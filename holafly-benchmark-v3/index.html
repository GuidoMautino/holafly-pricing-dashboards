<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holafly Pricing Benchmark</title>
<style>
:root{--green:#16a06a;--green-d:#0f7a50;--ink:#16242f;--muted:#6b7c8a;--line:#e7edf1;--bg:#f7f9fb;--card:#fff}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:40;background:rgba(247,249,251,.88);backdrop-filter:saturate(160%) blur(8px);border-bottom:1px solid var(--line)}
.nav .in{max-width:min(1600px,94vw);margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px}
.fresh{font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap}
.brand{font-weight:800;font-size:15px;letter-spacing:-.01em;white-space:nowrap}
.navtabs{display:flex;gap:4px;margin-left:6px}
.navtabs button{border:0;background:none;padding:7px 12px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:9px;transition:.15s}
.navtabs button:hover{color:var(--ink);background:#eef3f6}.navtabs button.on{color:var(--ink);background:#e8f5ee}
.spacer{flex:1}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:0;background:var(--card);padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.12s}.seg button.on{background:var(--ink);color:#fff}
.wrap{max-width:min(1600px,94vw);margin:0 auto;padding:26px 22px 80px}
h1{font-size:27px;margin:0 0 4px;letter-spacing:-.02em}.tagline{color:var(--muted);font-size:15px;margin:0 0 22px;max-width:680px}
.view{display:none}.view.on{display:block;animation:fadeUp .3s cubic-bezier(.2,.7,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px;margin:6px 0 24px}
.vcardx{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;border-top:3px solid var(--green);transition:transform .16s cubic-bezier(.2,.7,.2,1),box-shadow .16s}
.vcardx:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(20,40,55,.10)}
.vcardx h3{margin:0 0 8px;font-size:19px;letter-spacing:-.01em}.vcardx .see{margin:0 0 16px;font-size:14px;color:#3a4a55}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:0;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{background:var(--green-d);transform:translateX(2px)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:14px}
.panel h4{margin:0 0 10px;font-size:14px;letter-spacing:.01em}
.panel .row{font-size:13.5px;color:#3a4a55;margin:7px 0;padding-left:16px;position:relative}.panel .row:before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12.5px;color:var(--muted)}
.legend i{display:inline-block;width:14px;height:14px;border-radius:4px;margin-right:6px;vertical-align:-2px}
.example{background:#f1faf5;border:1px solid #c5e8d6;border-left:4px solid var(--green);border-radius:12px;padding:13px 17px;font-size:13.5px;margin-top:12px}.example b{color:var(--ink)}
details.howto{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:2px 16px;margin-bottom:14px}
details.howto summary{cursor:pointer;font-weight:700;padding:11px 0;font-size:13.5px;list-style:none}
details.howto summary::-webkit-details-marker{display:none}details.howto summary:before{content:"▸ ";color:var(--muted)}details.howto[open] summary:before{content:"▾ "}
details.howto .row{font-size:13px;color:#3a4a55;margin:6px 0 6px 4px}
.bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:8px 0 14px}
.grp{display:flex;gap:8px;align-items:center}.grp .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.dsearch{position:relative}.dsearch input{font-size:14px;font-weight:600;padding:8px 13px;border:1px solid var(--line);border-radius:10px;width:230px;outline:none;transition:.15s}.dsearch input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,160,106,.12)}
.dlist{position:absolute;z-index:30;top:42px;left:0;right:0;max-height:300px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(20,40,55,.14);display:none}
.dlist div{padding:8px 13px;font-size:14px;cursor:pointer}.dlist div:hover{background:#eef6f1}
.tabsub{font-size:13px;color:var(--muted);margin:2px 2px 12px;min-height:18px}
.kpis{display:flex;flex-wrap:wrap;gap:12px;margin:6px 0 16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 16px;flex:1;min-width:185px;transition:transform .15s}.kpi:hover{transform:translateY(-2px)}
.kpi b{display:block;font-size:21px;color:var(--green);letter-spacing:-.01em}.kpi span{font-size:12px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px 10px;overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th{font-size:11px;color:var(--muted);font-weight:700;padding:9px 6px;text-align:center;border-bottom:2px solid var(--line)}
th.l,td.l{text-align:left}td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line)}
td.dest{font-weight:700;cursor:pointer;transition:.12s}td.dest:hover{color:var(--green)}td.dest small{display:block;color:var(--muted);font-weight:500;font-size:11px}
.cell{border-radius:8px;padding:8px 5px;font-weight:700;display:inline-block;min-width:56px;cursor:help;transition:transform .1s}.cell:hover{transform:scale(1.05)}
.cell.nd{background:#f0f2f4;color:#aab4bd;font-weight:500;cursor:default}.cell.nd:hover{transform:none}
.blk{font-weight:600}.exg{font-size:12px;font-weight:700;color:#b5651d}.ex0{font-size:11px;color:var(--muted)}
.ghead td{background:#eef4f7;text-align:left;font-size:12.5px;font-weight:500;border-radius:7px;padding:9px 12px;cursor:pointer;transition:.12s;user-select:none}
.ghead:hover td{background:#e2edf3}
.garr{color:var(--muted);font-size:11px;display:inline-block;width:12px}
.note{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:9px;padding:10px 14px;margin:9px 0;font-size:12.5px;color:#3a4a55}.note b{color:var(--ink)}
#tip{position:fixed;z-index:99;display:none;background:#16242f;color:#fff;font-size:12px;font-weight:600;padding:7px 10px;border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,.28);pointer-events:none;max-width:290px;line-height:1.5}
.lead{background:#f1faf5;border:1px solid #c5e8d6;border-left:4px solid var(--green);border-radius:12px;padding:12px 16px;font-size:13.5px;margin-bottom:14px}
.fitsbox{background:#fff9ec;border:1px solid #f0dcae;border-left:4px solid #e8a317;border-radius:12px;padding:13px 17px;font-size:13.5px;margin-bottom:14px}
.scopebox{background:linear-gradient(135deg,#fff9ec,#fffdf6);border:1.5px solid #ecd9a8;border-radius:16px;padding:18px 22px;margin:0 0 18px;box-shadow:0 6px 18px rgba(180,140,40,.07)}
.scopebox h4{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.scopebadge{background:#e8a317;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:7px}
.srow{font-size:13.5px;color:#3a4a55;margin:7px 0;padding-left:24px;position:relative}
.srow:before{position:absolute;left:0;top:0;font-weight:800}
.srow.in:before{content:"✓";color:var(--green)}
.srow.out:before{content:"✕";color:#e15241}
.srow.rule:before{content:"·";color:#e8a317;font-size:20px;line-height:1;top:-2px}
.fitsbox h4{margin:0 0 8px;font-size:13.5px}.fitsbox .step{margin:5px 0;color:#3a4a55}.fitsbox .warn{margin-top:9px;padding-top:9px;border-top:1px dashed #e3cf9b;font-weight:600}
.cell .pl{display:none}
.insight .row b{color:var(--ink)}
.ghl{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.5}.ghl b{font-weight:800}
.gmethod{font-size:12px;color:var(--muted);margin-bottom:12px}
.gchips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.gchip{background:#f7f9fb;border:1px solid var(--line);border-radius:11px;padding:9px 13px;min-width:170px;flex:1}
.gchip .lab{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:4px}
.gchip b{display:block;margin-bottom:3px}
.gchip .sub{font-size:11px;color:var(--muted)}
.gall{border-top:1px dashed var(--line);padding-top:10px;font-size:13px;color:#3a4a55}
.gall .tt{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin-bottom:3px}.gall b{color:var(--ink)}
.btn2{display:inline-flex;align-items:center;gap:6px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.btn2:hover{border-color:var(--green);color:var(--green)}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin:6px 0 16px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.tile .tt{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tile b{display:block;font-size:24px;letter-spacing:-.01em;margin-bottom:6px}
.tile span{font-size:12px;color:var(--muted);line-height:1.5}
.diaggrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:980px){.diaggrid{grid-template-columns:1fr}}
.chip{display:inline-block;border-radius:7px;padding:2px 8px;font-size:11.5px;font-weight:700;margin:2px 4px 2px 0}
@media(min-width:1400px){
  .wrap,.nav .in{max-width:min(1700px,92vw)}
  table{font-size:14px}td{padding:10px 8px}th{padding:10px 8px;font-size:11.5px}
  .cell{min-width:64px;padding:9px 7px}
  .cell .pl{display:block;font-size:10px;font-weight:600;opacity:.78;margin-top:1px}
}
@media(max-width:900px){
  h1{font-size:22px}
  .nav .in{gap:8px;padding:9px 12px;flex-wrap:wrap}.fresh{display:none}
  .bar{gap:8px}.dsearch input{width:170px}
  .kpis{display:grid;grid-template-columns:1fr 1fr}
  table{font-size:12px}td{padding:6px 4px}th{padding:7px 4px}
  .cell{min-width:46px;padding:6px 3px;font-size:11.5px}
  td.l,th.l{position:sticky;left:0;background:var(--card);z-index:3;box-shadow:2px 0 6px rgba(20,40,55,.06)}
  .ghead td{position:static;box-shadow:none}
}
</style></head><body>
<div class="nav"><div class="in">
  <span class="brand" data-t="title"></span>
  <div class="navtabs" id="navtabs"><button data-go="intro" class="on" data-t="nav_home"></button><button data-go="general" data-t="nav_gen"></button><button data-go="dias" data-t="nav_dias"></button><button data-go="diag" data-t="nav_diag"></button></div>
  <span class="spacer"></span>
  <span class="fresh" id="fresh"></span>
  <div class="seg" id="langseg"><button data-lang="en" class="on">EN</button><button data-lang="es">ES</button></div>
</div></div>
<div class="wrap">

<div id="intro" class="view on">
  <h1 data-t="title"></h1><p class="tagline" data-t="tagline"></p>
  <p class="tagline" data-t="intro_lead" style="margin-top:-12px"></p>
  <div class="cards">
    <div class="vcardx"><h3 data-t="v1_t"></h3><p class="see" data-t="v1_see"></p><button class="btn" data-go="general"><span data-t="v1_cta"></span> →</button></div>
    <div class="vcardx"><h3 data-t="v2_t"></h3><p class="see" data-t="v2_see"></p><button class="btn" data-go="dias"><span data-t="v2_cta"></span> →</button></div>
    <div class="vcardx"><h3 data-t="v3_t"></h3><p class="see" data-t="v3_see"></p><button class="btn" data-go="diag"><span data-t="v3_cta"></span> →</button></div>
  </div>
  <div class="scopebox">
    <h4><span class="scopebadge" data-t="scope_b"></span><span data-t="scope_t"></span></h4>
    <div class="srow in" data-t="scope_1"></div>
    <div class="srow out" data-t="scope_2"></div>
    <div class="srow in" data-t="scope_3"></div>
    <div class="srow rule" data-t="scope_4"></div>
    <div class="srow rule" data-t="scope_5"></div>
  </div>
  <div class="panel"><h4 data-t="read_t"></h4>
    <div class="row" data-t="read_1"></div><div class="row" data-t="read_2"></div><div class="row" data-t="read_3"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<div id="general" class="view">
  <h1 data-t="v1_t"></h1>
  <details class="howto" id="howgen"><summary data-t="read_t"></summary>
    <div class="row" data-t="read_1"></div><div class="row" data-t="read_3"></div>
    <div class="legend" id="legend2"></div>
    <div class="example"><span data-t="gen_ex"></span></div>
  </details>
  <div class="bar">
    <div class="grp"><span class="lab" data-t="destination"></span><div class="dsearch"><input id="gsearch" autocomplete="off"><div class="dlist" id="glist"></div></div></div>
    <div class="grp"><span class="lab" data-t="competitor"></span><div class="seg" id="compseg"></div></div>
    <div class="grp"><span class="lab" data-t="axis"></span><div class="seg" id="tabseg"><button data-tab="unl" class="on" data-t="unl_tab"></button><button data-tab="cost" data-t="cost_tab"></button></div></div>
    <div class="grp"><span class="lab" data-t="group"></span><div class="seg" id="groupseg"><button data-group="none" data-t="g_none"></button><button data-group="zona" class="on" data-t="g_zona"></button><button data-group="hftier" data-t="g_hf"></button><button data-group="revtier" data-t="g_rev"></button></div></div>
    <div class="grp"><span class="lab" data-t="order"></span><div class="seg" id="orderseg"><button data-order="rev" class="on" data-t="o_rev"></button><button data-order="worst" data-t="o_worst"></button><button data-order="best" data-t="o_best"></button></div></div>
    <div class="grp"><span class="lab" data-t="cell"></span><div class="seg" id="modeseg"><button data-mode="gap" class="on" data-t="gap"></button><button data-mode="diff" data-t="diff"></button></div></div>
    <div class="grp"><span class="lab" data-t="currency"></span><div class="seg" id="curseg"><button data-cur="USD" class="on">USD</button><button data-cur="EUR">EUR</button></div></div>
    <div class="grp"><span class="spacer"></span><button class="btn2" id="exportbtn"></button></div>
  </div>
  <div class="tabsub" id="tabsub"></div>
  <div class="fitsbox" id="fitsbox" style="display:none">
    <h4 data-t="fits_t"></h4>
    <div class="step" data-t="fits_1"></div><div class="step" data-t="fits_2"></div><div class="step" data-t="fits_3"></div>
    <div class="warn" data-t="fits_warn"></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="panel insight" id="insight"><h4 data-t="ins_t"></h4><div id="insbody"></div></div>
  <div class="card"><table id="tbl"></table></div>
  <div class="note" id="note_fup"></div>
</div>

<div id="dias" class="view">
  <h1 data-t="v2_t"></h1>
  <div class="fitsbox" style="background:#f1faf5;border-color:#c5e8d6;border-left-color:var(--green)">
    <h4 data-t="dias_t"></h4>
    <div class="step" data-t="dias_1"></div><div class="step" data-t="dias_2"></div><div class="step" data-t="dias_3"></div>
    <div class="warn" style="border-top-color:#c5e8d6" data-t="dias_warn"></div>
  </div>
  <details class="howto" id="howdias"><summary data-t="leg_t"></summary>
    <div class="legend" id="legend3"></div>
  </details>
  <div class="bar">
    <div class="grp"><span class="lab" data-t="destination"></span><div class="dsearch"><input id="gsearch2" autocomplete="off"><div class="dlist" id="glist2"></div></div></div>
    <div class="grp"><span class="lab" data-t="competitor"></span><div class="seg" id="gcompseg"><button data-gcomp="a" class="on">Airalo</button><button data-gcomp="s">Saily</button></div></div>
    <div class="grp"><span class="lab" data-t="days"></span><div class="seg" id="gviewseg"><button data-gview="rep" class="on" data-t="rep"></button><button data-gview="all" data-t="alld"></button></div></div>
    <div class="grp"><span class="lab" data-t="cell"></span><div class="seg" id="gmodeseg"><button data-gmode="gap" class="on" data-t="gap"></button><button data-gmode="diff" data-t="diff"></button></div></div>
    <div class="grp"><span class="lab" data-t="currency"></span><div class="seg" id="gcurseg"><button data-gcur="USD" class="on">USD</button><button data-gcur="EUR">EUR</button></div></div>
  </div>
  <div class="kpis" id="gkpis"></div>
  <div class="panel insight" id="ginsight"><h4 data-t="ins_t"></h4><div id="ginsbody"></div></div>
  <div class="card"><table id="gtbl"></table></div>
  <div class="note" id="gsnote" style="display:none;border-left-color:#e8a317;background:#fff9ec"></div>
  <div class="note" id="note_forced"></div>
  <div class="note" id="note_fup2" style="border-left-color:var(--green)"></div>
</div>

<div id="diag" class="view">
  <h1 data-t="v3_t"></h1>
  <div class="note" style="border-left-color:#e8a317;background:#fff9ec" data-t="beta_note"></div>
  <div class="panel"><h4 data-t="o_sum_t"></h4><div id="osum"></div></div>
  <div class="lead" data-t="d_basis"></div>
  <div class="tiles" id="dtiles"></div>
  <div class="diaggrid">
    <div class="panel"><h4 data-t="o_rep_t"></h4><div class="tabsub" data-t="o_rep_sub" style="margin:0 0 8px"></div><table id="dworst"></table></div>
    <div class="panel"><h4 data-t="o_head_t"></h4><div class="tabsub" data-t="o_head_sub" style="margin:0 0 8px"></div><table id="dbest"></table></div>
  </div>
  <div class="panel"><h4 data-t="o_free_t"></h4><div class="tabsub" data-t="o_free_sub" style="margin:0 0 8px"></div><div id="dnone"></div></div>
  <div class="panel"><h4 data-t="o_dur_t"></h4><div class="tabsub" data-t="o_dur_sub" style="margin:0 0 8px"></div><div class="lead" id="ddurread" style="margin:0 0 10px"></div><div style="overflow-x:auto"><table id="ddur"></table></div></div>
</div>

wn in the cell (e.g. 10GB).", "fits_3": "3 · The gap compares that plan against Holafly's unlimited. It's deliberately the toughest scenario for Holafly: our unlimited vs their smallest plan that's enough.", "fits_warn": "Red here doesn't mean \"we lose\". It means the competitor covers a light trip with less product for less money. The like-for-like comparison is the Unlimited vs Unlimited tab; this one measures how exposed the premium is when the customer only needs a few GB.", "ins_t": "Reading", "ins_scope_all": "All destinations", "ins_one_hint": "Showing one destination; the reading below covers the whole table.", "ins_main": "Unlimited vs unlimited against <b>{c}</b>: Holafly is cheaper in <b>{p}%</b> of cells ({w} of {n}), median gap <b>{m}</b>.", "ins_cost": "Against <b>{c}</b>'s cheapest plan that fits: Holafly wins <b>{p}%</b> of cells ({w} of {n}), median gap <b>{m}</b>. A positive gap is expected here: it prices the premium vs a smaller capped plan.", "ins_best": "Biggest edges: {x}", "ins_worst": "Biggest deficits: {x}", "ins_excl": "{e} cells where {c} sells no unlimited at all, uncontested territory for the claim.", "export": "Export CSV", "fresh": "Data:", "d_basis": "Basis: unlimited vs unlimited, USD, against the <b>best price between Airalo and Saily</b>. Each destination is summarized by its median gap across the 8 durations. Revenue = Holafly net sales by destination, <b>Jan-May 2026</b> (internal destinations report); used only to rank priorities, internal, don't share outside pricing.", "d_dest": "Destination", "d_med": "Median gap", "d_reg": "Region", "d_revcol": "Revenue", "beta_note": "<b>Beta.</b> Preliminary reading to prioritize where to look, not a verdict. Thresholds (≥ +10%, ≤ 0%) and the revenue basis are under review; nothing here should be acted on without validating.", "o_sum_t": "Quick read", "o_sum_1": "Across {n} destinations with unlimited-vs-unlimited data, Holafly quotes a median <b>{m}</b> vs the best competitor price.", " as en Airalo salta al bloque de 30).", "kpi_cheaper": "celdas donde Holafly es más barato que {c}", "kpi_median": "mediana del gap unlimited", "kpi_excl": "celdas donde {c} no vende unlimited", "kpi_cost": "mediana del gap vs el plan que te alcanza", "g_kpi_w": "largos de viaje donde Holafly le gana al bloque forzado de {c}", "g_kpi_ex": "días de más que {c} te cobra en promedio", "zona": {"NA": "Norteamérica", "LATAM": "Latinoamérica", "EU": "Europa", "ME": "Medio Oriente", "AF": "África", "APAC": "Asia-Pacífico", "OT": "Otros"}, "hf": {"t1": "Económico ~$19,5", "t2": "Medio ~$20,9", "t3": "Alto ~$29,9", "t4": "Premium ~$31,9", "na": "-"}, "rev": {"r1": "Mega ≥€4M (ene-may'26)", "r2": "Grande €2-4M", "r3": "Medio €0.5-2M", "r4": "Cola <€0.5M"}, "note_forced": "Bloque forzado = el ilimitado más chico del competidor cuya validez cubre tu viaje. +N días = lo que pagás de más vs el viaje real. \"mismo día\" = tu viaje coincide con un bloque (sin ventaja de granularidad; ahí Holafly suele salir un toque más caro, mismo producto, distinta lista).", "note_fup": "Airalo: 3 GB/día y luego 1 Mbps (confirmado). Saily: 3-5 GB/día y luego 1 Mbps. Holafly no throttlea. Precio Airalo = el más barato entre los carriers locales del país (algunos tienen varios).", "note_saily": "Saily se vende principalmente por GB con validez ~30 días; solo su tier ilimitado varía por día, que es lo único comparable acá.", "lead_dias": "Holafly vende el día exacto (1-90). Los competidores venden bloques fijos: si tu viaje cae entre bloques, comprás el de arriba y pagás días que no usás.", "nav_diag": "Oportunidades (beta)", "v3_t": "Oportunidades (beta)", "v3_see": "Qué vas a ver: dónde está expuesto el premium (candidatos a repricing), dónde Holafly gana claro (claims y headroom), mercados sin competencia, y si el gap es estructural por duración.", "v3_cta": "Abrir", "order": "Orden", "o_rev": "Revenue", "o_worst": "Peor gap", "o_best": "Mejor gap", "gh_cells": "gana {w}/{t} celdas", "gh_med": "me ue en juego", "o_t4_d": "Net sales ene-may 2026 del grupo expuesto. Es lo que está en juego si la competencia aprieta en precio, no lo que se pierde.", "o_dur": "Duración", "o_n": "celdas", "fits_t": "Cómo leer este eje (NO es mismo producto, a propósito)", "fits_1": "1 · Estimamos el consumo real del viaje: proxy de consumo (los GB/día abajo de cada destino) × días de viaje.", "fits_2": "2 · Tomamos el plan más barato del competidor que cubre ese consumo y esa validez, capeado o ilimitado, el que salga menos. El plan elegido se ve en la celda (ej. 10GB).", "fits_3": "3 · El gap compara ese plan contra el ilimitado de Holafly. Es a propósito el peor escenario para Holafly: nuestro ilimitado vs el plan más chico que les alcanza.", "fits_warn": "El rojo acá no significa \"perdemos\". Significa que el competidor cubre un viaje liviano con menos producto por menos plata. La comparación pareja es el tab Unlimited vs Unlimited; este eje mide qué tan expuesto queda el premium cuando el cliente solo necesita unos GB.", "ins_t": "Lectura", "ins_scope_all": "Todos los destinos", "ins_one_hint": "Estás viendo un destino; la lectura de abajo cubre toda la tabla.", "ins_main": "Unlimited vs unlimited contra <b>{c}</b>: Holafly es más barato en <b>{p}%</b> de las celdas ({w} de {n}), mediana del gap <b>{m}</b>.", "ins_cost": "Contra el plan que te alcanza de <b>{c}</b>: Holafly gana <b>{p}%</b> de las celdas ({w} de {n}), mediana del gap <b>{m}</b>. Un gap positivo acá es esperable: le pone precio al premium vs un capeado más chico.", "ins_best": "Mayores ventajas: {x}", "ins_worst": "Mayores déficits: {x}", "ins_excl": "{e} celdas donde {c} no vende ilimitado, territorio libre para el claim.", "export": "Exportar CSV", "fresh": "Data:", "d_basis": "Base: unlimited vs unlimited, USD, contra el <b>mejor precio entre Airalo y Saily</b>. Cada destino se resume por la mediana de su gap en las 8 duraciones. Revenue = net sales de Holafly por destino, <b>ene-may 2026</b> (reporte inter       const pu=pick(cell,false); if(!pu.has)return;

  document.getElementById('dbest').innerHTML=oppTable(head.slice(0,12));
  const ns=[...none].sort((a,b)=>(b.rev||0)-(a.rev||0));
  document.getElementById('dnone').innerHTML=ns.length?ns.map(o=>'<span class="chip" style="background:#dce8f5;color:#1c3d5a">'+o.name+(o.rev?' · '+revFmt(o.rev):'')+'</span>').join(''):'-';
  // gap por duración (estructura de curva)
  let dh='<tr><th class="l">'+t('o_dur')+'</th><th>Airalo</th><th>Saily</th><th>'+t('best')+'</th></tr>';
  const allBest=[]; const durMeds=[];
  D.durations.forEach(d=>{ const acc={Airalo:[],Saily:[],BEST:[]};
    D.destinos.forEach(o=>{ const c=o.days[String(d)]; if(!c||c.hu==null)return; let best=null;
      D.competitors.forEach(k=>{ const cc=c.c[k]; if(cc&&cc.u!=null){ acc[k].push((c.hu-cc.u)/cc.u*100); if(best==null||cc.u<best)best=cc.u; } });
      if(best!=null)acc.BEST.push((c.hu-best)/best*100); });
    if(acc.BEST.length){ allBest.push(...acc.BEST); durMeds.push(median(acc.BEST)); }
    dh+='<tr><td class="l" style="font-weight:700">'+d+'d</td>'+['Airalo','Saily','BEST'].map(k=>{ const a=acc[k];
      if(!a.length)return '<td><span class="cell nd">-</span></td>';
      const m=median(a),col=gcol(m);
      return '<td><span class="cell" style="background:'+col.bg+';color:'+col.fg+'">'+fmtPct(m)+'</span><div style="font-size:10px;color:var(--muted)">'+a.length+' '+t('o_n')+'</div></td>'; }).join('')+'</tr>'; });
  document.getElementById('ddur').innerHTML=dh;
  // lectura rápida (auto, prudente)
  const dmin=Math.min(...durMeds), dmax=Math.max(...durMeds);
  document.getElementById('ddurread').innerHTML=t('o_dur_read').replace('{a}','<b>'+fmtPct(dmin)+'</b>').replace('{b}','<b>'+fmtPct(dmax)+'</b>').replace('{s}',(dmax-dmin)<=5?t('o_dur_flat'):t('o_dur_steep'));
  const totRev=D.destinos.reduce((a,o)=>a+(o.rev||0),0);
  const repPct=totRev?Math.round(repRev/totRev*100)+'%':'-';
  const tops=rep.slice(0,3).map(r=>r.name+' ('+fmtPct(r.med)+', '+revFmt(r.rev)+')').join(', ');
  let sum='<div class="ghl">'+t('o_sum_1').replace('{n}',rows.length).replace('{m}',fmtPct(median(allBest)))+'</div>';
  sum+='<div class="row">'+t('o_sum_2').replace('{a}',fmtPct(dmin)).replace('{b}',fmtPct(dmax)).replace('{s}',(dmax-dmin)<=5?t('o_sum_flat'):t('o_sum_steep'))+'</div>';
  if(rep.length) sum+='<div class="row">'+t('o_sum_3').replace('{k}',rep.length).replace('{r}',repPct).replace('{x}','<b>'+tops+'</b>')+'</div>';
  sum+='<div class="row">'+t('o_sum_4').replace('{f}',none.length)+'</div>';
  document.getElementById('osum').innerHTML=sum; }
// ---- Export CSV (vista general, estado actual de filtros) ----
function exportCSV(){ const std=(TAB==='cost'); const lab=cLabel();
  let rows=[['destination','region','hf_rev_tier','duration_days','hf_usd',(std?'comp_fits_usd':'comp_unl_usd'),'plan','competitor','gap_pct']];
  const list=SEL==='ALL'?D.destinos:D.destinos.filter(o=>o.name===SEL);
  list.forEach(o=>{ D.durations.forEach(d=>{ const cell=o.days[String(d)]; if(!cell||cell.hu==null)return;
    const p=pick(cell,std); if(!p.has||p.price==null)return;
    const g=Math.round((cell.hu-p.price)/p.price*1000)/10;
    rows.push([o.name,o.zona,o.revtier,d,cell.hu,p.price,(std?(p.vl||''):'unlimited'),(p.who||lab),g]); }); });
  const csv=rows.map(r=>r.map(x=>{x=String(x); return x.indexOf(',')>=0?'"'+x+'"':x;}).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='holafly_benchmark_'+(std?'fits':'unlimited')+'_'+(COMP==='BEST'?'best':COMP)+'_'+D.built+'.csv'; a.click(); }
function setupSearch(inputId,listId,onPick,withAll){ const inp=document.getElementById(inputId),lst=document.getElementById(listId);
  function opts(q){ q=(q||'').toLowerCase(); let arr=NAMES.filter(n=>n.toLowerCase().indexOf(q)>=0);
    let html=''; if(withAll&&(''===q||t('all_dest').toLowerCase().indexOf(q)>=0)) html+='<div data-v="ALL">'+t('all_dest')+'</div>';
    return html+arr.map(n=>'<div data-v="'+n+'">'+n+'</div>').join(''); }
  inp.addEventListener('focus',()=>{lst.innerHTML=opts(inp.value);lst.style.display='block';});
  inp.addEventListener('input',()=>{lst.innerHTML=opts(inp.value);lst.style.display='block';});
  lst.addEventListener('mousedown',e=>{const d=e.target.closest('[data-v]'); if(!d)return; const v=d.dataset.v; inp.value=(v==='ALL'?t('all_dest'):v); lst.style.display='none'; onPick(v);});
  inp.addEventListener('blur',()=>setTimeout(()=>lst.style.display='none',150)); }
function show(v){ VIEW=v; ['intro','general','dias','diag'].forEach(id=>document.getElementById(id).classList.toggle('on',id===v));
  document.querySelectorAll('#navtabs button').forEach(b=>b.classList.toggle('on',b.dataset.go===v));
  syncSearch(); if(v==='general')renderGen(); if(v==='dias')renderGran(); if(v==='diag')renderDiag(); window.scrollTo({top:0,behavior:'smooth'}); }
function bind(id,attr,set){ const el=document.getElementById(id); if(!el)return; el.addEventListener('click',e=>{const v=e.target.dataset[attr]; if(v==null)return; set(v); document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.toggle('on',b.dataset[attr]===v)); if(VIEW==='general')renderGen(); else if(VIEW==='dias')renderGran();}); }
document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>show(b.dataset.go)));
bind('compseg','comp',v=>COMP=v); bind('tabseg','tab',v=>TAB=v); bind('groupseg','group',v=>GROUP=v); bind('modeseg','mode',v=>MODE=v); bind('curseg','cur',v=>CUR=v); bind('orderseg','order',v=>ORDER=v);
document.getElementById('tbl').addEventListener('click',e=>{ const g=e.target.closest('tr.ghead'); if(!g||!g.dataset.gk)return; const k=GROUP+'|'+g.dataset.gk; OPENG[k]=!OPENG[k]; renderTable(); });
bind('gcompseg','gcomp',v=>gCOMP=v); bind('gviewseg','gview',v=>gVIEWD=v); bind('gmodeseg','gmode',v=>gMODE=v); bind('gcurseg','gcur',v=>gCUR=v);
function syncSearch(){ const lab=SEL==='ALL'?'':SEL; const a=document.getElementById('gsearch'),b=document.getElementById('gsearch2'); if(a)a.value=lab; if(b)b.value=lab; }
setupSearch('gsearch','glist',v=>{SEL=v;syncSearch();renderGen();},true);
setupSearch('gsearch2','glist2',v=>{SEL=v;syncSearch();renderGran();},true);
document.getElementById('langseg').addEventListener('click',e=>{const v=e.target.dataset.lang; if(!v)return; LANG=v; document.querySelectorAll('#langseg button').forEach(b=>b.classList.toggle('on',b.dataset.lang===v)); applyI18n(); syncSearch(); if(VIEW==='general')renderGen(); else if(VIEW==='dias')renderGran(); else if(VIEW==='diag')renderDiag();});
document.getElementById('exportbtn').addEventListener('click',exportCSV);
const tip=document.getElementById('tip');
document.body.addEventListener('mousemove',e=>{const c=e.target.closest('.cell'); if(c&&c.dataset.tip){tip.innerHTML=c.dataset.tip;tip.style.display='block';let x=e.clientX+14,y=e.clientY+14;if(x>innerWidth-300)x=e.clientX-290;tip.style.left=x+'px';tip.style.top=y+'px';}else tip.style.display='none';});
document.body.addEventListener('click',e=>{const td=e.target.closest('td.dest'); if(td&&td.dataset.name){SEL=td.dataset.name;syncSearch();renderGen();return;}
  if(window.matchMedia&&window.matchMedia('(hover: none)').matches){ const c=e.target.closest('.cell');
    if(c&&c.dataset.tip){ tip.innerHTML=c.dataset.tip; tip.style.display='block'; const r=c.getBoundingClientRect();
      let x=Math.min(r.left,innerWidth-300); tip.style.left=Math.max(6,x)+'px'; tip.style.top=(r.bottom+8)+'px'; }
    else tip.style.display='none'; }});
applyI18n(); syncSearch();
