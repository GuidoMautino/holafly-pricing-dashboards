const Gauge = ({ label, baseline, current, floor, unit, t }) => {
  const d = current - baseline;
  const rng = Math.max(Math.abs(baseline - (floor || baseline * 0.7)), Math.abs(d), 0.01) * 2.5;
  const pos = Math.max(5, Math.min(95, 50 + (d / rng) * 45));
  const c = (floor !== undefined && current < floor) ? t.red : current >= baseline ? t.green : t.yellow;
  const fmt = v => unit === "%" ? v.toFixed(1) + "%" : "€" + v.toFixed(2);
  return <div style={{ marginBottom: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
      <span style={{ fontSize: 13, color: t.textDim }}>{label}</span>
      <div style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
        <span style={{ fontSize: 14, fontWeight: 700, fontFamily: MN, color: t.text }}>{fmt(current)}</span>
        <span style={{ fontSize: 12, fontFamily: MN, color: c }}>{d >= 0 ? "+" : ""}{unit === "%" ? d.toFixed(2) + "pp" : ((d / baseline) * 100).toFixed(1) + "%"}</span>
      </div>
    </div>
    <div style={{ position: "relative", height: 10, borderRadius: 5, background: t.border }}>
      {floor !== undefined && <div style={{ position: "absolute", left: Math.max(2, 50 + ((floor - baseline) / rng) * 45) + "%", top: 0, bottom: 0, width: 2, background: t.red + "60", zIndex: 1 }} />}
      <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 2, background: t.textMuted + "40", zIndex: 1 }} />
      <div style={{ position: "absolute", left: Math.min(50, pos) + "%", width: Math.abs(pos - 50) + "%", top: 1, bottom: 1, borderRadius: 4, background: c, opacity: 0.6 }} />
      <div style={{ position: "absolute", left: pos + "%", top: -2, width: 14, height: 14, borderRadius: "50%", background: c, transform: "translateX(-50%)", border: "2px solid " + t.card, zIndex: 2 }} />
    </div>
    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3, fontSize: 10, color: t.textMuted }}>
      <span>{floor !== undefined ? "Floor: " + fmt(floor) : ""}</span><span>Baseline: {fmt(baseline)}</span>

};

  const gaugeGmBase = ref === "14d" && D.baselines.gm_14d ? D.baselines.gm_14d : D.baselines.gm;

  const rH = (text, status, label) => {
    const hp = pH(text);
    return <div style={{ padding: "12px 14px", borderRadius: 8, background: t.accent + "06", border: "1px solid " + t.accent + "20", marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: t.accent, letterSpacing: 1 }}>{label}</span>
        <Pill color={status === "Confirmed" ? t.green : t.yellow}>{status.toUpperCase()}</Pill>
      </div>
      <div style={{ fontSize: 13, color: t.text, lineHeight: 1.6 }}><span style={{ fontWeight: 700, color: t.accent }}>{ifL}</span> {hp.i}</div>
      <div style={{ fontSize: 13, color: t.text, lineHeight: 1.6, marginTop: 4 }}><span style={{ fontWeight: 700, color: t.green }}>{thenL}</span> {hp.t}</div>
      <div style={{ fontSize: 13, color: t.text, lineHeight: 1.6, marginTop: 4 }}><span style={{ fontWeight: 700, color: t.yellow }}>{becL}</span> {hp.b}</div>
    </div>;
  };

  const aovChk = r => {
    if (r.chk === "ok") return { s: "✅", c: t.green };
    if (r.chk === "warn") return { s: "⚠️", c: t.yellow };
    if (r.flag === "anomaly") return { s: "⚠️", c: t.yellow };
    return { s: "✅", c: t.green };
  };

  // D Object Validation Warnings
  const warnings = [];
  if (!D.declaration) warnings.push({ en: "Missing experiment declaration (launch date, clean days, timeline).", es: "Falta declaración del experimento (fecha lanzamiento, días limpios, timeline)." });
  if (!D.baselines.arpu_14d) warnings.push({ en: "Missing 14-day ARPU baseline. Toggle will use 90-day for both views.", es: "Falta baseline ARPU 14 días. El toggle usará 90 días para ambas vistas." });
  if (!D.baselines.cr_14d) warnings.push({ en: "Missing 14-day CR baseline. Toggle will use 90-day for both views.", es: "Falta baseline CR 14 días. El toggle usará 90 días para ambas vistas." });
  if (!D.baselines.gm_14d) warnings.push({ en: "Missing 14-day Gross Margin baseline. Toggle will use 90-day for both views.", es: "Falta baseline Gross Margin 14 días. El toggle usará 90 días para ambas vistas." });
  if (!D.impactCalcRows || !D.impactCalcRows["90d"]) warnings.push({ en: "Missing structured impact calculations.", es: "Faltan calculos de impacto estructurados." });
  if (D.totalOrders > 10000 && !D.sig.chi.cramers_v) warnings.push({ en: "Large sample (" + D.totalOrders.toLocaleString() + " orders) without Cramér's V. Chi-square inflates with sample size, V normalizes it.", es: "Muestra grande (" + D.totalOrders.toLocaleString() + " órdenes) sin V de Cramér. Chi-cuadrado se infla con tamaño de muestra, V lo normaliza." });

  return <div style={{ fontFamily: "'IBM Plex Sans', system-ui, sans-serif", background: t.bg, color: t.text, minHeight: "100vh", padding: 20, maxWidth: 860, margin: "0 auto" }}>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

    {/* HEADER */}
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span style={{ fontSize: 22 }}>{D.flag}</span>
        <h1 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>{D.code}</h1>
        <Pill color={sc}>{D.signal.toUpperCase()}</Pill>
        <Pill color={cc}>{D.causalConfidence} CONFIDENCE</Pill>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <Tg left="EN" right="ES" active={lang === "en" ? "left" : "right"} fn={() => setLang(lang === "en" ? "es" : "en")} />
        <Tg left="☾" right="☀" active={dark ? "left" : "right"} fn={() => setDark(!dark)} />
      </div>
    </div>
    <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
      <Pill color={t.accent}>{D.jira}</Pill><Pill color={t.textMuted}>{D.category}</Pill><Pill color={t.textMuted}>{D.revScope}</Pill>
      <a href={D.notion} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: t.accent, textDecoration: "none" }}>Notion ↗</a>
    </div>

    {/* EXPERIMENT RESULT (only for Completed experiments) */}
    {D.summary && D.declaration.status === "Completed" && <div style={{ marginBottom: 14, padding: "16px 20px", borderRadius: 10, background: sc + "06", border: "1px solid " + sc + "25" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: sc, letterSpacing: 1 }}>{tx(lang, "EXPERIMENT RESULT", "RESULTADO DEL EXPERIMENTO")}</div>
        <Pill color={sc}>{D.signal.toUpperCase()}</Pill>
      </div>
      {/* HEADLINE with selective bold */}
      <div style={{ fontSize: 15, color: t.text, lineHeight: 1.6, marginBottom: 14 }}>{D.summary[lang].headline.map((s, i) => s.b ? <span key={i} style={{ fontWeight: 700 }}>{s.t}</span> : <span key={i}>{s.t}</span>)}</div>
      {/* MDE CARDS */}
      {D.mde && <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 10 }}>{tx(lang, "MINIMUM DESIRABLE EFFECTS (vs " + D.mde.reference + ")", "EFECTOS MINIMOS DESEADOS (vs " + D.mde.reference + ")")}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
        {D.mde.criteria.map((c, i) => { const col = c.status === "met" ? t.green : c.status === "partial" || c.status === "trending" ? t.yellow : t.red; return <div key={i} style={{ padding: "10px 14px", borderRadius: 8, background: col + "06", border: "1px solid " + col + "20" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{tx(lang, c.label_en, c.label_es)}</span>
            <span style={{ fontSize: 14 }}>{c.status === "met" ? "✅" : c.status === "partial" ? "📊" : c.status === "trending" ? "📈" : "❌"}</span>
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: MN, color: col, marginBottom: 4 }}>{c.result}</div>
          <div style={{ fontSize: 10, color: t.textDim }}>{tx(lang, "Target", "Objetivo")}: {c.threshold}</div>
        </div>; })}
        </div>
      </div>}
      {/* KEY INSIGHT: bridges observed vs DID */}
      {D.keyInsight && <div style={{ fontSize: 13, color: t.text, lineHeight: 1.7, padding: "14px 16px", marginBottom: 12, background: t.purple + "08", borderRadius: 8, border: "1px solid " + t.purple + "20" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.purple, letterSpacing: 1, marginBottom: 8 }}>{tx(lang, "KEY INSIGHT", "INSIGHT CLAVE")}</div>
        {(lang === "en" ? D.keyInsight.en : D.keyInsight.es).map((para, pi) => <div key={pi} style={{ marginBottom: pi < 2 ? 8 : 3, fontSize: pi < 2 ? 13 : 12, color: pi < 2 ? t.text : t.textDim }}>{para.map((s, si) => s.b ? <strong key={si} style={{ color: t.purple }}>{s.t}</strong> : <span key={si}>{s.t}</span>)}</div>)}
      </div>}
    </div>}

    {/* ═══ METHODOLOGY & CONFIDENCE ═══ */}
    {D.declaration.status === "Completed" && <Xp title={tx(lang, "📋 Methodology, Action & Confidence", "📋 Metodologia, Accion y Confianza")} t={t}>
      {/* ACTION */}
      <div style={{ padding: "10px 14px", borderRadius: 6, background: t.accent + "08", border: "1px solid " + t.accent + "15", marginBottom: 10 }}>
        <div style={{ fontSize: 10, fontWeight: 600, color: t.accent, marginBottom: 6 }}>{tx(lang, "ACTION & RATIONALE", "ACCION Y RACIONAL")}</div>
        {D.summary[lang].action.map((p, i) => <div key={i} style={{ fontSize: 13, fontWeight: i === 0 ? 500 : 400, color: i === 0 ? t.text : t.textDim, lineHeight: 1.6, marginBottom: i < D.summary[lang].action.length - 1 ? 8 : 0 }}>{p}</div>)}
      </div>
      {/* CAVEATS */}
      <div style={{ marginBottom: 10, padding: "8px 12px", borderRadius: 6, background: t.yellow + "06", border: "1px solid " + t.yellow + "15" }}>
        <div style={{ fontSize: 10, fontWeight: 600, color: t.yellow, marginBottom: 3 }}>{tx(lang, "CAVEATS", "CAVEATS")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{D.summary[lang].caveat}</div>
      </div>
      {/* CONFIDENCE */}
      {D.confidence && <div style={{ padding: "14px 16px", borderRadius: 8, background: t.card, border: "1px solid " + t.border }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1 }}>{tx(lang, "CONFIDENCE LEVEL", "NIVEL DE CONFIANZA")}</span>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 60, height: 6, borderRadius: 3, background: t.border, overflow: "hidden" }}><div style={{ width: (D.confidence.level * 10) + "%", height: "100%", borderRadius: 3, background: D.confidence.level >= 8 ? t.green : D.confidence.level >= 6 ? t.yellow : t.orange }} /></div>
            <span style={{ fontSize: 14, fontWeight: 700, fontFamily: MN, color: D.confidence.level >= 8 ? t.green : D.confidence.level >= 6 ? t.yellow : t.orange }}>{D.confidence.level}/10</span>
          </div>
        </div>
        <div style={{ fontSize: 13, color: t.text, lineHeight: 1.7, marginBottom: 10 }}>{D.confidence[lang].solid.map((s, i) => s.b ? <strong key={i}>{s.t}</strong> : <span key={i}>{s.t}</span>)}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: t.green, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "HIGH CONFIDENCE (9-10)", "ALTA CONFIANZA (9-10)")}</div>
            {D.confidence[lang].solid_items.map((item, i) => <div key={i} style={{ fontSize: 11, color: t.textDim, lineHeight: 1.5, marginBottom: 4, paddingLeft: 12, position: "relative" }}><span style={{ position: "absolute", left: 0, color: t.green }}>+</span>{item}</div>)}
          </div>
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: t.yellow, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "MODERATE CONFIDENCE (5-7)", "CONFIANZA MODERADA (5-7)")}</div>
            {D.confidence[lang].uncertain_items.map((item, i) => <div key={i} style={{ fontSize: 11, color: t.textDim, lineHeight: 1.5, marginBottom: 4, paddingLeft: 12, position: "relative" }}><span style={{ position: "absolute", left: 0, color: t.yellow }}>~</span>{item}</div>)}
          </div>
        </div>
        <div style={{ padding: "10px 12px", background: t.accent + "06", borderRadius: 6, border: "1px solid " + t.accent + "15" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "HOW TO INCREASE CONFIDENCE", "COMO AUMENTAR LA CONFIANZA")}</div>
          {D.confidence[lang].improve.map((item, i) => <div key={i} style={{ fontSize: 11, color: t.textDim, lineHeight: 1.5, marginBottom: 4, paddingLeft: 12, position: "relative" }}><span style={{ position: "absolute", left: 0, color: t.accent }}>&#8594;</span>{item}</div>)}
        </div>
      </div>}
    </Xp>}

    {/* CHECKPOINT STATUS (for Live experiments, not Completed) */}
    {D.mde && D.declaration.status !== "Completed" && <div style={{ marginBottom: 14, padding: "16px 20px", borderRadius: 10, background: t.card, border: "1px solid " + t.border }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 8 }}>{tx(lang, "CHECKPOINT STATUS — MDE PROGRESS", "ESTADO DEL CHECKPOINT — PROGRESO MDE")}</div>
      {D.mde.criteria.map((c, i) => <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "6px 10px", marginBottom: 3, borderRadius: 4, background: c.status === "met" ? t.green + "06" : c.status === "trending" ? t.yellow + "06" : t.border + "30" }}>
        <span style={{ fontSize: 14 }}>{c.status === "met" ? "✅" : c.status === "trending" ? "📈" : "⏳"}</span>
        <span style={{ fontSize: 12, color: t.text, flex: 1 }}>{tx(lang, c.label_en, c.label_es)}: {c.threshold}</span>
        <span style={{ fontSize: 11, fontFamily: MN, color: c.status === "met" ? t.green : c.status === "trending" ? t.yellow : t.textDim }}>{c.result}</span>
      </div>)}
    </div>}

    {/* EXPERIMENT DECLARATION */}
    {D.declaration && <div style={{ marginBottom: 14, padding: "12px 16px", borderRadius: 10, background: t.card, border: "1px solid " + t.border }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1 }}>{tx(lang, "EXPERIMENT TIMELINE", "TIMELINE DEL EXPERIMENTO")}</span>
        <Pill color={D.declaration.status === "Completed" ? t.green : D.declaration.status === "Live" ? t.accent : t.yellow}>{D.declaration.status.toUpperCase()}</Pill>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
        {[
          { l: tx(lang, "Launch", "Lanzamiento"), v: D.declaration.launchDate },
          { l: tx(lang, "First clean day", "Primer día limpio"), v: D.declaration.firstCleanDay },
          { l: tx(lang, "Expected end", "Fin esperado"), v: D.declaration.endDate },
          { l: tx(lang, "Clean days", "Días limpios"), v: D.declaration.actualCleanDays + " / " + D.declaration.expectedCleanDays },
        ].map((item, i) => <div key={i}>
          <div style={{ fontSize: 9, color: t.textMuted, marginBottom: 2 }}>{item.l}</div>
          <div style={{ fontSize: 12, fontFamily: MN, color: t.text }}>{item.v}</div>
        </div>)}
      </div>
      {D.declaration.actualCleanDays < D.declaration.expectedCleanDays && <div style={{ fontSize: 11, color: t.yellow, marginBottom: 6 }}>⚠️ {tx(lang, "Experiment has " + D.declaration.actualCleanDays + " of " + D.declaration.expectedCleanDays + " expected clean days. Results are from this checkpoint, not the final window.", "Experimento tiene " + D.declaration.actualCleanDays + " de " + D.declaration.expectedCleanDays + " días limpios esperados. Resultados son de este checkpoint, no de la ventana final.")}</div>}
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: t.textMuted, marginBottom: 4 }}>
        <span>{D.checkpoint} ({D.checkpointDate}) · {D.totalOrders.toLocaleString()} {tx(lang, "orders", "órdenes")}</span>
      </div>
      <div style={{ height: 8, borderRadius: 4, background: t.border }}><div style={{ height: "100%", borderRadius: 4, background: "linear-gradient(90deg, " + t.orange + ", " + sc + ")", width: Math.min(100, D.declaration.actualCleanDays / D.declaration.expectedCleanDays * 100) + "%" }} /></div>
    </div>}

    {/* ═══ ANALYSIS LENS TOGGLE (sticky) ═══ */}
    <div style={{ position: "sticky", top: 0, zIndex: 10, marginBottom: 14, padding: "10px 16px", borderRadius: 10, background: t.bg, borderBottom: "2px solid " + (isDID ? t.purple : ref === "14d" ? t.yellow : t.accent) + "40" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1 }}>{tx(lang, "ANALYSIS LENS", "LENTE DE ANALISIS")}</span>
        <Tg3 opts={[
          { v: "90d", l: tx(lang, "Observed vs 90d", "Observado vs 90d") },
          { v: "14d", l: tx(lang, "Observed vs 14d", "Observado vs 14d") },
          ...(D.impactDID ? [{ v: "did", l: tx(lang, "Price-attributable (DID)", "Atribuible al precio (DID)") }] : []),
        ]} active={ref} setActive={setRef} />
      </div>
    </div>

    {/* ═══ TOGGLE INSIGHT ═══ */}
    {D.toggleInsights && D.toggleInsights[ref] && <div style={{ marginBottom: 14, padding: "14px 16px", borderRadius: 10, background: (isDID ? t.purple : ref === "14d" ? t.yellow : t.accent) + "06", border: "1px solid " + (isDID ? t.purple : ref === "14d" ? t.yellow : t.accent) + "20" }}>
      {D.toggleFraming && D.toggleFraming[ref] && <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid " + (isDID ? t.purple : ref === "14d" ? t.yellow : t.accent) + "15" }}>{tx(lang, D.toggleFraming[ref].en, D.toggleFraming[ref].es)}</div>}
      <div style={{ fontSize: 10, fontWeight: 700, color: isDID ? t.purple : ref === "14d" ? t.yellow : t.accent, letterSpacing: 1, marginBottom: 10 }}>{tx(lang, "WHAT THIS VIEW SHOWS", "QUE MUESTRA ESTA VISTA")}</div>
      {(lang === "en" ? D.toggleInsights[ref].en : D.toggleInsights[ref].es).map((item, i, arr) => <div key={i} style={{ fontSize: 12, color: i < arr.length - 1 ? t.text : t.textDim, lineHeight: 1.6, marginBottom: 6, paddingLeft: 14, position: "relative" }}>
        <span style={{ position: "absolute", left: 0, color: isDID ? t.purple : ref === "14d" ? t.yellow : t.accent, fontWeight: 700 }}>{i < arr.length - 1 ? "·" : "→"}</span>
        {item}
      </div>)}
    </div>}

    {/* ═══ MAIN RESULTS ═══ */}
    <Xp title={tx(lang, "📋 Main experiment results", "📋 Resultados principales")} t={t}>

      {/* NEXT STEPS + CONFOUNDER (inside, not top-level) */}
      <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 250, padding: "10px 14px", borderRadius: 8, background: t.accent + "08", border: "1px solid " + t.accent + "20" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, letterSpacing: 1, marginBottom: 3 }}>🎯 {tx(lang, "NEXT STEPS", "SIGUIENTES PASOS")}</div>
          <div style={{ fontSize: 12, color: t.text, lineHeight: 1.5 }}>{L.nextSteps}</div>
        </div>
        {D.confounder && <div style={{ flex: 1, minWidth: 250, padding: "10px 14px", borderRadius: 8, background: t.orange + "08", border: "1px solid " + t.orange + "20" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.orange, letterSpacing: 1, marginBottom: 3 }}>⚠️ CONFOUNDER</div>
          <div style={{ fontSize: 12, color: t.orange, lineHeight: 1.5 }}>{L.confounderNote}</div>
        </div>}
      </div>

      {/* COUNTERFACTUAL (context for evidence) */}
      {D.counterfactual && <div style={{ fontSize: 12, color: t.accent, lineHeight: 1.6, marginBottom: 10, padding: "10px 14px", borderRadius: 6, background: t.accent + "06", border: "1px solid " + t.accent + "15" }}>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>{tx(lang, "Counterfactual", "Contrafactual")}</div>
        {(Array.isArray(D.counterfactual[lang]) ? D.counterfactual[lang] : [D.counterfactual[lang]]).map((p, i) => <div key={i} style={{ marginBottom: i < (Array.isArray(D.counterfactual[lang]) ? D.counterfactual[lang].length - 1 : 0) ? 6 : 0 }}>{p}</div>)}
      </div>}

      {/* Sub-1: Hypotheses & Verdict */}
      <Xp title={tx(lang, "🔬 Hypotheses & Verdict", "🔬 Hipótesis y Veredicto")} defaultOpen={true} t={t}>
        {rH(L.h1, D.h1Status, tx(lang, "HYPOTHESIS", "HIPÓTESIS"))}
        {D.declaration.status !== "Completed" &&
          <div style={{ fontSize: 12, color: t.orange, fontStyle: "italic", padding: "6px 12px", background: t.orange + "08", borderRadius: 6, marginBottom: 10 }}>🧪 {tx(lang, "Falsifiable", "Falsificable")}: {L.falsifiable}</div>
        }
        {/* VERDICT */}
        <div style={{ padding: "14px 18px", borderRadius: 10, background: sc + "08", border: "1px solid " + sc + "25" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: sc, letterSpacing: 1 }}>{D.checkpoint} VERDICT</div>
            <Pill color={sc}>{D.signal.toUpperCase()}</Pill>
          </div>
          <div style={{ fontSize: 14, color: t.text, lineHeight: 1.7, marginBottom: 12 }}>{L.verdictIntro}</div>
          {L.verdictChecklist && L.verdictChecklist.map((item, i) => <div key={i} style={{ display: "flex", gap: 8, fontSize: 13, color: t.text, lineHeight: 1.5, marginBottom: 2 }}>
            <span style={{ fontSize: 15, flexShrink: 0 }}>{item.icon}</span><span>{item.text}</span>
          </div>)}
        </div>
      </Xp>

      {/* Sub-2: Key Metrics & Business Impact */}
      <Xp title={tx(lang, "📊 Key Metrics & Business Impact", "📊 Metricas e Impacto")} desc={tx(lang, "Data shown corresponds to the analysis lens selected above.", "Los datos mostrados corresponden a la lente de analisis seleccionada arriba.")} t={t}>
        {ref === "did" && <div style={{ fontSize: 11, color: t.purple, padding: "6px 10px", background: t.purple + "08", borderRadius: 6, marginBottom: 10 }}>{tx(lang, "DID view: showing only price-attributable impact on treated buckets (1-3 day plans).", "Vista DID: mostrando solo impacto atribuible al precio en buckets tratados (planes 1-3 dias).")}</div>}

        {/* STAT CARDS (change with toggle) */}
        {!isDID && <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 14 }}>
          {[
            { l: D.hasFiltered ? "ARPU (excl. PS)" : "ARPU", v: r_(D.accum.arpu_f_d90, D.accum.arpu_f_d14), s: "€" + gaugeArpuBase.toFixed(2) + " → €" + D.accum.arpu_f, c: D.accum.arpu_status === "positive" ? t.green : t.yellow },
            { l: D.hasFiltered ? "CR (excl. PS)" : "CR to Order", v: r_(D.accum.cr_f_d90, D.accum.cr_f_d14), s: gaugeCrBase.toFixed(2) + "% → " + D.accum.cr_f + "%", c: t.green },
            { l: "Gross Margin", v: r_(D.accum.gm_d90, D.accum.gm_d14), s: gaugeGmBase.toFixed(2) + "% → " + D.accum.gm + "%", c: t.green },
          ].map((s, i) => <div key={i} style={{ background: t.card, borderRadius: 10, border: "1px solid " + t.border, padding: "12px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 4 }}>{s.l}</div>

      {D.mix.map((m, i) => { const pre = ref === "14d" && m.pre14 ? m.pre14 : m.pre; const delta = ref === "14d" && m.delta14 ? m.delta14 : m.delta; return <Row key={i} cells={[m.b, pre.toFixed(1), m.post.toFixed(1), { v: delta, color: delta.startsWith("-") ? t.orange : t.accent }, m.preS.toFixed(1) + "%", m.postS.toFixed(1) + "%"]} t={t} />; })}
      <Row cells={[tx(lang, "TOTAL SHORT (1-3d)", "TOTAL CORTOS (1-3d)"), "", "", "", D.mixTotals.shortPre + "%", D.mixTotals.shortPost + "% (" + D.mixTotals.shortD + ")"]} t={t} />
      <Row cells={[tx(lang, "TOTAL LONG (4+d)", "TOTAL LARGOS (4+d)"), "", "", "", D.mixTotals.longPre + "%", D.mixTotals.longPost + "% (" + D.mixTotals.longD + ")"]} t={t} />
      <div style={{ marginTop: 10 }}>
        <PropBar label={tx(lang, "Before", "Antes") + " (" + ref + ")"} a={D.mixTotals.shortPre} b={D.mixTotals.longPre} aL={"Short " + D.mixTotals.shortPre + "%"} bL={"Long " + D.mixTotals.longPre + "%"} color={t.accent} t={t} />
        <PropBar label={tx(lang, "After (post)", "Despues (post)")} a={D.mixTotals.shortPost} b={D.mixTotals.longPost} aL={"Short " + D.mixTotals.shortPost + "%"} bL={"Long " + D.mixTotals.longPost + "%"} color={t.green} t={t} />
      </div>
      {ref === "90d" && <Sec color={t.green} t={t}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.green, marginBottom: 6 }}>Chi-square: {D.sig.chi.val} vs {D.sig.chi.threshold} = {tx(lang, "SIGNIFICANT", "SIGNIFICATIVO")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{L.chiFeynman}</div>
        <div style={{ marginTop: 8, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "HOW WE CALCULATED CHI-SQUARE", "COMO CALCULAMOS CHI-CUADRADO")}</div>
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 1: For each bucket, calculate expected orders = total post orders x pre-launch share (90d)", "Paso 1: Para cada bucket, calcular ordenes esperadas = total ordenes post x share pre-lanzamiento (90d)")}</div>
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 2: Chi-sq = sum of (observed - expected)² / expected for all 7 buckets", "Paso 2: Chi-sq = suma de (observado - esperado)² / esperado para los 7 buckets")}</div>
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 3: Result = 88.70. Degrees of freedom = 7 buckets - 1 = 6", "Paso 3: Resultado = 88.70. Grados de libertad = 7 buckets - 1 = 6")}</div>
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 4: Threshold for 6 df at 95% = 12.59 (from statistical table)", "Paso 4: Umbral para 6 gl al 95% = 12.59 (de tabla estadistica)")}</div>
          <div style={{ fontSize: 11, color: t.green, lineHeight: 1.6, fontWeight: 500 }}>{tx(lang, "88.70 vs 12.59. Think of it as an exam: you need a 6 to pass, we scored a 49. The mix shift is real, not noise.", "88.70 vs 12.59. Pensalo como un examen: necesitas un 6 para aprobar, sacamos un 49. El cambio de mix es real, no ruido.")}</div>
          {D.sig.chi.cramers_v && <div style={{ fontSize: 11, color: t.textDim, marginTop: 6, lineHeight: 1.5 }}>{tx(lang, "Cramer's V = " + D.sig.chi.cramers_v + " (" + D.sig.chi.cramers_v_interp + "). With 12,608 orders, chi-square inflates naturally. V normalizes by sample size. Small V is expected: we redistributed volume within the same catalog, not a structural overhaul.", "V de Cramer = " + D.sig.chi.cramers_v + " (" + D.sig.chi.cramers_v_interp + "). Con 12,608 ordenes, chi-cuadrado se infla naturalmente. V normaliza por tamano de muestra. V pequeno es esperado: redistribuimos volumen dentro del mismo catalogo, no un cambio estructural.")}</div>}
        </div>
      </Sec>}
      {ref === "14d" && <div style={{ fontSize: 11, color: t.yellow, padding: "8px 12px", background: t.yellow + "06", borderRadius: 6, marginTop: 6 }}>{tx(lang, "Chi-square test (88.70 vs 12.59 = significant) was calculated against the 90d baseline distribution. Since the 14d pre had a seasonal distortion (+56% short orders), the expected distribution differs. The full chi-square analysis with step-by-step calculation is in the 90d view.", "El test chi-cuadrado (88.70 vs 12.59 = significativo) fue calculado contra la distribucion del baseline de 90d. Como los 14d pre tenian distorsion estacional (+56% ordenes cortas), la distribucion esperada difiere. El analisis chi-cuadrado completo con calculo paso a paso esta en la vista 90d.")}</div>}
    </Xp>}
    {isDID && <div style={{ fontSize: 11, color: t.textMuted, padding: "8px 12px", background: t.border + "20", borderRadius: 6, marginBottom: 8 }}>{tx(lang, "Mix shift analysis is not shown in DID view. DID compares treated vs control destinations, not plan mix.", "El analisis de mix shift no se muestra en vista DID. DID compara destinos tratados vs control, no la mezcla de planes.")}</div>}

    {/* REVENUE PER BUCKET */}
    {!isDID && D.revPerBucket && <Xp title={tx(lang, "Revenue per bucket (daily average)", "Revenue por bucket (promedio diario)")} desc={tx(lang, "Daily average revenue in EUR for each plan duration. Treated buckets (1-3 day) had price changes. Untreated (4+ day) had charm pricing only (<1%).", "Promedio diario de revenue en EUR por duracion de plan. Buckets tratados (1-3 dias) tuvieron cambios de precio. No tratados (4+ dias) solo charm pricing (<1%).")} t={t}>
      <Row cells={[tx(lang, "Bucket", "Bucket"), tx(lang, "Baseline", "Baseline") + " (" + ref + ")", tx(lang, "Post", "Post"), tx(lang, "Change", "Cambio"), tx(lang, "Treated?", "Tratado?")]} header t={t} />
      {D.revPerBucket.map((r, i) => { const base = ref === "14d" ? r.pre14 : r.pre90; const delta = ref === "14d" ? r.d14 : r.d90; return <Row key={i} cells={[r.b, "€" + base, "€" + r.post, { v: delta, color: delta.startsWith("-") ? t.orange : t.green }, r.treated ? "✅" : "—"]} t={t} />; })}
    </Xp>}
    {isDID && D.impactDID && <Xp title={tx(lang, "Revenue per bucket — DID breakdown (daily average)", "Revenue por bucket — desglose DID (promedio diario)")} desc={tx(lang, "Revenue per day for treated (65 destinations with price change) vs control. These are the base numbers used to calculate elasticity. Buckets 4+ days are excluded (no meaningful price change).", "Revenue por dia para tratados (65 destinos con cambio de precio) vs control. Estos son los numeros base para calcular elasticidad. Buckets 4+ dias excluidos (sin cambio de precio significativo).")} t={t}>
      <Row cells={[tx(lang, "Bucket", "Bucket"), tx(lang, "Treated pre", "Tratados pre"), tx(lang, "Treated post", "Tratados post"), tx(lang, "Control pre", "Control pre"), tx(lang, "Control post", "Control post"), tx(lang, "DID rev", "DID rev"), tx(lang, "Price-attr. €/d", "€/d atrib. precio")]} header t={t} />
      {D.impactDID.buckets.map((b, i) => <Row key={i} cells={[b.b + " (" + b.pc + ")", "€" + b.t_pre_rev.toFixed(0), "€" + b.t_post_rev.toFixed(0), "€" + b.c_pre_rev.toFixed(0), "€" + b.c_post_rev.toFixed(0), { v: b.did_rev_pct, color: b.did_rev_pct.startsWith("+") ? t.green : b.did_rev_pct.startsWith("-") ? t.orange : t.text }, { v: (b.rev_day_attr >= 0 ? "+" : "") + "€" + b.rev_day_attr, color: b.rev_day_attr > 0 ? t.green : b.rev_day_attr < 0 ? t.orange : t.text }]} t={t} />)}
      <Row cells={[tx(lang, "NET", "NETO"), "", "", "", "", "", { v: "+€" + D.impactDID.net_day.toFixed(1) + "/d (€" + D.impactDID.net_annual.toLocaleString() + "/yr)", color: t.purple }]} t={t} />
      <div style={{ marginTop: 10, padding: "10px 12px", background: t.purple + "06", borderRadius: 6 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.purple, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "HOW WE CALCULATED DID REVENUE", "COMO CALCULAMOS REVENUE DID")}</div>
        <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 1: Measure how treated destinations changed: Treated post / Treated pre", "Paso 1: Medir como cambiaron los destinos tratados: Tratados post / Tratados pre")}</div>
        <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 2: Measure how control destinations changed: Control post / Control pre", "Paso 2: Medir como cambiaron los destinos control: Control post / Control pre")}</div>
        <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Step 3: DID = (Treated post - Treated pre) - (Control post - Control pre)", "Paso 3: DID = (Tratados post - Tratados pre) - (Control post - Control pre)")}</div>
        <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, lineHeight: 1.6, marginBottom: 4 }}>{tx(lang, "Example (2-day): (€187 - €102) - (€200 - €145) = €85 - €55 = +€30 excess growth", "Ejemplo (2 dias): (€187 - €102) - (€200 - €145) = €85 - €55 = +€30 de crecimiento en exceso")}</div>
        <div style={{ fontSize: 11, color: t.purple, lineHeight: 1.6, fontWeight: 500 }}>{tx(lang, "The excess growth is what the price change caused. If treated and control moved identically, DID = 0 (no price effect).", "El crecimiento en exceso es lo que causo el cambio de precio. Si tratados y control se movieron identicamente, DID = 0 (sin efecto de precio).")}</div>
      </div>
    </Xp>}

    {/* ELASTICITY */}
    <Xp title={tx(lang, "Price elasticity", "Elasticidad de precio")} t={t}>
      {/* NOTE FOR 90d/14d: elasticity is DID */}
      {!isDID && <div style={{ fontSize: 11, color: t.purple, padding: "8px 12px", background: t.purple + "06", borderRadius: 6, marginBottom: 10, lineHeight: 1.6 }}>{tx(lang, "The elasticity values (e) shown below are calculated using the DID method (treated vs control), not from observed totals. This is the most rigorous measure. The order/revenue data in each card corresponds to the " + ref + " view you selected. Switch to the DID view for the full causal breakdown and calculation formulas.", "Los valores de elasticidad (e) mostrados abajo estan calculados con el metodo DID (tratados vs control), no de totales observados. Es la medida mas rigurosa. Los datos de ordenes/revenue en cada card corresponden a la vista " + ref + " seleccionada. Cambia a la vista DID para el desglose causal completo y las formulas de calculo.")}</div>}
      {/* MACRO SUMMARY FIRST */}
      <div style={{ fontSize: 13, color: t.text, lineHeight: 1.7, padding: "12px 14px", background: t.accent + "06", borderRadius: 8, border: "1px solid " + t.accent + "15", marginBottom: 12 }}>{L.elastSummary}</div>
      {/* PER-BUCKET DETAIL */}
      {D.elast.map((e, i) => e.flag ? (
        <Sec key={i} color={e.flag === "price_up" ? t.purple : t.yellow} t={t}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: e.flag === "price_up" ? t.purple : t.yellow }}>{e.b}</span>
            {e.confidence && <Pill color={t[cl[e.confidence].c]}>{cl[e.confidence].l}</Pill>}
          </div>
          <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{tx(lang, e.reason_en, e.reason_es)}</div>
        </Sec>
      ) : (
        <Sec key={i} color={t.accent} t={t}>
          <div style={{ fontSize: 13, fontWeight: 600, color: t.text, marginBottom: 8 }}>{e.b} ({tx(lang, "designed", "disenado")} {e.pc})</div>
          <Row cells={["", tx(lang, "Baseline", "Baseline") + " (" + (isDID ? tx(lang, "treated only", "solo tratados") : ref) + ")", "Post", tx(lang, "Change", "Cambio")]} header t={t} />
          <Row cells={[tx(lang, "Orders/day", "Ordenes/dia"), (isDID && e.tPreO ? e.tPreO : ref === "14d" && e.prO14 ? e.prO14 : e.prO90).toFixed(1), (isDID && e.tPostO ? e.tPostO : e.postO).toFixed(1), { v: isDID ? (e.dVdid || e.dV90) : ref === "14d" ? (e.dV14 || e.dV90) : e.dV90, color: t.green }]} t={t} />
          {e.prR90 && <Row cells={[tx(lang, "Revenue/day", "Revenue/dia"), "€" + (isDID && e.tPreR ? e.tPreR : ref === "14d" && e.prR14 ? e.prR14 : e.prR90).toFixed(0), "€" + (isDID && e.tPostR ? e.tPostR : e.postR).toFixed(0), { v: isDID ? (e.dRdid || e.dR90) : ref === "14d" ? (e.dR14 || e.dR90) : e.dR90, color: isDID && e.dRdid && e.dRdid.startsWith("-") ? t.orange : t.green }]} t={t} />}
          <div style={{ display: "grid", gridTemplateColumns: e.e_upper ? "1fr 1fr" : "1fr", gap: 8, marginTop: 10 }}>
            <div style={{ padding: 8, background: t.green + "10", borderRadius: 6, textAlign: "center" }}>
              <div style={{ fontSize: 9, color: t.textMuted }}>DID</div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: MN, color: t.green }}>{e.e_did}</div>
              <div style={{ fontSize: 9, color: t.textDim }}>{tx(lang, "treated vs control", "tratados vs control")}</div>
            </div>
            {e.e_upper && <div style={{ padding: 8, background: t.border + "30", borderRadius: 6, textAlign: "center" }}>
              <div style={{ fontSize: 9, color: t.textMuted }}>{tx(lang, "Naïve (all destinations)", "Naïve (todos los destinos)")}</div>
              <div style={{ fontSize: 18, fontWeight: 700, fontFamily: MN, color: t.textDim }}>{e.e_upper}</div>
              <div style={{ fontSize: 9, color: t.textDim }}>{tx(lang, "inflated by organic growth", "inflado por crecimiento orgánico")}</div>
            </div>}
          </div>
          <div style={{ fontSize: 10, color: t.yellow, marginTop: 8, lineHeight: 1.5 }}>{tx(lang, e.e_note_en, e.e_note_es)}</div>
        </Sec>
      ))}
      {isDID && <div style={{ fontSize: 11, color: t.textMuted, fontStyle: "italic", marginTop: 4 }}>{tx(lang, "See calculation formulas in the sections below (Parallel Trends, Revenue DID, Elasticity Formula).", "Ver formulas de calculo en las secciones de abajo (Tendencias Paralelas, Revenue DID, Formula Elasticidad).")}</div>}
      {!isDID && <div style={{ fontSize: 11, color: t.purple, fontStyle: "italic", marginTop: 4 }}>{tx(lang, "The elasticity calculation formulas and DID breakdown are available in the DID view. Switch to 'Price-attributable (DID)' in the toggle above.", "Las formulas de calculo de elasticidad y desglose DID estan disponibles en la vista DID. Cambia a 'Atribuible al precio (DID)' en el toggle de arriba.")}</div>}

      {/* PARALLEL TRENDS CHART (DID view only) */}
      {isDID && D.parallelTrends && <Xp title={tx(lang, "📈 Parallel trends — why we can trust the DID", "📈 Tendencias paralelas — por que podemos confiar en el DID")} defaultOpen={true} t={{...t, card: "transparent", border: t.border}}>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginBottom: 10 }}>{tx(lang, D.parallelTrends.note_en, D.parallelTrends.note_es)}</div>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "ORDERS/DAY — 1-DAY PLAN BUCKET", "ÓRDENES/DÍA — BUCKET PLAN 1 DÍA")}</div>
        <div style={{ marginBottom: 8, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: "1px solid " + t.border }}>
              <th style={{ padding: "4px 6px", color: t.textMuted, textAlign: "left" }}>Week</th>
              <th style={{ padding: "4px 6px", color: t.accent, textAlign: "right" }}>{tx(lang, "Treated", "Tratados")}</th>
              <th style={{ padding: "4px 6px", color: t.textMuted, textAlign: "right" }}>Control</th>
            </tr></thead>
            <tbody>{D.parallelTrends.data.map((d, i) => <tr key={i} style={{ borderBottom: "1px solid " + t.border + "30", background: d.w === "Mar 8" ? t.orange + "10" : "transparent" }}>
              <td style={{ padding: "3px 6px", color: d.w === "Mar 8" ? t.orange : t.textDim, fontFamily: MN, fontSize: 10 }}>{d.w}{d.w === "Mar 8" ? " ← Launch" : ""}</td>
              <td style={{ padding: "3px 6px", color: t.accent, textAlign: "right", fontFamily: MN }}>{d.t}</td>
              <td style={{ padding: "3px 6px", color: t.textMuted, textAlign: "right", fontFamily: MN }}>{d.c}</td>
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "RATIO TREATED / CONTROL (stability = parallel trends hold)", "RATIO TRATADOS / CONTROL (estabilidad = tendencias paralelas se cumplen)")}</div>
        <div style={{ marginBottom: 8, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: "1px solid " + t.border }}>
              <th style={{ padding: "4px 6px", color: t.textMuted, textAlign: "left" }}>Week</th>
              <th style={{ padding: "4px 6px", color: t.yellow, textAlign: "right" }}>Ratio (T/C)</th>
            </tr></thead>
            <tbody>{D.parallelTrends.data.filter(d => d.r).map((d, i) => <tr key={i} style={{ borderBottom: "1px solid " + t.border + "30" }}>
              <td style={{ padding: "3px 6px", color: t.textDim, fontFamily: MN, fontSize: 10 }}>{d.w}</td>
              <td style={{ padding: "3px 6px", color: t.yellow, textAlign: "right", fontFamily: MN }}>{d.r.toFixed(3)}</td>
            </tr>)}</tbody>
          </table>
          <div style={{ fontSize: 10, color: t.green, marginTop: 4 }}>{tx(lang, "Mean: 0.679 | CV: 10.6% | Threshold: <20% | VALID", "Media: 0.679 | CV: 10.6% | Umbral: <20% | VALIDO")}</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
          <div style={{ textAlign: "center", padding: "8px 6px", background: t.card, borderRadius: 6, border: "1px solid " + t.border }}>
            <div style={{ fontSize: 9, color: t.textMuted }}>{tx(lang, "Pre-launch mean", "Media pre-launch")}</div>
            <div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.text }}>0.679</div>
          </div>
          <div style={{ textAlign: "center", padding: "8px 6px", background: t.card, borderRadius: 6, border: "1px solid " + t.green + "20" }}>
            <div style={{ fontSize: 9, color: t.textMuted }}>CV</div>
            <div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.green }}>{D.parallelTrends.stats.cv}</div>
            <div style={{ fontSize: 8, color: t.green }}>{tx(lang, "threshold", "umbral")} {D.parallelTrends.stats.threshold}</div>
          </div>
          <div style={{ textAlign: "center", padding: "8px 6px", background: t.card, borderRadius: 6, border: "1px solid " + t.green + "20" }}>
            <div style={{ fontSize: 9, color: t.textMuted }}>{tx(lang, "Verdict", "Veredicto")}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: t.green }}>{D.parallelTrends.stats.verdict}</div>
          </div>
        </div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.7, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>{L.ptExplain}</div>
      </Xp>}

      {/* REVENUE DID TABLE (DID view only) */}
      {isDID && D.revenueDID && <Xp title={tx(lang, "💰 Revenue DID — what's genuinely price-attributable", "💰 Revenue DID — que es genuinamente atribuible al precio")} t={{...t, card: "transparent", border: t.border}}>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.7, marginBottom: 10, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>{L.didFormula}</div>
        <Row cells={["Bucket", tx(lang, "Treated pre", "Tratados pre"), tx(lang, "Treated post", "Tratados post"), tx(lang, "Control pre", "Control pre"), tx(lang, "Control post", "Control post"), "DID", "e"]} header t={t} />
        {D.revenueDID.map((r, i) => <Row key={i} cells={[r.b + " (" + r.pc + ")", "€" + r.t_pre.toFixed(0), "€" + r.t_post.toFixed(0), "€" + r.c_pre.toFixed(0), "€" + r.c_post.toFixed(0), { v: r.did, color: r.did.startsWith("+") ? t.green : r.did.startsWith("-") ? t.orange : t.text }, { v: r.e.toFixed(2), color: Math.abs(r.e) > 1 ? t.green : t.orange }]} t={t} />)}
        {D.revenueDID.map((r, i) => <div key={"n" + i} style={{ fontSize: 11, color: Math.abs(r.e) > 1 ? t.green : t.orange, lineHeight: 1.4, padding: "4px 0 6px 0", borderBottom: i < D.revenueDID.length - 1 ? "1px solid " + t.border + "20" : "none" }}><strong>{r.b}:</strong> {tx(lang, r.note_en, r.note_es)}</div>)}
      </Xp>}

      {isDID && D.elastCalcRows && <Xp title={tx(lang, "📐 How we calculated elasticity", "📐 Como calculamos la elasticidad")} t={{...t, card: "transparent", border: t.border}}>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.7, marginBottom: 12, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>{L.elastFormula}</div>
        {D.elastCalcRows.map((section, si) => <div key={si} style={{ marginBottom: si < D.elastCalcRows.length - 1 ? 14 : 0 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: section.color === "accent" ? t.accent : section.color === "green" ? t.green : section.color === "yellow" ? t.yellow : t.text, letterSpacing: 0.5, marginBottom: 6 }}>{tx(lang, section.title_en, section.title_es)}</div>
          {section.rows.map((r, ri) => <CalcRow key={ri} label={tx(lang, r.label_en, r.label_es)} from={r.from} to={r.to} delta={r.delta_en ? tx(lang, r.delta_en, r.delta_es) : r.delta} color={r.positive ? t.green : r.negative ? t.orange : t.accent} t={t} />)}
          {section.note_en && <div style={{ fontSize: 11, color: section.warning ? t.yellow : t.textDim, marginTop: 4, lineHeight: 1.5 }}>{section.warning ? "⚠️ " : ""}{tx(lang, section.note_en, section.note_es)}</div>}
        </div>)}
      </Xp>}
    </Xp>

    {/* SIGNIFICANCE */}
    <Xp title={tx(lang, "Statistical significance", "Significancia estadistica")} t={t}>
      {ref === "90d" && <div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.7, marginBottom: 12, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>{L.sigExplain}</div>
        <Sec color={t.green} t={t}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: t.text }}>CR to Order (Z-test, excl. PS)</span>
            <Pill color={t.green}>{tx(lang, vm[D.sig.cr.verdict].en, vm[D.sig.cr.verdict].es)}</Pill>
          </div>
          <div style={{ fontSize: 12, fontWeight: 600, color: t.green, marginBottom: 6 }}>{L.crHeadline}</div>
          <div style={{ fontSize: 11, color: t.textDim, lineHeight: 1.6, marginBottom: 8, padding: "8px 10px", background: t.border + "15", borderRadius: 6 }}>{tx(lang, "Data source: Adobe Analytics (excluding Paid Social). Pre-launch = 90 days before March 2 (25,704 unique visitors, 3,817 orders). Post-launch = 14 clean days March 3-16 (25,929 unique visitors, 4,964 orders). Both pools are visitors to the 65 treated MXN destinations.", "Fuente de datos: Adobe Analytics (excluyendo Paid Social). Pre-lanzamiento = 90 dias antes del 2 marzo (25,704 visitantes unicos, 3,817 ordenes). Post-lanzamiento = 14 dias limpios marzo 3-16 (25,929 visitantes unicos, 4,964 ordenes). Ambos pools son visitantes a los 65 destinos MXN tratados.")}</div>
          <PropBar label={tx(lang, "Pre-launch (90d, old prices)", "Pre-lanzamiento (90d, precios viejos)")} a={D.sig.cr.ctrl_c} b={D.sig.cr.ctrl_v - D.sig.cr.ctrl_c} aL={(D.sig.cr.ctrl_c / D.sig.cr.ctrl_v * 100).toFixed(1) + "% converted"} bL={D.sig.cr.ctrl_v.toLocaleString() + " visitors"} color={t.textMuted} t={t} />
          <PropBar label={tx(lang, "Post-launch (14d, new prices)", "Post-lanzamiento (14d, precios nuevos)")} a={D.sig.cr.var_c} b={D.sig.cr.var_v - D.sig.cr.var_c} aL={(D.sig.cr.var_c / D.sig.cr.var_v * 100).toFixed(1) + "% converted"} bL={D.sig.cr.var_v.toLocaleString() + " visitors"} color={t.green} t={t} />
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim, marginTop: 6 }}>z = {D.sig.cr.z} | p = {D.sig.cr.p}</div>
          <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginTop: 4 }}>{L.crExplain}</div>
          {D.zCalc && <div style={{ marginTop: 8, padding: "10px 12px", background: t.accent + "06", borderRadius: 6 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "HOW WE CALCULATED Z", "COMO CALCULAMOS Z")}</div>
            {D.zCalc[lang].map((step, i) => <div key={i} style={{ fontSize: 11, fontFamily: i < D.zCalc[lang].length - 1 ? MN : "inherit", color: i < D.zCalc[lang].length - 1 ? t.textDim : t.green, lineHeight: 1.6, marginBottom: 4, fontWeight: i === D.zCalc[lang].length - 1 ? 500 : 400 }}>{step}</div>)}
          </div>}
        </Sec>
        <Sec color={t.green} t={t}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: t.text }}>ARPU (vs 90d)</span>
            <Pill color={t.green}>{tx(lang, "POSITIVE", "POSITIVO")}</Pill>
          </div>
          <div style={{ fontSize: 12, fontWeight: 600, color: t.green, marginBottom: 4 }}>{L.arpuHeadline}</div>
          <div style={{ fontSize: 11, fontFamily: MN, color: t.textDim }}>Lift {D.sig.arpu.lift} | €{D.baselines.arpu_f} → €{D.accum.arpu_f} | {D.sig.arpu.days} days | €{D.sig.arpu.inc.toLocaleString()} incremental</div>
          <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginTop: 4 }}>{tx(lang, D.sig.arpu.note_en, D.sig.arpu.note_es)}</div>
        </Sec>
      </div>}
      {ref === "14d" && <div style={{ padding: "12px 14px", background: t.yellow + "06", borderRadius: 8, border: "1px solid " + t.yellow + "20" }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.yellow, marginBottom: 6 }}>{tx(lang, "Statistical significance: confirmed", "Significancia estadistica: confirmada")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginBottom: 6 }}>{tx(lang, "CR improved +4.29pp (14.85% to 19.14%) with z=12.99 (p<0.0001). This is confirmed at 95% confidence. The z-test compares pre-launch vs post-launch visitor pools and does not change between baseline views.", "CR mejoro +4.29pp (14.85% a 19.14%) con z=12.99 (p<0.0001). Confirmado al 95% de confianza. El z-test compara pools de visitantes pre vs post lanzamiento y no cambia entre vistas de baseline.")}</div>
        <div style={{ fontSize: 11, color: t.yellow }}>{tx(lang, "Full z-test calculation with step-by-step breakdown and ARPU analysis: switch to 90d view.", "Calculo z-test completo con desglose paso a paso y analisis de ARPU: cambiar a vista 90d.")}</div>
      </div>}
      {isDID && <div style={{ padding: "12px 14px", background: t.purple + "06", borderRadius: 8, border: "1px solid " + t.purple + "20" }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.purple, marginBottom: 6 }}>{tx(lang, "Statistical significance: confirmed", "Significancia estadistica: confirmada")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginBottom: 6 }}>{tx(lang, "CR improved +4.29pp (z=12.99, p<0.0001) at 95% confidence. This z-test is an observed metric (pre vs post visitor pools). In this DID view, the causal evidence comes from the treated vs control comparison above. Both confirm the experiment worked, from different angles.", "CR mejoro +4.29pp (z=12.99, p<0.0001) al 95% de confianza. Este z-test es una metrica observada (pools de visitantes pre vs post). En esta vista DID, la evidencia causal viene de la comparacion tratados vs control de arriba. Ambos confirman que el experimento funciono, desde angulos distintos.")}</div>
        <div style={{ fontSize: 11, color: t.purple }}>{tx(lang, "Full z-test calculation and ARPU analysis: switch to 90d view.", "Calculo z-test completo y analisis de ARPU: cambiar a vista 90d.")}</div>
      </div>}
    </Xp>

    {/* BLENDED (hidden in DID) */}
    {!isDID && D.hasBlended && <Xp title={tx(lang, "Blended metrics (transparency)", "Metricas blended (transparencia)")} desc={L.blendedNote} t={t}>
      <Row cells={[tx(lang, "Metric", "Métrica"), "Baseline", "Post", "Δ"]} header t={t} />
      <Row cells={["ARPU blended", "€" + D.baselines.arpu_b, "€" + D.accum.arpu_b, { v: D.accum.arpu_b_d90, color: t.red }]} t={t} />
      <Row cells={["CR blended", D.baselines.cr_b + "%", D.accum.cr_b + "%", { v: D.accum.cr_b_d90, color: t.red }]} t={t} />
    </Xp>}

    {/* ANOMALIES */}
    <Xp title={tx(lang, "Anomalies", "Anomalías")} badge={<Pill color={t.yellow}>{D.anomalies.length}</Pill>} t={t}>
      {D.anomalies.map((a, i) => <div key={i} style={{ padding: "10px 12px", borderRadius: 6, border: "1px solid " + t.border, marginBottom: 6 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
          <strong style={{ color: t.yellow, fontSize: 13 }}>{a.bucket}</strong>
          {a.confidence && <Pill color={t[cl[a.confidence].c]}>{cl[a.confidence].l}</Pill>}
          <Pill color={a.status === "resolved" ? t.green : t.yellow}>{a.status.toUpperCase()}</Pill>
        </div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.5 }}>{tx(lang, a.en, a.es)}</div>
        <div style={{ fontSize: 11, color: t.textMuted, marginTop: 3 }}>{tx(lang, a.hyp_en, a.hyp_es)}</div>
        {/* DESTINATIONS DETAIL */}
        {a.destinations && <Xp title={tx(lang, "Affected destinations (" + a.destinations.length + ")", "Destinos afectados (" + a.destinations.length + ")")} desc={tx(lang, "Identified during post-experiment audit." + (a.dest_bucket ? " Applies to: " + a.dest_bucket + "." : ""), "Identificados en auditoría post-experimento." + (a.dest_bucket ? " Aplica a: " + a.dest_bucket + "." : ""))} t={{...t, card: "transparent", border: t.border}}>
          <Row cells={[tx(lang, "Destination", "Destino"), tx(lang, "Orders", "Órdenes"), tx(lang, "AOV before", "AOV antes"), tx(lang, "AOV after", "AOV después"), tx(lang, "Change", "Cambio"), tx(lang, "Note", "Nota")]} header t={t} />
          {a.destinations.map((d, di) => <Row key={di} cells={[d.name, String(d.orders), d.aov_before || "—", d.aov_after || "—", { v: d.aov_delta, color: d.aov_delta.startsWith("+") ? t.orange : t.green }, d.note || ""]} t={t} />)}
          <div style={{ fontSize: 11, color: t.textDim, marginTop: 6, lineHeight: 1.5 }}>{tx(lang, a.dest_summary_en, a.dest_summary_es)}</div>
        </Xp>}
      </div>)}
    </Xp>

    {/* GM TIMELINE */}
    <Xp title={tx(lang, "Gross margin timeline", "Timeline margen bruto")} desc={tx(lang, "Source: " + D.gm.source + ". Accumulated: " + D.gm.display + "%.", "Fuente: " + D.gm.source + ". Acumulado: " + D.gm.display + "%.")} t={t}>
      {D.gm.timeline.map((r, i) => {
        const note = typeof r.n === "object" ? tx(lang, r.n.en, r.n.es) : r.n;
        return <Row key={i} cells={[r.d, { v: r.v + (note ? " ⚠️ " + note : ""), color: note ? t.yellow : t.text }]} t={t} />;
      })}
      <div style={{ marginTop: 8 }}><Gauge label={tx(lang, "Accumulated", "Acumulado")} baseline={D.baselines.gm} current={D.accum.gm} floor={30} unit="%" t={t} /></div>
    </Xp>

    {/* GAPS */}
    <Xp title={tx(lang, "Gaps", "Gaps")} badge={<Pill color={t.orange}>{D.gaps.filter(g => g.status === "open").length} {tx(lang, "open", "abiertos")}</Pill>} t={t}>
      {D.gaps.map((g, i) => <div key={i} style={{ padding: "8px 10px", borderRadius: 6, border: "1px solid " + t.border + "60", marginBottom: 6 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
          <Pill color={g.type === "TEST" ? t.orange : g.type === "INFRASTRUCTURE" ? t.textMuted : t.accent}>{g.type}</Pill>
          <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{tx(lang, g.en, g.es)}</span>
        </div>
        <div style={{ fontSize: 11, color: t.textDim }}>{tx(lang, g.why_en, g.why_es)} · {g.owner} · {g.target}</div>
      </div>)}
    </Xp>

    {/* VALIDATION WARNINGS — moved here from top, less intrusive */}
    {warnings.length > 0 && !isDID && <Xp title={tx(lang, "⚙️ Data completeness (" + warnings.length + " gaps)", "⚙️ Completitud de datos (" + warnings.length + " gaps)")} t={t}>
      {warnings.map((w, i) => <div key={i} style={{ fontSize: 11, color: t.orange, lineHeight: 1.5, marginBottom: 4, padding: "4px 0", borderBottom: i < warnings.length - 1 ? "1px solid " + t.border + "30" : "none" }}>⚠️ {tx(lang, w.en, w.es)}</div>)}
      <div style={{ fontSize: 10, color: t.textMuted, marginTop: 6, fontStyle: "italic" }}>{tx(lang, "These gaps don't block the analysis but affect toggle accuracy or section visibility.", "Estos gaps no bloquean el análisis pero afectan precisión del toggle o visibilidad de secciones.")}</div>
    </Xp>}

    {/* GLOSSARY */}
    <Xp title={tx(lang, "📖 Glossary", "📖 Glosario")} t={t}>
      {[
        { term: "MDE", def: { en: "Minimum Desirable Effect. The targets we set BEFORE the experiment to define success. Think of it as the bar the experiment needs to clear. If all MDE are met, the experiment is a success. If some are not, we investigate why.", es: "Efecto Minimo Deseado. Los objetivos que definimos ANTES del experimento para definir exito. Es la vara que el experimento tiene que superar. Si todos los MDE se cumplen, el experimento es exitoso. Si algunos no, investigamos por que." } },
        { term: "ARPU", def: { en: "Average Revenue Per User. Total revenue divided by total unique visitors. If 1,000 people visit the store and we make EUR 5,000, ARPU is EUR 5. It captures both conversion rate and order value in one number.", es: "Revenue Promedio por Usuario. Revenue total dividido visitantes unicos totales. Si 1,000 personas visitan la tienda y facturamos EUR 5,000, ARPU es EUR 5. Captura tanto la tasa de conversion como el valor de orden en un solo numero." } },
        { term: "CR", def: { en: "Conversion Rate. Of every 100 visitors, how many buy something. If 15 out of 100 buy, CR is 15%. A higher CR means the store is better at turning visitors into buyers.", es: "Tasa de Conversion. De cada 100 visitantes, cuantos compran algo. Si 15 de 100 compran, CR es 15%. Un CR mas alto significa que la tienda es mejor convirtiendo visitantes en compradores." } },
        { term: "AOV", def: { en: "Average Order Value. The average EUR paid per order. If 100 orders totaled EUR 3,700, AOV is EUR 37. When we cut prices on short plans, AOV drops on those plans but volume should compensate.", es: "Valor Promedio de Orden. El promedio en EUR pagado por orden. Si 100 ordenes sumaron EUR 3,700, AOV es EUR 37. Cuando bajamos precios en planes cortos, el AOV baja en esos planes pero el volumen deberia compensar." } },
        { term: "GM", def: { en: "Gross Margin. What percentage of revenue is profit after paying direct costs (data, carrier fees). If we make EUR 100 and costs are EUR 20, GM is 80%. Higher GM = more money left per euro of revenue.", es: "Margen Bruto. Que porcentaje del revenue es ganancia despues de pagar costos directos (datos, fees de carrier). Si facturamos EUR 100 y los costos son EUR 20, GM es 80%. Mayor GM = mas dinero por euro de revenue." } },
        { term: "Price-per-Day (PPD)", def: { en: "The first price impression a buyer sees: plan price divided by number of days. A 3-day plan at EUR 15 has a PPD of EUR 5/day. When PPD is too high on short plans, buyers see an expensive first impression and leave. The correction brings PPD to a standard level across the catalog.", es: "La primera impresion de precio que ve el comprador: precio del plan dividido por cantidad de dias. Un plan de 3 dias a EUR 15 tiene un PPD de EUR 5/dia. Cuando el PPD es demasiado alto en planes cortos, los compradores ven una primera impresion cara y se van. La correccion lleva el PPD a un nivel estandar en todo el catalogo." } },
        { term: "DID (Difference-in-Differences)", def: { en: "A method to isolate the effect of a price change from everything else happening in the market. We compare two groups: destinations where we changed prices (treated) vs destinations where we didn't (control). Both groups are affected by seasonality and marketing. The DIFFERENCE between how much each group changed is the price effect. Like measuring how much faster a runner got by comparing against someone who trained the same way but didn't change shoes.", es: "Un metodo para aislar el efecto de un cambio de precio de todo lo demas que pasa en el mercado. Comparamos dos grupos: destinos donde cambiamos precios (tratados) vs destinos donde no (control). Ambos grupos son afectados por estacionalidad y marketing. La DIFERENCIA entre cuanto cambio cada grupo es el efecto del precio. Como medir cuanto mas rapido corrio un atleta comparando contra alguien que entreno igual pero no cambio zapatillas." } },
        { term: tx(lang, "Parallel Trends", "Tendencias Paralelas"), def: { en: "The requirement that treated and control groups moved together BEFORE the price change. If they did, we can trust that any divergence AFTER the change is caused by the price. We measure this with the CV (Coefficient of Variation) of their weekly ratio. CV below 20% = they moved together = DID is valid. Think of it as checking that two runners had similar pace before one changed shoes.", es: "El requisito de que los grupos tratado y control se movieron juntos ANTES del cambio de precio. Si lo hicieron, podemos confiar en que cualquier divergencia DESPUES del cambio es causada por el precio. Lo medimos con el CV (Coeficiente de Variacion) de su ratio semanal. CV debajo de 20% = se movieron juntos = DID es valido. Es como verificar que dos corredores tenian ritmo similar antes de que uno cambiara zapatillas." } },
        { term: "CV (Coefficient of Variation)", def: { en: "A measure of how stable a ratio is over time. Low CV = stable = the two groups co-move. We use it on the weekly ratio of treated/control orders. Our CV of 10.6% means the ratio varied only 10.6% week to week over 14 weeks. That's very stable (threshold is 20%). It validates that DID is the right method.", es: "Una medida de cuan estable es un ratio en el tiempo. CV bajo = estable = los dos grupos se mueven juntos. Lo usamos en el ratio semanal de ordenes tratados/control. Nuestro CV de 10.6% significa que el ratio vario solo 10.6% de semana a semana en 14 semanas. Eso es muy estable (umbral es 20%). Valida que DID es el metodo correcto." } },
        { term: tx(lang, "Elasticity", "Elasticidad"), def: { en: "How much volume changes when price changes. Formula: % volume change (DID-adjusted) / % price change. If we cut price 36% and volume goes up 79% (after removing organic growth), elasticity is -2.20. The absolute value |2.20| > 1 means volume reacts MORE than proportionally. When |e| > 1, lowering prices increases total revenue. When |e| < 1 (inelastic), it doesn't.", es: "Cuanto cambia el volumen cuando cambia el precio. Formula: % cambio volumen (ajustado por DID) / % cambio precio. Si bajamos precio 36% y volumen sube 79% (despues de sacar crecimiento organico), elasticidad es -2.20. El valor absoluto |2.20| > 1 significa que el volumen reacciona MAS que proporcionalmente. Cuando |e| > 1, bajar precios aumenta el revenue total. Cuando |e| < 1 (inelastico), no." } },
        { term: tx(lang, "Break-even (Revenue-neutral)", "Punto de equilibrio (Revenue-neutral)"), def: { en: "When a price cut generates exactly enough extra volume to keep total revenue the same. For 1-day plans: we cut price 36%, volume nearly doubled, but each order brings in less money. Net result: same revenue, more customers. It's not a failure. It means pricing reached the equilibrium point of the demand curve. The value is in funnel entry and price perception, not immediate revenue.", es: "Cuando una baja de precio genera exactamente el volumen extra necesario para mantener el revenue total igual. Para planes 1 dia: bajamos precio 36%, volumen casi se duplico, pero cada orden trae menos dinero. Resultado neto: mismo revenue, mas clientes. No es un fracaso. Significa que el pricing llego al punto de equilibrio de la curva de demanda. El valor esta en la entrada al funnel y la percepcion de precio, no en revenue inmediato." } },
        { term: "Chi-square", def: { en: "A statistical test that checks if a distribution changed for real or by chance. We use it to test whether the mix of plan durations shifted after the price change. The test produces a score (ours: 88.70). We compare it against a threshold (12.59, which depends on how many categories we have and our confidence level). Score much higher than threshold = the shift is real, not random noise.", es: "Un test estadistico que verifica si una distribucion cambio de verdad o por azar. Lo usamos para testear si la mezcla de duraciones de plan cambio despues del cambio de precio. El test produce un score (nuestro: 88.70). Lo comparamos contra un umbral (12.59, que depende de cuantas categorias tenemos y nuestro nivel de confianza). Score mucho mayor que umbral = el cambio es real, no ruido aleatorio." } },
        { term: tx(lang, "Cramer's V", "V de Cramer"), def: { en: "Normalizes the chi-square result by sample size. Chi-square grows with more data, so a large sample always looks 'significant'. Cramer's V adjusts for this. Our V=0.087 (small) is expected: we redistributed volume within the same catalog, not a dramatic structural change. The economic impact (1-day orders +85%) is what matters.", es: "Normaliza el resultado de chi-cuadrado por tamano de muestra. Chi-cuadrado crece con mas datos, entonces una muestra grande siempre parece 'significativa'. V de Cramer ajusta por esto. Nuestro V=0.087 (pequeno) es esperado: redistribuimos volumen dentro del mismo catalogo, no un cambio estructural dramatico. El impacto economico (ordenes 1 dia +85%) es lo que importa." } },
        { term: "Z-score", def: { en: "Measures how far a result is from 'no effect'. z = 1.96 means 95% confidence (only 5% chance the result is random). z = 2.58 means 99% confidence. Our z = 12.99 is extreme. It's so far from zero that the probability of the conversion improvement being random noise is essentially zero (p < 0.0001).", es: "Mide que tan lejos esta un resultado de 'ningun efecto'. z = 1.96 significa 95% de confianza (solo 5% de probabilidad de que el resultado sea aleatorio). z = 2.58 significa 99%. Nuestro z = 12.99 es extremo. Esta tan lejos de cero que la probabilidad de que la mejora de conversion sea ruido aleatorio es esencialmente cero (p < 0.0001)." } },
        { term: tx(lang, "Counterfactual", "Contrafactual"), def: { en: "The answer to 'what would have happened if we hadn't changed prices?' We can't observe this directly (we can't run two parallel universes). DID estimates it by using the control group as a proxy: if control destinations grew 42%, we assume treated destinations would have grown ~42% too without the price change. Any growth above 42% is attributable to the price.", es: "La respuesta a 'que habria pasado si no hubieramos cambiado los precios?' No podemos observar esto directamente (no podemos correr dos universos paralelos). DID lo estima usando el grupo control como proxy: si los destinos control crecieron 42%, asumimos que los tratados habrian crecido ~42% tambien sin el cambio de precio. Cualquier crecimiento por encima de 42% es atribuible al precio." } },
        { term: tx(lang, "Excluding Paid Social", "Excluyendo Paid Social"), def: { en: "Removing visitors who came through paid social media ads (Meta, TikTok, etc.) from the analysis. When a Paid Social budget change happens on the same day as a price change, it contaminates the blended metrics. By excluding PS visitors, we isolate the organic effect of the pricing change on visitors who arrived through search, direct, or other non-paid channels.", es: "Remover visitantes que llegaron por publicidad paga en redes sociales (Meta, TikTok, etc.) del analisis. Cuando un cambio de presupuesto de Paid Social ocurre el mismo dia que un cambio de precio, contamina las metricas blended. Al excluir visitantes PS, aislamos el efecto organico del cambio de pricing en visitantes que llegaron por busqueda, directo, u otros canales no pagos." } },
      ].map((item, i, arr) => <div key={i} style={{ padding: "8px 0", borderBottom: i < arr.length - 1 ? "1px solid " + t.border + "30" : "none" }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: t.accent }}>{item.term}</span>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginTop: 3 }}>{tx(lang, item.def.en, item.def.es)}</div>
      </div>)}
      <div style={{ fontSize: 10, color: t.textMuted, marginTop: 10, fontStyle: "italic" }}>{tx(lang, "Living document. Updated with each experiment. All terms explained in plain language.", "Documento vivo. Se actualiza con cada experimento. Todos los terminos explicados en lenguaje simple.")}</div>
    </Xp>

    {/* FOOTER */}
    <div style={{ marginTop: 16, padding: 10, fontSize: 11, color: t.textMuted, textAlign: "center", borderTop: "1px solid " + t.border }}>{D.footer[lang]}</div>
  </div>;
}

    ReactDOM.render(React.createElement(ExpPerf), document.getElementById('root'));
  </script>
</body>
</html>
