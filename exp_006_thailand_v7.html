const SeasonalChart = ({ t: th, lang }) => {
  const data = D.seasonalContext.weeklyRevenue;
  const maxVal = Math.max(...data.map(d => d.th));
  const w = 560, h = 200, barW = 60, gap = 24, baseY = h - 30;
  const totalW = data.length * (barW + gap) - gap;
  const startX = (w - totalW) / 2;
  const reds = ["#FCA5A5", "#F87171", "#EF4444", "#DC2626", "#B91C1C", "#991B1B"];
  return <svg viewBox={`0 0 ${w} ${h + 10}`} style={{ width: "100%", maxWidth: 580 }}>
    {data.map((d, i) => {
      const barH = (d.th / maxVal) * (baseY - 20);
      const x = startX + i * (barW + gap);
      const y = baseY - barH;
      return <g key={i}>
        <rect x={x} y={y} width={barW} height={barH} rx={4} fill={reds[i]} opacity={0.85} />
        <text x={x + barW / 2} y={y - 6} textAnchor="middle" fontSize={10} fontFamily={MN} fill={th.text} fontWeight={700}>€{Math.round(d.th / 1000)}K</text>
        {d.wow != null && <text x={x + barW / 2} y={y + barH / 2 + 4} textAnchor="middle" fontSize={9} fontFamily={MN} fill="#FFF" fontWeight={600}>{d.wow > 0 ? "+" : ""}{d.wow}%</text>}
        <text x={x + barW / 2} y={baseY + 14} textAnchor="middle" fontSize={9} fontFamily={UI} fill={th.textDim}>{d.week}</text>
      </g>;
    })}
  </svg>;
};

const TuesdayChart = ({ t: th }) => {
  const data = D.tuesdays;
  const w = 480, h = 160, dotR = 8;
  const minR = Math.min(...data.map(d => d.ratio));
  const maxR = Math.max(...data.map(d => d.ratio));
  const rangeR = maxR - minR + 0.2;
  const padY = 30, padX = 60;
  const threshold = D.benchmarkPost.rollbackThreshold;
  const yScale = (v) => padY + ((maxR + 0.1 - v) / rangeR) * (h - padY * 2);
  const xScale = (i) => padX + i * ((w - padX * 2) / (data.length - 1));
  const threshY = yScale(threshold);
  return <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", maxWidth: 500 }}>
    <line x1={padX} y1={threshY} x2={w - padX} y2={threshY} stroke={th.red} strokeWidth={1.5} strokeDasharray="6 4" />
    <text x={w - padX + 4} y={threshY + 4} fontSize={9} fontFamily={MN} fill={th.red}>{threshold}x</text>
    {data.map((d, i) => {
      if (i > 0) {
        const prev = data[i - 1];
        return <line key={"l" + i} x1={xScale(i - 1)} y1={yScale(prev.ratio)} x2={xScale(i)} y2={yScale(d.ratio)} stroke={th.textMuted} strokeWidth={1.5} />;
      }
      return null;
    })}
    {data.map((d, i) => {
      const isPre = d.period === "PRE";
      const isAbove = d.ratio >= threshold;
      const color = isPre ? th.textMuted : isAbove ? th.green : th.red;
      return <g key={i}>
        <circle cx={xScale(i)} cy={yScale(d.ratio)} r={dotR} fill={color} opacity={isPre ? 0.5 : 1} />
        <text x={xScale(i)} y={yScale(d.ratio) - 14} textAnchor="middle" fontSize={11} fontFamily={MN} fill={color} fontWeight={700}>{d.ratio.toFixed(2)}x</text>
        <text x={xScale(i)} y={h - 4} textAnchor="middle" fontSize={8} fontFamily={UI} fill={th.textDim}>{d.date}</text>
        {d.did != null && <text x={xScale(i)} y={yScale(d.ratio) + 20} textAnchor="middle" fontSize={8} fontFamily={MN} fill={color}>DID: {d.did > 0 ? "+" : ""}{d.did}pp</text>}
      </g>;
    })}
  </svg>;
};

const BreakEvenChart = ({ t: th }) => {
  const data = D.breakEven;
  const w = 560, h = 200, barW = 80, gap = 20, baseY = h - 30;
  const maxGap = Math.max(...data.map(d => Math.abs(d.gap)));
  const totalW = data.length * (barW + gap) - gap;
  const startX = (w - totalW) / 2;
  return <svg viewBox={`0 0 ${w} ${h + 10}`} style={{ width: "100%", maxWidth: 580 }}>
    {data.map((d, i) => {
      const barH = (Math.abs(d.gap) / maxGap) * (baseY - 30);
      const x = startX + i * (barW + gap);
      const color = d.met ? th.green : th.red;
      const opacity = d.lowN ? 0.4 : 0.8;
      return <g key={i}>
        <rect x={x} y={baseY - barH} width={barW} height={barH} rx={4} fill={color} opacity={opacity} />
        <text x={x + barW / 2} y={baseY - barH - 6} textAnchor="middle" fontSize={10} fontFamily={MN} fill={color} fontWeight={700}>{d.gap > 0 ? "+" : ""}{d.gap}pp</text>
        <text x={x + barW / 2} y={baseY - barH + 16} textAnchor="middle" fontSize={10} fill="#FFF" fontWeight={700}>{d.met ? "✓" : "✗"}</text>
        {d.critical && <text x={x + barW / 2} y={baseY - barH - 18} textAnchor="middle" fontSize={12} fill={th.yellow}>★</text>}
        <text x={x + barW / 2} y={baseY + 14} textAnchor="middle" fontSize={10} fontFamily={UI} fill={th.textDim}>{d.b}</text>
      </g>;
    })}
  </svg>;
};

      </Xp>

      {/* P9: Data Sources */}
      <Xp title={tx(lang, "Data Sources", "Fuentes de Datos")} desc={tx(lang, "Audit trail: where every number comes from.", "Trazabilidad: de dónde viene cada número.")} defaultOpen={false} t={t}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr>{[tx(lang,"Source","Fuente"),tx(lang,"System","Sistema"),tx(lang,"Period","Período"),tx(lang,"Records","Registros")].map((h,i) => <th key={i} style={th_}>{h}</th>)}</tr></thead>
            <tbody>{D.dataSources.map((s,i) => <tr key={i}>
              <td style={{ ...td, fontFamily: UI }}>{s.name}</td>
              <td style={{ ...td, fontSize: 10 }}>{s.system}</td>
              <td style={td}>{s.period}</td>
              <td style={td}>{s.records}</td>
            </tr>)}</tbody>
          </table>
        </div>
      </Xp>

      {/* P10: Open Gaps */}
      <Xp title={tx(lang, "Open Gaps", "Gaps Abiertos")} desc={tx(lang, "What's still open and who owns it.", "Qué queda abierto y quién es responsable.")} defaultOpen={false} t={t}>
        {D.gaps.map((g, i) => {
          const typeColors = { DATA: t.yellow, METHODOLOGY: t.purple, CAUSAL: t.red, TEST: t.green, INFRASTRUCTURE: t.textDim };
          return <div key={i} style={{ padding: "8px 12px", marginBottom: 6, borderLeft: `3px solid ${typeColors[g.type] || t.textMuted}`, borderRadius: "0 6px 6px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
              <Pill color={typeColors[g.type] || t.textMuted}>{g.type}</Pill>
              <span style={{ fontSize: 12, fontWeight: 700, color: t.text }}>{tx(lang, g.en, g.es)}</span>
            </div>
            <div style={{ fontSize: 11, color: t.textDim }}>{tx(lang, g.why_en, g.why_es)}</div>
            <div style={{ fontSize: 10, color: t.textMuted, marginTop: 2 }}>{g.owner} · {g.target} · {g.status}</div>
          </div>;
        })}
      </Xp>

      {/* P11: Glossary */}
      <Xp title={tx(lang, "Glossary", "Glosario")} desc={tx(lang, "Feynman-style: if a 12-year-old can't understand it, rewrite.", "Estilo Feynman: si un niño de 12 años no lo entiende, reescribir.")} defaultOpen={false} t={t}>
        {D.glossary.map((g, i) => {
          const termText = typeof g.term === "string" ? g.term : tx(lang, g.term.en, g.term.es);
          return <div key={i} style={{ padding: "6px 0", borderBottom: "1px solid " + t.border }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: t.text }}>{termText}</span>
            <span style={{ fontSize: 11, color: t.textDim, marginLeft: 8 }}>{tx(lang, g.def_en, g.def_es)}</span>
          </div>;
        })}
      </Xp>

    </div>}

    {/* ════ TOGGLE INSIGHTS (contextual note at bottom) ════ */}
    {isPricing && D.toggleInsights[cfView] && <div style={{ padding: "10px 14px", borderRadius: 8, background: t.card, border: "1px dashed " + t.border, marginTop: 16, marginBottom: 12 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 6 }}>{cfView === "CF" ? "CF VIEW" : "14d VIEW"}</div>
      <div style={{ fontSize: 11, color: t.textDim, lineHeight: 1.7 }}>{tx(lang, D.revFramingNote[cfView].en, D.revFramingNote[cfView].es)}</div>
    </div>}

    {/* ════ FOOTER ════ */}
    <div style={{ padding: "16px 0", textAlign: "center", fontSize: 11, fontFamily: MN, color: t.textMuted, borderTop: "1px solid " + t.border, marginTop: 20 }}>
      {tx(lang, D.footer.en, D.footer.es)}
    </div>

  </div>;
}

ReactDOM.render(<Dashboard />, document.getElementById("root"));
  </script>
</body>
</html>
