<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holafly · Exposición a IA · método Reforge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --paper:#FAFAF8; --card:#FFFFFF; --ink:#292B2E; --mute:#6B6F73; --line:#E4E2DC;
    --pink:#E6485C; --pink-soft:#FCEBED; --soft:#F3F0EA;
    --r1:#1F9E8C; --r4:#E2B23A; --r7:#B82A45;
    --font:"Mulish",ui-sans-serif,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.55;padding-bottom:80px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  h1,h2,h3,h4{letter-spacing:-.01em}
  .mono{font-family:var(--mono)}

  .langtog{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .langtog button{border:0;background:transparent;color:var(--mute);font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer}
  .langtog button.on{background:var(--ink);color:#fff}

  /* STICKY TOPBAR */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(250,250,248,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    transform:translateY(-100%);transition:transform .25s ease;opacity:0}
  #topbar.show{transform:translateY(0);opacity:1}
  #topbar .in{max-width:1000px;margin:0 auto;padding:9px 20px;display:flex;align-items:center;gap:14px}
  #topbar .brand{font-weight:900;font-size:13px;white-space:nowrap}
  #topbar .brand span{color:var(--pink)}
  #topbar .tb-scores{display:flex;gap:7px}
  #topbar .tsc{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;color:#fff;white-space:nowrap}
  #topbar nav{margin-left:auto;display:flex;gap:4px;align-items:center}
  #topbar nav a{font-size:12px;font-weight:700;color:var(--mute);text-decoration:none;padding:6px 9px;border-radius:7px}
  #topbar nav a:hover{background:var(--soft);color:var(--ink)}
  @media(max-width:760px){#topbar nav a{display:none}}

  /* HERO */
  header.hero{padding:20px 0 24px}
  .herotop{display:flex;justify-content:flex-end;margin-bottom:18px}
  .kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);font-weight:700}
  header.hero h1{font-size:34px;line-height:1.1;font-weight:900;margin:12px 0 12px;max-width:800px}
  .thesis{font-size:16.5px;color:#3E4145;max-width:780px;margin:0;line-height:1.55}
  .thesis b{color:var(--ink)}

  /* SECTION HEADER */
  .shead{display:flex;align-items:center;gap:11px;margin:38px 0 14px;scroll-margin-top:64px}
  .shead .n{font-family:var(--mono);font-size:12px;color:var(--pink);font-weight:700}
  .shead h2{font-size:16px;font-weight:800;margin:0;text-transform:uppercase;letter-spacing:.04em}
  .shead .tag{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .shead .line{flex:1;height:1px;background:var(--line)}
  .lead{font-size:14px;color:var(--mute);margin:-4px 0 14px;max-width:760px;line-height:1.5}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px}

  /* CONTEXT */
  .ctx{padding:6px 22px 20px}
  .ctx .scqa{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin-top:14px}
  .ctx .blk .h{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pink);margin-bottom:4px}
  .ctx .blk p{margin:0;font-size:13.5px;line-height:1.55;color:#3E4145}
  .ctx .blk p b{color:var(--ink)}
  .method{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .method .row{display:flex;gap:22px;flex-wrap:wrap;align-items:center}
  .mlab{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pink);margin-bottom:7px}
  .scale{flex:1;min-width:260px}
  .scale .bar{height:12px;border-radius:999px;background:linear-gradient(90deg,var(--r1),var(--r4),var(--r7))}
  .scale .slab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--mute);margin-top:5px}
  .bands{display:flex;gap:8px;flex-wrap:wrap}
  .bandchip{font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;color:#fff}
  .areas-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
  .al-item{display:flex;gap:9px;font-size:12.5px;line-height:1.4}
  .al-item .b{font-weight:800;white-space:nowrap}
  .al-item .c{font-family:var(--mono);font-size:10px;color:var(--mute);border:1px solid var(--line);border-radius:5px;padding:1px 5px;align-self:flex-start;margin-top:1px}

  /* EXEC CARDS */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
  .mcard h3{margin:0;font-size:15px;font-weight:800}
  .mcard .sub{font-size:11.5px;color:var(--mute);margin-top:2px;line-height:1.35;min-height:30px}
  .mcard .score{font-family:var(--mono);font-size:42px;font-weight:800;line-height:1;margin:12px 0 2px}
  .mcard .score span{font-size:15px;color:var(--mute)}
  .mcard .bd{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;color:#fff;margin-top:4px}
  .mcard .arg{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);font-size:12.5px;line-height:1.48;color:#3E4145}
  .mcard .arg .h{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pink);margin-bottom:4px}
  .mcard .arg b{color:var(--ink)}
  .areas-bars{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .arow{display:grid;grid-template-columns:74px 1fr 26px;gap:8px;align-items:center}
  .arow .al{font-size:11px;color:var(--mute);font-weight:700}
  .arow .track{height:7px;background:var(--soft);border-radius:999px;overflow:hidden}
  .arow .track i{display:block;height:100%;border-radius:999px;transition:width .25s,background .25s}
  .arow .av{font-family:var(--mono);font-size:11.5px;font-weight:700;text-align:right}

  /* CONTROLS */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0 6px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{border:0;background:transparent;color:var(--mute);font-family:var(--font);font-size:13px;font-weight:700;padding:7px 13px;border-radius:8px;cursor:pointer;transition:all .14s}
  .seg button.on{background:var(--ink);color:#fff}
  .ghost{font-family:var(--mono);font-size:11.5px;font-weight:500;border:1px solid var(--line);background:var(--card);color:var(--mute);border-radius:9px;padding:8px 12px;cursor:pointer}
  .hint{font-size:12px;color:#A6A39C;font-family:var(--mono)}

  /* HEATMAP */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px 16px 16px}
  .hm-row{display:grid;grid-template-columns:1fr 44px 44px 44px;gap:8px;align-items:center;padding:4px 4px;border-radius:8px}
  .hm-row:hover{background:var(--soft)}
  .hm-head{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);font-weight:700;padding-top:8px}
  .hm-head .m{text-align:center}
  .hm-area{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--pink);padding:13px 4px 4px}
  .hm-name{font-size:12.5px}
  .cell{height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;color:#fff;cursor:pointer;transition:transform .08s}
  .cell:hover{transform:scale(1.08)}
  .note{font-size:12px;color:#A6A39C;margin-top:12px;line-height:1.5}

  /* LECTURA */
  .lectura{background:var(--ink);color:#F2F0EC;border-radius:18px;padding:26px 24px}
  .lectura .lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);font-weight:700}
  .lectura .pt{margin-top:16px}
  .lectura .pt h4{font-size:14.5px;font-weight:800;margin:0 0 4px;color:#fff;display:flex;gap:9px;align-items:baseline}
  .lectura .pt h4 .k{font-family:var(--mono);font-size:11px;color:var(--pink)}
  .lectura .pt p{margin:0;font-size:13.5px;line-height:1.6;color:#CFCDC8}
  .lectura .pt p b{color:#fff}
  .lectura .div{border-top:1px solid #3C3E41;margin-top:16px;padding-top:2px}

  /* AUDIT IA */
  .auh{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pink)}
  .aumethod{font-size:12.5px;color:#3E4145;margin:8px 0 0;line-height:1.5}
  .aubluf{font-size:15px;font-weight:800;color:var(--ink);background:var(--soft);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;line-height:1.45}
  .aubuckets{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .buck{border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .buck .bh{font-weight:800;font-size:13px;margin-bottom:7px}
  .buck.green{background:rgba(31,158,140,.06)} .buck.green .bh{color:#1F7E70}
  .buck.red{background:rgba(230,72,92,.06)} .buck.red .bh{color:#C23046}
  .buck ul{margin:0;padding-left:17px} .buck li{font-size:12.5px;line-height:1.5;color:#3E4145;margin:3px 0}
  .aufind{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .aufind .fi{background:var(--soft);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.45;color:#3E4145}
  .aufind .fi b{color:var(--ink)}
  .augrid{display:grid;grid-template-columns:1.5fr repeat(4,1fr);gap:5px;margin-top:6px}
  .augrid .gh{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--mute);text-align:center;padding-bottom:2px}
  .augrid .gq{font-size:11.5px;display:flex;align-items:center}
  .augrid .gc{height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#fff}
  .aulegend{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
  .aunote{margin-top:14px;font-size:12px;color:#3E4145;background:#fff;border:1px dashed var(--line);border-radius:9px;padding:10px 12px;line-height:1.5}
  @media(max-width:760px){.aufind,.aubuckets{grid-template-columns:1fr}.augrid{font-size:9px;gap:3px}}

  /* AREAS */
  .area{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .area>.ahead{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;flex-wrap:wrap}
  .area>.ahead:hover{background:#fcfcfb}
  .ahead .ttl{flex:1;min-width:200px}
  .ahead .ttl .t{font-size:15px;font-weight:800;display:flex;align-items:center;gap:9px}
  .ahead .ttl .t .cnt{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--mute);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .ahead .ttl .bl{font-size:12.5px;color:var(--mute);margin-top:3px;line-height:1.4}
  .ahead .mini{display:flex;gap:6px}
  .ahead .mini .b{width:46px;text-align:center}
  .ahead .mini .b .mv{font-family:var(--mono);font-size:14px;font-weight:800;border-radius:7px;padding:3px 0;color:#fff}
  .ahead .mini .b .mk{font-family:var(--mono);font-size:8.5px;color:var(--mute);margin-top:2px;letter-spacing:.04em}
  .ahead .chev{font-family:var(--mono);color:var(--pink);font-size:13px;transition:transform .2s}
  .area.open .ahead .chev{transform:rotate(90deg)}
  .abody{display:none;border-top:1px solid var(--line);padding:0 18px 8px}
  .area.open .abody{display:block}
  .explain{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0 6px}
  .explain .e{background:var(--soft);border-radius:10px;padding:10px 12px}
  .explain .e .h{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pink);margin-bottom:3px}
  .explain .e p{margin:0;font-size:12.5px;line-height:1.45;color:#3E4145}

  /* FACTOR */
  .factor{border-top:1px solid var(--line);padding:14px 0}
  .fhead{display:flex;gap:9px;align-items:baseline;flex-wrap:wrap}
  .fnum{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--pink);background:var(--pink-soft);border-radius:6px;padding:2px 7px}
  .fname{font-size:14px;font-weight:800}
  .fdesc{font-size:12.5px;color:var(--mute);margin:6px 0 0}
  .poles{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;margin:10px 2px 0}
  .poles .lo{color:var(--r1)}.poles .hi{color:var(--pink)}
  .sliders{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:9px}
  .slot{background:var(--soft);border-radius:11px;padding:9px 11px 11px}
  .slot .l{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;font-weight:700}
  .slot .chip{min-width:25px;height:25px;border-radius:7px;color:#fff;font-family:var(--mono);font-weight:700;font-size:12.5px;display:inline-flex;align-items:center;justify-content:center}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:999px;margin:8px 0 0;background:linear-gradient(90deg,var(--r1),var(--r4),var(--r7));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:#fff;border:3px solid var(--ink);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:#fff;border:3px solid var(--ink);cursor:pointer}
  .misfit{margin-top:11px;background:var(--pink-soft);border-radius:9px;padding:9px 12px;font-size:12px;color:#9a2c3a;line-height:1.5}
  .misfit b{color:#7a1f2b}
  .why{margin-top:10px}
  .why>button{font-family:var(--mono);font-size:11.5px;font-weight:500;border:1px solid var(--line);background:var(--card);color:var(--pink);border-radius:8px;padding:6px 11px;cursor:pointer}
  .why .b{display:none;margin-top:9px;border-left:2px solid var(--pink);padding-left:13px}
  .why .b.open{display:block}
  .why .r{font-size:12.5px;margin:6px 0;color:#3E4145;line-height:1.5}
  .why .r b{color:var(--ink)}

  /* PRIORIDADES */
  .pcol{padding:13px 16px;border-bottom:1px solid var(--line)}
  .pcol:last-child{border-bottom:0}
  .ph{font-size:13px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .ph .dot{width:10px;height:10px;border-radius:3px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--soft);border-radius:999px;padding:5px 11px;margin:3px 5px 3px 0;font-size:12px}
  .pill .s{width:20px;height:20px;border-radius:6px;color:#fff;font-family:var(--mono);font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center}

  footer{font-family:var(--mono);font-size:11.5px;color:#A6A39C;line-height:1.7;margin-top:30px;text-align:center}

  @media(max-width:760px){
    .cards{grid-template-columns:1fr}
    .ctx .scqa,.areas-legend,.explain{grid-template-columns:1fr}
    .sliders{grid-template-columns:1fr}
    .hm-row{grid-template-columns:1fr 36px 36px 36px}
    header.hero h1{font-size:26px}
  }
</style>
</head>
<body data-lang="es">

<div id="topbar"><div class="in">
  <span class="brand">Holafly <span>·</span> <span id="tb-title">Exposición a IA</span></span>
  <span class="tb-scores" id="tbScores"></span>
  <nav>
    <a href="#ctx" id="nav-ctx">Contexto</a>
    <a href="#veredicto" id="nav-ver">Veredicto</a>
    <a href="#lectura" id="nav-lec">Lectura</a>
    <a href="#areas" id="nav-areas">Áreas</a>
    <span class="langtog" id="langTop"><button data-l="es" class="on">ES</button><button data-l="en">EN</button></span>
  </nav>
</div></div>

<header class="hero">
  <div class="wrap">
    <div class="herotop"><span class="langtog" id="langHero"><button data-l="es" class="on">ES</button><button data-l="en">EN</button></span></div>
    <div id="heroBox"></div>
  </div>
</header>

<div class="wrap">
  <div class="shead" id="ctx"></div>
  <div class="card ctx" id="ctxBox"></div>

  <div class="shead" id="veredicto"></div>
  <p class="lead" id="lead-ver"></p>
  <div class="controls">
    <span class="hint" id="lbl-models"></span>
    <div class="seg" id="modelToggle">
      <button data-m="b2c" class="on">B2C</button>
      <button data-m="men" class="on" id="btn-men">Mensual</button>
      <button data-m="b2b" class="on">B2B</button>
    </div>
    <button class="ghost" id="reset"></button>
  </div>
  <div class="cards" id="cards"></div>
  <div style="margin-top:16px"></div>
  <div class="panel" id="heatmap"></div>
  <div id="auditBox" style="margin-top:16px"></div>

  <div class="shead" id="lectura"></div>
  <div class="lectura" id="lecturaBox"></div>

  <div class="shead" id="areas"></div>
  <p class="lead" id="lead-areas"></p>
  <div class="controls"><button class="ghost" id="expandAll"></button></div>
  <div id="areasWrap"></div>

  <div class="shead" id="sh-prio"></div>
  <div class="panel" id="prios" style="padding:0 16px"></div>

  <footer id="footBox"></footer>
</div>

<script>
let lang='es';
const L=o=>(o&&typeof o==='object'&&'es'in o)?o[lang]:o;

const UI={
  tbTitle:{es:"Exposición a IA",en:"AI exposure"},
  nav:{ctx:{es:"Contexto",en:"Context"},ver:{es:"Veredicto",en:"Verdict"},lec:{es:"Lectura",en:"Read"},areas:{es:"Áreas",en:"Areas"}},
  kicker:{es:"Diagnóstico de exposición a IA · framework de Reforge aplicado a Holafly",en:"AI exposure diagnostic · Reforge framework applied to Holafly"},
  h1:{es:"El riesgo de Holafly está concentrado en un solo flanco.",en:"Holafly's risk is concentrated on a single front."},
  thesis:{es:"La IA no fabrica conectividad, nadie consigue datos en Tokio con un prompt, así que el producto aguanta. Lo expuesto es <b>cómo te descubren y por qué te eligen</b>. Este informe va de lo macro a lo micro: el veredicto primero, el detalle de cada factor cuando lo quieras abrir.",
    en:"AI doesn't manufacture connectivity. Nobody gets data in Tokyo from a prompt, so the product holds. What's exposed is <b>how you get discovered and why you get chosen</b>. This report runs macro to micro: the verdict first, the detail of each factor when you choose to open it."},
  sh:{ctx:{n:"00",t:{es:"Qué es esto y de dónde sale",en:"What this is and where it comes from"}},
      ver:{n:"01",t:{es:"El veredicto, por modelo",en:"The verdict, by model"},tag:{es:"macro",en:"macro"}},
      lec:{n:"02",t:{es:"La lectura estratégica",en:"The strategic read"},tag:{es:"qué hacer con esto",en:"what to do with it"}},
      areas:{n:"03",t:{es:"Las 4 áreas, en detalle",en:"The 4 areas, in detail"},tag:{es:"micro",en:"micro"}},
      prio:{n:"04",t:{es:"Dónde actuar primero",en:"Where to act first"},tag:{es:"factores en rojo ≥5",en:"red factors ≥5"}}},
  leadVer:{es:"Los tres modelos, su total y dónde se concentra el rojo. Las barras de cada card son el promedio del modelo en cada una de las 4 áreas: ahí se ve que la vulnerabilidad no está repartida, vive en Use Case y Growth (el embudo).",
    en:"The three models, their total and where the red concentrates. Each card's bars are the model's average across the 4 areas: that's where you see the vulnerability isn't spread out, it lives in Use Case and Growth (the funnel)."},
  leadAreas:{es:"Cada área explica qué evalúa y cómo se lee. Abrila para ver sus factores, mover los scores y leer el razonamiento de cada uno.",

  method:{es:"Son <b>18 factores</b> en <b>4 áreas</b>. Cada uno va de 1 a 7 y la suma da el total sobre 126. El propio Reforge avisa algo que vale subrayar: <b>el total importa menos que la concentración</b>. Los factores en 5 o más son las prioridades. Lo aplicamos a los <b>tres modelos de venta de Holafly por separado</b> (B2C directo, planes mensuales, B2B), porque el riesgo IA es distinto en cada uno. Los scores son la lectura de Guido sobre el negocio, no un dato medido: están para discutirse y calibrarse con BQ y el benchmark. Movélos y todo se recalcula.",
    en:"It's <b>18 factors</b> across <b>4 areas</b>. Each runs 1 to 7 and the sum gives the total out of 126. Reforge itself flags something worth underlining: <b>the total matters less than the concentration</b>. Factors at 5 or higher are the priorities. We applied it to <b>Holafly's three sales models separately</b> (B2C direct, monthly plans, B2B), because the AI risk differs in each. The scores are Guido's read of the business, not a measured figure: they're meant to be argued and calibrated against BQ and the benchmark. Move them and everything recalculates."},
  scqa:{
    s:{lbl:{es:"Situación",en:"Situation"},p:{es:"La IA está reescribiendo qué productos sobreviven. En los casos peores genera un <b>Product Market Fit Collapse</b>: productos que parecían sólidos pierden su razón de ser de golpe (Chegg, Stack Overflow, Getty).",en:"AI is rewriting which products survive. In the worst cases it triggers a <b>Product Market Fit Collapse</b>: products that looked solid lose their reason to exist overnight (Chegg, Stack Overflow, Getty)."}},
    c:{lbl:{es:"Complicación",en:"Complication"},p:{es:"El golpe no avisa y no pega parejo. Algunos productos quedan intactos y otros se vacían en meses. La diferencia está en dónde sos vulnerable, y casi nunca es obvio a simple vista.",en:"The hit gives no warning and doesn't land evenly. Some products stay intact and others empty out in months. The difference is where you're vulnerable, and it's rarely obvious at a glance."}},
    q:{lbl:{es:"Pregunta",en:"Question"},p:{es:"Qué tan expuesta está Holafly, y por dónde exactamente. No el titular 'la IA viene', sino el mapa concreto de dónde duele y dónde no.",en:"How exposed Holafly is, and where exactly. Not the headline 'AI is coming', but the concrete map of where it hurts and where it doesn't."}},
    a:{lbl:{es:"Respuesta",en:"Answer"},p:{es:"Este diagnóstico. Usa el <b>AI Vulnerability Assessment de Reforge</b> (de su material sobre estrategia de producto en la era IA, a partir de la observación de Casey Winters sobre el PMF Collapse). Lo corrimos sobre Holafly.",en:"This diagnostic. It uses <b>Reforge's AI Vulnerability Assessment</b> (from their material on product strategy in the AI era, built on Casey Winters' observation about PMF Collapse). We ran it on Holafly."}}

  lecturaLab:{es:"6 conclusiones",en:"6 takeaways"},
  lectura:[
    {h:{es:"El total engaña",en:"The total misleads"},p:{es:"La mitad de los 18 factores preguntan si la IA puede replicar tu producto. No puede: es infraestructura física. Esos factores te dan \"seguro\" y diluyen el total hacia abajo, escondiendo un riesgo real y concentrado en 4 o 5 celdas de distribución. No mires la suma. Mirá la concentración.",en:"Half of the 18 factors ask whether AI can replicate your product. It can't: it's physical infrastructure. Those factors score \"safe\" and drag the total down, hiding a real risk concentrated in 4 or 5 distribution cells. Don't look at the sum. Look at the concentration."}},
    {h:{es:"Todo el riesgo está en la distribución",en:"All the risk is in distribution"},p:{es:"El growth model de <b>B2C llega a 20/21</b>. SEO (\"best esim japan\"), paid search y afiliados, los tres en la zona que la IA rehace ahora. Las AI Overviews se comen el clic, los chatbots responden la query sin que entres al sitio, y el agente de viaje termina comprando por el usuario. Si arreglás un solo cuadrante, es éste.",en:"B2C's growth model hits <b>20/21</b>. SEO (\"best esim japan\"), paid search and affiliates, all three in the zone AI is rewriting now. AI Overviews eat the click, chatbots answer the query without you reaching the site, and the travel agent ends up buying for the user. If you fix one quadrant, it's this one."}},
    {h:{es:"El mensual juega de defensa",en:"Monthly plays defense"},p:{es:"La suscripción da vuelta los tres factores más letales del B2C: frecuencia 7→2, switching 7→4, relación mediada 7→5. Cada euro que movés de un viaje suelto a conectividad recurrente sale del radio de explosión de la distribución por IA.",en:"The subscription flips B2C's three most lethal factors: frequency 7→2, switching 7→4, mediated relationship 7→5. Every euro you move from a one-off trip to recurring connectivity leaves the blast radius of AI distribution."}},
    {h:{es:"La fuerza es simétrica",en:"The force is symmetric"},p:{es:"Si Holafly se vuelve <b>el eSIM que el agente recomienda por default</b> (marca, disponibilidad estructurada, partnership con plataformas de viaje IA, checkout y API agent-friendly), el mismo agente que hoy te puede saltear mañana te puede elegir. El juego deja de ser rankear en Google y pasa a ser el default del agente.",en:"If Holafly becomes <b>the eSIM the agent recommends by default</b> (brand, structured availability, partnership with AI travel platforms, agent-friendly checkout and API), the same agent that can skip you today can pick you tomorrow. The game stops being ranking on Google and becomes being the agent's default."}},
    {h:{es:"El casillero es real pero chico y volátil",en:"The slot is real but small and volatile"},p:{es:"El audit ubicó tu frente fuerte: unlimited, heavy, multipaís, y sobre todo español/LATAM (Gemini te corona en México). En inglés y en la query de precio, perdés. Y la posición oscila motor a motor: aparecés #1 o ausente según con qué IA hable el usuario. No es un ranking bajo y parejo, es inestabilidad, más difícil de gestionar porque no hay una sola palanca.",en:"The audit located your strong front: unlimited, heavy, multi-country, and above all Spanish/LATAM (Gemini crowns you in Mexico). In English and on the price query, you lose. And the position swings engine to engine: you show up #1 or absent depending on which AI the user opens. It's not a low, even ranking, it's instability, harder to manage because there's no single lever."}},
    {h:{es:"Tu cancha: el pricing es parte de la defensa",en:"Your court: pricing is part of the defense"},div:true,p:{es:"Si la IA commoditiza la comparación y el agente optimiza por precio y specs, tu posición premium necesita un claim de <b>unlimited</b> que el agente pueda parsear. Ojo: el audit mostró que ese casillero te lo están reescribiendo (Ubigi ataca con hotspot sin cap; tu 500MB/día y el throttling salen con asterisco en los 4 motores). El diferencial es legible pero erosionable. El benchmark de 189 destinos es el prototipo manual de lo que el agente va a hacer solo: no te invalida el trabajo, le pone reloj. <b>Cobrá el premium ahora y reinvertí en lo que sobrevive: marca, cobertura, unlimited bien hecho y stickiness.</b>",en:"If AI commoditizes comparison and the agent optimizes on price and specs, your premium position needs an <b>unlimited</b> claim the agent can parse. Careful: the audit showed that slot is being rewritten on you (Ubigi attacks with uncapped hotspot; your 500MB/day and throttling show up with an asterisk in all 4 engines). The differentiator is legible but erodible. The 189-destination benchmark is the manual prototype of what the agent will do on its own: it doesn't invalidate the work, it puts a clock on it. <b>Charge the premium now and reinvest in what survives: brand, coverage, unlimited done right and stickiness.</b>"}}
  ],
  audit:{

    purpose:{es:"No nos quedamos en la teoría. Le preguntamos a las 4 IAs (ChatGPT, Perplexity, Gemini y una Claude aislada) lo que preguntaría un viajero, en sesiones limpias sin historial, y miramos si recomendaban Holafly. El veredicto deja de ser opinión y pasa a ser evidencia.",en:"We didn't stop at theory. We asked the 4 AIs (ChatGPT, Perplexity, Gemini and an isolated Claude) what a traveler would ask, in clean sessions with no history, and checked whether they recommended Holafly. The verdict stops being opinion and becomes evidence."},
    bluf:{es:"En la pregunta genérica de viaje, Holafly desaparece. Solo aparece fuerte en su nicho, y de forma inestable entre motores.",en:"On the generic travel question, Holafly disappears. It only shows up strong in its niche, and unevenly across engines."},

    findings:[
      {es:"<b>En la genérica, 0 de 4.</b> Forzada a elegir una sola opción para Japón, ningún motor eligió Holafly. Ganaron Ubigi, Saily y MobiMatter. El default de viaje está perdido.",en:"<b>On the generic one, 0 of 4.</b> Forced to pick a single option for Japan, no engine chose Holafly. Ubigi, Saily and MobiMatter won. The travel default is lost."},

      {es:"<b>Su casillero está disputado.</b> En 'unlimited, sin límite', que debería ser su cancha, aparece fuerte pero no domina: en un motor la pasa Ubigi con hotspot sin cap. El diferencial es legible pero erosionable.",en:"<b>Its slot is contested.</b> On 'unlimited, no cap', which should be its turf, it shows up strong but doesn't dominate: in one engine Ubigi overtakes it with uncapped hotspot. The differentiator is legible but erodible."}

    note:{es:"Esto endureció el veredicto del B2C: relación mediada (F11 6→7) y unit economics (F18 5→6). El total del B2C pasó de 98 a 100. El Mensual subió de 78 a 79 (F11 4→5). El B2B no se movió: la presencia en la IA es volátil, pero contratos y switching siguen protegiendo.",en:"This hardened the B2C verdict: mediated relationship (F11 6→7) and unit economics (F18 5→6). B2C total went from 98 to 100. Monthly rose from 78 to 79 (F11 4→5). B2B didn't move: AI presence is volatile, but contracts and switching still protect it."}

  {n:11,name:{es:"Relación directa ↔ mediada",en:"Direct ↔ mediated relationship"},desc:{es:"Vienen directo a vos o vía terceros?",en:"Do they come straight to you or via third parties?"},lo:{es:"Directa",en:"Direct"},hi:{es:"Mediada",en:"Mediated"},

let visible={b2c:true,men:true,b2b:true};
let openAreas=new Set();
let openWhys=new Set();
let allOpen=false;
const RAMP=["#1F9E8C","#4FAE6B","#8FB44C","#E2B23A","#E68A3C","#E6485C","#B82A45"];
const colorFor=v=>RAMP[Math.max(1,Math.min(7,Math.round(v)))-1];
function band(t){if(t<=36)return{label:{es:"Baja",en:"Low"},color:"#1F9E8C"};if(t<=72)return{label:{es:"Moderada",en:"Moderate"},color:"#E2B23A"};return{label:{es:"Alta",en:"High"},color:"#E6485C"};}
function modelTotal(k){let t=0;AREAS.forEach(a=>a.factors.forEach(f=>t+=f.s[k]));return t;}
function areaAvg(area,k){return area.factors.reduce((s,f)=>s+f.s[k],0)/area.factors.length;}
function flat(){const o=[];AREAS.forEach(a=>a.factors.forEach(f=>o.push(f)));return o;}
function shortName(s){return s.replace(' ↔ ',' / ');}
function shortArea(n){return n.replace(' Model','');}

function setText(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}
function shead(n,t,tag){return `<span class="n">${n}</span><h2>${t}</h2>`+(tag?`<span class="tag">${tag}</span>`:'')+`<span class="line"></span>`;}

function renderTopbar(){
  const h=document.getElementById('tbScores');h.innerHTML='';
  MODELS.forEach(m=>{if(!visible[m.k])return;const t=modelTotal(m.k),b=band(t);
    h.insertAdjacentHTML('beforeend',`<span class="tsc" style="background:${b.color}">${m.k.toUpperCase()} ${t}</span>`);});
}

function renderCards(){
  const h=document.getElementById('cards');h.innerHTML='';
  MODELS.forEach(m=>{
    if(!visible[m.k])return;
    const t=modelTotal(m.k),b=band(t);
    let bars=AREAS.map(a=>{const av=areaAvg(a,m.k),pct=Math.round(av/7*100);
      return `<div class="arow"><span class="al">${shortArea(a.name)}</span><span class="track"><i style="width:${pct}%;background:${colorFor(av)}"></i></span><span class="av" style="color:${colorFor(av)}">${av.toFixed(1)}</span></div>`;}).join('');
    h.insertAdjacentHTML('beforeend',`<div class="mcard"><h3>${L(m.name)}</h3><div class="sub">${L(m.sub)}</div>
      <div class="score" style="color:${b.color}">${t}<span> /126</span></div>
      <span class="bd" style="background:${b.color}">${L(b.label)} ${L(UI.vuln)}</span>
      <div class="arg"><div class="h">${L(UI.argLabel)}</div>${L(m.arg)}</div>
      <div class="areas-bars">${bars}</div></div>`);
  });
}

function renderHeatmap(){
  const h=document.getElementById('heatmap');h.innerHTML='';
  h.insertAdjacentHTML('beforeend',`<div class="hm-row hm-head"><div>Factor</div>`+MODELS.map(m=>`<div class="m" style="${visible[m.k]?'':'opacity:.25'}">${m.k.toUpperCase()}</div>`).join('')+`</div>`);
  AREAS.forEach(a=>{
    h.insertAdjacentHTML('beforeend',`<div class="hm-area">${a.name}</div>`);
    a.factors.forEach(f=>{
      let c=`<div class="hm-name">${f.n}. ${shortName(L(f.name))}</div>`;
      MODELS.forEach(m=>{const v=f.s[m.k];c+=`<div class="cell" data-go="${f.n}" title="${L(m.name)}: ${v}/7" style="background:${colorFor(v)};${visible[m.k]?'':'opacity:.16'}">${v}</div>`;});
      h.insertAdjacentHTML('beforeend',`<div class="hm-row">${c}</div>`);
    });
  });
  h.insertAdjacentHTML('beforeend',`<div class="note">${L(UI.hmNote)}</div>`);
  h.querySelectorAll('[data-go]').forEach(c=>c.addEventListener('click',()=>openFactor(+c.getAttribute('data-go'))));
}

function renderAreas(){
  const h=document.getElementById('areasWrap');h.innerHTML='';
  AREAS.forEach((a,ai)=>{
    const isOpen=allOpen||openAreas.has(ai);
    let mini=MODELS.filter(m=>visible[m.k]).map(m=>{const av=areaAvg(a,m.k);
      return `<div class="b"><div class="mv" style="background:${colorFor(av)}">${av.toFixed(1)}</div><div class="mk">${m.k.toUpperCase()}</div></div>`;}).join('');
    let factors=a.factors.map(f=>{
      let slots=MODELS.filter(m=>visible[m.k]).map(m=>{const v=f.s[m.k];
        return `<div class="slot"><div class="l"><span>${L(m.name)}</span><span class="chip" id="chip-${f.n}-${m.k}" style="background:${colorFor(v)}">${v}</span></div><input type="range" min="1" max="7" step="1" value="${v}" data-f="${f.n}" data-m="${m.k}"></div>`;}).join('');
      let rows=MODELS.filter(m=>visible[m.k]).map(m=>`<div class="r"><b>${L(m.name)}:</b> ${L(f.why[m.k])}</div>`).join('');
      let mf=f.misfit?`<div class="misfit"><b>${lang==='es'?'Acá el framework no calza:':"Here the framework doesn't fit:"}</b> ${L(f.misfit)}</div>`:'';
      const wo=openWhys.has(f.n)?' open':'';
      return `<div class="factor" id="f${f.n}">
        <div class="fhead"><span class="fnum">${f.n}</span><span class="fname">${L(f.name)}</span></div>
        <div class="fdesc">${L(f.desc)}</div>
        <div class="poles"><span class="lo">◂ 1 · ${L(f.lo)}</span><span class="hi">${L(f.hi)} · 7 ▸</span></div>
        <div class="sliders">${slots}</div>${mf}
        <div class="why"><button data-why="${f.n}">${L(UI.whyBtn)}</button><div class="b${wo}" id="why-${f.n}">${rows}</div></div>
      </div>`;}).join('');
    h.insertAdjacentHTML('beforeend',`<div class="area${isOpen?' open':''}" data-area="${ai}">
      <div class="ahead">
        <div class="ttl"><div class="t">${a.name} <span class="cnt">${a.factors.length} ${lang==='es'?'factores':'factors'}</span></div><div class="bl">${L(a.blurb)}</div></div>
        <div class="mini">${mini}</div>
        <span class="chev">▶</span>
      </div>
      <div class="abody">
        <div class="explain"><div class="e"><div class="h">${lang==='es'?'Qué evalúa':'What it measures'}</div><p>${L(a.what)}</p></div><div class="e"><div class="h">${lang==='es'?'Cómo se lee':'How to read it'}</div><p>${L(a.how)}</p></div></div>
        ${factors}
      </div></div>`);
  });
  h.querySelectorAll('.ahead').forEach(head=>head.addEventListener('click',e=>{
    if(e.target.closest('input')||e.target.closest('button'))return;
    const area=head.parentElement,ai=+area.getAttribute('data-area');
    area.classList.toggle('open');
    if(area.classList.contains('open'))openAreas.add(ai);else openAreas.delete(ai);
  }));
  h.querySelectorAll('input[type=range]').forEach(inp=>inp.addEventListener('input',e=>{
    const fn=+e.target.getAttribute('data-f'),mk=e.target.getAttribute('data-m'),v=+e.target.value;
    flat().find(x=>x.n===fn).s[mk]=v;
    const chip=document.getElementById(`chip-${fn}-${mk}`);chip.textContent=v;chip.style.background=colorFor(v);
    renderTopbar();renderCards();renderHeatmap();renderPrios();renderAreaMinis();
  }));
  h.querySelectorAll('[data-why]').forEach(b=>b.addEventListener('click',()=>{
    const n=+b.getAttribute('data-why');const body=document.getElementById('why-'+n);
    body.classList.toggle('open');
    if(body.classList.contains('open'))openWhys.add(n);else openWhys.delete(n);
  }));
}
function renderAreaMinis(){
  document.querySelectorAll('.area').forEach(el=>{
    const ai=+el.getAttribute('data-area'),a=AREAS[ai],mini=el.querySelector('.mini');if(!mini)return;
    mini.innerHTML=MODELS.filter(m=>visible[m.k]).map(m=>{const av=areaAvg(a,m.k);
      return `<div class="b"><div class="mv" style="background:${colorFor(av)}">${av.toFixed(1)}</div><div class="mk">${m.k.toUpperCase()}</div></div>`;}).join('');
  });
}
function openFactor(n){
  let ai=AREAS.findIndex(a=>a.factors.some(f=>f.n===n));
  openAreas.add(ai);
  const area=document.querySelector(`.area[data-area="${ai}"]`);
  if(area)area.classList.add('open');
  setTimeout(()=>{const node=document.getElementById('f'+n);
    if(node){node.scrollIntoView({behavior:'smooth',block:'center'});const o=node.style.background;node.style.transition='background .3s';node.style.background='#FCEBED';setTimeout(()=>node.style.background=o,1000);}},80);
}

function renderPrios(){
  const h=document.getElementById('prios');h.innerHTML='';
  MODELS.forEach(m=>{
    if(!visible[m.k])return;
    const items=flat().filter(f=>f.s[m.k]>=5).sort((a,b)=>b.s[m.k]-a.s[m.k]);
    let pills=items.map(f=>`<span class="pill"><span class="s" style="background:${colorFor(f.s[m.k])}">${f.s[m.k]}</span>${f.n}. ${shortName(L(f.name))}</span>`).join('');
    if(!items.length)pills=`<span class="hint">${L(UI.prioEmpty)}</span>`;
    const fw=L(UI.foco);const word=items.length===1?fw[0]:fw[1];
    h.insertAdjacentHTML('beforeend',`<div class="pcol"><div class="ph"><span class="dot" style="background:${band(modelTotal(m.k)).color}"></span>${L(m.name)} · ${items.length} ${word}</div>${pills}</div>`);
  });
}

document.getElementById('modelToggle').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  const k=e.target.getAttribute('data-m');
  if(visible[k]&&Object.values(visible).filter(Boolean).length===1)return;
  visible[k]=!visible[k];e.target.classList.toggle('on',visible[k]);renderDynamic();
});
document.getElementById('expandAll').addEventListener('click',e=>{
  allOpen=!allOpen;
  if(allOpen){AREAS.forEach((a,i)=>openAreas.add(i));}else{openAreas.clear();}
  document.querySelectorAll('.area').forEach(a=>a.classList.toggle('open',allOpen));
  e.target.innerHTML=allOpen?L(UI.expandClose):L(UI.expandOpen);
});
document.getElementById('reset').addEventListener('click',()=>{AREAS.forEach(a=>a.factors.forEach(f=>Object.assign(f.s,BASELINE[f.n])));renderDynamic();});
const BASELINE={};AREAS.forEach(a=>a.factors.forEach(f=>BASELINE[f.n]={...f.s}));

document.querySelectorAll('.langtog').forEach(tg=>tg.addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  lang=btn.getAttribute('data-l');renderAll();
}));

const tb=document.getElementById('topbar');
window.addEventListener('scroll',()=>{tb.classList.toggle('show',window.scrollY>360);});

function renderDynamic(){renderTopbar();renderCards();renderHeatmap();renderAreas();renderPrios();}
function renderAll(){applyStatic();renderDynamic();}
renderAll();
</script>
</body>
</html>
