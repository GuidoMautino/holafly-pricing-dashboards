const Xp=({title,open:defO=false,children,t,left})=>{
  const[o,setO]=useState(defO);
  return(
    <div style={{background:t.card,border:`1px solid ${t.border}`,borderLeft:left?`4px solid ${left}`:`1px solid ${t.border}`,borderRadius:10,marginBottom:14,overflow:"hidden"}}>
      <div onClick={()=>setO(!o)} style={{padding:"14px 20px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none"}}>
        <span style={{fontWeight:700,fontSize:15,lineHeight:1.3}}>{title}</span>
        <span style={{fontFamily:MN,fontSize:10,color:t.dim,transform:o?"rotate(90deg)":"none",transition:"transform 0.15s",flexShrink:0,marginLeft:10}}>▶</span>
      </div>
      {o&&<div style={{padding:"0 20px 18px",borderTop:`1px solid ${t.border}`}}>{children}</div>}
    </div>
  );
};

const MC=({label,value,sub,c,t})=>{
  const col=({green:t.green,yellow:t.yellow,red:t.red,accent:t.accent,purple:t.purple,blue:t.blue})[c]||t.dim;
  const bg=({green:t.gBg,yellow:t.yBg,red:t.rBg,accent:t.bBg,purple:t.pBg,blue:t.bBg})[c]||t.card;
  const bd=({green:t.gBdr,yellow:t.yBdr,red:t.rBdr,accent:t.bBdr,purple:t.pBdr,blue:t.bBdr})[c]||t.border;
  return(
    <div style={{background:bg,border:`1px solid ${bd}`,borderLeft:`4px solid ${col}`,borderRadius:8,padding:"12px 14px"}}>
      <div style={{fontFamily:MN,fontSize:9,fontWeight:700,color:t.dim,letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:4}}>{label}</div>
      <div style={{fontFamily:MN,fontSize:19,fontWeight:700,color:col,lineHeight:1.1,marginBottom:4}}>{value}</div>
      <div style={{fontSize:11,color:t.dim,lineHeight:1.4}}>{sub}</div>
    </div>
  );
};

const Pill=({s,t})=>{
  const m={
    met:[t.green,"MET"],
    notmet:[t.red,"NOT MET"],
    ok:[t.green,"OK"],
    flag:[t.yellow,"FLAG"],
    breached:[t.red,"BREACHED"]
  };
  const[col,lab]=m[s]||[t.dim,s];
  return <span style={{background:`${col}15`,color:col,fontFamily:MN,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:4,letterSpacing:"0.4px"}}>{lab}</span>;
};

const Bar=({ok,old,oth,label,t})=>{
  const tot=ok+old+oth;
  if(!tot)return null;
  return(
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",fontFamily:MN,fontSize:10,marginBottom:2}}>
        <span style={{fontWeight:600}}>{label}</span>
        <span>
          <span style={{color:t.green,fontWeight:700}}>{ok}</span>
          {old>0&&<span style={{color:t.red}}> · {old} old</span>}
          {oth>0&&<span style={{color:t.dim}}> · {oth} other</span>}
        </span>
      </div>
      <div style={{height:5,background:t.border,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.round(ok/tot*100)}%`,background:t.green,borderRadius:3}}/>
      </div>
    </div>
  );
};
