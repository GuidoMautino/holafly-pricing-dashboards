const Pill = ({ children, color }) => <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 4, fontSize: 10, fontWeight: 700, letterSpacing: 0.5, color, background: color + "15", border: "1px solid " + color + "30" }}>{children}</span>;

const Gauge = ({ label, baseline, current, floor, unit, t }) => {
  const d = current - baseline;
  const rng = Math.max(Math.abs(baseline - (floor || baseline * 0.7)), Math.abs(d), 0.01) * 2.5;
  const pos = Math.max(5, Math.min(95, 50 + (d / rng) * 45));
  const c = (floor !== undefined && current < floor) ? t.red : current >= baseline ? t.green : t.yellow;
  return <div style={{ marginBottom: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 4 }}>
      <span style={{ color: t.textMuted, fontWeight: 600 }}>{label}</span>
      <span style={{ fontFamily: MN, color: c, fontWeight: 600 }}>{current.toFixed(2)}{unit === "%" ? "%" : ""} ({d >= 0 ? "+" : ""}{d.toFixed(2)}{unit === "%" ? "pp" : ""})</span>
    </div>
    <div style={{ position: "relative", height: 10, borderRadius: 5, background: t.border }}>
      <div style={{ position: "absolute", left: "50%", top: 0, width: 2, height: 10, background: t.textMuted + "40" }} />
      <div style={{ position: "absolute", left: pos + "%", top: -2, width: 14, height: 14, borderRadius: "50%", background: c, border: "2px solid " + t.bg, transform: "translateX(-50%)" }} />
      {floor !== undefined && <div style={{ position: "absolute", left: Math.max(5, Math.min(95, 50 + ((floor - baseline) / rng) * 45)) + "%", top: -1, width: 3, height: 12, background: t.red + "60", borderRadius: 1 }} />}
    </div>
    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: t.textMuted, marginTop: 2 }}>
      <span>{tx("en", "Baseline", "Baseline")}: {baseline.toFixed(2)}{unit === "%" ? "%" : ""}</span>
      {floor !== undefined && <span style={{ color: t.red }}>Floor: {floor}{unit === "%" ? "%" : ""}</span>}
    </div>
  </div>;
};

const sc_ = (s, t) => s === "Scale" ? t.green : s === "Monitor" ? t.orange : s === "Iterate" ? t.yellow : t.red;
const cc_ = (c, t) => c === "HIGH" ? t.green : c === "MEDIUM" ? t.yellow : t.orange;
const cl = { confirmed: { l: "CONFIRMED", c: "green" }, hypothesis: { l: "HYPOTHESIS", c: "yellow" }, unknown: { l: "INVESTIGATE", c: "orange" } };
const pH = h => {
  const m1 = h.match(/(?:IF|SI)\s+(.*?)(?:,\s*(?:THEN|ENTONCES))/s);
  const m2 = h.match(/(?:THEN|ENTONCES)\s+(.*?)(?:,\s*(?:BECAUSE|PORQUE))/s);
  const m3 = h.match(/(?:BECAUSE|PORQUE)\s+(.*)/s);
  return { i: m1 ? m1[1].trim() : "", t: m2 ? m2[1].trim() : "", b: m3 ? m3[1].trim().replace(/\.$/, "") : "" };
};

    {/* Mix Shift */}
    <Xp title={tx(lang, "Mix shift & chi-square", "Shift de mix y chi-cuadrado")} desc={tx(lang, "How orders redistributed across plan durations. Chi-square tests whether the shift is real or random noise.", "Como se redistribuyeron las ordenes entre duraciones de plan. Chi-cuadrado testea si el shift es real o ruido aleatorio.")} t={t}>
      <Row cells={[tx(lang, "Bucket", "Bucket"), tx(lang, "OPD base", "OPD base"), tx(lang, "OPD post", "OPD post"), tx(lang, "Change", "Cambio"), tx(lang, "Share pre", "Share pre"), tx(lang, "Share post", "Share post")]} header t={t} />
      {D.mix.map((r, i) => {
        const opd = ref === "14d" ? r.pre14 : r.pre;
        const d = ref === "14d" ? r.delta14 : r.delta;
        const sP = ref === "14d" ? r.pre14S : r.preS;
        return <Row key={i} cells={[r.b, opd.toFixed(1), r.post.toFixed(1), { v: d, color: d.startsWith("+") ? t.green : d.startsWith("-") ? t.orange : t.text }, sP + "%", r.postS + "%"]} t={t} />;
      })}
      <div style={{ marginTop: 10, marginBottom: 10 }}>
        <PropBar label={tx(lang, "Before", "Antes") + " (" + ref + ")"} a={ref === "14d" ? D.mixTotals.shortPre14 : D.mixTotals.shortPre} b={ref === "14d" ? D.mixTotals.longPre14 : D.mixTotals.longPre} aL={"Short " + (ref === "14d" ? D.mixTotals.shortPre14 : D.mixTotals.shortPre) + "%"} bL={"Long " + (ref === "14d" ? D.mixTotals.longPre14 : D.mixTotals.longPre) + "%"} color={t.accent} t={t} />
        <PropBar label={tx(lang, "After (post)", "Despues (post)")} a={D.mixTotals.shortPost} b={D.mixTotals.longPost} aL={"Short " + D.mixTotals.shortPost + "%"} bL={"Long " + D.mixTotals.longPost + "%"} color={t.green} t={t} />
      </div>
      {ref === "90d" && <Sec color={t.green} t={t}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.green, marginBottom: 6 }}>Chi-square: {D.sig.chi.val} vs {D.sig.chi.threshold} = {tx(lang, "SIGNIFICANT", "SIGNIFICATIVO")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{L.chiFeynman}</div>
        {D.sig.chi.cramers_v && <div style={{ fontSize: 11, color: t.textDim, marginTop: 6, lineHeight: 1.5 }}>{tx(lang, "Cramer's V = " + D.sig.chi.cramers_v + " (" + D.sig.chi.cramers_v_interp + "). Small V is expected: we redistributed volume within the same catalog.", "V de Cramer = " + D.sig.chi.cramers_v + " (" + D.sig.chi.cramers_v_interp + "). V pequeno es esperado: redistribuimos volumen dentro del mismo catalogo.")}</div>}
      </Sec>}
      {ref === "90d" && D.chiCalc && <Xp title={tx(lang, "📐 Chi-square calculation", "📐 Calculo chi-cuadrado")} t={{...t, card: "transparent", border: t.border}}>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 8 }}>{tx(lang, "EXPECTED vs OBSERVED (basis for chi-square)", "ESPERADO vs OBSERVADO (base del chi-cuadrado)")}</div>
        <Row cells={[tx(lang, "Bucket", "Bucket"), tx(lang, "Share 90d", "Share 90d"), tx(lang, "Expected", "Esperado"), tx(lang, "Observed", "Observado"), tx(lang, "Diff", "Diff")]} header t={t} />
        {D.mix.map((r, i) => {
          const expected = Math.round(14686 * r.preS / 100);
          const observed = Math.round(r.post * 13);
          const diff = observed - expected;
          return <Row key={i} cells={[r.b, r.preS + "%", expected.toLocaleString(), observed.toLocaleString(), { v: (diff >= 0 ? "+" : "") + diff, color: diff > 0 ? t.green : t.orange }]} t={t} />;
        })}
        <div style={{ marginTop: 10 }}>
          {D.chiCalc[lang].map((s, i) => <div key={i} style={{ fontSize: 11, fontFamily: MN, color: i === D.chiCalc[lang].length - 1 ? t.green : t.textDim, lineHeight: 1.6, marginBottom: 4, fontWeight: i === D.chiCalc[lang].length - 1 ? 500 : 400 }}>{s}</div>)}
        </div>
      </Xp>}
      {ref === "14d" && <div style={{ fontSize: 11, color: t.yellow, padding: "8px 12px", background: t.yellow + "06", borderRadius: 6, marginTop: 6 }}>{tx(lang, "Chi-square (553.4 vs 12.59 = significant) was calculated against the 90d distribution. Full analysis with expected vs observed table in the 90d view.", "Chi-cuadrado (553.4 vs 12.59 = significativo) fue calculado contra la distribucion 90d. Analisis completo con tabla esperado vs observado en la vista 90d.")}</div>}
    </Xp>

    {/* Significance */}
    <Xp title={tx(lang, "Statistical significance", "Significancia estadistica")} desc={tx(lang, "Z-test for CR to Order (primary) and ARPU assessment. Full calculations in 90d view.", "Z-test para CR to Order (primario) y evaluacion ARPU. Calculos completos en vista 90d.")} t={t}>
      <div style={{ padding: "10px 14px", borderRadius: 8, background: t.green + "06", border: "1px solid " + t.green + "20", marginBottom: 10 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.green, marginBottom: 6 }}>{L.crHeadline}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{L.crExplain}</div>
      </div>
      {ref === "90d" && <Xp title={tx(lang, "📐 Z-test calculation", "📐 Calculo z-test")} t={{...t, card: "transparent", border: t.border}}>
        {D.zCalc[lang].map((s, i) => <div key={i} style={{ fontSize: 11, fontFamily: MN, color: i === D.zCalc[lang].length - 1 ? t.green : t.textDim, lineHeight: 1.6, marginBottom: 4, fontWeight: i === D.zCalc[lang].length - 1 ? 500 : 400 }}>{s}</div>)}
      </Xp>}
      {ref === "14d" && <div style={{ fontSize: 11, color: t.accent, padding: "6px 10px", background: t.accent + "06", borderRadius: 6 }}>{tx(lang, "Full z-test calculation in the 90d view. z=2.843 is an absolute measurement (pre vs post visitors), not relative to the toggle.", "Calculo z-test completo en la vista 90d. z=2.843 es una medicion absoluta (visitantes pre vs post), no relativa al toggle.")}</div>}
      <div style={{ padding: "10px 14px", borderRadius: 8, background: t.yellow + "06", border: "1px solid " + t.yellow + "20", marginTop: 10 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.yellow, marginBottom: 6 }}>{tx(lang, "ARPU", "ARPU")}</div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{L.arpuHeadline}</div>
        <div style={{ fontSize: 11, color: t.textMuted, marginTop: 4 }}>{tx(lang, D.sig.arpu.note_en, D.sig.arpu.note_es)}</div>
      </div>
    </Xp>

    {/* Elasticity (indicative) */}
    <Xp title={tx(lang, "Price elasticity (indicative)", "Elasticidad de precio (indicativa)")} desc={tx(lang, "Indicative estimates only. No formal DID control group. Do not use as pricing reference.", "Estimados orientativos solamente. Sin grupo de control DID formal. No usar como referencia de pricing.")} t={t}>
      <div style={{ fontSize: 11, color: t.orange, padding: "8px 12px", background: t.orange + "06", borderRadius: 6, marginBottom: 10, lineHeight: 1.6 }}>{tx(lang, "No formal DID control group exists for this experiment. All elasticity estimates are indicative. March seasonal demand inflates volume estimates. Do not use these values as pricing references without a dedicated DID experiment.", "No existe grupo de control formal DID para este experimento. Todos los estimados de elasticidad son orientativos. La demanda estacional de marzo infla los estimados de volumen. No usar estos valores como referencia de pricing sin un experimento DID dedicado.")}</div>
      <div style={{ fontSize: 13, color: t.text, lineHeight: 1.7, padding: "12px 14px", background: t.accent + "06", borderRadius: 8, border: "1px solid " + t.accent + "15", marginBottom: 12 }}>{L.elastSummary}</div>
      {D.elast.map((e, i) => <Sec key={i} color={e.flag === "price_up" ? t.purple : e.flag === "anomaly" ? t.yellow : t.accent} t={t}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: e.flag === "price_up" ? t.purple : e.flag === "anomaly" ? t.yellow : t.accent }}>{e.b}</span>
          {e.e_range && <span style={{ fontSize: 12, fontFamily: MN, color: t.accent }}>e = {e.e_range}</span>}
          {e.confidence && <Pill color={t[cl[e.confidence].c]}>{cl[e.confidence].l}</Pill>}
        </div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{tx(lang, e.note_en || e.reason_en, e.note_es || e.reason_es)}</div>
      </Sec>)}
    </Xp>

    {/* Benchmark */}
    {D.benchmarkPost && <Xp title={tx(lang, "🌏 Benchmark — Singapore (informal)", "🌏 Benchmark — Singapore (informal)")} desc={tx(lang, "Informal thermometer, not formal DID. 6x less volume than Japan. Validated retroactively.", "Termometro informal, no DID formal. 6x menos volumen que Japan. Validado retroactivamente.")} t={t}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
        {[
          { l: "🇯🇵 Japan", vol: D.benchmarkPost.jp_vol_d, aov: D.benchmarkPost.jp_aov_d, rev: D.benchmarkPost.jp_rev_d },
          { l: "🇸🇬 Singapore", vol: D.benchmarkPost.sg_vol_d, aov: D.benchmarkPost.sg_aov_d, rev: D.benchmarkPost.sg_rev_d },
        ].map((m, i) => <div key={i} style={{ padding: "10px 14px", background: t.card, borderRadius: 8, border: "1px solid " + t.border }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: t.text, marginBottom: 6 }}>{m.l}</div>
          <div style={{ fontSize: 11, color: t.textDim }}>{tx(lang, "Volume", "Volumen")}: <span style={{ fontFamily: MN, color: t.text }}>{m.vol}</span></div>
          <div style={{ fontSize: 11, color: t.textDim }}>AOV: <span style={{ fontFamily: MN, color: t.text }}>{m.aov}</span></div>
          <div style={{ fontSize: 11, color: t.textDim }}>Revenue: <span style={{ fontFamily: MN, color: t.text }}>{m.rev}</span></div>
        </div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
        <IBox label="DID Volume" val={D.benchmarkPost.did_vol} sub={tx(lang, "Japan underperformed Singapore", "Japan subperformo a Singapore")} color={t.orange} t={t} />
        <IBox label="DID Revenue" val={D.benchmarkPost.did_rev} sub={tx(lang, "March seasonal tailwind", "Viento de cola estacional marzo")} color={t.orange} t={t} />
      </div>
      <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6 }}>{D.benchmarkPost[lang === "en" ? "note_en" : "note_es"]}</div>
      <div style={{ marginTop: 10, padding: "10px 14px", borderRadius: 8, background: t.orange + "08", border: "1px solid " + t.orange + "25" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.orange, letterSpacing: 1, marginBottom: 6 }}>{tx(lang, "⚠️ IMPLICATION FOR EXP-007 (TAIWAN + SOUTH KOREA)", "⚠️ IMPLICACION PARA EXP-007 (TAIWAN + SOUTH KOREA)")}</div>
        <div style={{ fontSize: 12, color: t.text, lineHeight: 1.6, marginBottom: 6 }}>{tx(lang, "Singapore grew +21.7% in volume and +22.9% in revenue during the same period without any price change. Japan grew only +7.2% in volume and +1.0% in revenue. The gap (-14.6pp volume, -22.0pp revenue) indicates the FX correction on long plans absorbed organic growth that would have occurred naturally.", "Singapore crecio +21.7% en volumen y +22.9% en revenue durante el mismo periodo sin cambio de precio. Japan solo crecio +7.2% en volumen y +1.0% en revenue. La brecha (-14.6pp volumen, -22.0pp revenue) indica que la correccion FX en planes largos absorbio crecimiento organico que habria ocurrido naturalmente.")}</div>
        <div style={{ fontSize: 12, color: t.orange, lineHeight: 1.6, fontWeight: 500 }}>{tx(lang, "Exp-007 must include a volume guardrail on long plans (15-30d, 31-90d) from Day 1. If Taiwan and South Korea show the same contraction pattern, the pricing model needs a volume-adjusted ceiling on FX corrections for long-duration plans.", "Exp-007 debe incluir un guardrail de volumen en planes largos (15-30d, 31-90d) desde el Dia 1. Si Taiwan y South Korea muestran el mismo patron de contraccion, el modelo de pricing necesita un tope ajustado por volumen en correcciones FX para planes de larga duracion.")}</div>
      </div>
    </Xp>}

    {/* Anomalies */}
    <Xp title={tx(lang, "⚠️ Anomalies & Gaps", "⚠️ Anomalias y Gaps")} desc={tx(lang, "Known anomalies with status and open gaps for follow-up.", "Anomalias conocidas con status y gaps abiertos para seguimiento.")} t={t}>
      {D.anomalies.map((a, i) => <div key={i} style={{ padding: "8px 12px", borderRadius: 6, background: a.status === "explained" ? t.green + "06" : t.yellow + "06", border: "1px solid " + (a.status === "explained" ? t.green : t.yellow) + "15", marginBottom: 6 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{a.bucket}</span>
          <Pill color={a.status === "explained" ? t.green : t.yellow}>{a.status.toUpperCase()}</Pill>
        </div>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.5 }}>{a[lang]}</div>
      </div>)}
      <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginTop: 12, marginBottom: 8 }}>GAPS</div>
      {D.gaps.map((g, i) => <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr 80px 80px", gap: 8, padding: "6px 0", borderBottom: "1px solid " + t.border + "30", fontSize: 11, alignItems: "center" }}>
        <Pill color={g.type === "CAUSAL" ? t.orange : g.type === "TEST" ? t.yellow : t.textMuted}>{g.type}</Pill>
        <span style={{ color: t.textDim }}>{tx(lang, g.en, g.es)}</span>
        <span style={{ color: t.textMuted, fontSize: 10 }}>{g.owner}</span>
        <span style={{ color: t.textMuted, fontSize: 10 }}>{g.target}</span>
      </div>)}
    </Xp>

    {/* LTV Caveat */}
    {D.hasLtvCaveat && <Xp title={tx(lang, "📅 LTV Cohort Tracking", "📅 Seguimiento Cohorte LTV")} t={t}>
      <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginBottom: 6 }}>{L.ltvCaveat}</div>
      <div style={{ fontSize: 11, color: t.accent, fontWeight: 500 }}>{L.ltvMonitor}</div>
    </Xp>}

    {/* GLOSSARY */}
    <Xp title={tx(lang, "📖 Glossary", "📖 Glosario")} desc={tx(lang, "All terms explained in plain language.", "Todos los terminos explicados en lenguaje simple.")} t={t}>
      {[
        { term: "MDE", def: { en: "Minimum Desirable Effect. The targets we set to define success. Think of it as the bar the experiment needs to clear. If all MDE are met, the experiment is a success.", es: "Efecto Minimo Deseado. Los objetivos que definimos para definir exito. Es la vara que el experimento tiene que superar. Si todos los MDE se cumplen, el experimento es exitoso." } },
        { term: "ARPU", def: { en: "Average Revenue Per User. Total revenue divided by total unique visitors. If 1,000 people visit and we make EUR 5,000, ARPU is EUR 5. Captures both conversion and order value in one number.", es: "Revenue Promedio por Usuario. Revenue total dividido visitantes unicos totales. Si 1,000 personas visitan y facturamos EUR 5,000, ARPU es EUR 5. Captura tanto conversion como valor de orden en un solo numero." } },
        { term: "CR", def: { en: "Conversion Rate. Of every 100 visitors, how many buy something. If 15 out of 100 buy, CR is 15%.", es: "Tasa de Conversion. De cada 100 visitantes, cuantos compran algo. Si 15 de 100 compran, CR es 15%." } },
        { term: "AOV", def: { en: "Average Order Value. The average EUR paid per order. When FX correction raises the JPY-to-EUR conversion, AOV in EUR goes up for long plans even though the JPY price is the same.", es: "Valor Promedio de Orden. El promedio en EUR pagado por orden. Cuando la correccion FX sube la conversion JPY-a-EUR, el AOV en EUR sube para planes largos aunque el precio en JPY sea el mismo." } },
        { term: "GM", def: { en: "Gross Margin. What percentage of revenue is profit after direct costs. If we make EUR 100 and costs are EUR 18, GM is 82%. The FX correction recovered GM because we were previously converting JPY revenue to EUR at a rate 10% below market.", es: "Margen Bruto. Que porcentaje del revenue es ganancia despues de costos directos. Si facturamos EUR 100 y los costos son EUR 18, GM es 82%. La correccion FX recupero GM porque antes convertiamos revenue JPY a EUR a una tasa 10% por debajo del mercado." } },
        { term: tx(lang, "FX Correction", "Correccion FX"), def: { en: "Adjusting the internal exchange rate from 159.31 to 175 JPY/EUR to reflect actual market conditions. This was not a strategic price increase: it corrected a systematic margin leak where JPY revenue was being recorded at ~10% less than its real EUR value.", es: "Ajustar la tasa de cambio interna de 159.31 a 175 JPY/EUR para reflejar condiciones reales del mercado. No fue una suba estrategica de precios: corrigio una fuga sistematica de margen donde el revenue JPY se registraba a ~10% menos de su valor real en EUR." } },
        { term: "Price-per-Day (PPD)", def: { en: "The first price impression a buyer sees: plan price divided by days. A 3-day plan at EUR 12 has a PPD of EUR 4/day. The correction brought short JPY plans to the standard EUR 3.79/day used across the catalog.", es: "La primera impresion de precio que ve el comprador: precio del plan dividido por dias. Un plan de 3 dias a EUR 12 tiene un PPD de EUR 4/dia. La correccion llevo los planes cortos JPY al estandar EUR 3.79/dia usado en todo el catalogo." } },
        { term: tx(lang, "Two Forces / Causal Forces", "Dos Fuerzas / Fuerzas Causales"), def: { en: "This experiment applied two changes simultaneously: FX correction (prices up on long plans) and PPD correction (prices down on short plans). Because both happened at the same time, we can confirm each mechanism worked (AOV moved in the designed direction) but cannot precisely measure how much volume change came from each force.", es: "Este experimento aplico dos cambios simultaneamente: correccion FX (precios suben en planes largos) y correccion PPD (precios bajan en planes cortos). Como ambos ocurrieron al mismo tiempo, podemos confirmar que cada mecanismo funciono (AOV se movio en la direccion disenada) pero no podemos medir con precision cuanto del cambio de volumen vino de cada fuerza." } },
        { term: tx(lang, "Benchmark (informal)", "Benchmark (informal)"), def: { en: "Singapore served as an informal thermometer. It has similar AOV levels and trend parallelism with Japan pre-launch. With 6x less volume than Japan, it confirms directional signals (like the March seasonal tailwind) but is not precise enough for formal DID.", es: "Singapore sirvio como termometro informal. Tiene niveles de AOV similares y paralelismo de tendencia con Japan pre-lanzamiento. Con 6x menos volumen que Japan, confirma senales direccionales (como el viento de cola de marzo) pero no es preciso para DID formal." } },
        { term: tx(lang, "Elasticity", "Elasticidad"), def: { en: "How much volume changes when price changes. Formula: % volume change / % price change. Range -2.83 to -4.00 for 1-day means: for every 1% price drop, volume grew 2.8-4.0%. Absolute value > 1 means volume reacts more than proportionally to price. In this experiment, estimates are indicative (no formal DID), not definitive.", es: "Cuanto cambia el volumen cuando cambia el precio. Formula: % cambio volumen / % cambio precio. Rango -2.83 a -4.00 para 1 dia significa: por cada 1% de baja, volumen crecio 2.8-4.0%. Valor absoluto > 1 significa que el volumen reacciona mas que proporcionalmente. En este experimento, los estimados son orientativos (sin DID formal), no definitivos." } },
        { term: "Chi-square", def: { en: "Statistical test checking if a distribution changed for real or by chance. Our score: 553.4 vs threshold 12.59. Like an exam needing a 6 to pass and scoring 44. The mix shift is real. Cramer's V (0.076) normalizes for sample size: the effect is small to moderate.", es: "Test estadistico que verifica si una distribucion cambio de verdad o por azar. Nuestro score: 553.4 vs umbral 12.59. Como un examen donde necesitas un 6 y sacaste 44. El cambio de mix es real. V de Cramer (0.076) normaliza por tamano de muestra: el efecto es pequeno a moderado." } },
        { term: "Z-score", def: { en: "Measures how far a result is from 'no effect'. z = 1.96 means 95% confidence. z = 2.576 means 99%. Our z = 2.843 exceeds 99%. p = 0.0045 means 0.45% chance the CR improvement is random.", es: "Mide que tan lejos esta un resultado de 'ningun efecto'. z = 1.96 significa 95% de confianza. z = 2.576 significa 99%. Nuestro z = 2.843 supera 99%. p = 0.0045 significa 0.45% de probabilidad de que la mejora de CR sea aleatoria." } },
        { term: tx(lang, "Seasonal Tailwind", "Viento de Cola Estacional"), def: { en: "A period of naturally elevated demand unrelated to the price change. March 2026 had strong Asia-Pacific travel demand. Singapore (no price change) grew +21.7% in orders during the same period. This means some of Japan's volume growth came from the season, not from the pricing correction.", es: "Un periodo de demanda naturalmente elevada no relacionada con el cambio de precio. Marzo 2026 tuvo fuerte demanda de viajes en Asia-Pacifico. Singapore (sin cambio de precio) crecio +21.7% en ordenes en el mismo periodo. Esto significa que parte del crecimiento de volumen de Japan vino de la temporada, no de la correccion de pricing." } },
        { term: tx(lang, "Blended vs Excl. PS", "Blended vs Excl. PS"), def: { en: "Blended includes all visitors. Excl. PS removes Paid Social visitors. In EXP-005 JPY, PS was MORE active pre-launch (10.4%) than post (8.3%), so blended is the clean metric. In EXP-004 MXN, PS spiked at launch, making excl. PS the clean metric. Different experiments, different primary metrics.", es: "Blended incluye todos los visitantes. Excl. PS remueve visitantes de Paid Social. En EXP-005 JPY, PS estaba MAS activo pre-lanzamiento (10.4%) que post (8.3%), asi que blended es la metrica limpia. En EXP-004 MXN, PS salto al lanzamiento, haciendo excl. PS la metrica limpia. Diferentes experimentos, diferentes metricas primarias." } },
      ].map((item, i, arr) => <div key={i} style={{ padding: "8px 0", borderBottom: i < arr.length - 1 ? "1px solid " + t.border + "30" : "none" }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: t.accent }}>{item.term}</span>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginTop: 3 }}>{tx(lang, item.def.en, item.def.es)}</div>
      </div>)}
    </Xp>

    {/* Footer */}
    <div style={{ textAlign: "center", fontSize: 10, color: t.textMuted, padding: "20px 0 10px", borderTop: "1px solid " + t.border, marginTop: 16 }}>
      {D.footer[lang]}
    </div>
  </div>;
}

ReactDOM.render(React.createElement(ExpPerf), document.getElementById('root'));
</script>
</body>
</html>
