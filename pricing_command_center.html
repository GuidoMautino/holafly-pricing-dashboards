<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holafly · Pricing Command Center v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Mulish',sans-serif; background:#FFFFFF; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes numIn { from { opacity:0; filter:blur(4px); transform:translateY(8px); } to { opacity:1; filter:blur(0); transform:translateY(0); } }
    @keyframes pop { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
    .anim-card { animation: fadeUp .4s ease both; }
    .anim-num { animation: numIn .5s ease both; }
    .anim-pop { animation: pop .35s ease both; }
    @media(max-width:359px){ body::before { content:'Please use a larger screen (360px+)'; position:fixed; inset:0; background:#FFFFFF; display:flex; align-items:center; justify-content:center; font-family:'Mulish',sans-serif; font-size:14px; color:#292B2E; z-index:9999; padding:20px; text-align:center; } #root { display:none; } }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:#CCD0D7; border-radius:3px; }
    @keyframes easterFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .easter-egg { display:inline-block; animation: easterFloat 2s ease-in-out infinite; font-size:14px; margin-left:8px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ═══ HOLAFLY DESIGN SYSTEM V2 — LIGHT THEME ═══
const T = {
  bg:"#FFFFFF",card:"#F8FAFC",text:"#292B2E",textDim:"#64748B",textMuted:"#94A3B8",
  border:"#E4E6EA",accent:"#E6485C",accentLight:"#FDE8EB",
  successBg:"#48EC86",successText:"#15803D",dangerText:"#DC2626",warningText:"#B45309",
  yellow:"#FFF0AB",blue:"#BFEBFF",orange:"#FFCCB0",purple:"#643560",
};
const CAT_C={"FX Correction":{bg:"#BFEBFF",t:"#1E3A5F"},"PPD Optimization":{bg:"#FFF0AB",t:"#7C5C00"},"Catalog Correction":{bg:"#E8F4FD",t:"#1E3A5F"},"Exploratory":{bg:"#FFCCB0",t:"#7C3A00"}};
const MN="JetBrains Mono,Consolas,monospace",UI="Mulish,sans-serif";

const TABS=[
  {id:"overview",en:"Overview",es:"Resumen",c:T.text},
  {id:"blockers",en:"Blockers & Decisions",es:"Bloqueos & Decisiones",c:T.dangerText},
  {id:"experiments",en:"Experiments",es:"Experimentos",c:"#34D399"},
  {id:"strategy",en:"Strategy",es:"Estrategia",c:T.purple},
  {id:"data",en:"Data & Dashboards",es:"Datos & Dashboards",c:"#6BA3D6"},
  {id:"infra",en:"Infrastructure",es:"Infraestructura",c:"#D4A843"},
  {id:"roadmap",en:"Roadmap",es:"Hoja de ruta",c:"#D49370"},
  {id:"log",en:"Log",es:"Registro",c:"#8B5CF6"},
];

// STATUS
const ST={live:{bg:"#E8FBF0",t:T.successText,d:T.successBg},closed:{bg:T.card,t:T.textMuted,d:T.border},ready:{bg:"#FEF9C3",t:T.warningText,d:"#EAB308"},approved:{bg:"#DBEAFE",t:"#1D4ED8",d:"#3B82F6"},paused:{bg:T.accentLight,t:T.accent,d:T.accent},success:{bg:"#E8FBF0",t:T.successText,d:T.successBg},blocked:{bg:"#FEE2E2",t:T.dangerText,d:T.dangerText},pending:{bg:"#FFF7ED",t:T.warningText,d:"#F97316"},"stand-by":{bg:"#F3F4F6",t:"#6B7280",d:"#9CA3AF"}};
const Bd=({s,label})=>{const c=ST[s]||ST.paused;return (<span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:99,background:c.bg,color:c.t,fontSize:11,fontWeight:600}}><span style={{width:6,height:6,borderRadius:"50%",background:c.d,flexShrink:0}}/>{label||s}</span>)};
const CB=({cat})=>{const c=CAT_C[cat]||{bg:T.card,t:T.textDim};return (<span style={{fontSize:10.5,fontWeight:600,padding:"3px 8px",borderRadius:4,background:c.bg,color:c.t}}>{cat}</span>)};

// COMPONENTS — #1 Typography bump: body 14px, desc 14px, metrics 26px, section headers 12px
const Card=({children,accent,onClick,s={},delay=0})=><div onClick={onClick} className="anim-card" style={{background:T.card,borderRadius:10,border:`1px solid ${T.border}`,borderLeft:accent?`3px solid ${accent}`:`1px solid ${T.border}`,padding:"16px 18px",cursor:onClick?"pointer":"default",transition:"box-shadow .15s",animationDelay:`${delay}ms`,...s}} onMouseEnter={e=>{if(onClick)e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,.06)"}} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>{children}</div>;
const XL=({href,icon,title,desc,delay=0})=><Card accent={T.accent} delay={delay} onClick={()=>{if(href)window.open(href,"_blank")}}><div style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontSize:18,lineHeight:1,flexShrink:0}}>{icon}</span><div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:3}}>{title}</div><div style={{fontSize:12,color:T.textDim,lineHeight:1.45}}>{desc}</div></div></div></Card>;
const Sec=({children,color})=><h3 style={{fontSize:12,fontWeight:700,color:color||T.textMuted,textTransform:"uppercase",letterSpacing:1.3,margin:"26px 0 12px",fontFamily:UI}}>{children}</h3>;
const Desc=({children})=><p style={{fontSize:14,color:T.textDim,lineHeight:1.6,margin:"0 0 14px"}}>{children}</p>;
const G=({cols="repeat(auto-fit,minmax(230px,1fr))",gap=10,children})=><div style={{display:"grid",gridTemplateColumns:cols,gap}}>{children}</div>;
const Met=({label,value,sub,color,delay=0})=><div className="anim-pop" style={{background:T.card,borderRadius:10,border:`1px solid ${T.border}`,borderLeft:`3px solid ${color||T.textMuted}`,padding:"14px 10px",textAlign:"center",animationDelay:`${delay}ms`}}><div style={{fontSize:10.5,color:T.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:.7,marginBottom:5}}>{label}</div><div className="anim-num" style={{fontSize:26,fontWeight:800,color:color||T.text,fontFamily:MN,lineHeight:1,animationDelay:`${delay+80}ms`}}>{value}</div>{sub&&<div style={{fontSize:10.5,color:T.textDim,marginTop:5}}>{sub}</div>}</div>;
const L=(lang,en,es)=>lang==="en"?en:es;

// COLLAPSIBLE SECTION
const Coll=({title,color,count,children,open:initOpen=false})=>{
  const [open,setOpen]=useState(initOpen);
  return <div style={{marginBottom:14}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"10px 0",borderBottom:`1px solid ${T.border}`,userSelect:"none"}}>
      <span style={{fontSize:11,color:color||T.textMuted,transition:"transform .2s",transform:open?"rotate(90deg)":"rotate(0deg)",fontWeight:700}}>▶</span>
      <span style={{fontSize:12,fontWeight:700,color:color||T.textMuted,textTransform:"uppercase",letterSpacing:1.3,fontFamily:UI}}>{title}</span>
      {count!=null&&<span style={{fontSize:10,fontFamily:MN,color:T.textMuted,background:T.border,padding:"1px 6px",borderRadius:4}}>{count}</span>}
    </div>
    {open&&<div style={{paddingTop:12}} className="anim-card">{children}</div>}
  </div>
};

// DASHBOARD URLS (per experiment)
const DASH={
  "EXP-004":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_004_mxn_v5_final.html",
  "EXP-005":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_005_jpy_v5_final.html",
  "EXP-006":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_006_thailand_v7.html",
};

// TIMELINE BAR — #20 experiment progress bar
const TimelineBar=({start,end,label,pct,delay=0})=>{
  const col = pct>=100?"#34D399":pct>=50?T.warningText:T.accent;
  return <div className="anim-card" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",animationDelay:`${delay}ms`}}>
    <span style={{fontSize:11,fontFamily:MN,color:T.textMuted,minWidth:60}}>{start}</span>
    <div style={{flex:1,height:6,background:T.border,borderRadius:3,overflow:"hidden",position:"relative"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:col,borderRadius:3,transition:"width .6s ease"}}/>
    </div>
    <span style={{fontSize:11,fontFamily:MN,color:T.textMuted,minWidth:60,textAlign:"right"}}>{end}</span>
    <span style={{fontSize:10,fontWeight:700,fontFamily:MN,color:col,minWidth:40,textAlign:"right"}}>{pct}%</span>
  </div>
};

// LIFECYCLE BADGE — #21
const LifecycleBd=({phase})=>{
  const map={"pre-launch":{bg:"#FFF7ED",t:"#B45309"},"running":{bg:"#E8FBF0",t:T.successText},"closed":{bg:T.card,t:T.textMuted},"review":{bg:"#EDE9FE",t:"#6D28D9"}};
  const c=map[phase]||map["pre-launch"];
  return <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,background:c.bg,color:c.t,textTransform:"capitalize"}}>{phase}</span>
};

// EXPERIMENT CARD — collapsible detail
const ExpCard=({e,idx,l})=>{
  const [open,setOpen]=useState(false);
  const accentCol=e.st==="live"?"#34D399":e.st==="approved"?"#3B82F6":e.st==="stand-by"?"#9CA3AF":T.border;
  return <Card accent={accentCol} delay={idx*60}>
    <div onClick={()=>setOpen(!open)} style={{cursor:"pointer",userSelect:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:5}}>
        <div><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
          <span style={{fontSize:11,color:accentCol,transition:"transform .2s",transform:open?"rotate(90deg)":"rotate(0deg)",fontWeight:700}}>▶</span>
          <span style={{fontFamily:MN,fontSize:11,color:T.accent,fontWeight:700}}>{e.id}</span><span style={{fontWeight:700,fontSize:13.5,color:T.text}}>{e.name}</span></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Bd s={e.st}/>{e.result&&<Bd s={e.result} label="Scale"/>}<LifecycleBd phase={e.phase}/><span style={{fontSize:10,color:T.textMuted,padding:"2px 6px",background:T.border,borderRadius:3}}>{e.meth}</span><CB cat={e.cat}/></div></div>
        <span style={{fontSize:10.5,color:T.textMuted,whiteSpace:"nowrap"}}>{e.dates}</span></div>
    </div>
    {open&&<div className="anim-card" style={{marginTop:10}}>
      <div style={{fontSize:14,color:T.textDim,lineHeight:1.55}}>{e.detail}</div>
      {e.start!=="—"&&<TimelineBar start={e.start} end={e.end} pct={e.pct} delay={0}/>}
      {e.review&&<div style={{marginTop:8,padding:"8px 12px",background:"#FAFAFE",borderRadius:6,border:`1px solid ${T.border}`}}>
        <div style={{fontSize:10.5,fontWeight:700,color:T.purple,marginBottom:6,textTransform:"uppercase",letterSpacing:.8}}>{L(l,"Review Schedule","Calendario Review")}</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{e.review.map((r,ri)=><div key={ri} style={{flex:"1 1 180px",padding:"6px 10px",borderRadius:5,border:`1px solid ${r.done?T.successBg:T.border}`,background:r.done?"#F0FDF4":"#FFFFFF"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <span style={{fontFamily:MN,fontSize:11,fontWeight:700,color:r.done?T.successText:T.text}}>{r.d}</span>
            <span style={{fontFamily:MN,fontSize:10,color:T.textMuted}}>{r.date}</span>
          </div>
          <div style={{fontSize:11.5,color:T.textDim,lineHeight:1.4}}>{r.focus}</div>
        </div>)}</div>
      </div>}
      {e.url&&<div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
        <a href={e.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.accent,fontWeight:600}}>Notion →</a>
        {DASH[e.id]&&<a href={DASH[e.id]} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.purple,fontWeight:600}}>Dashboard →</a>}
      </div>}
    </div>}
  </Card>;
};

// TLDR BANNER — situational summary, updated manually with each dashboard update
const TLDR=({date,items,lang})=><div className="anim-card" style={{background:"#F8FAFC",border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.accent}`,borderRadius:10,padding:"14px 18px",marginBottom:20}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
    <span style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1}}>TLDR</span>
    <span style={{fontSize:10,fontFamily:MN,color:T.textMuted}}>{date}</span>
  </div>
  <div style={{fontSize:14,color:T.text,lineHeight:1.65}}>{items.map((it,i)=><div key={i} style={{marginBottom:i<items.length-1?6:0,display:"flex",gap:8,alignItems:"flex-start"}}><span style={{color:it.color||T.textDim,fontSize:13,lineHeight:1.7,flexShrink:0}}>{it.icon}</span><span>{it.text}</span></div>)}</div>
</div>;

// WEEK IN REVIEW component
const WR=({done,carried,next,l})=><div style={{display:"flex",flexDirection:"column",gap:4}}>
  <Coll title={`✅ ${L(l,"Done","Hecho")} (${done.length})`} color={"#34D399"}>
    {done.map((d,i)=><div key={i} style={{fontSize:14,color:T.text,lineHeight:1.7,marginBottom:10,paddingLeft:14,borderLeft:`2px solid #34D399`}}>{d}</div>)}
  </Coll>
  <Coll title={`⏳ ${L(l,"Carried Over","Pendiente")} (${carried.length})`} color={"#EAB308"} open={true}>
    {carried.map((d,i)=><div key={i} style={{fontSize:14,color:T.text,lineHeight:1.7,marginBottom:10,paddingLeft:14,borderLeft:`2px solid #EAB308`}}>{d}</div>)}
  </Coll>
  <Coll title={`📅 ${L(l,"This Week","Esta Semana")} (${next.length})`} color={"#3B82F6"}>
    {next.map((d,i)=><div key={i} style={{fontSize:14,color:T.text,lineHeight:1.7,marginBottom:10,paddingLeft:14,borderLeft:`2px solid #3B82F6`}}>{d}</div>)}
  </Coll>
</div>;

// TLDR DATA — edit these when updating the dashboard
const TLDR_OVERVIEW=(l)=>({date:"Apr 7, 2026",items:[
  {icon:"🎯",color:T.accent,text:l==="en"?<span><strong>Today is the pivot day of the week.</strong> EXP-009 GBP deploys this morning (Sebas confirmed last Friday) and CORR-001 hits its first clean post-Easter read today. Double monitoring kicks off in parallel with the weekly pricing meet at 13:30 ES, aligning the team in real time on both reads.</span>:<span><strong>Hoy es el día que define la semana.</strong> EXP-009 GBP deploya esta mañana (Sebas confirmó el viernes pasado) y CORR-001 cae con su primera lectura limpia post-Easter hoy. Doble monitoreo arranca en paralelo con el weekly pricing de las 13:30 ES, alineando al equipo en tiempo real sobre ambos.</span>},
  {icon:"🤝",color:T.successText,text:l==="en"?<span><strong>PH workstream is in rhythm.</strong> Yesterday's meet landed the agreements (21→10-15 models, Strapi clustering criteria, FX monotonicity check), sheet sent under NDA. Picks back up Thursday 17:00 ES with PH cooking the data on their side. Alfonso wants to maximize the hours.</span>:<span><strong>El workstream con PH agarró ritmo.</strong> El meet de ayer cerró los acuerdos (21→10-15 modelos, criterio clustering para Strapi, check de monotonicidad FX), sheet enviado bajo NDA. Retomamos Jueves 17:00 ES con PH cocinando data de su lado. Alfonso quiere aprovechar las horas al máximo.</span>},
  {icon:"⏸",color:T.warningText,text:l==="en"?<span><strong>Two workstreams sit on Pricing for decisions, not on Sebas for execution.</strong> The 4 pricing corrections (€5.9M scope) are in stand-by pending case-by-case decisions before re-engaging Content. The SSoT deep work surfaced 6 findings now logged for tracking, full detail in the SSoT Dashboard ahead of Thursday's Data alignment meet.</span>:<span><strong>Dos workstreams quedan en Pricing para decidir, no en Sebas para ejecutar.</strong> Las 4 correcciones de pricing (€5.9M de scope) están en stand-by pendientes de decisiones caso por caso antes de reactivar con Content. El deep work del SSoT levantó 6 hallazgos ya trackeados, detalle completo en el SSoT Dashboard de cara al meet de alineación con Data del jueves.</span>},
]});
const TLDR_BLOCKERS=(l)=>({date:"Apr 7, 2026",items:[
  {icon:"🔑",color:T.accent,text:l==="en"?<span><strong>The big unlock: EXP-009 GBP and CORR-001 both fall today.</strong> Sebas confirmed the deploy for this morning, CORR-001 hits its post-Easter D+7 today as well. Tomorrow (Wed Apr 8) is the first clean read for both. From now until Friday we are in active double monitoring.</span>:<span><strong>El gran desbloqueo: EXP-009 GBP y CORR-001 caen ambos hoy.</strong> Sebas confirmó el deploy para esta mañana, CORR-001 marca su D+7 post-Easter también hoy. Mañana (Mié 8 Abr) es el primer día limpio para ambos. De acá al viernes estamos en monitoreo doble activo.</span>},
  {icon:"⏸",color:T.warningText,text:l==="en"?<span><strong>4 pricing corrections in stand-by pending Pricing decisions, not Content execution.</strong> Bundles, DR, Saint Barthélemy, Bosnia (€5.9M total). The blocker is upstream: case-by-case decisions need to close before the implementation queue moves.</span>:<span><strong>4 correcciones de pricing en stand-by pendientes de decisiones de Pricing, no de ejecución de Content.</strong> Bundles, DR, Saint Barthélemy, Bosnia (€5.9M total). El blocker es upstream: las decisiones caso por caso tienen que cerrarse antes de que la cola de implementación se mueva.</span>},
  {icon:"🏗️",text:l==="en"?<span><strong>Background context still in play:</strong> Josy unblocked the bundles, regionals and GM thread yesterday (Carriers tracks GM negative independently, not urgent for them). Core→Legacy rollback (Spain/EU/UK/MAR/TUR) remains a confounder for any active experiment in those markets.</span>:<span><strong>Contexto de fondo que sigue en juego:</strong> Josy desbloqueó ayer el thread de bundles, regionales y GM (Carriers trackea GM negativo de forma independiente, no es urgente para ellos). Rollback Core→Legacy (España/EU/UK/MAR/TUR) sigue siendo confounder para cualquier experimento activo en esos mercados.</span>},
]});

// URLS — #4 all verified
const N={tracker:"https://www.notion.so/holafly/9010f2a344c24435b8f24fec5ca144c2",marco:"https://www.notion.so/holafly/321eea72a18881f384b7d0d132a9e6a5",marcoNav:"https://www.notion.so/holafly/329eea72a18881758aa6fdd3037075ae",snapshot:"https://www.notion.so/holafly/323eea72a18881daa62be22b7fac4021",checklist:"https://www.notion.so/holafly/326eea72a1888129a6eef3b93f128aef",checkpoint:"https://www.notion.so/holafly/327eea72a1888194855cef61ec91bf88",pricingMain:"https://www.notion.so/holafly/17deea72a1888034b308d325667c49f9",pricingProcess:"https://www.notion.so/holafly/182eea72a18880ccb9fad9d03ab86daa",pricingRoadmap:"https://www.notion.so/holafly/18ceea72a188802a8f10cc15c0a2e00f",pricingHub:"https://www.notion.so/holafly/1d1eea72a188809c9d02c8fe7f4769f6",expHub:"https://www.notion.so/holafly/30beea72a1888197bea7fa72c798f69f",handover:"https://www.notion.so/holafly/2fbeea72a1888027a852d469270593e2",cruisePricingES:"https://www.notion.so/holafly/322eea72a1888031b6d8f2aed4f68d28",pimCurve:"https://www.notion.so/holafly/314eea72a1888084aca8de8165ffef4e",alertsFix:"https://www.notion.so/holafly/30deea72a18880c78dfaf427f1346f0c",fxAlert:"https://www.notion.so/holafly/182eea72a188806dbd1ad9990f028f82",ppdAudit:"https://www.notion.so/holafly/328eea72a18880cdac74fdd8c4da339b",exp004:"https://www.notion.so/holafly/312eea72a188801aab58eb71720b7bce",exp005:"https://www.notion.so/holafly/310eea72a1888015b123def6eca20202",exp006:"https://www.notion.so/holafly/31eeea72a1888185a981d5d7056dde22",corr001:"https://www.notion.so/holafly/321eea72a188806db422e6756b8711d0",exp008:"https://www.notion.so/holafly/9010f2a344c24435b8f24fec5ca144c2",exp009:"https://www.notion.so/holafly/32deea72a188817c8a4bcba239451636",exp010:"https://www.notion.so/holafly/32deea72a18881969d0dc58e081bda2b",saudiEval:"https://www.notion.so/holafly/318eea72a18880959e72ed8792bec08d",stratPlan:"https://www.notion.so/holafly/18ceea72a188801e9438e97924f99074",pricingStrategy:"https://www.notion.so/holafly/100b53637f       <div style={{display:"flex",alignItems:"center",gap:14}}>
        {mob&&<button onClick={()=>setMenu(!menu)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",padding:0,color:T.text}}>☰</button>}
        <div><div style={{fontSize:10,fontWeight:700,color:T.accent,letterSpacing:2,textTransform:"uppercase"}}>Holafly · Growth Pricing</div><span style={{fontSize:17,fontWeight:800,color:T.text,letterSpacing:-.3}}>Pricing Command Center</span><span className="easter-egg">🐣</span></div></div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{textAlign:"right"}}><div style={{fontSize:10,color:T.textMuted}}>{lang==="en"?"Updated":"Actualizado"}</div><div style={{fontSize:11,fontWeight:600,color:T.textDim}}>Apr 7, 2026</div></div>
        <div style={{display:"flex",background:T.border,borderRadius:6,overflow:"hidden"}}><button onClick={()=>setLang("en")} style={{padding:"5px 12px",border:"none",cursor:"pointer",fontSize:11,fontWeight:lang==="en"?700:400,background:lang==="en"?T.text:"transparent",color:lang==="en"?T.bg:T.textDim,fontFamily:UI}}>EN</button><button onClick={()=>setLang("es")} style={{padding:"5px 12px",border:"none",cursor:"pointer",fontSize:11,fontWeight:lang==="es"?700:400,background:lang==="es"?T.text:"transparent",color:lang==="es"?T.bg:T.textDim,fontFamily:UI}}>ES</button></div></div></div>
    {mob&&menu&&<div style={{position:"fixed",top:56,left:0,right:0,bottom:0,background:"rgba(0,0,0,.3)",zIndex:15}} onClick={()=>setMenu(false)}><div style={{background:T.bg,width:240,height:"100%",borderRight:`1px solid ${T.border}`,paddingTop:8}} onClick={e=>e.stopPropagation()}>{sidebar}</div></div>}
    <div style={{display:"flex",flex:1,minHeight:0}}>
      {!mob&&<div style={{width:200,minWidth:200,borderRight:`1px solid ${T.border}`,padding:"18px 12px",position:"sticky",top:56,height:"calc(100vh - 56px)",overflowY:"auto"}}>{sidebar}</div>}
      {/* #2. No maxWidth, full expansion */}
      <div style={{flex:1,padding:mob?"14px 16px 48px":"24px 40px 48px",minWidth:0}}>{content[tab]}</div></div>
  </div>);
}

ReactDOM.render(<PCC/>, document.getElementById("root"));
</script>
</body>
</html>
