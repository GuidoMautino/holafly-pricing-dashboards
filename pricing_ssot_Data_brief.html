      <Coll title={L(l,"Dashboard links","Links a dashboards")} color={T.blue} count={8}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8}}>
          {[
            {n:"Adobe Analytics",h:URLS.adobe},
            {n:"Foundational KPIs",h:URLS.foundational},
            {n:"COGS Hub",h:URLS.cogs},
            {n:"Recurrence Cockpit",h:URLS.recurrence},
            {n:L(l,"Experiment Tracker","Tracker de experimentos"),h:URLS.tracker},

            {n:"Holafly Travel Club",h:URLS.travelClub},
            {n:L(l,"Subscription plans (public)","Planes de suscripción (público)"),h:URLS.plansEsim},
          ].map((x,i)=>
            <a key={i} href={x.h} target="_blank" rel="noreferrer" style={{background:T.card,borderRadius:6,border:`1px solid ${T.border}`,padding:"10px 12px",textDecoration:"none",fontSize:12,fontWeight:600,color:T.text,display:"block"}}>{x.n}</a>
          )}
        </div>
      </Coll>
    </Sec>}

    {/* FOOTER */}
    <div style={{padding:"14px 0",borderTop:`1px solid ${T.border}`,fontSize:10,color:T.muted,lineHeight:1.6}}>
      <strong style={{color:T.dim}}>{L(l,"Sources","Fuentes")}:</strong> BigQuery (int_shopify_sales_with_vat_adjusted, mdm_delivery.product_purchase_date_gm) · Adobe Analytics · Looker Studio (Foundational KPIs, COGS, Recurrence Cockpit) · Holafly All Hands Q1 2026 · Holafly public site (Travel Club, plans). 13 BigQuery queries and supporting CSVs archived for traceability.
