<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXP-004 MXN · D+60 Results</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --pink:#E6485C;--pink-soft:rgba(230,72,92,0.08);--pink-border:rgba(230,72,92,0.18);
  --charcoal:#292B2E;--charcoal-soft:#4A4D52;--gray-mid:#64748B;--gray-light:#94A3B8;
  --card:#F8FAFC;--white:#FFFFFF;--rule:#E4E6EA;--rule-soft:rgba(41,43,46,0.06);
  --green:#15803D;--green-bg:#E8F5EE;--warn:#B45309;--warn-bg:#FDF3E7;
  --blue:#1D4ED8;--blue-bg:#E8EFFD;--purple:#7C3AED;--purple-bg:#F3EEFE;
  --pastel-yellow:#FFF0AB;--mono:'JetBrains Mono',monospace;--sans:'Mulish',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--white);color:var(--charcoal);line-height:1.65;font-size:14px;-webkit-font-smoothing:antialiased}
::selection{background:var(--pink);color:var(--white)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CCD0D7;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.anim-up{animation:fadeUp .4s ease both}.anim-scale{animation:scaleIn .35s ease both}

.top-bar{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 48px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:border-color .3s}
.top-bar.scrolled{border-bottom-color:var(--rule)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.top-bar-dot{width:8px;height:8px;background:var(--pink);border-radius:50%}
.top-bar-brand{font-size:15px;font-weight:800;color:var(--charcoal);letter-spacing:-0.02em}
.top-bar-divider{width:1px;height:14px;background:var(--rule)}
.top-bar-context{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--gray-mid);letter-spacing:.08em;text-transform:uppercase}
.top-bar-badge{background:var(--green);color:var(--white);font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.1em;text-transform:uppercase}
.lang-toggle{display:flex;border:1px solid var(--rule);border-radius:999px;overflow:hidden;background:var(--rule-soft);padding:3px;gap:2px}
.lang-toggle button{background:transparent;border:none;padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);cursor:pointer;border-radius:999px;transition:all .25s;letter-spacing:.08em}
.lang-toggle button.active{background:var(--charcoal);color:var(--white)}
.top-right{display:flex;align-items:center;gap:10px}

.page{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.section{padding:40px 0 10px}
.section-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:8px}
.section h2{font-size:clamp(24px,3vw,34px);font-weight:800;color:var(--charcoal);line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px}
.section h2 .accent{color:var(--pink)}
.section h2 .highlight{background-image:linear-gradient(120deg,var(--pastel-yellow) 0%,var(--pastel-yellow) 100%);background-repeat:no-repeat;background-size:100% 26%;background-position:0 88%;padding:0 3px}
.section-intro{font-size:15px;color:var(--charcoal-soft);max-width:780px;line-height:1.65;margin-bottom:28px}
.section-intro strong{color:var(--charcoal);font-weight:700}
.section-divider{border:none;border-top:1px solid var(--rule);margin:48px 0 0}

.hero{padding:64px 0 48px}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink)}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:900;color:var(--charcoal);line-height:1.08;letter-spacing:-0.03em;margin-bottom:18px}
.hero h1 .accent{color:var(--pink)}
.hero-deck{font-size:16px;color:var(--charcoal-soft);max-width:750px;line-height:1.65}
.hero-deck strong{color:var(--charcoal);font-weight:700}
.hero-meta{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap;font-size:12px;color:var(--gray-light)}
.hero-meta span strong{color:var(--charcoal);font-weight:700}
.hero-meta .sep{width:1px;height:12px;background:var(--rule);align-self:center}

.card{background:var(--white);border:1px solid var(--rule);border-radius:12px;padding:22px 24px;margin-bottom:14px}
.card-accent{border-left:3px solid var(--pink)}
.card-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.card p{font-size:14px;color:var(--charcoal-soft);line-height:1.6;margin-bottom:6px}.card p:last-child{margin-bottom:0}.card p strong{color:var(--charcoal);font-weight:700}
.callout{background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:16px 20px;margin:18px 0;font-size:13px;color:var(--charcoal-soft);line-height:1.6}
.callout strong{color:var(--charcoal);font-weight:700}.callout em{color:var(--pink);font-style:normal;font-weight:700}
.callout.green{border-left-color:var(--green);background:var(--green-bg)}
.callout.blue{border-left-color:var(--blue);background:var(--blue-bg)}
.callout.warn{border-left-color:var(--warn);background:var(--warn-bg)}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:18px 16px;text-align:center}
.metric-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.metric-value{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--charcoal);line-height:1}
.metric-value .accent{color:var(--pink)}
.metric-value .green{color:var(--green)}
.metric-sub{font-size:11px;color:var(--gray-mid);margin-top:6px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
@media(max-width:800px){.grid-2,.grid-3{grid-template-columns:1fr}}

.timeline{display:flex;flex-direction:column;gap:0;margin:20px 0}
.tl-row{display:grid;grid-template-columns:90px 24px 1fr;gap:12px;align-items:start;padding:18px 0;position:relative}
.tl-row:not(:last-child){border-bottom:1px solid var(--rule-soft)}
.tl-when{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gray-mid);padding-top:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--rule);margin-top:4px;justify-self:center;position:relative}
.tl-dot.active{background:var(--pink)}
.tl-dot.done{background:var(--green)}
.tl-content{font-size:14px;color:var(--charcoal-soft);line-height:1.55}
.tl-content strong{color:var(--charcoal);font-weight:700}
.tl-content .tl-metric{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--charcoal);display:inline-block;margin-top:4px}

.range-bar{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:20px 24px;margin:18px 0}
.range-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:8px}
.range-track{height:8px;background:var(--rule);border-radius:4px;position:relative;overflow:hidden}
.range-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--pink))}
.range-note{font-size:12px;color:var(--gray-mid);margin-top:8px;text-align:center}
.range-note strong{color:var(--charcoal)}

.s-table{width:100%;border-collapse:collapse;margin:16px 0}
.s-table th{text-align:left;padding:10px 14px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gray-light);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--rule)}
.s-table th:not(:first-child){text-align:right}
.s-table td{padding:10px 14px;font-size:13px;color:var(--charcoal-soft);border-bottom:1px solid var(--rule-soft)}
.s-table td:not(:first-child){text-align:right;font-family:var(--mono);font-weight:600}
.s-table td.highlight{color:var(--charcoal);font-weight:700}
.s-table td .tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:6px}
.tag-up{background:var(--green-bg);color:var(--green)}
.tag-flat{background:var(--card);color:var(--gray-mid)}
.tag-note{background:var(--warn-bg);color:var(--warn)}
.s-table tr.total-row td{border-top:2px solid var(--charcoal);font-weight:800;color:var(--charcoal)}

.claims-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
@media(max-width:800px){.claims-grid{grid-template-columns:1fr}}
.claim-card{border-radius:10px;padding:18px 20px}
.claim-card.yes{background:var(--green-bg);border:1px solid rgba(21,128,61,0.15)}
.claim-card.no{background:var(--card);border:1px solid var(--rule)}
.claim-card .claim-header{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.claim-card.yes .claim-header{color:var(--green)}
.claim-card.no .claim-header{color:var(--gray-mid)}
.claim-card .claim-item{font-size:13px;color:var(--charcoal-soft);line-height:1.55;padding:4px 0}
.claim-card .claim-item strong{color:var(--charcoal);font-weight:700}

.page-footer{border-top:1px solid var(--rule);padding:24px 0;margin-top:48px;text-align:center;font-size:11px;color:var(--gray-light)}
.page-footer strong{color:var(--gray-mid);font-weight:700}
.page-footer a{color:var(--gray-mid);text-decoration:none;border-bottom:1px solid var(--rule)}

@media(max-width:800px){
  .top-bar{padding:12px 18px}.page{padding:0 18px 48px}.hero h1{font-size:28px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── SVG mini chart ── */
function DIDChart({en}) {
  const W=520,H=200,PX=60,PY=30,PB=40,PR=30;
  const cW=W-PX-PR, cH=H-PY-PB;
  const labels=["D+14","D+30","D+60"];
  const did=[4409,9126,9240];
  const ols=[3541,8019,7888];
  const maxY=10000;
  const x=i=>PX+(i/(labels.length-1))*cW;
  const y=v=>PY+cH-(v/maxY)*cH;
  const pathD=did.map((v,i)=>`${i===0?"M":"L"}${x(i)},${y(v)}`).join(" ");
  const pathO=ols.map((v,i)=>`${i===0?"M":"L"}${x(i)},${y(v)}`).join(" ");
  const areaPath=`M${x(0)},${y(did[0])} L${x(1)},${y(did[1])} L${x(2)},${y(did[2])} L${x(2)},${y(ols[2])} L${x(1)},${y(ols[1])} L${x(0)},${y(ols[0])} Z`;
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--rule)",borderRadius:10,padding:"16px 10px",margin:"20px 0",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:520,display:"block",margin:"0 auto"}}>
        {[0,2500,5000,7500,10000].map(v=>(<g key={v}><line x1={PX} y1={y(v)} x2={W-PR} y2={y(v)} stroke="var(--rule)" strokeWidth="1"/><text x={PX-8} y={y(v)+4} textAnchor="end" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{v===0?"0":`${(v/1000).toFixed(1)}K`}</text></g>))}
        {labels.map((l,i)=>(<text key={l} x={x(i)} y={H-10} textAnchor="middle" fill="var(--gray-mid)" fontSize="11" fontWeight="700" fontFamily="var(--mono)">{l}</text>))}
        <path d={areaPath} fill="rgba(29,78,216,0.08)"/>
        <path d={pathO} fill="none" stroke="var(--blue)" strokeWidth="2" strokeDasharray="6,4"/>
        <path d={pathD} fill="none" stroke="var(--pink)" strokeWidth="2.5"/>
        {did.map((v,i)=>(<circle key={`d${i}`} cx={x(i)} cy={y(v)} r="4" fill="var(--pink)"/>))}
        {ols.map((v,i)=>(<circle key={`o${i}`} cx={x(i)} cy={y(v)} r="3.5" fill="var(--blue)"/>))}
        {did.map((v,i)=>(<text key={`dl${i}`} x={x(i)} y={y(v)-10} textAnchor="middle" fill="var(--pink)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{"\u20AC"}{v.toLocaleString()}</text>))}
        {ols.map((v,i)=>(<text key={`ol${i}`} x={x(i)} y={y(v)+16} textAnchor="middle" fill="var(--blue)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{"\u20AC"}{v.toLocaleString()}</text>))}
        <text x={W-PR} y={PY-6} textAnchor="end" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">EUR/day</text>
      </svg>
      <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:10,fontSize:11,color:"var(--gray-mid)"}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:3,background:"var(--pink)",borderRadius:2,display:"inline-block"}}/> DID</span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:3,background:"var(--blue)",borderRadius:2,display:"inline-block",borderTop:"2px dashed var(--blue)"}}/> OLS</span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:10,background:"rgba(29,78,216,0.08)",border:"1px solid rgba(29,78,216,0.2)",borderRadius:2,display:"inline-block"}}/> {en?"Honest range":"Rango honesto"}</span>
      </div>
    </div>
  );
}

/* ── ARPU sparkline ── */
function ARPUSparkline({en}) {
  const W=480,H=160,PX=50,PY=20,PB=40,PR=30;
  const cW=W-PX-PR,cH=H-PY-PB;
  const labels=["Pre","D+14","D+30","D+60"];
  const vals=[7.06,8.76,9.88,6.43];
  const maxY=11,minY=5;
  const x=i=>PX+(i/(labels.length-1))*cW;
  const y=v=>PY+cH-((v-minY)/(maxY-minY))*cH;
  const path=vals.map((v,i)=>`${i===0?"M":"L"}${x(i)},${y(v)}`).join(" ");
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--rule)",borderRadius:10,padding:"16px 10px",margin:"18px 0",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:480,display:"block",margin:"0 auto"}}>
        <line x1={PX} y1={y(7.06)} x2={W-PR} y2={y(7.06)} stroke="var(--rule)" strokeWidth="1" strokeDasharray="4,3"/>
        <text x={PX-8} y={y(7.06)+4} textAnchor="end" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{"\u20AC"}7.06</text>
        {labels.map((l,i)=>(<text key={l} x={x(i)} y={H-8} textAnchor="middle" fill="var(--gray-mid)" fontSize="11" fontWeight="700" fontFamily="var(--mono)">{l}</text>))}
        <path d={path} fill="none" stroke="var(--pink)" strokeWidth="2.5"/>
        {vals.map((v,i)=>(<circle key={i} cx={x(i)} cy={y(v)} r="4" fill={i===3?"var(--warn)":"var(--pink)"}/>))}
        {vals.map((v,i)=>(<text key={`t${i}`} x={x(i)} y={y(v)-(i===3?-18:10)} textAnchor="middle" fill={i===3?"var(--warn)":"var(--charcoal)"} fontSize="11" fontWeight="700" fontFamily="var(--mono)">{"\u20AC"}{v.toFixed(2)}</text>))}
        <text x={x(3)+4} y={y(6.43)-18} textAnchor="middle" fill="var(--warn)" fontSize="8" fontFamily="var(--mono)" fontWeight="600">AON + Cinco de Mayo</text>
      </svg>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("en");
  const [scrolled, setScrolled] = useState(false);
  const en = lang === "en";

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 10);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);

  return (<div>
    <div className={`top-bar ${scrolled ? "scrolled" : ""}`}>
      <div className="top-bar-left">
        <span className="top-bar-dot" />
        <span className="top-bar-brand">Holafly</span>
        <span className="top-bar-divider" />
        <span className="top-bar-context">EXP-004 MXN D+60</span>
      </div>
      <div className="top-right">
        <span className="top-bar-badge">Scale Confirmed</span>
        <div className="lang-toggle">
          <button className={en ? "active" : ""} onClick={() => setLang("en")}>EN</button>
          <button className={!en ? "active" : ""} onClick={() => setLang("es")}>ES</button>
        </div>
      </div>
    </div>

    <div className="page">
      {/* ═══ 1. HERO ═══ */}
      <div className="hero anim-up">
        <div className="hero-eyebrow">EXP-004 Results</div>
        <h1>{en ? <>MXN pricing correction<span className="accent">.</span> <br/>78 days later.</> : <>Corrección de pricing MXN<span className="accent">.</span> <br/>78 días después.</>}</h1>
        <div className="hero-deck">{en ? <>On March 2 we corrected the price-per-day on short plans (1-3 days) across 65 MXN destinations to align with the EUR 3.79/day policy. <strong>This is what happened.</strong></> : <>El 2 de marzo corregimos el precio-por-día en planes cortos (1-3 días) en 65 destinos MXN para alinear con la política de EUR 3.79/día. <strong>Esto es lo que pasó.</strong></>}</div>
        <div className="hero-meta">
          <span><strong>{en ? "For" : "Para"}</strong> Shravan Kochhar</span>
          <span className="sep" /><span><strong>{en ? "Date" : "Fecha"}</strong> May 20, 2026</span>
          <span className="sep" /><span><strong>Owner</strong> Guido Mautino</span>
          <span className="sep" /><span><strong>Status</strong> D+60 {en ? "validation" : "validación"}</span>
        </div>
      </div>

      {/* ═══ 2. VERDICT ═══ */}
      <hr className="section-divider" />
      <div className="section">
        <div className="section-label">{en ? "The Verdict" : "El Veredicto"}</div>
        <h2>{en ? <>It worked. The effect <span className="highlight">is lasting.</span></> : <>Funcionó. El efecto <span className="highlight">se mantiene.</span></>}</h2>
        <div className="section-intro">{en ? <>Volume compensated the price cut. Revenue grew. Margins improved. No cannibalization. The effect stabilized between D+30 and D+60. <strong>The D+14 decision to scale holds at 78 days.</strong></> : <>El volumen compensó la baja de precio. El revenue creció. Los márgenes mejoraron. Sin canibalización. El efecto se estabilizó entre D+30 y D+60. <strong>La decisión de escalar en D+14 se sostiene a los 78 días.</strong></>}</div>
        <div className="metrics-grid">
          <div className="metric anim-scale"><div className="metric-label">{en ? "Short Plan Net Impact" : "Impacto Neto Planes Cortos"}</div><div className="metric-value">+<span className="accent">EUR 180</span></div><div className="metric-sub">{en ? "per day, direct short plan impact (~EUR 66K/year)" : "por día, impacto directo planes cortos (~EUR 66K/año)"}</div></div>
          <div className="metric anim-scale" style={{animationDelay:"60ms"}}><div className="metric-label">{en ? "Short Plan Volume (DID)" : "Volumen Planes Cortos (DID)"}</div><div className="metric-value">+<span className="accent">75%</span></div><div className="metric-sub">{en ? "short plan orders attributable to pricing (DID)" : "órdenes planes cortos atribuibles a pricing (DID)"}</div></div>
          <div className="metric anim-scale" style={{animationDelay:"120ms"}}><div className="metric-label">{en ? "Gross Margin" : "Margen Bruto"}</div><div className="metric-value"><span className="green">85.3%</span></div><div className="metric-sub">{en ? "up from 74.5% pre (not from pricing)" : "sube de 74.5% pre (no por pricing)"}</div></div>
          <div className="metric anim-scale" style={{animationDelay:"180ms"}}><div className="metric-label">{en ? "Cannibalization" : "Canibalización"}</div><div className="metric-value"><span className="green">{en ? "None" : "Cero"}</span></div><div className="metric-sub">{en ? "short plans did not steal from long" : "planes cortos no le quitaron a largos"}</div></div>
        </div>
        <div className="callout">{en
          ? <><strong>Total DID across all plan durations: +EUR 9,240/day.</strong> This includes long plans (4d+) where prices were not changed. The short plan figure above is the direct, verifiable pricing impact.</>
          : <><strong>DID total incluyendo todas las duraciones: +EUR 9,240/día.</strong> Esto incluye planes largos (4d+) donde los precios no fueron cambiados. La cifra de planes cortos arriba es el impacto de pricing directo y verificable.</>}</div>
