  {week:"Apr 12-18, 2026",groups:[
    {cat:L(l,"Decisions","Decisiones"),icon:"⚖️",color:"#6D28D9",items:[
      {d:"Apr 13 14:39",text:L(l,"PIM Migration Measurement Framework v1.0 sealed and published. Slack message live in #internal-growth-team, cc Alfonso + Dani Samaniego + Xabi. Thread with core (3 points) + next steps. 48h objection window closes Wed Apr 15 ~14:39 BA. The framework defines per-deploy pseudo-experiment (30d baseline + ±2d blackout + D+7/D+14/D+21/D+30 checkpoints), Level 1 automated guardrails for all 200+ destinations, Level 2 deep analysis for ~24 representatives (3 per cluster as starting point, may flex 16-32). 4 primary guardrails. Single aggregated KPI: GM% blended of the 123-destination candidate universe vs March 2026 baseline.","Framework de Medición Migración PIM v1.0 sellado y publicado. Mensaje Slack live en #internal-growth-team, cc Alfonso + Dani Samaniego + Xabi. Thread con core (3 puntos) + next steps. Ventana 48h cierra Mié 15 Abr ~14:39 BA. El framework define pseudo-experimento por deploy (30d baseline + ±2d blackout + checkpoints D+7/D+14/D+21/D+30), Nivel 1 guardrails automáticos para los 200+ destinos, Nivel 2 análisis profundo para ~24 representativos (3 por cluster como starting point, puede flexear 16-32). 4 guardrails primarios. KPI agregado único: GM% blended del universo candidato de 123 destinos vs baseline marzo 2026."),who:"Guido"},
      {d:"Apr 13 12:22",text:L(l,"Alfonso gave OK on framing the USD experiment ask, with his own suggested wording: \"we see we are X% below where we should be, possibly losing €6.5M in US per year, so we propose to experiment\". He is going to talk to Pedro first before I send the email to Allan + Miki. Guardrail per Alfonso: conversion must not drop.","Alfonso dio OK al framing del pedido del experimento USD, con su propio wording sugerido: \"oye vemos que estamos un X% por debajo de donde deberíamos estar, podemos estar perdiendo 6,5M€ de revenue en US al año, así que consideramos experimentarlo\". Va a hablar con Pedro primero antes de que mande el email a Allan + Miki. Guardrail según Alfonso: conversión no debe caer."),who:"Alfonso"},
      {d:"Apr 13",text:L(l,"4 pre-approved curve fixes recovered from limbo. Alfonso gave OK on Mar 30 thread (#internal-growth-team) to: (1) Bundles €2.6M keep as-is for migration, (2) Dominican Republic €3.2M adopt Brazil/Chile/Colombia curve, (3) Saint Barthélemy €22K assign India cluster. Status was lost in the PCC for 14 days. Bosnia is a separate case: pre-approved fix (60-90d markup +23.3%) blocked by negative GM that needs addressing first — illustrative case for Opp 1 co-led approach.","4 fixes de curva pre-aprobados recuperados del limbo. Alfonso dio OK en thread del 30 Mar (#internal-growth-team) a: (1) Bundles €2.6M mantener as-is para migración, (2) República Dominicana €3.2M adoptar curva Brazil/Chile/Colombia, (3) Saint Barthélemy €22K asignar cluster India. El estado se perdió en el PCC por 14 días. Bosnia es caso separado: fix pre-aprobado (markup 60-90d +23.3%) bloqueado por GM negativa que hay que abordar primero — caso ilustrativo para el approach co-led de Opp 1."),who:"Guido"},
      {d:"Apr 13",text:L(l,"Q1 Review Meeting framing clarification: tomorrow Tue Apr 14 is NOT a dedicated Pricing Committee. It is the general Q1 Review Meeting of the company. I contributed the 4-opportunity portfolio with the impact potential Pricing could generate. The committee initiative (separate, ongoing, being evaluated jointly with Alfonso, Josy recommends herself as sole Carriers rep) is unrelated and stays as-is in the PCC.","Aclaración del framing de la Reunión Q1: mañana Mar 14 Abr NO es un Comité de Pricing dedicado. Es la Reunión Q1 general de la compañía. Contribuí el portfolio de 4 oportunidades con el impacto potencial que Pricing podría generar. La iniciativa del comité (separada, en curso, en evaluación conjunta con Alfonso, Josy se recomienda como única rep de Carriers) es no relacionada y queda como está en el PCC."),who:"Guido"},
    ]},
    {cat:L(l,"Contacts","Contactos"),icon:"📨",color:T.textDim,items:[
      {d:"Apr 13 13:49",text:L(l,"Daniela Rojas (Data team) added an Origin filter to the GM Overview Looker Studio section. Lucas Videla brought down the requirement from my earlier ask. Filter applies to both aggregate and granular views (variant, provider) — confirmed by Daniela. Critical capability for the PIM Migration Framework: enables baseline segmentation by Origin in addition to Destination. I validated it today and it is functional.","Daniela Rojas (equipo Data) agregó filtro Origin en la sección GM Overview de Looker Studio. Lucas Videla bajó el requerimiento desde mi pedido previo. Filtro aplica a vista agregada y granular (variant, provider) — confirmado por Daniela. Capability crítico para el Framework PIM: habilita segmentación de baseline por Origin además de Destination. Lo validé hoy y está funcional."),who:"Daniela Rojas"},
      {d:"Apr 13 09:15",text:L(l,"Mati Villalba Llano (Data) workstream opened. I asked for a complete listing of destinations × variants × prices by currency as raw base for the PIM monitoring rollout. Mati confirmed COGS handles a different data granularity than the pricing dashboard and that the model needs to be polished until they are equivalent. New workstream: align COGS data layer with pricing dashboard layer. Mati also flagged that cruise eSIMs (PRIC-85) are missing from the pricing dashboard — separate fix tracked alongside.","Workstream con Mati Villalba Llano (Data) abierto. Le pedí un listado completo de destinos × variantes × precios por moneda como base raw para el rollout del monitoreo PIM. Mati confirmó que COGS maneja una granularidad de datos distinta del dashboard pricing y que hay que pulir el modelo hasta que sean equivalentes. Workstream nuevo: alinear capa de datos COGS con capa del dashboard pricing. Mati también flagueó que los eSIMs de cruceros (PRIC-85) faltan en el dashboard pricing — fix separado trackeado en paralelo."),who:"Mati Villalba"},
      {d:"Apr 13 12:20",text:L(l,"Óscar Vilella (Data) reached out asking for the documentation we reviewed in the Thursday data alignment meet. Sent him the SSoT Data Alignment Brief plus the full SSoT dashboard. Óscar is engaging — relevant because he is the suggested counterpart for the Data Team Request subhoja of the framework.","Óscar Vilella (Data) escribió pidiendo la documentación que vimos en el meet de alineación con Data del jueves. Le pasé el SSoT Data Alignment Brief más el dashboard SSoT completo. Óscar se está enganchando — relevante porque es la contraparte sugerida del Pedido al Data Team de la subhoja del framework."),who:"Óscar Vilella"},
    ]},
    {cat:L(l,"Infrastructure & Fixes","Infraestructura & Fixes"),icon:"🔧",color:"#1E3A5F",items:[
      {d:"Apr 13",text:L(l,"Apr 13 Core Migration Snapshot analyzed. 89% catalog launched (181 of 204), 11 destinations with rollback history identified (UK, Spain, France, Germany, Italy, Switzerland, Europe Multiproduct, Andorra, China, USA, Faroe Islands). Morocco confirmed in Core since Oct 15 2025 (6 months stable, no rollback). 9 destinations specific to material below-floor pool of Opp 1 verified: Morocco oldest, Bosnia 10/6 (date ambiguous), Andorra doubly-classified (material AND rollback) re-launched Feb 12, Bahamas/Jamaica/Barbados Nov 2025, Nigeria/Senegal Jan 19 2026, Seychelles Jan 28 2026. Implication: 5 of 9 material destinations are still in Core ramp-up phase (<3 months in Core). Cadence agreed: monthly snapshot first day of each month, Pricing operates autonomously. Master doc: core_migration_status_report.docx in committee Drive folder.","Snapshot Migración Core 13 Abr analizado. 89% del catálogo launched (181 de 204), 11 destinos con historial de rollback identificados (UK, Spain, France, Germany, Italy, Switzerland, Europe Multiproduct, Andorra, China, USA, Faroe Islands). Morocco confirmado en Core desde 15 Oct 2025 (6 meses estable, sin rollback). 9 destinos específicos del pool material below-floor de Opp 1 verificados: Morocco el más viejo, Bosnia 10/6 (fecha ambigua), Andorra doblemente clasificada (material Y rollback) re-launched 12 Feb, Bahamas/Jamaica/Barbados Nov 2025, Nigeria/Senegal 19 Ene 2026, Seychelles 28 Ene 2026. Implicación: 5 de 9 destinos materiales están en ramp-up de Core (<3 meses en Core). Cadencia acordada: snapshot mensual primer día de cada mes, Pricing opera autónomo. Doc maestro: core_migration_status_report.docx en carpeta Drive del comité.")},
      {d:"Apr 13",text:L(l,"PIM Migration Measurement Framework v1.0 published as new section in Notion: https://www.notion.so/holafly/PIM-Migration-Measurement-Framework-v1-0-341eea72a18880bdac86d5de61c149d9 + Data Team Request subhoja published: https://www.notion.so/holafly/Data-Team-Request-PIM-Migration-Monitoring-341eea72a18880f583d0ce29b1bc022e","Framework de Medición Migración PIM v1.0 publicado como nueva sección en Notion: https://www.notion.so/holafly/PIM-Migration-Measurement-Framework-v1-0-341eea72a18880bdac86d5de61c149d9 + subhoja del Pedido al Data Team publicada: https://www.notion.so/holafly/Data-Team-Request-PIM-Migration-Monitoring-341eea72a18880f583d0ce29b1bc022e")},
      {d:"Apr 13",text:L(l,"Templates updated as consequence of Core snapshot: opp1_template_updated.docx (Morocco reframed as co-led, cost/GB observation updated, window-rule trigger added, risk layer 1 updated) and opp2_template_updated.docx (pre-rollout validation criteria adds rollback-history check). Sizing of all 4 Opps unchanged. Files in committee Drive folder, replace previous versions.","Templates actualizados como consecuencia del snapshot Core: opp1_template_updated.docx (Morocco reenmarcado como co-led, observación cost/GB actualizada, regla de ventana agregada al trigger, layer 1 de risk actualizada) y opp2_template_updated.docx (criterios de validación pre-rollout agregan check de historial de rollback). Sizing de las 4 Opps sin cambio. Archivos en carpeta Drive del comité, reemplazan versiones anteriores.")},
    ]},
  ]},
  {week:"Apr 5-11, 2026",groups:[
    {cat:L(l,"Decisions","Decisiones"),icon:"⚖️",color:"#6D28D9",items:[
      {d:"Apr 10",text:L(l,"Q1 Review Meeting Pricing contribution overview sent to Alfonso (21:18 BA). 4 opportunities Pricing contributes to the Q1 Review in the Context / What Pricing brings / When / Dependencies format Alfonso asked for, impact figures next to each name. Live at pricing_committee_overview.html (URL kept). Full research fundamentals, sources and spreadsheets organized by folder in Drive. Alfonso reviews Monday, sync if needed before Tuesday\'s Q1 Review Meeting.","Overview de contribución de Pricing a la Reunión Q1 enviado a Alfonso (21:18 BA). 4 oportunidades que Pricing aporta al Q1 Review en el formato Context / What Pricing brings / When / Dependencies que pidió Alfonso, impacto al lado de cada nombre. Live en pricing_committee_overview.html (URL mantenida). Fundamentos completos, fuentes y planillas organizados por carpeta en Drive. Alfonso lo revisa el lunes, sync si hace falta antes de la Reunión Q1 del martes."),who:"Guido"},
      {d:"Apr 9",text:L(l,"STRAPI REFRAMING: Thursday\'s Platform Migration meet with Gabriela Vicioso revealed that Strapi works with base price + discount tier curves, not day-by-day prices. We can define as many models as we want. PH\'s 9-cluster analysis (later consolidated to 8) stays as input (criteria, monotonicity, price curve logic) but is no longer the final output. Passed the heads-up to Alfonso before the PH meeting #2 so he could steer the conversation.","REENMARCAR STRAPI: El meet Platform Migration del jueves con Gabriela Vicioso reveló que Strapi funciona con precio base + curvas de tiers de descuento, no con precios día por día. Podemos definir todos los modelos que queramos. El análisis de 9 clusters de PH (luego consolidado a 8) queda como input (criterio, monotonicidad, lógica de curva de precio) pero ya no es el output final. Le pasé el heads-up a Alfonso antes del meet PH #2 para que pudiera guiar la conversación."),who:"Gabriela + Guido"},
      {d:"Apr 9",text:L(l,"Alfonso convened me to dimension the 2026 Revenue Pricing impact potential. Google Doc shared for collaboration. Separate workstream from the committee portfolio, feeds longer-horizon planning tied to the 3Y plan.","Alfonso me convocó para dimensionar el potencial de impacto en Revenue 2026 para Pricing. Google Doc compartido para colaboración. Workstream separado del portfolio del comité, alimenta planificación de horizonte largo ligada al plan 3Y."),who:"Alfonso"},
      {d:"Apr 9",text:L(l,"Alfonso pre-sent feedback on the SSoT Brief before the Data meet: 9 use cases on top of my 7, plus 3 future evolution items (subscriptions LTV/churn, new services like insurance and add-ons, bundle margin visibility). Brings the SSoT scope from 7 to 19 use cases in total. Meet objective simplified: align purpose and identify resources for upcoming weeks.","Alfonso mandó feedback del SSoT Brief antes del meet con Data: 9 use cases sobre mis 7, más 3 ítems de evolución futura (LTV/churn de subscriptions, new services como insurance y add-ons, bundle margin visibility). Lleva el scope del SSoT de 7 a 19 use cases en total. Objetivo del meet simplificado: alinear propósito e identificar recursos para las próximas semanas."),who:"Alfonso"},
      {d:"Apr 9",text:L(l,"Iñigo confirmed (DM): charming price is per-currency, not per-model. Important context for the Strapi pricing model design.","Iñigo confirmó (DM): charming price es por moneda, no por modelo. Contexto importante para el diseño del modelo pricing en Strapi."),who:"Iñigo"},
      {d:"Apr 13",text:L(l,"FX shortlist analysis closed (continuation work from a parallel session). BigQuery Q1 2026 + 4-quarter historical, validated against previous files with no discrepancies. Wave 1 = JPY+CAD parallel (€1.00M combined annual scoped, USA excluded). Wave 2 conditional = CLP. Stand-by = SAR (Iran-Gulf -64%) + GBP (1.2% gap insufficient). Master doc fx_shortlist_apr13_2026.docx in Opp 4 Drive folder. Closes [A7] Tier 2 action.","Análisis del shortlist FX cerrado (trabajo de continuación desde una sesión paralela). BigQuery Q1 2026 + histórico 4 trimestres, validado contra archivos previos sin discrepancias. Ola 1 = JPY+CAD en paralelo (€1.00M combinada anual scoped, USA excluido). Ola 2 condicional = CLP. Stand-by = SAR (Iran-Gulf -64%) + GBP (gap 1.2% insuficiente). Documento maestro fx_shortlist_apr13_2026.docx en carpeta Drive de Opp 4. Cierra acción [A7] del Tier 2."),who:"FX"},
      {d:"Apr 14",text:L(l,"Weekly pricing meet (15:14 CEST). Attendees: Guido, Xabi, Alfonso, Mostafa. Outputs: (1) Net profit estimate adopted as obligatory metric for all future experiments (Xabi proposal, Guido confirmed). (2) Elasticity confirmed as top priority by 3-way alignment, Joan mid-May enables it. (3) USD experiments NOT systemically blocked. Two regimes: (a) movement >10-12% in a principal currency = MANDATORY price adjustment, raise hand with Javier first then Pedro. (b) Below 10-12% = experimentation allowed through normal processes, no special escalation needed. (4) Previous USD experiment by Xabi exists in Drive (raised 10%, conv drop > AOV gain) — to find. (5) App vs Web -7.3% gap: write to Iñigo for technical validation, Plan B = 5th validation including Hola Coins (Alfonso hypothesis). (6) Strapi caveat from Xabi: PH model output transformed by Strapi rules — test concrete = upload one cluster and inspect JSON output. (7) Aleja recurrent meet for Vanwestendorp suggested by Xabi (already followed up). (8) Mati raw destinations × variants × prices listing requested (already done). (9) Mostafa to share AI/dynamic pricing docs (already requested). (10) Alfonso pings Data team for competitor intelligence dashboard.","Weekly pricing (15:14 CEST). Asistentes: Guido, Xabi, Alfonso, Mostafa. Outputs: (1) Beneficio neto estimado adoptado como métrica obligatoria de todos los experimentos futuros (propuesta Xabi, Guido confirmó). (2) Elasticidad confirmada como prioridad top por alineación de 3 partes, Joan mid-May lo habilita. (3) Experimentos USD NO sistémicamente bloqueados. Dos regímenes: (a) movimiento >10-12% en moneda principal = ajuste de precio OBLIGATORIO, levantar la mano con Javier primero después Pedro. (b) Por debajo de 10-12% = experimentación permitida por procesos normales, sin escalación especial. (4) Existe experimento USD previo de Xabi en Drive (subió 10%, caída conv > ganancia AOV) — a encontrar. (5) Gap App vs Web -7.3%: escribir a Iñigo para validación técnica, Plan B = 5ta validación incluyendo Hola Coins (hipótesis Alfonso). (6) Caveat Strapi de Xabi: output del modelo PH transformado por reglas Strapi — test concreto = subir un cluster e inspeccionar output JSON. (7) Meet recurrente con Aleja para Vanwestendorp sugerido por Xabi (ya followed up). (8) Listado raw de destinos × variantes × precios pedido a Mati (ya hecho). (9) Mostafa va a compartir docs de IA/dynamic pricing (ya pedido). (10) Alfonso pings al equipo de Data por dashboard de inteligencia competitiva."),who:"Weekly"},
      {d:"Apr 14",text:L(l,"Iñigo response on App vs Web pricing gap: structural gap should NOT exist because Shopify is the source of truth and enforces price parity at checkout. Display-time mismatches may happen but checkout should always reflect the same price. If concrete cases are found, he can review them. This reframes the Opp 3 investigation entirely — the -7.3% BQ gap is now either a display-time artifact or a data attribution issue (Hola Coins remains the leading hypothesis from Alfonso). Next: deeper BQ validation to determine which.","Respuesta de Iñigo sobre gap App vs Web: el gap estructural NO debería existir porque Shopify es la fuente de verdad e impone paridad de precios en el checkout. Pueden ocurrir desincronizaciones en el display pero el checkout siempre debería reflejar el mismo precio. Si se encuentran casos concretos, los puede revisar. Esto reenmarca la investigación de Opp 3 entera — el gap -7.3% en BQ ahora es o un artefacto de display-time o un issue de atribución de datos (Hola Coins sigue siendo la hipótesis principal de Alfonso). Próximo: validación profunda en BQ para determinar cuál."),who:"Iñigo"},
      {d:"Apr 14",text:L(l,"Aleja response on Vanwestendorp study: in progress. Expected report ready by the last week of April. Complementary input to the elasticity workstream. Xabi caveat: the analysis is hard to do well and previous attempt was suboptimal — validate methodology before acting on it.","Respuesta de Aleja sobre el estudio Vanwestendorp: en proceso. Reporte esperado para la última semana de abril. Input complementario al workstream de elasticidad. Caveat de Xabi: el análisis es difícil de hacer bien y el intento anterior fue subóptimo — validar metodología antes de actuar sobre él."),who:"Aleja"},
      {d:"Apr 8",text:L(l,"PH delivered the 9-cluster analysis (criteria: price curve, monotonicity included). Possible merge to 6-7 clusters if values verify. I confirmed the aggregated numbers match ours. Decision on the merge gates Strapi load.","PH entregó el análisis de 9 clusters (criterio: curva de precio, monotonicidad incluida). Posible merge a 6-7 clusters si los valores verifican. Confirmé que los números agregados cierran con los nuestros. La decisión sobre el merge condiciona la carga en Strapi."),who:"PH + Guido"},
      {d:"Apr 8",text:L(l,"PH workstream scope formalized in the Gines + Alfonso meet: 4 areas (recurrence, SEO, internationalization, pricing). Gines confirmed Miki sees pricing as a coherent starting point. Monthly cadence with PH being formalized by Alfonso for cross-functional visibility.","Scope del workstream PH formalizado en el meet Gines + Alfonso: 4 áreas (recurrencia, SEO, internacionalización, pricing). Gines confirmó que Miki ve al pricing como un buen punto de partida. Cadencia mensual con PH se está formalizando por Alfonso para visibility cross-funcional."),who:"PH + Alfonso"},
      {d:"Apr 8",text:L(l,"SSOT Pre-Data Meeting (14:45 ES) outputs: ARPU as North Star unreliable due to Adobe under-reporting (suggested export Triple Whale + Adjust to BigQuery), 17K zero-value orders identified (mostly Hola Coins), +1pp NPS modeled at +€1.3M incremental. Pricing team prioritized ownership over discounts and gross margins. Action items locked.","Outputs del SSOT Pre-Data Meeting (14:45 ES): ARPU como North Star poco confiable por subreporte de Adobe (sugerido exportar Triple Whale + Adjust a BigQuery), 17K órdenes valor cero identificadas (la mayoría Hola Coins), +1pp NPS modelado a +€1.3M incrementales. El equipo de pricing priorizó ownership sobre descuentos y márgenes brutos. Action items cerrados."),who:"Pricing + Data"},
      {d:"Apr 6",text:L(l,"PH meeting: agreed reduce 21→10-15 pricing models, define clustering criteria for Strapi, review monotonicity post FX (AED/QAR/SAR).","Meet PH: acordado reducir 21→10-15 modelos pricing, definir criterio clustering para Strapi, revisar monotonicidad post FX (AED/QAR/SAR)."),who:"PH + Guido"},
      {d:"Apr 6",text:L(l,"Alfonso approved sharing GM data with PH under NDA. Scope to expand: 'we have hours, let\'s maximize'.","Alfonso aprobó compartir GM con PH bajo NDA. Scope a ampliar: 'tenemos horas, aprovechemos'."),who:"Alfonso"},
      {d:"Apr 7",text:L(l,"CORR-001 D+7 status posted to #pricing: numbers below target but Easter contamination dominates. Decision: extend to D+14 (Apr 14) for clean post-Easter read. ARPU floors holding, no guardrails breached.","CORR-001 D+7 status posteado a #pricing: números bajo target pero contaminación Easter domina. Decisión: extender a D+14 (14 Abr) para lectura limpia post-Easter. ARPU floors holding, sin guardrails rotos."),who:"Guido"},
      {d:"Apr 7",text:L(l,"EXP-009 GBP deployed this morning. JSMCO-283 in IT activation queue, coordinated through Sergio Guerrero (PM Ecommerce). Juan Jose Gabelo updates: \"estamos a la espera del equipo de IT\".","EXP-009 GBP deployado esta mañana. JSMCO-283 en cola de activación IT, coordinado por Sergio Guerrero (PM Ecommerce). Updates Juan Jose Gabelo: \"estamos a la espera del equipo de IT\"."),who:"Guido"},
      {d:"Apr 7",text:L(l,"Weekly pricing meet (13:30 ES). Joan confirmed as new Pricing Manager (Revenue Management background), joining mid-May. Dani Samaniego officially activated for SSoT support. GM Marruecos flagged as urgent review of the week. Travel Club → Hola Coins migration noted (~€25M liability).","Weekly pricing (13:30 ES). Joan confirmado como nuevo Pricing Manager (background Revenue Management), entra mid-May. Dani Samaniego oficialmente activado para soporte SSoT. GM Marruecos marcado como revisión urgente de la semana. Migración Travel Club → Hola Coins notada (~€25M liability)."),who:"Weekly"},
      {d:"Apr 7",text:L(l,"Gabriela Vicioso (Product) reached out via DM: Strapi team waiting for pricing model to disconnect Shopify. Iñigo flagged me as the source. Meet happened Thu Apr 9 14:30 with Gabriela + Sergio Guerrero (PM Ecommerce) — Strapi base + tiers reframing came out of it.","Gabriela Vicioso (Product) contactó por DM: equipo Strapi esperando modelo de pricing para desconectar Shopify. Iñigo me marcó como la fuente. Meet agendado para Jue 9 Abr 14:30 con Gabriela + Sergio Guerrero (PM Ecommerce)."),who:"Gabriela"},
      {d:"Apr 7",text:L(l,"Gines Coll created Pricing Experiments | PH - Holafly meet for Wed Apr 8 15:30 ES. Behavioural research workstream kickoff with Alfonso attending. Action item from today's weekly.","Gines Coll creó meet Pricing Experiments | PH - Holafly para Mié 8 Abr 15:30 ES. Kickoff workstream behavioural research con Alfonso. Action item del weekly de hoy."),who:"Gines"},
      {d:"Apr 7",text:L(l,"Created SSOT Pre-Data Meeting for Wed Apr 8 14:45 ES (Alfonso + Mostafa + Dani Samaniego) as prep for Thursday's Data team meet.","Creé SSOT Pre-Data Meeting para Mié 8 Abr 14:45 ES (Alfonso + Mostafa + Dani Samaniego) como prep del meet con Data del jueves."),who:"Guido"},
      {d:"Apr 7",text:L(l,"Forwarded PH context email thread to Mostafa for context on the COGS sheet and clustering work in progress.","Forwardié email thread con contexto PH a Mostafa sobre el sheet de COGS y el trabajo de clustering en curso."),who:"Guido"},
      {d:"Apr 7",text:L(l,"Replied to Xabi feedback on ARPU framing (posted in #internal-growth-team last night). Clarified that ARPU mixes price + mix and is a poor primary metric when both move simultaneously. Action item: explain rationale and MDE methodology in detail.","Respondí al feedback de Xabi sobre framing ARPU (posteado en #internal-growth-team anoche). Aclarado que ARPU mezcla price + mix y es mal primary metric cuando ambos se mueven a la vez. Action item: explicar racional y metodología MDE en detalle."),who:"Guido"},
      {d:"Apr 7",text:L(l,"Bosnia +23.3% markup on plans 46+ days surfaced by Alejandro Zuleta on Mar 31, now formally part of the 4 corrections block requiring own analysis before Alfonso decision.","Bosnia +23.3% markup en planes 46+ días detectado por Alejandro Zuleta el 31 Mar, ahora formalmente parte del bloque de 4 correcciones que requieren análisis propio antes de decisión Alfonso."),who:"Alejandro"},
      {d:"Apr 6",text:L(l,"Product Hackers (Jesús Martín Romero) delivered analysis report on the New_Pricing_Structure_Rules_Nov25_v3 file ahead of the Apr 6 meet.","Product Hackers (Jesús Martín Romero) entregó informe de análisis sobre el archivo New_Pricing_Structure_Rules_Nov25_v3 antes del meet del 6 Abr."),who:"PH"},
      {d:"Apr 6",text:L(l,"Sebas confirmed EXP-009 GBP deploys Apr 7 morning.","Sebas confirmó EXP-009 GBP deploya 7 Abr mañana."),who:"Sebas"},
    ]},
    {cat:L(l,"Deployments & Launches","Deploys & Lanzamientos"),icon:"🚀",color:"#1D4ED8",items:[
      {d:"Apr 9",text:L(l,"PRIC-85 closed: Carriers + Content officially launched 4 new cruise eSIMs (Mediterranean, Europe Mediterranean+Baltic, Caribbean, Alaska). Products visible on both the app and website. Coverage on land only at the indicated destinations, not at sea. I committed to verify everything is flowing correctly into the Gross Margin sheets and other relevant dashboards over the next few days.","PRIC-85 cerrado: Carriers + Content lanzaron oficialmente los 4 nuevos eSIMs de cruceros (Mediterranean, Europe Mediterranean+Baltic, Caribbean, Alaska). Productos visibles en app y website. Cobertura solo en tierra en los destinos indicados, no en el mar. Me comprometí a verificar que todo fluya correctamente a los sheets de Gross Margin y otros dashboards relevantes durante los próximos días."),link:null},
      {d:"Apr 8",text:L(l,"JSMCO-283 closed by Juan Jose Gabelo at 18:32 CET (status Finalizada). EXP-009 GBP fully live across all 190 variants (63 destinations × 3 days × £2.99). D+0 contaminated by mid-day deploy, D+1 (Apr 8) is the first clean trading day.","JSMCO-283 cerrado por Juan Jose Gabelo a las 18:32 CET (status Finalizada). EXP-009 GBP totalmente live en las 190 variantes (63 destinos × 3 días × £2.99). D+0 contaminado por deploy a media jornada, D+1 (8 Abr) es el primer día limpio de trading.")},
      {d:"Apr 6",text:L(l,"Sheet (NDA-covered) sent to PH: COGS post-Core March + 5 tabs (dataset, currencies, raw by provider, mapping, README).","Sheet (bajo NDA) enviado a PH: COGS post-Core marzo + 5 pestañas (dataset, monedas, raw por proveedor, mapeo, README).")},
      {d:"Apr 2",text:L(l,"JSMCO-285 EXP-006 Thailand rollback finalized by Bon. AED resolved as part of full closure.","JSMCO-285 rollback EXP-006 Tailandia finalizada por Bon. AED resuelto como parte del cierre completo."),link:J.jsmco285},
    ]},
    {cat:L(l,"Meetings","Reuniones"),icon:"🤝",color:"#7C5C00",items:[
      {d:"Apr 8",text:L(l,"SSOT Pre-Data Meeting (14:45 ES) completed with Alfonso, Mostafa, Dani Samaniego. Output deliverable: SSoT Data Alignment Brief built post-meet, shared with Alfonso/Dani at 16:54.","SSOT Pre-Data Meeting (14:45 ES) completado con Alfonso, Mostafa, Dani Samaniego. Entregable: SSoT Data Alignment Brief armado post-meet, compartido con Alfonso/Dani a las 16:54.")},
      {d:"Apr 8",text:L(l,"Pricing Experiments | PH - Holafly meet (15:30 ES) with Gines + Alfonso. Output: PH workstream scope formalized to 4 areas. Gines and Miki aligned, monthly cadence being set up.","Meet Pricing Experiments | PH - Holafly (15:30 ES) con Gines + Alfonso. Output: scope del workstream PH formalizado a 4 áreas. Gines y Miki alineados, cadencia mensual armándose.")},
      {d:"Apr 8",text:L(l,"Ash intro (17:30 ES, 30 min). Data Analyst, Recurrence & Loyalty. First contact, new stakeholder.","Intro con Ash (17:30 ES, 30 min). Data Analyst, Recurrence & Loyalty. Primer contacto, nuevo stakeholder.")},
      {d:"Apr 8",text:L(l,"Daniela Muñoz call (17:30 BA). Master Product Hackers case study, Holafly growth role overview.","Call Daniela Muñoz (17:30 BA). Caso de estudio Master Product Hackers, overview del rol growth en Holafly.")},
      {d:"Apr 8",text:L(l,"Dani Samaniego added to tomorrow's Pricing data dashboard meet (Thu Apr 9 16:00 ES). Attendees now 5: Alfonso + Miquel + Óscar Vilella + Dani + Guido.","Dani Samaniego agregado al meet de mañana Pricing data dashboard (Jue 9 Abr 16:00 ES). Asistentes ahora 5: Alfonso + Miquel + Óscar Vilella + Dani + Guido.")},
      {d:"Apr 6",text:L(l,"PH meeting (Lu, Jesús, Bedoya). Sheet review, model reduction, clustering criteria, monotonicity. Next: Thu Apr 9 17:00 ES.","Meet PH (Lu, Jesús, Bedoya). Review sheet, reducción modelos, criterio clustering, monotonicidad. Próxima: Jue 9 Abr 17:00 ES.")},
      {d:"Apr 6",text:L(l,"Daniela Muñoz call coordinated for Wed Apr 8 17:30 ES. Master PH case study.","Call Daniela Muñoz coordinada para Mié 8 Abr 17:30 ES. Caso estudio Master PH.")},
      {d:"Apr 7",text:L(l,"Intro with Ash Mon 12:00 (30 min). Data Analyst, Recurrence & Loyalty.","Intro con Ash Lun 12:00 (30 min). Data Analyst, Recurrence & Loyalty.")},

    {cat:L(l,"Contacts","Contactos"),icon:"📨",color:T.textDim,items:[
      {d:"Apr 10",text:L(l,"Mariana Cara shared a Pricing report in Notion plus recommended visualping.io as a competitive monitoring tool. Adds to the competitive intelligence stack.","Mariana Cara compartió un Pricing report en Notion más recomendó visualping.io como herramienta de monitoreo competitivo. Suma al stack de inteligencia competitiva.")},
      {d:"Apr 8",text:L(l,"Alfonso delivered the Holacoins / discounts dashboard (Looker Studio). Resolved the Awaiting Response item. Feeds the SSoT understanding of 17K zero-value orders mostly tied to Hola Coins.","Alfonso entregó el dashboard de Holacoins / descuentos (Looker Studio). Cerró el item de Awaiting Response. Alimenta el entendimiento SSoT de las 17K órdenes con valor cero mayormente ligadas a Hola Coins."),who:"Alfonso"},
      {d:"Apr 8",text:L(l,"Eamonn Dromgoole flagged in #pricing: 10-day Middle East package (variant Shopify 48839767720272) went 52.90 → 48.90 over the last 10 days, broke a fraud rule the support team had in place. Pricing did not push this change. Investigation needed: who or what touched the catalog.","Eamonn Dromgoole flagueó en #pricing: el paquete 10 días Middle East (variante Shopify 48839767720272) pasó de 52.90 a 48.90 en los últimos 10 días, rompió una regla de fraude del equipo de soporte. Pricing no empujó este cambio. Investigación necesaria: quién o qué tocó el catálogo.")},
      {d:"Apr 8",text:L(l,"Alfonso shared Joan de Homdedeu Cortés LinkedIn (yesterday at 08:35 BA). Joan joins mid-May as Pricing Manager with Revenue Management background.","Alfonso compartió LinkedIn de Joan de Homdedeu Cortés (ayer a las 08:35 BA). Joan entra mid-May como Pricing Manager con background Revenue Management.")},
      {d:"Apr 8",text:L(l,"Requested Holacoins/discounts dashboard from Alfonso via DM (the dash that surfaced the Travel Club → Hola Coins migration in the weekly). Connects to the 17K zero-value orders SSoT Pre-Data finding.","Pedí el dashboard de Holacoins/descuentos a Alfonso por DM (el dash que sacó a la luz la migración Travel Club → Hola Coins en el weekly). Conecta con el hallazgo del SSoT Pre-Data de las 17K órdenes con valor cero.")},
      {d:"Apr 8",text:L(l,"Dani Samaniego forwarded the Gross Margin Manual originally from Lucas Videla (Mar 3). Defines the 3 canonical GMs. Important reference for the SSoT framework, mentioned in the Data Alignment Brief.","Dani Samaniego forwardeó el Gross Margin Manual originalmente de Lucas Videla (3 Mar). Define los 3 GMs canónicos. Referencia importante para el framework SSoT, mencionado en el Data Alignment Brief.")},
      {d:"Apr 6",text:L(l,"Josy back from sick. Detailed response: bundles use CHM in Core / 3AU in Legacy. Japan-China possible €3.79/d migration (March GM +2pp). Greenland no coverage. Sierra Leone unlimited opportunity. UAE volume drop war-related. GM negative not urgent (Carriers has own alarms).","Josy recuperada. Respuesta detallada: bundles usan CHM en Core / 3AU en Legacy. Japan-China posible migración €3.79/d (GM marzo +2pp). Greenland sin cobertura. Oportunidad ilimitado Sierra Leone. Drop volumen UAE relacionado guerra. GM negativo no urgente (Carriers tiene alarmas propias).")},
      {d:"Apr 6",text:L(l,"Gines re-engaged. Behavioural research workstream reactivated.","Gines re-conectado. Workstream behavioural research reactivado.")},
