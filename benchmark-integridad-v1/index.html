<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holafly Pricing Benchmark · Precio efectivo + Integridad</title>
<style>
:root{--green:#16a06a;--green-d:#0f7a50;--ink:#16242f;--muted:#6b7c8a;--line:#e7edf1;--bg:#f7f9fb;--card:#fff;--amber:#e8a317;--teal:#1d9e75}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:40;background:rgba(247,249,251,.9);backdrop-filter:saturate(160%) blur(8px);border-bottom:1px solid var(--line)}
.nav .in{max-width:1240px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:14px}
.brand{font-weight:800;font-size:15px;letter-spacing:-.01em}
.navtabs{display:flex;gap:3px}
.navtabs button{border:0;background:none;padding:7px 12px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:9px}
.navtabs button.on{color:var(--ink);background:#e8f5ee}
.spacer{flex:1}.tag{font-size:10px;font-weight:800;background:var(--green);color:#fff;border-radius:5px;padding:2px 6px;margin-left:5px}
.wrap{max-width:1240px;margin:0 auto;padding:22px 22px 70px}
h1{font-size:23px;letter-spacing:-.01em;margin:4px 0 4px}
.tagline{color:var(--muted);font-size:14px;margin:0 0 16px;max-width:900px}
.bar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:0 0 14px}
.grp{display:flex;align-items:center;gap:8px}
.grp .lab{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:0;background:var(--card);padding:7px 11px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.seg button.on{background:var(--ink);color:#fff}
input#q{border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:13.5px;width:170px;outline:none}
input#q:focus{border-color:var(--green)}
.fitsbox{background:#fff9ec;border:1px solid #f0dcae;border-left:4px solid var(--amber);border-radius:12px;padding:11px 16px;font-size:13px;margin:0 0 14px;color:#3a4a55;display:none}
.fitsbox.on{display:block}.fitsbox b{color:var(--ink)}
.wipbox{background:#fff9ec;border:1px solid #f0dcae;border-left:4px solid var(--amber);border-radius:12px;padding:11px 16px;font-size:12.5px;line-height:1.65;margin:0 0 14px;color:#3a4a55}
.wipbox b{color:var(--ink)}.wipbox .ttl{display:inline-block;font-weight:800;color:#9a6a06;text-transform:uppercase;letter-spacing:.04em;font-size:11px;margin-bottom:3px}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 15px;flex:1;min-width:150px}
.kpi .k{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.kpi .v{font-size:20px;font-weight:800;margin-top:2px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 20px;margin-bottom:14px}
.panel h4{margin:0 0 8px;font-size:14px}
.insight{border-left:3px solid var(--green)}#insbody{font-size:13.5px;color:#3a4a55}#insbody b{color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px 10px;overflow-x:auto}
table{border-collapse:separate;border-spacing:4px;width:100%}
th,td{font-size:13px;text-align:center}
thead th{font-size:11.5px;color:var(--muted);font-weight:700;padding:6px 4px}
td.l,th.l{position:sticky;left:0;background:var(--card);z-index:3;text-align:left;font-weight:600;padding:0 12px;box-shadow:2px 0 6px rgba(20,40,55,.06);white-space:nowrap;min-width:150px}
td.l small{display:block;font-weight:500;color:var(--muted);font-size:10px}
.ghead td{background:#eef4f7;text-align:left;font-size:12.5px;font-weight:600;border-radius:7px;padding:9px 12px;cursor:pointer;user-select:none}
.ghead:hover td{background:#e2edf3}.ghead .gsum{font-weight:500;color:#52606b;font-size:12px}
.cell{position:relative;display:block;border-radius:8px;padding:11px 6px;font-weight:700;font-size:13px;cursor:default}
.cell .pl{display:block;font-weight:600;font-size:10px;opacity:.82;margin-top:1px}
.cell.nd{background:#f0f2f4;color:#aab4bd}
.flag{position:absolute;top:4px;right:5px;width:0;height:0;border-style:solid;border-width:0 9px 9px 0;border-color:transparent var(--amber) transparent transparent}
.flag.bun{border-right-color:#6b7c8a}.flag.manual{border-right-color:var(--teal)}
.legend{display:flex;gap:13px;flex-wrap:wrap;font-size:12px;color:#3a4a55;margin:12px 2px 0}
.legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:13px;height:13px;border-radius:4px}
.semrow{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:#3a4a55;margin:8px 2px 0;border-top:1px dashed var(--line);padding-top:10px}
.tri{display:inline-block;width:0;height:0;border-style:solid;border-width:0 10px 10px 0}
.chk{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line);font-size:13px}.chk:first-of-type{border-top:none}
.chk .bdg{flex:0 0 70px;text-align:center;font-size:10.5px;font-weight:800;border-radius:5px;padding:3px 0;height:fit-content;letter-spacing:.03em}
.b-rev{background:#fdf3e2;color:#9a6a06}.b-bun{background:#eef1f4;color:#52606b}.b-cap{background:#eef1f4;color:#52606b}.b-man{background:#e1f5ee;color:#0f6e56}.b-ok{background:#e8f5ee;color:#0f7a50}
.chk .act{color:var(--muted);font-size:12.5px;margin-top:2px}
#tip{position:fixed;z-index:99;display:none;background:#16242f;color:#fff;font-size:12px;font-weight:600;padding:7px 10px;border-radius:8px;pointer-events:none;max-width:300px;line-height:1.5}
footer{font-size:12px;color:var(--muted);margin-top:24px;border-top:1px solid var(--line);padding-top:14px}
</style>
</head>

  DEST.forEach(o=>{let hc=false,hb=false,hm=false;o.rows.forEach(r=>{const b=COMP==='Airalo'?r.air:r.sai;if(b.u_flag==='rev'||b.c_flag==='rev')hc=true;if(b.u_flag==='bun')hb=true;if(b.u_flag==='manual')hm=true;});if(hc)camp.push(o.name);if(hb)bun.push(o.name);if(hm)man.push(o.name);});
  const items=[];
  if(camp.length)items.push({b:'rev',lab:(LANG==='es'?'VERIFICAR':'VERIFY'),t:(LANG==='es'?'Campaña activa en: <b>'+camp.join(', ')+'</b>.':'Active campaign in: <b>'+camp.join(', ')+'</b>.'),a:(LANG==='es'?'Confirmar en la app que el ilimitado coincide con lo capturado. Etiquetar como precio de campaña, no base. Reauditar al cierre.':'Confirm in the app it matches capture. Tag as campaign price, not base. Re-audit at close.')});
  if(bun.length)items.push({b:'bun',lab:(LANG==='es'?'NOTA':'NOTE'),t:(LANG==='es'?'Bundles TSN en: <b>'+bun.join(', ')+'</b>.':'TSN bundles in: <b>'+bun.join(', ')+'</b>.'),a:(LANG==='es'?'No es descuento, incluye streaming. Excluir de claims de precio puro.':'Not a discount, includes streaming. Exclude from pure-price claims.')});
  if(man.length)items.push({b:'man',lab:(LANG==='es'?'MANUAL':'MANUAL'),t:(LANG==='es'?'Efectivo de app medido a mano en: <b>'+man.join(', ')+'</b>.':'App effective measured by hand in: <b>'+man.join(', ')+'</b>.'),a:(LANG==='es'?'Ancla de campo (alta confianza), NO scrapeado. La regla −15% país está confirmada universal pero el resto queda s/d hasta captura automática.':'Field anchor (high confidence), NOT scraped. The −15% country rule is confirmed universal but the rest stays n/a until automated capture.')});
  items.push({b:'ok',lab:(LANG==='es'?'COBERTURA':'COVERAGE'),t:(LANG==='es'?'Efectivo capturado: <b>'+NCAP()+' de '+NTOT+'</b> ('+COMP+').':'Effective captured: <b>'+NCAP()+' of '+NTOT+'</b> ('+COMP+').'),a:(LANG==='es'?(COMP==='Airalo'?'Seguir sumando por revenue (cookie logueada). El resto muestra s/d.':'Saily app pendiente de captura automática (cert pinning). Web sí está scrapeada, 189.'):(COMP==='Airalo'?'Keep adding by revenue (logged-in cookie).':'Saily app pending automated capture; web is scraped, 189.'))});
  document.getElementById('queue').innerHTML=items.map(q=>'<div class="chk"><span class="bdg b-'+q.b+'">'+q.lab+'</span><div><div>'+q.t+'</div><div class="act">→ '+q.a+'</div></div></div>').join('');
  document.getElementById('qcount').textContent=LANG==='es'?('· '+revc+' celdas son precio de campaña activa: confirmar contra la app antes de citarlas. El resto está reconciliado o pendiente (s/d).'):('· '+revc+' cells are active-campaign prices: confirm against the app before quoting. The rest is reconciled or pending (n/a).');
  document.getElementById('foot').textContent=(LANG==='es'
    ?'Holafly: referencia Mayo (USD). Airalo: lista (scrape anónimo, 189) + efectivo logueado validado ('+P.cap.Airalo+' dest). Saily: lista web scrapeada (189) + efectivo app medido a mano ('+P.cap.Saily+' dest), no scrapeado. USD. Gap = (Holafly − competidor)/competidor; verde = Holafly más barato. Cableado al D object real · v1.'
    :'Holafly: May reference (USD). Airalo: list (anonymous scrape, 189) + logged-in effective ('+P.cap.Airalo+'). Saily: scraped web list (189) + hand-measured app effective ('+P.cap.Saily+'), not scraped. USD. Wired to the real D object · v1.');
}
function kpi(k,v){return'<div class="kpi"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}

document.addEventListener('click',e=>{const g=e.target.closest('.ghead');if(g){OPENZ[g.dataset.z]=!OPENZ[g.dataset.z];render();return;}const b=e.target.closest('button');if(!b)return;if(b.dataset.lang)LANG=b.dataset.lang;['comp','axis','price','mode','flag'].forEach(a=>{if(b.dataset[a]!==undefined){if(a==='comp')COMP=b.dataset[a];else if(a==='axis')AXIS=b.dataset[a];else if(a==='price')PRICE=b.dataset[a];else if(a==='mode')MODE=b.dataset[a];else if(a==='flag')FLT=b.dataset[a];}});render();});
document.getElementById('q').addEventListener('input',e=>{Q=e.target.value;render();});
const tip=document.getElementById('tip');
document.addEventListener('mousemove',e=>{const c=e.target.closest('[data-tip]');if(c){tip.textContent=c.dataset.tip;tip.style.display='block';tip.style.left=Math.min(e.clientX+14,innerWidth-310)+'px';tip.style.top=(e.clientY+16)+'px';}else tip.style.display='none';});
render();
</script>
</body>
