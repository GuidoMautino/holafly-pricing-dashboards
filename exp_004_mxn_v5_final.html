// Gauge — visual indicator (baseline center, current dot, optional floor mark)
const Gauge = ({ label, baseline, current, floor, unit, t: th }) => {
  const d = current - baseline;
  const rng = Math.max(Math.abs(baseline - (floor || baseline * 0.7)), Math.abs(d), 0.01) * 2.5;
  const pos = Math.max(5, Math.min(95, 50 + (d / rng) * 45));
  const gc = (floor !== undefined && current < floor) ? th.red : current >= baseline ? th.green : th.yellow;
  const u = unit === "%" ? "%" : "";
  const pp = unit === "%" ? "pp" : "";
  return (
    <div style={{
      padding: "12px 14px", background: th.card, border: "1px solid " + th.border,
      borderRadius: 10, borderLeft: "3px solid " + gc,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 6 }}>
        <span style={{ color: th.textDim, fontWeight: 600 }}>{label}</span>
        <span style={{ fontFamily: MN, color: gc, fontWeight: 600 }}>
          {current.toFixed(2)}{u} ({d >= 0 ? "+" : ""}{d.toFixed(2)}{pp})
        </span>
      </div>
      <div style={{ position: "relative", height: 10, borderRadius: 5, background: th.border }}>
        <div style={{ position: "absolute", left: "50%", top: 0, width: 2, height: 10, background: th.textMuted + "40" }} />
        <div style={{
          position: "absolute", left: pos + "%", top: -2, width: 14, height: 14,
          borderRadius: "50%", background: gc, border: "2px solid " + th.bg,
          transform: "translateX(-50%)",
        }} />
        {floor !== undefined && <div style={{
          position: "absolute",
          left: Math.max(5, Math.min(95, 50 + ((floor - baseline) / rng) * 45)) + "%",
          top: -1, width: 3, height: 12, background: th.red + "60", borderRadius: 1,
        }} />}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: th.textMuted, marginTop: 3 }}>
        <span>Baseline: {baseline.toFixed(2)}{u}</span>
        {floor !== undefined && <span style={{ color: th.red }}>Floor: {floor}{u}</span>}
      </div>
    </div>
  );
};

    {/* ═══ CATEGORY: COUNTERFACTUAL ═══ */}

        <MC label={tx(lang, "Revenue vs CF", "Revenue vs CF")} value="+€3.437/d" delta="+20,6% vs projected" sub={tx(lang, "BQ DID projection. €48K incremental in 14 days.", "Proyeccion DID BQ. €48K incremental en 14 dias.")} c={t.green} bdr={t.green} t={t} />

          <div style={{ fontSize: 12, color: t.text, lineHeight: 1.7 }}>
            {tx(lang,
              `In the 14 days after the change, treated MXN destinations earned ${fm(CF.actual.total)}/day. The control group (destinations without significant price change) grew ${CF.controlRatio.toFixed(2)}× during the same period. Applying that ratio to treated destinations' pre-period gives ${fm(CF.cfOverall.projected)}/day projected. Actual exceeded projection by ${fm(CF.cfOverall.delta)}/day (+${CF.cfOverall.deltaPct}%). Orders grew ${pcR(CF.seg.total.p_opd, CF.seg.total.b_opd)} while Average Order Value dropped ${pcR(CF.seg.total.p_aov, CF.seg.total.b_aov)}, but volume more than compensated.`,
              `En los 14 dias posteriores al cambio, los destinos MXN tratados facturaron ${fm(CF.actual.total)}/dia. El grupo control (destinos sin cambio significativo de precio) crecio ${CF.controlRatio.toFixed(2)}× en el mismo periodo. Aplicando ese ratio al periodo pre de los tratados da ${fm(CF.cfOverall.projected)}/dia proyectado. El real supero la proyeccion por ${fm(CF.cfOverall.delta)}/dia (+${CF.cfOverall.deltaPct}%). Las ordenes crecieron ${pcR(CF.seg.total.p_opd, CF.seg.total.b_opd)} mientras el precio promedio bajo ${pcR(CF.seg.total.p_aov, CF.seg.total.b_aov)}, pero el volumen mas que compenso.`

      {/* TOGGLE: WHY THIS METHOD (C2: explain ratio control global) */}
      <Tog l={tx(lang, "Why Difference-in-Differences? (justification + calculation)", "Por que Diferencia en Diferencias? (justificacion + calculo)")} o={showMethod} s={setShowMethod} t={t} />
      {showMethod && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        <div style={{ padding: "12px 14px", background: t.bBg, borderRadius: 8, border: `1px solid ${t.bBdr}`, borderLeft: `3px solid ${t.textDim}`, marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.text, marginBottom: 6 }}>{tx(lang, "Why DID is the right method for this experiment", "Por que DID es el metodo correcto para este experimento")}</div>
          <div style={{ fontSize: 11, color: t.textDim, lineHeight: 1.7 }}>
            <p style={{ margin: "0 0 6px" }}>{tx(lang,
              "This experiment has an internal control group: ~120 MXN destinations where only charm pricing was applied (<5% price change). Both treated (65 destinations, >30% change on 1-day) and control experienced the same seasonality, same Paid Social changes, same market conditions. The only systematic difference is the price correction.",
              "Este experimento tiene grupo de control interno: ~120 destinos MXN donde solo se aplico charm pricing (<5% cambio de precio). Tanto tratados (65 destinos, >30% cambio en 1 dia) como control experimentaron la misma estacionalidad, mismos cambios de Paid Social, mismas condiciones de mercado. La unica diferencia sistematica es la correccion de precio."
            )}</p>
            <p style={{ margin: "0 0 6px" }}><strong>{tx(lang, "Parallel trends validated:", "Parallel trends validado:")}</strong> {tx(lang,
              "14 weeks pre-launch, treated and control destinations moved together week to week (CV = 10.6%, threshold <20%). This confirms the DID assumption holds.",
              "14 semanas pre-lanzamiento, destinos tratados y control se movieron juntos semana a semana (CV = 10,6%, umbral <20%). Esto confirma que el supuesto DID se cumple."
            )}</p>
            <p style={{ margin: 0 }}><strong>{tx(lang, "Alternative methods considered:", "Metodos alternativos considerados:")}</strong> {tx(lang,
              "CausalImpact requires daily user-level data joined with revenue (GA4-Shopify join, pending Q2 2026). Synthetic Control needs 3-5 donor markets with similar seasonality — the MXN pool lacks this. The 90-day average is shown as a fallback scenario in sensitivity analysis below.",
              "CausalImpact requiere datos diarios a nivel usuario unidos con revenue (join GA4-Shopify, pendiente Q2 2026). Control Sintetico necesita 3-5 mercados donor con estacionalidad similar — el pool MXN no lo tiene. El promedio 90 dias se muestra como escenario fallback en el analisis de sensibilidad abajo."
            )}</p>
          </div>
        </div>
        <div style={{ fontSize: 11, fontWeight: 700, color: t.text, marginBottom: 6 }}>{tx(lang, "How the DID projection was calculated:", "Como se calculo la proyeccion DID:")}</div>
        <div style={{ fontSize: 12, color: t.text, lineHeight: 1.8 }}>
          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 1:", "Paso 1:")}</strong> {tx(lang, "For each duration bucket, we took 96 days of pre-period revenue for both treated and control groups.", "Para cada bucket de duracion, tomamos 96 dias de revenue pre-periodo para grupos tratados y control.")}</p>
          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 2:", "Paso 2:")}</strong> {tx(lang, `We calculated the control group's growth ratio per bucket (e.g., 1-day control grew ${CF.bk[0].c_ratio.toFixed(2)}×, 2-day grew ${CF.bk[1].c_ratio.toFixed(2)}×). Overall control ratio: ${CF.controlRatio.toFixed(2)}×.`, `Calculamos el ratio de crecimiento del control por bucket (ej: control 1 dia crecio ${CF.bk[0].c_ratio.toFixed(2)}×, 2 dias crecio ${CF.bk[1].c_ratio.toFixed(2)}×). Ratio control global: ${CF.controlRatio.toFixed(2)}×.`)}</p>
          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 3:", "Paso 3:")}</strong> {tx(lang, "We applied each bucket's control ratio to the treated pre-period revenue. This is the counterfactual: what treated destinations would have earned at the control group's growth rate.", "Aplicamos el ratio de control de cada bucket al revenue pre-periodo tratado. Este es el contrafactual: lo que hubieran facturado los tratados al ritmo del control.")}</p>
          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 4:", "Paso 4:")}</strong> {tx(lang, "The difference between actual and projected is the price effect.", "La diferencia entre real y proyectado es el efecto del precio.")}</p>
        </div>
        <Note bg={t.bBg} bdr={t.bBdr} ac={t.textDim} strong={tx(lang, "Control ratio global 1.63× explained:", "Ratio control global 1,63× explicado:")} t={t}>
          {tx(lang,
            `The control group (~120 MXN destinations with <5% price change) grew 1.63× in revenue during the post period. If treated destinations had grown at the same rate, they would have earned €${Math.round(CF.cfOverall.projected).toLocaleString("de-DE")}/day. They earned €${Math.round(CF.cfOverall.actual).toLocaleString("de-DE")}/day. The difference (+€${Math.round(CF.cfOverall.delta).toLocaleString("de-DE")}/day) is attributable to the price correction.`,
            `El grupo control (~120 destinos MXN con <5% cambio de precio) crecio 1,63× en revenue durante el periodo post. Si los destinos tratados hubieran crecido al mismo ritmo, hubieran facturado €${Math.round(CF.cfOverall.projected).toLocaleString("de-DE")}/dia. Facturaron €${Math.round(CF.cfOverall.actual).toLocaleString("de-DE")}/dia. La diferencia (+€${Math.round(CF.cfOverall.delta).toLocaleString("de-DE")}/dia) es atribuible a la correccion de precio.`
          )}
        </Note>

        {/* SENSITIVITY (C1: table with 3 scenarios + reading) */}
        <Tog l={tx(lang, "Sensitivity analysis: three projection methods compared", "Analisis de sensibilidad: tres metodos de proyeccion comparados")} o={showSens} s={setShowSens} t={t} />
        {showSens && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 14, background: t.bg }}>
          <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>
              {[tx(lang, "Scenario", "Escenario"), tx(lang, "How calculated", "Como se calcula"), tx(lang, "Projected/d", "Proyeccion/d"), "Real/d", tx(lang, "Difference/d", "Diferencia/d")].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: h === tx(lang, "Scenario", "Escenario") || h === tx(lang, "How calculated", "Como se calcula") ? "left" : "right", color: t.textMuted, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {[
                { name: tx(lang, CF.sensitivity.ratio.label_en, CF.sensitivity.ratio.label_es), how: tx(lang, "Each bucket scaled by its own control ratio", "Cada bucket escalado por su ratio de control"), ...CF.sensitivity.ratio, c: t.green, w: 700 },
                { name: tx(lang, CF.sensitivity.overall.label_en, CF.sensitivity.overall.label_es), how: tx(lang, "All treated × single control ratio (1.63×)", "Todos tratados × ratio control unico (1,63×)"), ...CF.sensitivity.overall, c: t.textDim, w: 500 },
                { name: tx(lang, CF.sensitivity.flat.label_en, CF.sensitivity.flat.label_es), how: tx(lang, "Pre-period average, no control adjustment", "Promedio pre-periodo, sin ajuste control"), ...CF.sensitivity.flat, c: t.yellow, w: 700 },
              ].map((s, i) => <tr key={i} style={{ borderBottom: `1px solid ${t.border}40`, background: i === 0 ? t.gBg : "transparent" }}>
                <td style={{ padding: "6px 8px", fontWeight: s.w, color: s.c }}>{s.name}</td>
                <td style={{ padding: "6px 8px", fontSize: 10, color: t.textDim }}>{s.how}</td>
                <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN }}>{fm(s.projected)}</td>
                <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN, fontWeight: 600 }}>{fm(s.real)}</td>

              </tr>)}
            </tbody>
          </table></div>
          <div style={{ marginTop: 10, fontSize: 11, color: t.text, lineHeight: 1.7 }}>
            <strong>{tx(lang, "Reading:", "Lectura:")}</strong> {tx(lang,
              "The per-bucket ratio scaling (DID) is the primary because it uses the control group that lived the same conditions. The overall ratio (1.63×) is a simplified version using a single multiplier. The flat 90-day average is a raw reference only — it does not account for seasonality or market growth, so it overstates the effect. It is NOT a conservative estimate.",
              "El ratio por bucket (DID) es el principal porque usa el grupo control que vivio las mismas condiciones. El ratio global (1,63×) es una version simplificada usando un multiplicador unico. El promedio 90 dias plano es solo una referencia bruta — no ajusta por estacionalidad ni crecimiento del mercado, por lo que sobreestima el efecto. NO es un estimado conservador."
            )}
          </div>
        </div>}
      </div>}

      {/* TOGGLE: DECOMPOSITION */}
      <Tog l={tx(lang, "Decomposition: orders and price by segment", "Descomposicion: ordenes y precio por segmento")} o={showSeg} s={setShowSeg} t={t} />
      {showSeg && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        <p style={{ fontSize: 11, color: t.textDim, margin: "0 0 12px", lineHeight: 1.5 }}>{tx(lang,
          "Revenue is the result of multiplying orders by average price. Here we separate both to see what moved the result.",
          "El revenue es el resultado de multiplicar ordenes por precio promedio. Aca separamos ambos para ver que movio el resultado."
        )}</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }} className="g2">
          {[{ n: tx(lang, "Short (1-3 days)", "Cortos (1-3 dias)"), s: CF.seg.short },
            { n: tx(lang, "Long (4+ days)", "Largos (4+ dias)"), s: CF.seg.long }].map((sg, i) => {
            const dO = pcR(sg.s.p_opd, sg.s.b_opd), dA = pcR(sg.s.p_aov, sg.s.b_aov);

            return <div key={i} style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: 14, borderLeft: `4px solid ${t.green}` }}>
              <div style={{ fontSize: 13, fontWeight: 700 }}>{sg.n}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 6, alignItems: "center", margin: "12px 0" }}>
                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "ORDERS/DAY (proj.)", "ORD/DIA (proy.)")}</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.textDim }}>{Math.round(sg.s.b_opd)}</div></div>
                <span style={{ color: t.textMuted }}>→</span>
                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "ORDERS/DAY (actual)", "ORD/DIA (real)")}</div><div style={{ fontSize: 16, fontWeight: 800, fontFamily: MN, color: t.green }}>{Math.round(sg.s.p_opd)}</div><div style={{ fontSize: 10, fontWeight: 700, color: t.green }}>{dO}</div></div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 6, alignItems: "center" }}>
                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "AVG PRICE (proj.)", "PRECIO PROM (proy.)")}</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.textDim }}>{"€"}{sg.s.b_aov.toFixed(2).replace(".", ",")}</div></div>

              </div>
            </div>;

        </div>

      <Tog l={tx(lang, "Break-Even: did volume compensate in each bucket?", "Break-Even: el volumen compenso en cada bucket?")} o={showBe} s={setShowBe} t={t} />
      {showBe && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        {/* L8: Break-Even bar chart — threshold vs actual per bucket */}
        <div style={{ background: t.bg, borderRadius: 8, border: `1px solid ${t.border}`, padding: 10, marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 8 }}>{tx(lang, "BREAK-EVEN: THRESHOLD VS ACTUAL VOLUME GROWTH", "BREAK-EVEN: UMBRAL VS CRECIMIENTO REAL DE VOLUMEN")}</div>
          <svg viewBox="0 0 700 180" style={{ width: "100%" }}>
            {CF.beAll.map((b, i) => {
              const maxV = Math.max(...CF.beAll.map(x => Math.max(x.beReq, x.volReal)));
              const barW = 80, gap = 12, startX = 60;
              const x = startX + i * (barW + gap);
              const scaleH = v => (v / (maxV * 1.1)) * 130;
              const threshH = scaleH(b.beReq);
              const realH = scaleH(b.volReal);
              return <g key={i}>
                <rect x={x} y={150 - threshH} width={barW / 2 - 2} height={threshH} fill={t.border} rx={3} opacity={0.5} />
                <rect x={x + barW / 2} y={150 - realH} width={barW / 2 - 2} height={realH} fill={t.gFill} rx={3} opacity={0.8} />

          <div style={{ overflowX: "auto", marginBottom: 14 }}>

              </tr></thead>

      {/* SIGNIFICANCE: Z-SCORE */}

      <Xp title={tx(lang, "Decision Checklist (5/5 met)", "Checklist de Decision (5/5 cumplidos)")} t={t}>

      {/* GAPS */}
      <Xp title={tx(lang, "Open Gaps", "Gaps Abiertos")} t={t}>
        {D.gaps.map((g, i) => <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 1fr 80px 80px", gap: 8, padding: "6px 0", borderBottom: "1px solid " + t.border + "30", fontSize: 11, alignItems: "center" }}>

    {/* ════ FOOTER ════ */}

  </div>;
}

// WEEKLY CHART (SVG, no Recharts — V2 compliant)
// ═══════════════════════════════════════════════════════════════════════════
function WkChart({ data, t }) {
  const maxRev = Math.max(...data.map(d => d.r));
  const h = 120, w = 700, pad = { l: 48, r: 10, t: 6, b: 20 };
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  const xStep = plotW / (data.length - 1);
  const yScale = v => pad.t + plotH - (v / (maxRev * 1.08)) * plotH;
  const li = data.findIndex(d => d.p === "L");
  const path = data.map((d, i) => `${i === 0 ? "M" : "L"}${pad.l + i * xStep},${yScale(d.r)}`).join(" ");
  return <div style={{ background: t.bg, borderRadius: 8, border: `1px solid ${t.border}`, padding: 10 }}>
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%" }}>
      {[0, 50000, 100000, 150000, 200000].filter(v => v <= maxRev * 1.1).map(v => <g key={v}>
        <line x1={pad.l} x2={w - pad.r} y1={yScale(v)} y2={yScale(v)} stroke={t.border} strokeWidth={.5} />
        <text x={pad.l - 4} y={yScale(v) + 3} fill={t.textMuted} fontSize={5.5} textAnchor="end" fontFamily={MN}>€{(v / 1000).toFixed(0)}K</text>
      </g>)}
      {li >= 0 && <rect x={pad.l + li * xStep - 2} y={pad.t} width={xStep * 2 + 4} height={plotH} fill={t.accent + "08"} rx={3} />}
      <path d={path} fill="none" stroke={t.accent} strokeWidth={1.5} />
      {data.map((d, i) => <circle key={i} cx={pad.l + i * xStep} cy={yScale(d.r)} r={d.p ? 3.5 : 1.2} fill={d.p === "P" ? t.green : d.p === "L" ? t.yellow : t.accent} stroke={d.p ? t.bg : undefined} strokeWidth={d.p ? 1.5 : 0} />)}
      {data.map((d, i) => (i % 5 === 0 || i >= data.length - 2) ? <text key={"x" + i} x={pad.l + i * xStep} y={h - 4} fill={d.p === "P" ? t.green : d.p === "L" ? t.yellow : t.textMuted} fontSize={5.5} textAnchor="middle" fontFamily={MN} fontWeight={d.p ? 700 : 400}>{d.w}</text> : null)}
    </svg>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════════
// MARKET PANEL (SVG horizontal bars, central axis)
// ═══════════════════════════════════════════════════════════════════════════
function MktPanel({ data, t }) {
  const mx = Math.max(...data.map(x => Math.abs(parseFloat(x.d))));
  return <div style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 8, padding: 10 }}>
    {data.map(d => {
      const val = parseFloat(d.d);
      const isPos = val >= 0, bw = (Math.abs(val) / mx) * 40;
      const bc = isPos ? t.gFill : t.border;
      return <div key={d.c} style={{ display: "grid", gridTemplateColumns: "44px 1fr 60px", alignItems: "center", padding: "2px 8px", borderRadius: 4 }}>
        <span style={{ fontSize: 10, fontWeight: 500, color: t.textDim, fontFamily: MN }}>{d.c}</span>
        <div style={{ position: "relative", height: 10 }}>
          <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: t.border }} />
          <div style={{ position: "absolute", top: 1, height: 8, borderRadius: 2, background: bc, opacity: .4, ...(isPos ? { left: "50%", width: `${bw}%` } : { right: "50%", width: `${bw}%` }) }} />
        </div>
        <span style={{ textAlign: "right", fontSize: 10, fontWeight: 500, color: t.textDim, fontFamily: MN }}>{d.d}</span>
      </div>;
    })}
    <div style={{ marginTop: 6, padding: "6px 8px", background: t.yBg, borderRadius: 4, fontSize: 10, color: t.text, lineHeight: 1.4 }}>
      {tx("en",
        "Several MXN markets grew vs their 90d (PEN +133%, COP +64%). March is peak season. Part of MXN treated growth was seasonal.",
        "Varios mercados MXN crecieron vs sus 90d (PEN +133%, COP +64%). Marzo es temporada alta. Parte del crecimiento de MXN tratados fue estacional."
      )}
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════════
// PARALLEL TRENDS CHART (SVG — FIX-2: ratio line tells the story)
// ═══════════════════════════════════════════════════════════════════════════
function PTChart({ data, stats, t }) {
  const h = 180, w = 700, pad = { l: 38, r: 46, t: 10, b: 28 };
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  const xStep = plotW / (data.length - 1);
  const maxV = Math.max(...data.map(d => Math.max(d.t, d.c)));
  const yScale = v => pad.t + plotH - (v / (maxV * 1.15)) * plotH;
  const launchIdx = data.findIndex(d => d.p === "post");

  // Ratio scale (right Y axis)
  const maxR = Math.max(...data.map(d => d.r));
  const minR = Math.min(...data.map(d => d.r));
  const rRange = Math.max(maxR - minR, 0.3);
  const rBase = Math.max(0, minR - rRange * 0.15);
  const rTop = maxR + rRange * 0.15;
  const yR = v => pad.t + plotH - ((v - rBase) / (rTop - rBase)) * plotH;

  const pathT = data.map((d, i) => `${i === 0 ? "M" : "L"}${pad.l + i * xStep},${yScale(d.t)}`).join(" ");
  const pathC = data.map((d, i) => `${i === 0 ? "M" : "L"}${pad.l + i * xStep},${yScale(d.c)}`).join(" ");
  const pathR = data.map((d, i) => `${i === 0 ? "M" : "L"}${pad.l + i * xStep},${yR(d.r)}`).join(" ");

  // Pre-period mean ratio for reference line
  const preMean = stats.mean;

  return <div style={{ background: t.bg, borderRadius: 8, border: `1px solid ${t.border}`, padding: 10 }}>
    <div style={{ display: "flex", gap: 16, marginBottom: 8, fontSize: 10, flexWrap: "wrap" }}>
      <span><span style={{ display: "inline-block", width: 12, height: 3, background: t.accent, borderRadius: 2, marginRight: 4, opacity: 0.4 }} />Treated (65)</span>
      <span><span style={{ display: "inline-block", width: 12, height: 3, background: t.textDim, borderRadius: 2, marginRight: 4, opacity: 0.4 }} />Control (~120)</span>
      <span><span style={{ display: "inline-block", width: 12, height: 3, background: t.green, borderRadius: 2, marginRight: 4 }} /><strong>Ratio T/C (the story)</strong></span>
      <span style={{ color: t.textMuted }}>CV = {stats.cv} | {stats.verdict}</span>
    </div>
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%" }}>
      {/* Left Y grid (orders) */}
      {[0, 10, 20, 30, 40, 50].filter(v => v <= maxV * 1.1).map(v => <g key={v}>
        <line x1={pad.l} x2={w - pad.r} y1={yScale(v)} y2={yScale(v)} stroke={t.border} strokeWidth={.3} />
        <text x={pad.l - 4} y={yScale(v) + 3} fill={t.textMuted} fontSize={5} textAnchor="end" fontFamily={MN} opacity={0.5}>{v}</text>
      </g>)}
      {/* Right Y labels (ratio) */}
      {[0.5, 0.7, 0.9, 1.1, 1.3].filter(v => v >= rBase && v <= rTop).map(v => <g key={v}>
        <text x={w - pad.r + 4} y={yR(v) + 3} fill={t.green} fontSize={5.5} textAnchor="start" fontFamily={MN} fontWeight={v === 1.0 ? 700 : 400}>{v.toFixed(1)}</text>
      </g>)}
      {/* 1.0 reference line */}
      <line x1={pad.l} x2={w - pad.r} y1={yR(1.0)} y2={yR(1.0)} stroke={t.green} strokeWidth={0.5} strokeDasharray="2,3" opacity={0.4} />
      {/* Pre-period mean ratio line */}
      {launchIdx >= 0 && <line x1={pad.l} x2={pad.l + (launchIdx - 1) * xStep} y1={yR(preMean)} y2={yR(preMean)} stroke={t.textMuted} strokeWidth={0.5} strokeDasharray="3,2" opacity={0.6} />}
      {/* Launch line */}
      {launchIdx >= 0 && <line x1={pad.l + launchIdx * xStep} x2={pad.l + launchIdx * xStep} y1={pad.t} y2={pad.t + plotH} stroke={t.accent} strokeWidth={1} strokeDasharray="4,3" />}
      {launchIdx >= 0 && <text x={pad.l + launchIdx * xStep} y={pad.t - 2} fill={t.accent} fontSize={6} textAnchor="middle" fontFamily={MN}>LAUNCH</text>}
      {/* Background lines (faded) */}
      <path d={pathC} fill="none" stroke={t.textDim} strokeWidth={0.8} strokeDasharray="4,2" opacity={0.35} />
      <path d={pathT} fill="none" stroke={t.accent} strokeWidth={0.8} opacity={0.35} />
      {/* RATIO LINE — the protagonist */}
      <path d={pathR} fill="none" stroke={t.green} strokeWidth={2.5} />
      {/* Ratio dots */}
      {data.map((d, i) => <circle key={"r" + i} cx={pad.l + i * xStep} cy={yR(d.r)} r={d.p === "post" ? 4.5 : 2} fill={d.p === "post" ? t.green : t.green} stroke={d.p === "post" ? t.bg : undefined} strokeWidth={d.p === "post" ? 2 : 0} />)}
      {/* Ratio value labels on post points */}
      {data.filter(d => d.p === "post").map((d, i) => {
        const idx = data.indexOf(d);
        return <text key={"rv" + i} x={pad.l + idx * xStep} y={yR(d.r) - 8} fill={t.green} fontSize={8} fontWeight={700} textAnchor="middle" fontFamily={MN}>{d.r.toFixed(2)}</text>;
      })}
      {/* Pre-mean label */}
      {launchIdx >= 0 && <text x={pad.l + (launchIdx - 1) * xStep + 4} y={yR(preMean) - 4} fill={t.textMuted} fontSize={6} fontFamily={MN}>avg {preMean.toFixed(2)}</text>}
      {/* X labels */}
      {data.map((d, i) => (i % 3 === 0 || d.p === "post") ? <text key={"xl" + i} x={pad.l + i * xStep} y={h - 6} fill={d.p === "post" ? t.green : t.textMuted} fontSize={5} textAnchor="middle" fontFamily={MN} fontWeight={d.p === "post" ? 700 : 400}>{d.w}</text> : null)}
    </svg>
    {/* FIX-2: Visual narrative summary */}
    <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, marginTop: 10, alignItems: "center" }}>
      <div style={{ padding: "8px 12px", borderRadius: 8, background: t.card, border: `1px solid ${t.border}`, textAlign: "center" }}>
        <div style={{ fontSize: 20, fontWeight: 800, fontFamily: MN, color: t.textDim }}>0.68</div>
        <div style={{ fontSize: 9, color: t.textMuted, marginTop: 4, lineHeight: 1.4 }}>Pre-launch: treated sold 68% of what control sold (stable 14 weeks)</div>
      </div>
      <div style={{ fontSize: 20, color: t.green }}>→</div>
      <div style={{ padding: "8px 12px", borderRadius: 8, background: t.gBg, border: `1px solid ${t.gBdr}`, textAlign: "center" }}>
        <div style={{ fontSize: 20, fontWeight: 800, fontFamily: MN, color: t.green }}>1.03–1.36</div>
        <div style={{ fontSize: 9, color: t.textDim, marginTop: 4, lineHeight: 1.4 }}>Post-launch: treated sold MORE than control. Divergence = price effect</div>
      </div>
    </div>
  </div>;
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
  </script>
</body>
