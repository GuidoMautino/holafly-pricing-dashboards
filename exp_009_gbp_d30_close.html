<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXP-009 GBP · D+30 Results</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --pink:#E6485C;--pink-soft:rgba(230,72,92,0.08);--pink-border:rgba(230,72,92,0.18);
  --charcoal:#292B2E;--charcoal-soft:#4A4D52;--gray-mid:#64748B;--gray-light:#94A3B8;
  --card:#F8FAFC;--white:#FFFFFF;--rule:#E4E6EA;--rule-soft:rgba(41,43,46,0.06);
  --green:#15803D;--green-bg:#E8F5EE;--warn:#B45309;--warn-bg:#FDF3E7;
  --blue:#1D4ED8;--blue-bg:#E8EFFD;--purple:#7C3AED;--purple-bg:#F3EEFE;
  --pastel-yellow:#FFF0AB;--pastel-blue:#BFEBFF;--pastel-peach:#FFCCB0;
  --mono:'JetBrains Mono',monospace;--sans:'Mulish',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--white);color:var(--charcoal);line-height:1.65;font-size:14px;-webkit-font-smoothing:antialiased}
::selection{background:var(--pink);color:var(--white)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CCD0D7;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.anim-up{animation:fadeUp .4s ease both}.anim-scale{animation:scaleIn .35s ease both}

.top-bar{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 48px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:border-color .3s}
.top-bar.scrolled{border-bottom-color:var(--rule)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.top-bar-dot{width:8px;height:8px;background:var(--pink);border-radius:50%}
.top-bar-brand{font-size:15px;font-weight:800;color:var(--charcoal);letter-spacing:-0.02em}
.top-bar-divider{width:1px;height:14px;background:var(--rule)}
.top-bar-context{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--gray-mid);letter-spacing:.08em;text-transform:uppercase}
.top-bar-badge{background:var(--green);color:var(--white);font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.1em;text-transform:uppercase}
.lang-toggle{display:flex;border:1px solid var(--rule);border-radius:999px;overflow:hidden;background:var(--rule-soft);padding:3px;gap:2px}
.lang-toggle button{background:transparent;border:none;padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);cursor:pointer;border-radius:999px;transition:all .25s;letter-spacing:.08em}
.lang-toggle button.active{background:var(--charcoal);color:var(--white)}
.top-right{display:flex;align-items:center;gap:10px}

.page{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.section{padding:40px 0 10px}
.section-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:8px}
.section h2{font-size:clamp(24px,3vw,34px);font-weight:800;color:var(--charcoal);line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px}
.section h2 .accent{color:var(--pink)}
.section h2 .highlight{background-image:linear-gradient(120deg,var(--pastel-yellow) 0%,var(--pastel-yellow) 100%);background-repeat:no-repeat;background-size:100% 26%;background-position:0 88%;padding:0 3px}
.section-intro{font-size:15px;color:var(--charcoal-soft);max-width:780px;line-height:1.65;margin-bottom:28px}
.section-intro strong{color:var(--charcoal);font-weight:700}
.section-divider{border:none;border-top:1px solid var(--rule);margin:48px 0 0}

.hero{padding:64px 0 48px}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink)}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:900;color:var(--charcoal);line-height:1.08;letter-spacing:-0.03em;margin-bottom:18px}
.hero h1 .accent{color:var(--pink)}
.hero-deck{font-size:16px;color:var(--charcoal-soft);max-width:750px;line-height:1.65}
.hero-deck strong{color:var(--charcoal);font-weight:700}
.hero-meta{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap;font-size:12px;color:var(--gray-light)}
.hero-meta span strong{color:var(--charcoal);font-weight:700}
.hero-meta .sep{width:1px;height:12px;background:var(--rule);align-self:center}

.card{background:var(--white);border:1px solid var(--rule);border-radius:12px;padding:22px 24px;margin-bottom:14px}
.card-accent{border-left:3px solid var(--pink)}
.card-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.card p{font-size:14px;color:var(--charcoal-soft);line-height:1.6;margin-bottom:6px}.card p:last-child{margin-bottom:0}.card p strong{color:var(--charcoal);font-weight:700}
.callout{background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:16px 20px;margin:18px 0;font-size:13px;color:var(--charcoal-soft);line-height:1.6}
.callout strong{color:var(--charcoal);font-weight:700}.callout em{color:var(--pink);font-style:normal;font-weight:700}
.callout.green{border-left-color:var(--green);background:var(--green-bg)}
.callout.blue{border-left-color:var(--blue);background:var(--blue-bg)}
.callout.warn{border-left-color:var(--warn);background:var(--warn-bg)}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:18px 16px;text-align:center}
.metric-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.metric-value{font-family:var(--mono);font-size:26px;font-weight:800;color:var(--charcoal);line-height:1.05}
.metric-value .accent{color:var(--pink)}
.metric-value .green{color:var(--green)}
.metric-value .warn{color:var(--warn)}
.metric-sub{font-size:11px;color:var(--gray-mid);margin-top:6px;line-height:1.4}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
@media(max-width:800px){.grid-2,.grid-3{grid-template-columns:1fr}}

.timeline{display:flex;flex-direction:column;gap:0;margin:20px 0}
.tl-row{display:grid;grid-template-columns:110px 24px 1fr;gap:12px;align-items:start;padding:16px 0;position:relative}
.tl-row:not(:last-child){border-bottom:1px solid var(--rule-soft)}
.tl-when{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);padding-top:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--rule);margin-top:4px;justify-self:center;position:relative}
.tl-dot.active{background:var(--pink)}
.tl-dot.done{background:var(--green)}
.tl-dot.warn{background:var(--warn)}
.tl-content{font-size:13.5px;color:var(--charcoal-soft);line-height:1.55}
.tl-content strong{color:var(--charcoal);font-weight:700}
.tl-content .tl-metric{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--charcoal);display:inline-block;margin-top:4px}

.range-bar{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:20px 24px;margin:18px 0}
.range-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:8px}
.range-track{height:8px;background:var(--rule);border-radius:4px;position:relative;overflow:hidden}
.range-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--pink))}
.range-note{font-size:12px;color:var(--gray-mid);margin-top:8px;text-align:center}
.range-note strong{color:var(--charcoal)}

.s-table{width:100%;border-collapse:collapse;margin:16px 0}
.s-table th{text-align:left;padding:10px 14px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gray-light);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--rule)}
.s-table th:not(:first-child){text-align:right}
.s-table td{padding:10px 14px;font-size:13px;color:var(--charcoal-soft);border-bottom:1px solid var(--rule-soft)}
.s-table td:not(:first-child){text-align:right;font-family:var(--mono);font-weight:600}
.s-table td.highlight{color:var(--charcoal);font-weight:700}
.s-table td .tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:6px}
.tag-up{background:var(--green-bg);color:var(--green)}
.tag-down{background:var(--warn-bg);color:var(--warn)}
.tag-flat{background:var(--card);color:var(--gray-mid)}
.tag-note{background:var(--warn-bg);color:var(--warn)}
.tag-star{background:var(--pink-soft);color:var(--pink)}
.s-table tr.total-row td{border-top:2px solid var(--charcoal);font-weight:800;color:var(--charcoal)}
.s-table tr.star-row td{background:var(--pink-soft)}

.claims-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
@media(max-width:800px){.claims-grid{grid-template-columns:1fr}}
.claim-card{border-radius:10px;padding:18px 20px}
.claim-card.yes{background:var(--green-bg);border:1px solid rgba(21,128,61,0.15)}
.claim-card.no{background:var(--card);border:1px solid var(--rule)}
.claim-card .claim-header{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.claim-card.yes .claim-header{color:var(--green)}
.claim-card.no .claim-header{color:var(--gray-mid)}
.claim-card .claim-item{font-size:13px;color:var(--charcoal-soft);line-height:1.55;padding:4px 0}
.claim-card .claim-item strong{color:var(--charcoal);font-weight:700}

.cf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin:18px 0}
.cf-item{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:14px 16px}
.cf-item-label{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--pink);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.cf-item-title{font-size:13px;font-weight:800;color:var(--charcoal);margin-bottom:6px;line-height:1.35}
.cf-item-body{font-size:12px;color:var(--charcoal-soft);line-height:1.5}
.cf-item-body strong{color:var(--charcoal);font-weight:700}

.page-footer{border-top:1px solid var(--rule);padding:24px 0;margin-top:48px;text-align:center;font-size:11px;color:var(--gray-light)}
.page-footer strong{color:var(--gray-mid);font-weight:700}
.page-footer a{color:var(--gray-mid);text-decoration:none;border-bottom:1px solid var(--rule)}

@media(max-width:800px){
  .top-bar{padding:12px 18px}.page{padding:0 18px 48px}.hero h1{font-size:28px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── DID Weekly Ratios Chart: 13 pre + 4 post ── */
function DIDWeeklyChart({en}) {
  const W=620, H=260, PX=50, PY=28, PB=52, PR=24;
  const cW = W-PX-PR, cH = H-PY-PB;
  const preRatios = [1.855, 2.164, 2.242, 1.921, 2.291, 1.839, 1.932, 2.352, 2.250, 2.331, 2.602, 2.253, 2.310];
  const postRatios = [2.451, 2.705, 3.224, 3.276];
  const allRatios = [...preRatios, ...postRatios];
  const preMean = 2.180, postMean = 2.914;
  const maxY=3.5, minY=1.5;
  const x = i => PX + (i/(allRatios.length-1)) * cW;
  const y = v => PY + cH - ((v-minY)/(maxY-minY)) * cH;
  const prePath = preRatios.map((v,i) => `${i===0?"M":"L"}${x(i)},${y(v)}`).join(" ");
  const postPath = postRatios.map((v,i) => `${i===0?"M":"L"}${x(i+preRatios.length)},${y(v)}`).join(" ");
  const launchX = (x(12) + x(13)) / 2;
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--rule)",borderRadius:10,padding:"18px 14px",margin:"22px 0",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:620,display:"block",margin:"0 auto"}}>
        {[1.5,2.0,2.5,3.0,3.5].map(v=>(<g key={v}><line x1={PX} y1={y(v)} x2={W-PR} y2={y(v)} stroke="var(--rule)" strokeWidth="1"/><text x={PX-8} y={y(v)+4} textAnchor="end" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{v.toFixed(1)}x</text></g>))}
        <line x1={PX} y1={y(preMean)} x2={launchX} y2={y(preMean)} stroke="var(--blue)" strokeWidth="1.5" strokeDasharray="4,3"/>
        <text x={PX+6} y={y(preMean)-6} fill="var(--blue)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{en?"Pre mean 2.18":"Media pre 2.18"}</text>
        <line x1={launchX} y1={y(postMean)} x2={W-PR} y2={y(postMean)} stroke="var(--pink)" strokeWidth="1.5" strokeDasharray="4,3"/>
        <text x={W-PR-6} y={y(postMean)-6} textAnchor="end" fill="var(--pink)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{en?"Post mean 2.91":"Media post 2.91"}</text>
        <line x1={launchX} y1={PY} x2={launchX} y2={PY+cH} stroke="var(--charcoal)" strokeWidth="1.5"/>
        <text x={launchX} y={PY-8} textAnchor="middle" fill="var(--charcoal)" fontSize="10" fontWeight="800" fontFamily="var(--mono)">{en?"LAUNCH Apr 8":"LANZAMIENTO 8 Abr"}</text>
        <path d={prePath} fill="none" stroke="var(--blue)" strokeWidth="2" opacity="0.85"/>
        <path d={postPath} fill="none" stroke="var(--pink)" strokeWidth="2.5"/>
        {preRatios.map((v,i)=>(<circle key={`pre${i}`} cx={x(i)} cy={y(v)} r="3" fill="var(--blue)"/>))}
        {postRatios.map((v,i)=>(<circle key={`post${i}`} cx={x(i+preRatios.length)} cy={y(v)} r="4" fill="var(--pink)"/>))}
        {[0,4,8,12,16].map(i=>{const wk=i<13?`W${i+1}`:`W${i+1}`;return (<text key={i} x={x(i)} y={H-12} textAnchor="middle" fill="var(--gray-mid)" fontSize="10" fontFamily="var(--mono)">{wk}</text>)})}
        <text x={W/2} y={H-2} textAnchor="middle" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{en?"Weeks (Jan 5 – May 4, 2026)":"Semanas (5 Ene – 4 May 2026)"}</text>
      </svg>
      <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:8,fontSize:11,color:"var(--gray-mid)"}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:3,background:"var(--blue)",borderRadius:2,display:"inline-block"}}/> {en?"Pre (13 weeks)":"Pre (13 semanas)"}</span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:3,background:"var(--pink)",borderRadius:2,display:"inline-block"}}/> {en?"Post (4 weeks)":"Post (4 semanas)"}</span>
      </div>
    </div>
  );
}

/* ── CI Range Bar: -€0K to +€171K with CI [+€48K, +€171K] ── */
function CIRangeBar({en}) {
  const W=600, H=120, PX=30, PR=30;
  const cW = W - PX - PR;
  const min = -50, max = 200; // €K/year
  const ciLow = 48, ciHigh = 171;
  const x = v => PX + ((v-min)/(max-min)) * cW;
  const zeroX = x(0);
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--rule)",borderRadius:10,padding:"20px 16px",margin:"18px 0"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:600,display:"block",margin:"0 auto"}}>
        <line x1={PX} y1={60} x2={W-PR} y2={60} stroke="var(--rule)" strokeWidth="2"/>
        <rect x={x(ciLow)} y={50} width={x(ciHigh)-x(ciLow)} height={20} fill="var(--green-bg)" stroke="var(--green)" strokeWidth="1.5" rx="3"/>
        <line x1={zeroX} y1={36} x2={zeroX} y2={84} stroke="var(--charcoal)" strokeWidth="1.5" strokeDasharray="4,3"/>
        <text x={zeroX} y={28} textAnchor="middle" fill="var(--charcoal)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{en?"ZERO":"CERO"}</text>
        <text x={x(ciLow)} y={45} textAnchor="middle" fill="var(--green)" fontSize="11" fontWeight="800" fontFamily="var(--mono)">+€48K</text>
        <text x={x(ciHigh)} y={45} textAnchor="middle" fill="var(--green)" fontSize="11" fontWeight="800" fontFamily="var(--mono)">+€171K</text>
        <text x={(x(ciLow)+x(ciHigh))/2} y={97} textAnchor="middle" fill="var(--green)" fontSize="11" fontWeight="700" fontFamily="var(--mono)">{en?"95% CI · entirely positive":"IC 95% · todo positivo"}</text>
        {[-50,0,50,100,150,200].map(v=>(<text key={v} x={x(v)} y={H-2} textAnchor="middle" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{v>=0?`+€${v}K`:`-€${Math.abs(v)}K`}</text>))}
      </svg>
      <div style={{textAlign:"center",fontSize:12,color:"var(--gray-mid)",marginTop:8}}>{en?<><strong>Annualized revenue impact, Web channel only.</strong> Web is ~35% of treated volume, so this is a lower bound on total impact.</>:<><strong>Impacto de revenue anualizado, canal Web solamente.</strong> Web es ~35% del volumen tratado, así que este es un piso del impacto total.</>}</div>
    </div>
  );
}

/* ── Elasticity comparison: Web (Day 1, 2, 3) ── */
function ElasticityBar({en}) {
  const W=560, H=220, PX=70, PR=40, PY=30, PB=50;
  const cW = W-PX-PR, cH = H-PY-PB;
  const data = [
    {label:"Day 1", web:0.06, app:-2.68, color:"var(--gray-light)"},
    {label:"Day 2", web:-0.24, app:-2.01, color:"var(--warn)"},
    {label:"Day 3", web:-2.28, app:-2.61, color:"var(--pink)"},
  ];
  const minV=-3, maxV=0.5;
  const y = v => PY + cH - ((v-minV)/(maxV-minV)) * cH;
  const barW = (cW / 3) * 0.32;
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--rule)",borderRadius:10,padding:"18px 14px",margin:"18px 0",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:560,display:"block",margin:"0 auto"}}>
        {[-3,-2,-1,0].map(v=>(<g key={v}><line x1={PX} y1={y(v)} x2={W-PR} y2={y(v)} stroke="var(--rule)" strokeWidth="1"/><text x={PX-8} y={y(v)+4} textAnchor="end" fill="var(--gray-light)" fontSize="9" fontFamily="var(--mono)">{v}</text></g>))}
        <line x1={PX} y1={y(-1)} x2={W-PR} y2={y(-1)} stroke="var(--warn)" strokeWidth="1.5" strokeDasharray="4,3"/>
        <text x={W-PR-4} y={y(-1)-6} textAnchor="end" fill="var(--warn)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{en?"Elastic threshold ε=-1":"Umbral elástico ε=-1"}</text>
        {data.map((d,i)=>{
          const cx = PX + (cW/3)*(i+0.5);
          const webX = cx - barW - 4;
          const appX = cx + 4;
          const webY = d.web<0 ? y(d.web) : y(0);
          const webH = Math.abs(y(d.web) - y(0));
          const appY = y(d.app);
          const appH = y(0) - y(d.app);
          return (
            <g key={i}>
              <rect x={webX} y={webY} width={barW} height={webH} fill={d.web<-1?"var(--pink)":"var(--gray-light)"} rx="2"/>
              <text x={webX+barW/2} y={webY-6} textAnchor="middle" fill="var(--charcoal)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{d.web>=0?`+${d.web.toFixed(2)}`:d.web.toFixed(2)}</text>
              <rect x={appX} y={appY} width={barW} height={appH} fill="var(--blue)" rx="2"/>
              <text x={appX+barW/2} y={appY-6} textAnchor="middle" fill="var(--charcoal)" fontSize="10" fontWeight="700" fontFamily="var(--mono)">{d.app.toFixed(2)}</text>
              <text x={cx} y={H-22} textAnchor="middle" fill="var(--charcoal)" fontSize="12" fontWeight="700" fontFamily="var(--mono)">{d.label}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:6,fontSize:11,color:"var(--gray-mid)"}}>
