<style>

/* ──── Animations ──── */

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes slideRight { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
@keyframes highlightSweep { from { background-size: 0% 26%; } to { background-size: 100% 26%; } }
@keyframes drawBarH { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes drawLine { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(180,83,9,0); } 50% { box-shadow: 0 0 0 4px rgba(180,83,9,0.12); } }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out); }
.reveal.visible { opacity: 1; transform: translateY(0); }

.reveal-stagger.visible > *:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.05s; }
.reveal-stagger.visible > *:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
.reveal-stagger.visible > *:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.25s; }
.reveal-stagger.visible > *:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.35s; }
.reveal-stagger.visible > *:nth-child(5) { opacity: 1; transform: translateY(0); transition-delay: 0.45s; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ──── Custom hooks ──── */
function useScrollReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setVisible(true);
        obs.disconnect();
      }
    }, { threshold, rootMargin: '0px 0px -10% 0px' });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function useCountUp(target, duration = 1400, active = true, decimals = 0, prefix = '', suffix = '') {
  const [val, setVal] = useState(active ? 0 : target);
  useEffect(() => {
    if (!active) return;
    let raf;
    const start = performance.now();
    const tick = (now) => {
      const elapsed = now - start;
      const p = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(target * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
      else setVal(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration, active]);
  const formatted = decimals > 0 ? val.toFixed(decimals) : Math.round(val).toLocaleString();
  return `${prefix}${formatted}${suffix}`;
}

/* ──── Per-destination revenue chart with rollback line ──── */
function DivideChart({ en, active }) {
  const W = 720, H = 320, PX = 110, PY = 30, PB = 50, PR = 40;
  const cW = W - PX - PR, cH = H - PY - PB;
  const data = [
    { label: 'Italy', val: 9.31, decision: 'maintain' },
    { label: 'Spain', val: -0.07, decision: 'maintain' },
    { label: 'Brazil', val: -26.26, decision: 'rollback' },
    { label: 'Colombia', val: -29.05, decision: 'rollback' },
    { label: 'Mexico', val: -19.12, decision: 'control' },
  ];
  const maxAbs = 32;
  const zeroX = PX + cW * (maxAbs / (2 * maxAbs));
  const barH = 30;
  const gap = 16;
  const tx = zeroX + (-1.11 / maxAbs) * (cW / 2);

  return (
    <div style={{ background: 'var(--card)', border: '1px solid var(--rule)', borderRadius: 14, padding: '24px 18px 18px', margin: '28px 0' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', maxWidth: 720, display: 'block', margin: '0 auto' }}>
        {/* Background grid */}
        {[-30, -20, -10, 0, 10].map(v => {
          const x = zeroX + (v / maxAbs) * (cW / 2);
          return <line key={v} x1={x} y1={PY} x2={x} y2={H - PB} stroke="var(--rule-soft)" strokeWidth="1" strokeDasharray={v === 0 ? '0' : '3,3'} />;
        })}
        {[-30, -20, -10, 0, 10].map(v => {
          const x = zeroX + (v / maxAbs) * (cW / 2);
          return <text key={`l${v}`} x={x} y={H - PB + 20} textAnchor="middle" fill="var(--gray-light)" fontSize="10" fontFamily="var(--mono)" fontWeight="700">{v > 0 ? '+' : ''}{v}%</text>;
        })}

        {/* Zero baseline */}
        <line x1={zeroX} y1={PY - 8} x2={zeroX} y2={H - PB + 4} stroke="var(--charcoal)" strokeWidth="1.5" />

        {/* Rollback line (drawn) */}
        <line x1={tx} y1={PY - 8} x2={tx} y2={H - PB + 4} stroke="var(--red)" strokeWidth="1.5" strokeDasharray="5,4"
              style={{ strokeDashoffset: active ? 0 : 400, transition: 'stroke-dashoffset 1s var(--ease-out) 0.4s' }} />
        <text x={tx - 6} y={PY - 12} textAnchor="end" fill="var(--red)" fontSize="10" fontFamily="var(--mono)" fontWeight="800" letterSpacing="0.04em"
              style={{ opacity: active ? 1 : 0, transition: 'opacity 0.5s ease 1.2s' }}>
          {en ? 'ROLLBACK LINE (-1.1%)' : 'LÍNEA ROLLBACK (-1.1%)'}
        </text>

        {/* Bars */}
        {data.map((d, i) => {
          const yPos = PY + 12 + i * (barH + gap);
          const w = Math.abs(d.val / maxAbs) * (cW / 2);
          const xPos = d.val >= 0 ? zeroX : zeroX - w;
          const color = d.decision === 'maintain' ? 'var(--green)' : d.decision === 'rollback' ? 'var(--red)' : 'var(--gray-mid)';
          const transformOrigin = d.val >= 0 ? `${zeroX}px ${yPos + barH / 2}px` : `${zeroX}px ${yPos + barH / 2}px`;
          return (
            <g key={i}>
              <text x={PX - 12} y={yPos + barH / 2 + 5} textAnchor="end" fill="var(--charcoal)" fontSize="14" fontWeight="800">{d.label}</text>
              <rect x={xPos} y={yPos} width={w} height={barH} fill={color} rx="4"
                    style={{
                      transform: active ? 'scaleX(1)' : 'scaleX(0)',
                      transformOrigin,
                      transition: `transform 0.85s var(--ease-out) ${0.2 + i * 0.1}s`,
                    }} />
              <text x={d.val >= 0 ? xPos + w + 10 : xPos - 10} y={yPos + barH / 2 + 5}
                    textAnchor={d.val >= 0 ? 'start' : 'end'} fill={color} fontSize="13" fontWeight="800" fontFamily="var(--mono)"
                    style={{ opacity: active ? 1 : 0, transition: `opacity 0.5s ease ${0.6 + i * 0.1}s` }}>
                {d.val > 0 ? '+' : ''}{d.val.toFixed(1)}%
              </text>
            </g>
          );
        })}
      </svg>
      <div style={{ display: 'flex', justifyContent: 'center', gap: 28, marginTop: 14, fontSize: 12, color: 'var(--gray-mid)' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span style={{ width: 14, height: 14, background: 'var(--green)', borderRadius: 3 }} /> {en ? 'Maintain' : 'Mantener'}</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span style={{ width: 14, height: 14, background: 'var(--red)', borderRadius: 3 }} /> {en ? 'Rollback' : 'Rollback'}</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span style={{ width: 14, height: 14, background: 'var(--gray-mid)', borderRadius: 3 }} /> {en ? 'Control' : 'Control'}</span>
      </div>
    </div>
  );
}

/* ──── Reveal wrapper ──── */
function Reveal({ children, stagger = false, className = '' }) {
  const [ref, visible] = useScrollReveal();
  const cls = `${stagger ? 'reveal-stagger' : 'reveal'} ${visible ? 'visible' : ''} ${className}`;
  return <div ref={ref} className={cls}>{children}</div>;
}

function SectionWrap({ children }) {
  const [ref, visible] = useScrollReveal();
  return <div ref={ref} className={`section ${visible ? 'visible' : ''}`}>{children}</div>;
}

/* ──── Stat with count-up ──── */
function StatCard({ label, value, sub, variant, delay = 0, active, formatValue }) {
  return (
    <div className={`stat ${variant || ''}`} style={{ animation: active ? `scaleIn 0.6s var(--ease-out) ${delay}s both` : 'none' }}>
      <div className="stat-label">{label}</div>
      <div className={`stat-value ${variant === 'gain' ? 'gain' : variant === 'loss' ? 'loss' : ''}`}>{value}</div>
      <div className="stat-sub">{sub}</div>
    </div>
  );
}

/* ──── Hero stats with count-up animation ──── */
function HeroStats({ en, active }) {
  const ninety = useCountUp(90, 1400, active);
  const sevenSixtyTwo = useCountUp(762, 1600, active);
  return (
    <div className="stat-row">
      <StatCard variant="neutral" delay={0.65} active={active}
                label={en ? 'Decision' : 'Decisión'}
                value={en ? '2 + 2' : '2 + 2'}
                sub={en ? <><strong>2 maintain</strong> · <strong>2 rollback</strong> by destination</> : <><strong>2 mantener</strong> · <strong>2 rollback</strong> por destino</>} />
      <StatCard variant="guardrail" delay={0.75} active={active}
                label={en ? 'GM Guardrail' : 'Guardrail GM'}
                value={en ? 'Held' : 'OK'}
                sub={en ? <>No margin erosion <strong>across all four</strong></> : <>Sin erosión de margen <strong>en los cuatro</strong></>} />
      <StatCard variant="gain" delay={0.85} active={active}
                label={en ? 'Real annual gain' : 'Ganancia anual real'}
                value={`+€${ninety}K`}
                sub={en ? <>From keeping <strong>Spain + Italy</strong></> : <>De mantener <strong>España + Italia</strong></>} />
      <StatCard variant="loss" delay={0.95} active={active}
                label={en ? 'Annual loss prevented' : 'Pérdida anual evitada'}
                value={`€${sevenSixtyTwo}K`}
                sub={en ? <>Reverting <strong>Brazil + Colombia</strong> · not income</> : <>Revirtiendo <strong>Brasil + Colombia</strong> · no es ingreso</>} />
    </div>
  );
}
