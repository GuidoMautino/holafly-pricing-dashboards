  return <div style={{ marginBottom: 16 }}>
    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 6 }}>{label}</div>

    {/* ═══ CATEGORY: COUNTERFACTUAL ═══ */}
    {showL && <div id="sec-cf">

          "El 2 de marzo hicimos dos cambios en todos los destinos JPY (65+): correccion del tipo de cambio (159 a 175) y correccion PPD en planes cortos a €3,79. Este analisis proyecta cuanto hubiera facturado Japon en los 14 dias siguientes sin esos cambios, y lo compara con lo que realmente paso."
        )}

      <div style={{ padding: "8px 12px", background: t.bBg, borderRadius: 6, border: `1px solid ${t.bBdr}`, fontSize: 11, color: t.textDim, lineHeight: 1.5, marginBottom: 12 }}>

        <MC label={tx(lang, "ARPU vs CF", "ARPU vs CF")} value="€4,20" delta={tx(lang, "-6.7% vs projected (expected)", "-6,7% vs proyectado (esperado)")} sub={tx(lang, "Adobe CF excl PS. €4.51 → €4.20. p=0.014.", "Adobe CF excl PS. €4,51 → €4,20. p=0,014.")} c={t.yellow} bdr={t.yellow} t={t} />
        <MC label={tx(lang, "Revenue range", "Rango Revenue")} value={"+3,6% — +26,8%"} delta={tx(lang, "3 sensitivity scenarios", "3 escenarios sensibilidad")} sub={tx(lang, "BQ. MEDIUM confidence (no internal control).", "BQ. Confianza MEDIA (sin control interno).")} c={t.green} bdr={t.green} t={t} />

      <Tog l={tx(lang, "Narrative: what happened and why", "Narrativa: que paso y por que")} o={showSeg} s={setShowSeg} t={t} />

          <div style={{ fontSize: 13, fontWeight: 800, color: t.green, marginBottom: 6 }}>{tx(lang,
            "The change generated +€68,963 above the trend projection in 14 days (+26.8%)",

          <div style={{ fontSize: 12, color: t.text, lineHeight: 1.7 }}>
            {tx(lang,
              `In the 14 days after the change, Japan earned ${fm(CF.actual.total)}. The trend-based projection (principal) indicates it would have earned €${Math.round(CF.sensitivity.trend.projected).toLocaleString("de-DE")}. Orders grew ${pcR(CF.seg.total.p_opd, CF.seg.total.b_opd)} while Average Order Value dropped ${pcR(CF.seg.total.p_aov, CF.seg.total.b_aov)}, but volume more than compensated. Gross Margin improved +${CF.gmCf.delta} points and conversion improved ${CF.sigCf.cr_lift} at ${CF.sigCf.cr_conf} confidence.`,
              `En los 14 dias posteriores al cambio, Japon facturo ${fm(CF.actual.total)}. La proyeccion por tendencia (principal) indica que hubiera facturado €${Math.round(CF.sensitivity.trend.projected).toLocaleString("de-DE")}. Las ordenes crecieron ${pcR(CF.seg.total.p_opd, CF.seg.total.b_opd)} mientras el precio promedio bajo ${pcR(CF.seg.total.p_aov, CF.seg.total.b_aov)}, pero el volumen mas que compenso. El Margen Bruto mejoro +${CF.gmCf.delta} puntos y la conversion mejoro ${CF.sigCf.cr_lift} con ${CF.sigCf.cr_conf} de confianza.`

          <div style={{ fontSize: 11, color: t.textDim, marginTop: 6 }}>

              `Parte del crecimiento es estacional (marzo es temporada alta). El impacto se situa entre +${fm(CF.sensitivity.last4w.delta)} (ultimas 4 semanas) y +${fm(CF.sensitivity.flat.delta)} (plano 90d, referencia bruta). Por tendencia: +${fm(CF.sensitivity.trend.delta)} (+26,8%). Positivo en los tres escenarios.`

            <p style={{ margin: "0 0 6px" }}>{tx(lang,

              "Existen metodos estadisticos mas robustos para construir un contrafactual: Series Temporales Bayesianas (CausalImpact), Control Sintetico, y Diferencia en Diferencias con grupo de control formal. Evaluamos cada uno y elegimos el promedio 90 dias por razones especificas:"

            <p style={{ margin: "0 0 4px" }}><strong>{tx(lang, "CausalImpact / BSTS:", "CausalImpact / BSTS:")}</strong> {tx(lang,
              "Requires covariates (like traffic, sessions) joined at the order level. The GA4-Shopify join is not available yet (owner: Mati, ETA Q2 2026). Without it, the model would use only revenue time series, which offers marginal improvement over a simple average for a 14-day window.",
              "Requiere covariables (como trafico, sesiones) unidas a nivel de orden. El join GA4-Shopify aun no esta disponible (owner: Mati, ETA Q2 2026). Sin el, el modelo usaria solo la serie temporal de revenue, que ofrece mejora marginal sobre un promedio simple para una ventana de 14 dias."
            )}</p>
            <p style={{ margin: "0 0 4px" }}><strong>{tx(lang, "Synthetic Control:", "Control Sintetico:")}</strong> {tx(lang,

              "Construye una combinacion ponderada de otros mercados para replicar la tendencia pre de Japon. Singapore es el benchmark mas cercano pero tiene 6x menos volumen (pesos ruidosos). Un control sintetico confiable necesita 3-5 mercados donor con estacionalidad similar. El pool Asia-Pacifico es muy chico para pesos estables."
            )}</p>
            <p style={{ margin: "0 0 4px" }}><strong>{tx(lang, "Formal DID:", "DID formal:")}</strong> {tx(lang,
              "Requires an internal control group (destinations where nothing changed). In this experiment, all JPY destinations received at least the FX correction. There is no untreated group within JPY.",
              "Requiere grupo de control interno (destinos donde nada cambio). En este experimento, todos los destinos JPY recibieron al menos la correccion FX. No hay grupo no tratado dentro de JPY."
            )}</p>
            <p style={{ margin: "0 0 4px" }}><strong>{tx(lang, "What we chose:", "Lo que elegimos:")}</strong> {tx(lang,
              "Three scenarios that bound the uncertainty from different angles. The trend-based projection is the principal reference because it accounts for Japan's momentum heading into March. The flat 90-day average is a raw reference only (does not adjust for seasonality). The last 4 weeks captures the most recent context. The result is positive in all three.",
              "Tres escenarios que acotan la incertidumbre desde distintos angulos. La proyeccion por tendencia es la referencia principal porque tiene en cuenta el impulso de Japon hacia marzo. El promedio plano de 90 dias es solo una referencia bruta (no ajusta por estacionalidad). Las ultimas 4 semanas capturan el contexto mas reciente. El resultado es positivo en los tres."

        </div>

        {/* HOW: the 4 steps */}

          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 1:", "Paso 1:")}</strong> {tx(lang, "We took the 90 days before the change (Nov 26, 2025 to Mar 1, 2026). A period long enough to capture Japan's normal pace, including high and low weeks.", "Tomamos los 90 dias previos al cambio (26 Nov 2025 a 1 Mar 2026). Un periodo suficientemente largo para capturar el ritmo normal de Japon.")}</p>
          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 2:", "Paso 2:")}</strong> {tx(lang, `We calculated the average revenue per day, separated by short plans (1-3 days) and long plans (4+ days). Short: ${fm(CF.seg.short.b_rpd)}/day. Long: ${fm(CF.seg.long.b_rpd)}/day.`, `Calculamos el revenue promedio por dia, separado por planes cortos (1-3 dias) y largos (4+ dias). Cortos: ${fm(CF.seg.short.b_rpd)}/dia. Largos: ${fm(CF.seg.long.b_rpd)}/dia.`)}</p>

          <p style={{ margin: "0 0 8px" }}><strong>{tx(lang, "Step 4:", "Paso 4:")}</strong> {tx(lang, "We compared that projection with what actually happened in the 14 days after the change (Mar 3-16). The difference is the impact.", "Comparamos esa proyeccion con lo que realmente paso en los 14 dias posteriores al cambio (3-16 Mar). La diferencia es el impacto.")}</p>
        </div>

          {tx(lang, "The main projection assumes Japan would have earned at the 90-day average without the change. But Japan was accelerating into March. To evaluate how much that matters, we calculated three scenarios.", "La proyeccion principal asume que sin el cambio, Japon hubiera facturado al promedio de 90 dias. Pero Japon venia acelerando hacia marzo. Para evaluar cuanto importa eso, calculamos tres escenarios.")}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 10 }}>
            {[
              { m: "ARPU", proj: "€4,51", real: "€4,20", lift: "-6,7%", p: "0,014", c: t.yellow },
              { m: tx(lang, "Conv. Rate", "Tasa Conv."), proj: "18,8%", real: "19,5%", lift: "+3,8%", p: "0,024", c: t.green },
              { m: "AOV", proj: "€34,35", real: "€27,87", lift: "-18,9%", p: "<0,001", c: t.red },

              <div style={{ fontWeight: 700, color: t.text, marginBottom: 4 }}>{r.m}</div>
              <div style={{ color: t.textMuted }}>{tx(lang, "Projected", "Proyectado")}: {r.proj}</div>
              <div style={{ color: t.textMuted }}>{tx(lang, "Actual", "Real")}: {r.real}</div>
              <div style={{ fontWeight: 700, color: r.c, marginTop: 2 }}>{r.lift} (p={r.p})</div>

          </div>
          <div style={{ fontSize: 10, color: t.textMuted, marginTop: 8 }}>
            {tx(lang, "Source: Adobe Analytics, excluding Paid Social (99d training, LinearRegression + trend + DOW). Including Paid Social: ARPU -4.9% (p=0.042), CR +6.2% (p=0.001), AOV -19.1% (p<0.001).", "Fuente: Adobe Analytics, excluyendo Paid Social (99d entrenamiento, LinearRegression + tendencia + DOW). Incluyendo Paid Social: ARPU -4,9% (p=0,042), CR +6,2% (p=0,001), AOV -19,1% (p<0,001).")}
          </div>
        </div>

        {/* SUB-TOGGLE: SENSITIVITY */}
        <Tog l={tx(lang, "Sensitivity analysis: what if we adjust the projection?", "Analisis de sensibilidad: que pasa si ajustamos la proyeccion?")} o={showSens} s={setShowSens} t={t} />
        {showSens && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 14, background: t.bg }}>
          <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>
              {[tx(lang, "Scenario", "Escenario"), tx(lang, "Projection 14d", "Proyeccion 14d"), "Real 14d", tx(lang, "Difference", "Diferencia")].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: h === tx(lang, "Scenario", "Escenario") ? "left" : "right", color: t.textMuted, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}

              {[
                { name: tx(lang, "90d average (raw reference)", "Promedio 90d (referencia bruta)"), ...CF.sensitivity.flat, c: t.textDim, w: 500 },

      </div>}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }} className="g2">

                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "ORDERS/DAY (proj.)", "ORD/DIA (proy.)")}</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.textDim }}>{Math.round(sg.s.b_opd)}</div></div>
                <span style={{ color: t.textMuted }}>→</span>
                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "ORDERS/DAY (actual)", "ORD/DIA (real)")}</div><div style={{ fontSize: 16, fontWeight: 800, fontFamily: MN, color: t.green }}>{Math.round(sg.s.p_opd)}</div><div style={{ fontSize: 10, fontWeight: 700, color: t.green }}>{dO}</div></div>

                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "AVG PRICE (proj.)", "PRECIO PROM (proy.)")}</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: MN, color: t.textDim }}>{"€"}{sg.s.b_aov.toFixed(2).replace(".", ",")}</div></div>
                <span style={{ color: t.textMuted }}>→</span>
                <div><div style={{ fontSize: 9, color: t.textMuted, fontWeight: 600 }}>{tx(lang, "AVG PRICE (actual)", "PRECIO PROM (real)")}</div><div style={{ fontSize: 16, fontWeight: 800, fontFamily: MN, color: ad ? t.red : t.green }}>{"€"}{sg.s.p_aov.toFixed(2).replace(".", ",")}</div><div style={{ fontSize: 10, fontWeight: 700, color: ad ? t.red : t.green }}>{dA}</div></div>
              </div>
            </div>;

        </div>
      </div>}

      {/* TOGGLE: BREAK-EVEN */}
      <Tog l={tx(lang, "Break-Even: did volume compensate in each bucket?", "Break-Even: el volumen compenso en cada bucket?")} o={showBe} s={setShowBe} t={t} />
      {showBe && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        {/* Break-Even bar chart — threshold vs actual per bucket */}
        <div style={{ background: t.bg, borderRadius: 8, border: `1px solid ${t.border}`, padding: 10, marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1, marginBottom: 8 }}>{tx(lang, "BREAK-EVEN: THRESHOLD VS ACTUAL VOLUME CHANGE", "BREAK-EVEN: UMBRAL VS CAMBIO REAL DE VOLUMEN")}</div>
          <svg viewBox="0 0 700 190" style={{ width: "100%" }}>
            {CF.beAll.map((b, i) => {
              const maxAbsV = Math.max(...CF.beAll.map(x => Math.abs(x.volReal)));
              const barW = 80, gap = 16, startX = 55;
              const x = startX + i * (barW + gap);
              const mid = 140;
              const scaleH = v => Math.abs(v) / (maxAbsV * 1.1) * 60;
              const threshVal = b.type === "price_down" ? b.beReq : b.type === "price_up" ? b.maxLoss : 0;
              const threshH = scaleH(Math.abs(threshVal));
              const realH = scaleH(Math.abs(b.volReal));
              const realUp = b.volReal >= 0;
              const threshUp = threshVal >= 0;
              const vc = b.ok === true ? t.gFill : b.ok === false ? t.red : t.border;
              return <g key={i}>
                {threshVal !== 0 && <rect x={x} y={threshUp ? mid - threshH : mid} width={barW / 2 - 2} height={threshH} fill={t.border} rx={2} opacity={0.5} />}
                <rect x={x + barW / 2} y={realUp ? mid - realH : mid} width={barW / 2 - 2} height={realH} fill={vc} rx={2} opacity={0.7} />
                {threshVal !== 0 && <text x={x + barW / 4 - 1} y={threshUp ? mid - threshH - 3 : mid + threshH + 8} fill={t.textMuted} fontSize={6} textAnchor="middle" fontFamily={MN}>{threshVal > 0 ? "+" : ""}{threshVal}%</text>}
                <text x={x + barW * 3 / 4 - 1} y={realUp ? mid - realH - 3 : mid + realH + 8} fill={b.ok === true ? t.green : b.ok === false ? t.red : t.textDim} fontSize={6.5} textAnchor="middle" fontFamily={MN} fontWeight={700}>{b.volReal > 0 ? "+" : ""}{b.volReal.toFixed(0)}%</text>
                <text x={x + barW / 2} y={178} fill={t.textDim} fontSize={6} textAnchor="middle" fontFamily={MN}>{b.n}</text>
              </g>;
            })}
            <line x1={50} x2={690} y1={140} y2={140} stroke={t.border} strokeWidth={0.5} />
            <text x={46} y={143} fill={t.textMuted} fontSize={6} textAnchor="end" fontFamily={MN}>0%</text>
          </svg>
          <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 4, fontSize: 9 }}>
            <span><span style={{ display: "inline-block", width: 10, height: 6, background: t.border, borderRadius: 2, marginRight: 4, opacity: 0.5 }} />{tx(lang, "Threshold", "Umbral")}</span>
            <span><span style={{ display: "inline-block", width: 10, height: 6, background: t.gFill, borderRadius: 2, marginRight: 4, opacity: 0.7 }} />{tx(lang, "Actual (passed)", "Real (paso)")}</span>
            <span><span style={{ display: "inline-block", width: 10, height: 6, background: t.red, borderRadius: 2, marginRight: 4, opacity: 0.7 }} />{tx(lang, "Actual (failed)", "Real (no paso)")}</span>
          </div>
        </div>
        <p style={{ fontSize: 11, color: t.textDim, margin: "0 0 4px", lineHeight: 1.6 }}><strong style={{ color: t.text }}>{tx(lang, "How to read this table:", "Como leer esta tabla:")}</strong></p>
        <p style={{ fontSize: 11, color: t.textDim, margin: "0 0 4px", lineHeight: 1.6 }}>{tx(lang,
          "Price column = how much the average price changed in that bucket.",
          "Columna Precio = cuanto cambio el precio promedio en ese bucket."
        )}</p>
        <p style={{ fontSize: 11, color: t.textDim, margin: "0 0 4px", lineHeight: 1.6 }}>{tx(lang,
          "Threshold column = the break-even point. If price went DOWN, \"Need +X%\" means orders must grow at least X% to compensate. If price went UP, \"Can lose up to -X%\" means orders can drop up to X% and the bucket still generates more revenue than before.",
          "Columna Umbral = el punto de equilibrio. Si el precio BAJO, \"Necesita +X%\" significa que las ordenes deben crecer al menos X% para compensar. Si el precio SUBIO, \"Puede perder hasta -X%\" significa que las ordenes pueden caer hasta X% y el bucket sigue generando mas revenue que antes."
        )}</p>
        <p style={{ fontSize: 11, color: t.textDim, margin: "0 0 12px", lineHeight: 1.6 }}>{tx(lang,
          "Verdict = did the actual volume change pass the threshold? ✓ = yes, ✗ = no.",
          "Veredicto = el cambio real de volumen supero el umbral? ✓ = si, ✗ = no."
        )}</p>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>
              {["Bucket", tx(lang, "Price", "Precio"), tx(lang, "Threshold", "Umbral"), tx(lang, "Actual volume", "Volumen real"), tx(lang, "Verdict", "Veredicto")].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: h === "Bucket" ? "left" : "right", color: t.textMuted, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}
            </tr></thead>
            <tbody>{CF.beAll.map((b, i) => {
              const bg2 = b.ok === true ? t.gBg : b.ok === false ? t.rBg + "60" : "transparent";
              const vc = b.ok === true ? t.green : b.ok === false ? t.red : t.textDim;
              let umbral, verdict;
              if (b.type === "price_down") { umbral = tx(lang, "Need: +", "Necesita: +") + b.beReq + "%"; verdict = "✓ " + tx(lang, "Exceeded", "Superado"); }

                <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 700, color: vc, fontSize: 10 }}>{verdict}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>

        {/* Expandable: orders and revenue per bucket */}
        <Tog l={tx(lang, "Orders & Revenue per bucket (pre vs post)", "Ordenes y Revenue por bucket (pre vs post)")} o={showBeTables} s={setShowBeTables} t={t} />
        {showBeTables && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 12, background: t.bg }}>

            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>

              </tr></thead>
              <tbody>{CF.beAll.filter(b => b.opd_pre).map((b, i) => {
                const ordD = ((b.opd_post / b.opd_pre - 1) * 100);
                const revD = ((b.rpd_post / b.rpd_pre - 1) * 100);
                return <tr key={i} style={{ borderBottom: `1px solid ${t.border}30` }}>
                  <td style={{ padding: "4px 6px", fontWeight: 600 }}>{b.n}</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN }}>{b.opd_pre.toFixed(1)}</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN }}>{b.opd_post.toFixed(1)}</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN, fontWeight: 700, color: ordD >= 0 ? t.green : t.red }}>{ordD >= 0 ? "+" : ""}{ordD.toFixed(0)}%</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN }}>€{b.rpd_pre.toLocaleString()}</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN }}>€{b.rpd_post.toLocaleString()}</td>
                  <td style={{ padding: "4px 6px", textAlign: "right", fontFamily: MN, fontWeight: 700, color: revD >= 0 ? t.green : t.red }}>{revD >= 0 ? "+" : ""}{revD.toFixed(0)}%</td>
                </tr>;
              })}</tbody>
            </table>
          </div>
          {isP ? null : <div style={{ fontSize: 10, color: t.textMuted, marginTop: 8 }}>
            {tx(lang, "Full decomposition by treatment subgroup (PPD vs FX-only) available in the Pricing view under Decomposed View.", "Descomposicion completa por subgrupo de tratamiento (PPD vs solo-FX) disponible en la vista Pricing en Vista Descompuesta.")}
          </div>}
        </div>}

        <Note bg={t.gBg} bdr={t.gBdr} ac={t.green} strong={tx(lang, "5 of 7 buckets passed.", "5 de 7 buckets pasaron.")} t={t}>
          {tx(lang,
            "Short plans responded strongly to the price drop. 4-7d and 8-14d grew even with higher prices. Only 15-30d and 31-90d lost more volume than the price increase justified.",
            "Planes cortos respondieron fuerte a la baja de precio. 4-7d y 8-14d crecieron incluso con precio mas alto. Solo 15-30d y 31-90d perdieron mas volumen del que la suba de precio justificaba."
          )}
        </Note>
        <Note bg={t.rBg} bdr={t.red + "30"} ac={t.red} strong="15-30d / 31-90d:" t={t}>
          {tx(lang,
            "Volume dropped -18% and -39% when the maximum tolerable loss was -8% and -12% respectively. The assumption that long-plan demand is inelastic needs revision. For Exp-007: explicit volume guardrail from Day 1, or consider an intermediate exchange rate for long plans.",
            "El volumen cayo -18% y -39% cuando la caida maxima tolerable era -8% y -12% respectivamente. El supuesto de que la demanda de planes largos es inelastica necesita revision. Para Exp-007: guardrail de volumen explicito desde el Dia 1, o considerar un tipo de cambio intermedio para planes largos."
          )}
        </Note>
      </div>}

      {/* TOGGLE: CONTEXT */}
      {!isP && <div style={{ padding: "8px 14px", borderRadius: 8, background: t.card, border: "1px dashed " + t.border, marginBottom: 8, fontSize: 11, color: t.textMuted }}>
        {tx(lang, "Markets, confounders, statistical confidence, and raw data available in the Pricing view under Context & Methodology.", "Mercados, confounders, confianza estadistica y datos crudos disponibles en la vista Pricing en Contexto y Metodologia.")}
      </div>}
      {isP && <Tog l={tx(lang, "Context: markets, confounders and statistical confidence", "Contexto: mercados, confounders y confianza estadistica")} o={showCtx} s={setShowCtx} t={t} />}
      {showCtx && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        <Bar3 /><h4 style={{ fontSize: 13, fontWeight: 700, margin: "0 0 4px" }}>{tx(lang, "Markets without price change", "Mercados sin cambio de precio")}</h4>
        <p style={{ fontSize: 10, color: t.textDim, margin: "0 0 8px" }}>{tx(lang, "Currencies where price did not change >5%. Excludes JPY, MXN (experiments) and TRY (outlier). Same 90-day base.", "Monedas donde el precio no cambio >5%. Excluye JPY, MXN (experimentos) y TRY (outlier). Misma base 90 dias.")}</p>
        {/* MARKET PANEL */}
        <div style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 8, padding: 10 }}>
          {CF.panel.map(d => {
            const mx = Math.max(...CF.panel.map(x => Math.abs(x.d)));
            const isS = d.c === "SGD", isPos = d.d >= 0, bw = (Math.abs(d.d) / mx) * 40;
            let bc = isPos ? t.gFill : t.border, tc = t.textDim, bg2 = "transparent", fw = 500;

            return <div key={d.c} style={{ display: "grid", gridTemplateColumns: "44px 1fr 60px", alignItems: "center", padding: "2px 8px", borderRadius: 4, background: bg2 }}>
              <span style={{ fontSize: 10, fontWeight: fw, color: tc, fontFamily: MN }}>{d.c}</span>
              <div style={{ position: "relative", height: 10 }}>
                <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: t.border }} />
                <div style={{ position: "absolute", top: 1, height: 8, borderRadius: 2, background: bc, opacity: isS ? 1 : .4, ...(isPos ? { left: "50%", width: `${bw}%` } : { right: "50%", width: `${bw}%` }) }} />
              </div>
              <span style={{ textAlign: "right", fontSize: 10, fontWeight: fw, color: tc, fontFamily: MN }}>{pc(d.d)}</span>
            </div>;
          })}
          <div style={{ marginTop: 6, padding: "6px 8px", background: t.yBg, borderRadius: 4, fontSize: 10, color: t.text, lineHeight: 1.4 }}>
            {tx(lang,
              "Several markets grew vs their 90d (Brazil +32%, Canada +34%). March is peak season. Japan's growth is not exclusively a price effect.",
              "Varios mercados crecieron vs sus 90d (Brasil +32%, Canada +34%). Marzo es temporada alta. El crecimiento de Japon no es exclusivamente efecto del precio."
            )}
          </div>
        </div>

        {/* CONFOUNDERS */}
        <div style={{ marginTop: 20 }}><Bar3 c={t.accent} /><h4 style={{ fontSize: 13, fontWeight: 700, margin: "0 0 8px" }}>Confounders</h4></div>
        {CF.conf.map((c, i) => {
          const scC = c.s === "descartado" ? t.green : c.s === "contextualizado" ? t.yellow : t.textMuted;
          return <div key={i} style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 8, padding: "8px 12px", borderLeft: `3px solid ${scC}`, marginBottom: 6 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}><span style={{ fontSize: 12, fontWeight: 700 }}>{c.n}</span><Pill color={scC}>{c.s.toUpperCase()}</Pill></div>
            <div style={{ fontSize: 10, color: t.textDim, lineHeight: 1.5 }}>{c.e}</div>
          </div>;
        })}

        {/* SUB-TOGGLE: STATISTICAL CONFIDENCE */}
        <Tog l={tx(lang, "Statistical confidence", "Confianza estadistica")} o={showCtxStats} s={setShowCtxStats} t={t} />
        {showCtxStats && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 12, background: t.bg }}>
          <div style={{ fontSize: 11, color: t.textDim, lineHeight: 1.8 }}>
            <strong style={{ color: t.text }}>{tx(lang, "Conversion Rate:", "Tasa de Conversion:")}</strong> {CF.sigCf.cr_lift}, z={CF.sigCf.cr_z}, p={CF.sigCf.cr_p}. {tx(lang, "Significant at", "Significativo al")} {CF.sigCf.cr_conf}.<br />
            <strong style={{ color: t.text }}>{tx(lang, "Average Revenue Per User:", "Revenue Promedio por Usuario:")}</strong> {CF.sigCf.arpu_lift} {tx(lang, "vs counterfactual projection (p=" + CF.sigCf.arpu_p + "). Expected decline: price-per-day correction lowered short-plan prices by design.", "vs proyeccion contrafactual (p=" + CF.sigCf.arpu_p + "). Caida esperada: la correccion de precio por dia bajo precios de planes cortos por diseno.")}<br />
            <strong style={{ color: t.text }}>Mix shift:</strong> Chi-cuadrado={CF.sigCf.chi}, V de Cramér={CF.sigCf.cramers} ({tx(lang, "small to moderate effect", "efecto pequeno a moderado")}).
          </div>
        </div>}

        {/* SUB-TOGGLE: WEEKLY TREND */}
        <Tog l={tx(lang, "Weekly trend (28 weeks of context)", "Tendencia semanal (28 semanas de contexto)")} o={showCtxTrend} s={setShowCtxTrend} t={t} />
        {showCtxTrend && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 12, background: t.bg }}>
          <p style={{ fontSize: 10, color: t.textDim, margin: "0 0 8px" }}>{tx(lang,
            "How Japan was performing before the change. The last weeks show the seasonal acceleration into March.",

          )}</p>
          <WkChart data={CF.wk} t={t} />
        </div>}
      </div>}

      {/* TOGGLE: RAW DATA */}
      {isP && <Tog l={tx(lang, "Source data, calculations and technical sheet", "Datos de origen, calculos y ficha tecnica")} o={showRaw} s={setShowRaw} t={t} />}
      {showRaw && <div style={{ border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, background: t.card }}>
        <div style={{ fontFamily: MN, fontSize: 11, color: t.textDim, lineHeight: 2, padding: "10px 14px", background: t.bg, borderRadius: 8, border: `1px solid ${t.border}` }}>
          <div style={{ fontWeight: 700, color: t.text }}>{tx(lang, "Short (1-3 days)", "Cortos (1-3 dias)")}</div>
          <div>Revenue/{tx(lang, "day", "dia")} ({tx(lang, "90d average", "promedio 90d")}) = {fm(CF.seg.short.b_rpd)}</div>
          <div>{tx(lang, "Projection", "Proyeccion")} 14d = {fm(CF.seg.short.b_rpd)} x 14 = <strong style={{ color: t.text }}>{fm(CF.cf.short)}</strong></div>

          <div style={{ fontWeight: 700, color: t.text, marginTop: 6 }}>{tx(lang, "Long (4+ days)", "Largos (4+ dias)")}</div>
          <div>Revenue/{tx(lang, "day", "dia")} ({tx(lang, "90d average", "promedio 90d")}) = {fm(CF.seg.long.b_rpd)}</div>
          <div>{tx(lang, "Projection", "Proyeccion")} 14d = {fm(CF.seg.long.b_rpd)} x 14 = <strong style={{ color: t.text }}>{fm(CF.cf.long)}</strong></div>
          <div>Real 14d = <strong style={{ color: t.green }}>{fm(CF.actual.long)}</strong> | Dif: <strong style={{ color: t.green }}>+{fm(CF.delta.long)} ({pc(CF.delta.longPct)})</strong></div>
          <div style={{ fontWeight: 700, color: t.text, marginTop: 6 }}>Total: {fm(CF.cf.total)} {tx(lang, "proj", "proy")}. | {fm(CF.actual.total)} real | <span style={{ color: t.green }}>+{fm(CF.delta.total)} ({pc(CF.delta.totalPct)})</span></div>

    {/* ═══ CATEGORY: ARPU ANALYSIS ═══ */}

          {/* Launch marker */}
          <line x1={440} y1={10} x2={440} y2={125} stroke={t.accent} strokeWidth={1} strokeDasharray="4,3" />
          <text x={440} y={8} fill={t.accent} fontSize={6} fontFamily={MN} textAnchor="middle">LAUNCH</text>

          <text x={60} y={135} fill={t.textMuted} fontSize={7} fontFamily={MN} textAnchor="middle">{tx(lang, "99d baseline", "Baseline 99d")}</text>

        <div style={{ fontSize: 10, color: t.textMuted, marginTop: 6, textAlign: "center" }}>{tx(lang, "The decline is the price of acquiring more customers on cheaper plans. Expected by design.", "La caida es el precio de adquirir mas clientes en planes mas baratos. Esperado por diseno.")}</div>
      </div>
      <div style={{ padding: "10px 14px", borderRadius: 8, background: t.card, border: "1px solid " + t.border, marginBottom: 10, fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>

          "The price-per-day correction lowered prices on 1-3 day plans across 65 destinations. This was by design: the goal was to recover margin (+6.62pp) and increase short-plan volume (+65.5%), both achieved. The trade-off is a lower revenue per user because the same visitors now buy cheaper short plans. The model (99 days training) detected Japan's ARPU was stable around €4.50-4.55. The intervention dropped it to €4.20.",

        )}
      </div>
      <div style={{ padding: "10px 14px", borderRadius: 8, background: t.green + "06", border: "1px solid " + t.green + "15", fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>

        {tx(lang,

          "El mismo modelo muestra que la Tasa de Conversion mejoro +3,8% versus la proyeccion (p=0,024). Mas usuarios estan comprando, pero a un valor promedio menor. El revenue total igual crecio porque el aumento de volumen mas que compenso la baja de precio (proyeccion tendencia BQ: +€68.963 incrementales en 14 dias, +26,8%)."

          <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, letterSpacing: 1 }}>{tx(lang, "BLENDED vs EXCLUDING PAID SOCIAL", "BLENDED vs EXCLUYENDO PAID SOCIAL")}</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
          <div style={{ padding: "10px 14px", borderRight: "1px solid " + t.border }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: t.textDim, marginBottom: 6 }}>{tx(lang, "INCLUDING PAID SOCIAL", "INCLUYENDO PAID SOCIAL")}</div>
            <div style={{ fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>
              {tx(lang, "Projected: €4.13 | Actual: €3.93", "Proyectado: €4,13 | Real: €3,93")}

              {tx(lang, "Projected: €4.50 | Actual: €4.20", "Proyectado: €4,50 | Real: €4,20")}
              <br /><strong style={{ color: t.yellow }}>-6,7%</strong> <span style={{ fontSize: 10, color: t.textMuted }}>(p=0,012)</span>
            </div>
          </div>
        </div>
        <div style={{ padding: "8px 14px", background: t.card, borderTop: "1px solid " + t.border, fontSize: 10, color: t.textDim }}>
          {tx(lang,
            "Excluding Paid Social is the cleaner metric because Paid Social traffic was more active pre-launch (10.4%) than post (8.3%), which introduces noise. Both views confirm the same direction.",
            "Excluyendo Paid Social es la metrica mas limpia porque el trafico de Paid Social estaba mas activo pre-lanzamiento (10,4%) que post (8,3%), lo que introduce ruido. Ambas vistas confirman la misma direccion."

      {/* Methodology — how this was calculated (Pricing only expands, Leadership sees summary) */}
      {isP && <div style={{ marginTop: 12, padding: "12px 14px", borderRadius: 8, background: t.accent + "05", border: "1px solid " + t.accent + "15", fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>
        <div style={{ fontWeight: 700, color: t.accent, marginBottom: 6 }}>{tx(lang, "How this was calculated", "Como se calculo")}</div>
        <p style={{ margin: "0 0 6px" }}><strong>1.</strong> {tx(lang, "Extracted daily ARPU, Conversion Rate, AOV, and Unique Visitors from Adobe Analytics for 99 days pre (Nov 26 - Mar 1) and 14 days post (Mar 3-16). Filters: Page contains ecom/esim-, Environment = web, Currency = JPY.", "Extrajimos ARPU, Tasa de Conversion, AOV y Visitantes Unicos diarios de Adobe Analytics para 99 dias pre (26 Nov - 1 Mar) y 14 dias post (3-16 Mar). Filtros: Page contains ecom/esim-, Environment = web, Currency = JPY.")}</p>
        <p style={{ margin: "0 0 6px" }}><strong>2.</strong> {tx(lang, "Trained a LinearRegression model on the pre-period with two features: day number (captures trend) and day-of-week dummies (captures weekly seasonality, Sunday as reference).", "Entrenamos un modelo LinearRegression en el periodo pre con dos features: numero de dia (captura tendencia) y dummies de dia de la semana (captura estacionalidad semanal, Domingo como referencia).")}</p>
        <p style={{ margin: "0 0 6px" }}><strong>3.</strong> {tx(lang, "Used the trained model to predict what ARPU, CR, and AOV should have been for each of the 14 post days. This is the counterfactual: the expected value without our intervention.", "Usamos el modelo entrenado para predecir lo que ARPU, CR y AOV deberian haber sido para cada uno de los 14 dias post. Este es el contrafactual: el valor esperado sin nuestra intervencion.")}</p>
        <p style={{ margin: "0 0 6px" }}><strong>4.</strong> {tx(lang, "Compared actual vs predicted daily values. Ran a one-sample t-test on the residuals (actual minus predicted) to determine if the difference is statistically significant.", "Comparamos valores diarios reales vs predichos. Corrimos un t-test de una muestra sobre los residuos (real menos predicho) para determinar si la diferencia es estadisticamente significativa.")}</p>
        <p style={{ margin: 0, color: t.textMuted, fontSize: 10 }}>{tx(lang, "This is the same methodology Holafly's Product team uses for PDP experiments. See reference: ", "Esta es la misma metodologia que el equipo de Producto de Holafly usa para experimentos PDP. Ver referencia: ")}
          <a href="https://www.notion.so/holafly/Counterfactual-analysis-2f0eea72a1888025a042e00415d29c5b" target="_blank" rel="noopener noreferrer" style={{ color: t.accent, textDecoration: "none" }}>Notion ↗</a>
        </p>
      </div>}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }} className="g4">

          { label: tx(lang, "CR vs CF", "CR vs CF"), val: "+3,8%", delta: tx(lang, "vs projected (p=0.024)", "vs proyectado (p=0,024)"), c: t.green, sub: tx(lang, "Adobe CF excl PS. 18.8% → 19.5%", "Adobe CF excl PS. 18,8% → 19,5%") },
          { label: tx(lang, "ARPU vs CF", "ARPU vs CF"), val: "€4,20", delta: tx(lang, "-6.7% vs projected (expected)", "-6,7% vs proyectado (esperado)"), c: t.yellow, sub: tx(lang, "Adobe CF excl PS. €4.50 → €4.20. p=0.014", "Adobe CF excl PS. €4,50 → €4,20. p=0,014") },
          { label: tx(lang, "Revenue range", "Rango Revenue"), val: "+3,6% to +26,8%", delta: tx(lang, "vs 3 CF scenarios", "vs 3 escenarios CF"), c: t.green, sub: tx(lang, "BQ sensitivity. MEDIUM confidence", "Sensibilidad BQ. Confianza MEDIA") },
        ] : [
          { label: tx(lang, "Average Revenue Per User", "Revenue Promedio por Usuario"), val: "€" + arpuVal.toFixed(2), delta: arpuDelta, c: arpuDelta.startsWith("-") ? t.yellow : t.green, sub: tx(lang, "vs " + ref + " baseline", "vs baseline " + ref) },

          { label: tx(lang, "Gross Margin", "Margen Bruto"), val: gmVal.toFixed(2) + "%", delta: gmDelta, c: t.green, sub: "Looker Foundational" },

        ]).map((s, i) => <div key={i} className="cc" style={{
          background: `linear-gradient(135deg, ${s.c}06, ${t.card})`,

          <div style={{ fontSize: 12, fontWeight: 700, color: s.c, marginTop: 2 }}>{s.delta}</div>
          <div style={{ fontSize: 10, color: t.textMuted, marginTop: 4 }}>{s.sub}</div>
        </div>)}
      </div>

      {/* ════ GAUGES (ARPU, CR, GM) — CF uses projected as baseline ════ */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }} className="g2">
        {[
          { label: "ARPU", baseline: isCF ? 4.505 : ref === "14d" ? D.baselines.arpu_14d : D.baselines.arpu_f, current: D.accum.arpu_f, floor: D.baselines.arpuFloor, unit: "" },
          { label: tx(lang, "Conversion Rate", "Tasa de Conversion"), baseline: isCF ? 0.188 : ref === "14d" ? D.baselines.cr_14d : D.baselines.cr_f, current: isCF ? 0.195 : D.accum.cr_f, unit: "%" },

          const rng = Math.max(Math.abs(g.baseline - (g.floor || g.baseline * 0.7)), Math.abs(d), 0.01) * 2.5;
          const pos = Math.max(5, Math.min(95, 50 + (d / rng) * 45));

              {g.floor !== undefined && <div style={{ position: "absolute", left: Math.max(5, Math.min(95, 50 + ((g.floor - g.baseline) / rng) * 45)) + "%", top: -1, width: 3, height: 12, background: t.red + "60", borderRadius: 1 }} />}

      <Xp title={tx(lang, "Gross Margin Timeline (day by day)", "Timeline de Margen Bruto (dia a dia)")} desc={tx(lang, "Official source: Looker Foundational, origin JPY. Target: sustained above 80%.", "Fuente oficial: Looker Foundational, origin JPY. Objetivo: sostenido por encima de 80%.")} t={t}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>
              {[tx(lang, "Period", "Periodo"), tx(lang, "Gross Margin", "Margen Bruto"), tx(lang, "Note", "Nota")].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: h === tx(lang, "Period", "Periodo") ? "left" : h === tx(lang, "Note", "Nota") ? "left" : "right", color: t.textMuted, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}
            </tr></thead>
            <tbody>{D.gm.timeline.map((row, i) => {
              const v = parseFloat(row.v);
              const isAccum = row.d.startsWith("Acum");
              const gc = v >= 82 ? t.green : v >= 80 ? t.yellow : t.textDim;
              return <tr key={i} style={{ borderBottom: `1px solid ${t.border}40`, background: isAccum ? t.gBg : "transparent", fontWeight: isAccum ? 600 : 400 }}>
                <td style={{ padding: "6px 8px", fontSize: isAccum ? 12 : 11, color: isAccum ? t.text : t.textDim }}>{row.d}</td>
                <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN, fontWeight: isAccum ? 700 : 500, color: gc }}>{row.v}%</td>

          </table>
        </div>
        <div style={{ marginTop: 8, fontSize: 11, color: t.textDim, lineHeight: 1.5 }}>
          {tx(lang,
            "Gross Margin stabilized above 80% from Day 4 onward. The D+12-D+15 spike (87.31%) may reflect mix composition in that period. The accumulated figure (82.02%) is the official result. Source: Looker Foundational, origin JPY.",
            "El Margen Bruto se estabilizo por encima de 80% desde el Dia 4. El spike D+12-D+15 (87,31%) puede reflejar composicion del mix en ese periodo. La cifra acumulada (82,02%) es el resultado oficial. Fuente: Looker Foundational, origin JPY."
          )}
        </div>
      </Xp>

      {/* ANOMALIES & GAPS */}
      <Xp title={tx(lang, "Anomalies & Status", "Anomalias y Status")} desc={tx(lang, "Known anomalies with explanation and follow-up status.", "Anomalias conocidas con explicacion y status de seguimiento.")} t={t}>
        {[
          { bucket: tx(lang, "3-day Average Order Value anomaly (South Korea + Taiwan)", "Anomalia Valor Promedio de Orden 3 dias (South Korea + Taiwan)"),
            en: "Average Order Value +6.3% vs 90d when designed to decrease slightly. South Korea and Taiwan are 56.7% of the bucket and were not corrected in Exp-005. Their higher-than-average value pulls the bucket up. Without them, bucket is +1.7% (flat).",
            es: "Valor Promedio de Orden +6,3% vs 90d cuando se esperaba baja leve. South Korea y Taiwan son el 56,7% del bucket y no fueron corregidos en Exp-005. Sin ellos: +1,7% (plano).",
            status: "explained", confidence: "confirmed" },
          { bucket: tx(lang, "Long plan volume contraction (15-30d, 31-90d)", "Contraccion volumen planes largos (15-30d, 31-90d)"),
            en: "15-30d orders -42.5% vs 14d pre, 31-90d -26.4%. Singapore grew in those same buckets. Suggests non-zero elasticity in long plans, contradicting the assumption of full inelasticity in H2.",
            es: "Ordenes 15-30d -42,5% vs 14d pre, 31-90d -26,4%. Singapore crecio en esos mismos buckets. Sugiere elasticidad no cero en planes largos, contradiciendo la asuncion de inelasticidad total de H2.",
            status: "documented", confidence: "hypothesis" },
        ].map((a, i) => <div key={i} style={{ padding: "8px 12px", borderRadius: 6, background: a.status === "explained" ? t.green + "06" : t.yellow + "06", border: "1px solid " + (a.status === "explained" ? t.green : t.yellow) + "15", marginBottom: 6, borderLeft: "3px solid " + (a.status === "explained" ? t.green : t.yellow) }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{a.bucket}</span>
            <Pill color={a.status === "explained" ? t.green : t.yellow}>{a.status.toUpperCase()}</Pill>
          </div>
          <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.5 }}>{tx(lang, a.en, a.es)}</div>
        </div>)}
      </Xp>

      {/* REVENUE BY SEGMENT (view-dependent — CF uses counterfactual segments) */}
      <Xp title={tx(lang, "Revenue by Segment (" + (isCF ? "vs Counterfactual" : "vs " + view) + ")", "Revenue por Segmento (" + (isCF ? "vs Contrafactual" : "vs " + view) + ")")} desc={tx(lang, "Daily revenue by plan duration group. Short = 1-3 days (PPD correction). Long = 4+ days (FX correction).", "Revenue diario por grupo de duracion. Cortos = 1-3 dias (correccion PPD). Largos = 4+ dias (correccion FX).")} t={t}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ borderBottom: `2px solid ${t.border}` }}>
              {[tx(lang, "Segment", "Segmento"), isCF ? tx(lang, "Projected (CF)", "Proyectado (CF)") : tx(lang, "Base " + view, "Base " + view), tx(lang, "Actual", "Real"), "Δ"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: h === tx(lang, "Segment", "Segmento") ? "left" : "right", color: t.textMuted, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}
            </tr></thead>
            <tbody>{(isCF ? [
              { n: tx(lang, "Short plans (1-3d)", "Planes cortos (1-3d)"), base: Math.round(CF.cf.short / 14), post: Math.round(CF.actual.short / 14), d: "+" + CF.delta.shortPct.toFixed(1) + "%" },
              { n: tx(lang, "Long plans (4+d)", "Planes largos (4+d)"), base: Math.round(CF.cf.long / 14), post: Math.round(CF.actual.long / 14), d: "+" + CF.delta.longPct.toFixed(1) + "%" },
              { n: "Total", base: Math.round(CF.cf.total / 14), post: Math.round(CF.actual.total / 14), d: "+" + CF.delta.totalPct.toFixed(1) + "%", bold: true },
            ] : [
              { n: tx(lang, "Short plans (1-3d)", "Planes cortos (1-3d)"), base: view === "14d" ? D.rev.short.b14 : D.rev.short.b90, post: D.rev.short.post, d: view === "14d" ? D.rev.short.d14 : D.rev.short.d90 },
              { n: tx(lang, "Long plans (4+d)", "Planes largos (4+d)"), base: view === "14d" ? D.rev.long.b14 : D.rev.long.b90, post: D.rev.long.post, d: view === "14d" ? D.rev.long.d14 : D.rev.long.d90 },
              { n: "Total", base: view === "14d" ? D.rev.total.b14 : D.rev.total.b90, post: D.rev.total.post, d: view === "14d" ? D.rev.total.d14 : D.rev.total.d90, bold: true },
            ]).map((r, i) => <tr key={i} style={{ borderBottom: `1px solid ${t.border}40`, fontWeight: r.bold ? 700 : 400 }}>
              <td style={{ padding: "6px 8px", fontWeight: 600 }}>{r.n}</td>
              <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN, color: t.textDim }}>{"€"}{typeof r.base === "number" ? r.base.toLocaleString("de-DE") : r.base}/d</td>
              <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN, fontWeight: 600 }}>{"€"}{typeof r.post === "number" ? r.post.toLocaleString("de-DE") : r.post}/d</td>
              <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: MN, fontWeight: 700, color: (typeof r.d === "string" && r.d.startsWith("-")) ? t.red : t.green }}>{r.d}</td>
            </tr>)}</tbody>
          </table>
        </div>
        {!isCF && <div style={{ marginTop: 8, fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>{tx(lang, D.revFramingNote[view].en, D.revFramingNote[view].es)}</div>}
        {isCF && <div style={{ marginTop: 8, fontSize: 11, color: t.textDim, lineHeight: 1.6 }}>{tx(lang,
          "Projected = what Japan would have earned at the 90-day trend rate. Actual = what it earned. Range: +" + fm(CF.sensitivity.last4w.delta) + " (last 4w) to +" + fm(CF.sensitivity.flat.delta) + " (flat). Trend-based: +" + fm(CF.sensitivity.trend.delta) + " (+26.8%).",
          "Proyectado = lo que Japon hubiera facturado al ritmo de tendencia 90d. Real = lo que facturo. Rango: +" + fm(CF.sensitivity.last4w.delta) + " (ult 4 sem) a +" + fm(CF.sensitivity.flat.delta) + " (plano). Por tendencia: +" + fm(CF.sensitivity.trend.delta) + " (+26,8%)."
        )}</div>}
        {view === "14d" && <Note bg={t.yBg} bdr={t.yBdr} ac={t.yellow} strong={tx(lang, "14d pre context:", "Contexto 14d pre:")} t={t}>{tx(lang, D.ref14dWarning.en, D.ref14dWarning.es)}</Note>}
      </Xp>

      {/* SIGNIFICANCE: Z-SCORE (step by step) */}
      <Xp title={tx(lang, "Significance: Conversion Rate z-test (step by step)", "Significancia: z-test Tasa de Conversion (paso a paso)")} desc={tx(lang, "How we confirmed the conversion improvement is not random.", "Como confirmamos que la mejora de conversion no es aleatoria.")} t={t}>

        </div>
        <div style={{ fontFamily: MN, fontSize: 11, color: t.textDim, lineHeight: 2, padding: "10px 14px", background: t.bg, borderRadius: 8, border: `1px solid ${t.border}` }}>
          {(lang === "en" ? D.zCalc.en : D.zCalc.es).map((step, i) => <div key={i} style={{ fontWeight: i === 5 ? 700 : 400, color: i === 5 ? t.green : t.textDim }}>{step}</div>)}

      </Xp>

      {/* SIGNIFICANCE: CHI-SQUARE (step by step) */}
      <Xp title={tx(lang, "Significance: Chi-square mix shift (step by step)", "Significancia: Chi-cuadrado shift de mix (paso a paso)")} desc={tx(lang, "How we confirmed the order distribution change is real.", "Como confirmamos que el cambio de distribucion de ordenes es real.")} t={t}>
        <div style={{ padding: "6px 10px", background: t.bBg, borderRadius: 6, border: `1px solid ${t.bBdr}`, fontSize: 10, color: t.textDim, marginBottom: 8 }}>

      {/* DECISION CHECKLIST */}
      <Xp title={tx(lang, "Decision Checklist (4/6 met)", "Checklist de Decision (4/6 cumplidos)")} t={t}>
        {D.checks.map((c, i) => {
          const met = c.v === "met";

      </Xp>

      {/* LEARNINGS */}
      <Xp title={tx(lang, "Learnings", "Aprendizajes")} defaultOpen t={t}>
        {D.learnings.map((l, i) => <div key={i} style={{ padding: "8px 12px", borderRadius: 6, background: (l.color === "green" ? t.green : l.color === "yellow" ? t.yellow : t.accent) + "06", border: "1px solid " + (l.color === "green" ? t.green : l.color === "yellow" ? t.yellow : t.accent) + "15", marginBottom: 6, borderLeft: "3px solid " + (l.color === "green" ? t.green : l.color === "yellow" ? t.yellow : t.accent) }}>

        {D.gaps.map((g, i) => <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr 80px 80px", gap: 8, padding: "6px 0", borderBottom: "1px solid " + t.border + "30", fontSize: 11, alignItems: "center" }}>

    </>}

    {/* GLOSSARY (Leadership + Pricing) */}
    {showL && <Xp title={tx(lang, "Glossary", "Glosario")} t={t}>
      {[
        { term: "MDE", def: tx(lang, "Minimum Desirable Effect. The bar the experiment needs to clear. If all MDE are met, the experiment succeeds.", "Efecto Minimo Deseado. La vara que el experimento tiene que superar. Si todos los MDE se cumplen, exito.") },
        { term: tx(lang, "Average Revenue Per User (ARPU)", "Revenue Promedio por Usuario (ARPU)"), def: tx(lang, "Total revenue divided by total unique visitors. Captures conversion and order value in one number.", "Revenue total dividido visitantes unicos. Captura conversion y valor de orden en un numero.") },

        { term: tx(lang, "Average Order Value (AOV)", "Valor Promedio de Orden (AOV)"), def: tx(lang, "Average EUR paid per order. Weighted across 65+ destinations. When FX correction raises JPY-to-EUR conversion, AOV in EUR goes up for long plans.", "Promedio EUR por orden. Ponderado de 65+ destinos. Cuando la correccion FX sube la conversion JPY-a-EUR, el AOV sube para planes largos.") },
        { term: tx(lang, "Gross Margin (GM)", "Margen Bruto (GM)"), def: tx(lang, "Percentage of revenue that is profit after direct costs. Source: Looker. The FX correction recovered GM because JPY revenue was recorded at ~10% below market.", "Porcentaje del revenue que es ganancia despues de costos directos. Fuente: Looker. La correccion FX recupero GM porque el revenue JPY se registraba ~10% por debajo del mercado.") },
        { term: tx(lang, "FX Correction", "Correccion FX"), def: tx(lang, "Adjusting internal rate from 159.31 to 175 JPY/EUR. Corrected a systematic margin leak, not a strategic price increase.", "Ajustar rate interno de 159,31 a 175 JPY/EUR. Corrigio fuga sistematica de margen, no fue suba estrategica.") },
        { term: "Price-per-Day (PPD)", def: tx(lang, "First price impression: plan price / days. A 3-day plan at €12 = €4/day PPD. The correction brought short JPY plans to the standard €3.79/day.", "Primera impresion de precio: precio del plan / dias. Plan 3 dias a €12 = €4/dia PPD. La correccion llevo los cortos JPY al estandar €3,79/dia.") },
        { term: tx(lang, "Two Forces", "Dos Fuerzas"), def: tx(lang, "FX correction (prices up on long plans) + PPD correction (prices down on short plans) applied simultaneously. Directions confirmed, magnitudes not separable.", "Correccion FX (precios suben en largos) + correccion PPD (precios bajan en cortos) aplicadas simultaneamente. Direcciones confirmadas, magnitudes no separables.") },
        { term: tx(lang, "Counterfactual", "Contrafactual"), def: tx(lang, "What would have happened without the change. 14-day projection from 90-day average, compared against 14 actual days.", "Que hubiera pasado sin el cambio. Proyeccion 14d desde promedio 90d, comparada con 14 dias reales.") },
        { term: tx(lang, "Break-Even", "Break-Even"), def: tx(lang, "Price drops: additional orders needed to compensate. Price rises: max volume loss before the increase stops being profitable.", "Precio baja: ordenes adicionales para compensar. Precio sube: caida maxima de volumen antes de que deje de ser rentable.") },
        { term: tx(lang, "Elasticity", "Elasticidad"), def: tx(lang, "% volume change / % price change. |e| > 1 = volume reacts more than proportionally. In this experiment, indicative (no formal control).", "% cambio volumen / % cambio precio. |e| > 1 = volumen reacciona mas que proporcionalmente. En este experimento, orientativo (sin control formal).") },
        { term: tx(lang, "Blended AOV Masking (LEARN-52)", "AOV Blended Enmascarado (LEARN-52)"), def: tx(lang, "When opposite price forces cancel in the blended average (PPD down on 65 dests + FX up on 131 dests = 0% blended), the AOV appears unchanged but treatment varies by destination. Always verify per-subgroup.", "Cuando fuerzas opuestas se cancelan en el promedio (PPD -7% en 65 dests + FX +9% en 131 dests = 0% blended), el AOV parece no cambiar pero el tratamiento varia. Siempre verificar por subgrupo.") },
        { term: tx(lang, "Benchmark (informal)", "Benchmark (informal)"), def: tx(lang, "Singapore: similar AOV, trend parallelism with Japan. 6x less volume. Confirms directional signals, not precise enough for formal analysis.", "Singapore: AOV similar, paralelismo de tendencia con Japan. 6x menos volumen. Confirma senales direccionales, no es preciso para analisis formal.") },
        { term: "Chi-square", def: tx(lang, "Tests if a distribution changed for real or by chance. Score 553.4 vs threshold 12.59. Cramer's V = 0.076: small to moderate effect.", "Verifica si una distribucion cambio de verdad o por azar. Score 553,4 vs umbral 12,59. V de Cramer = 0,076: efecto pequeno a moderado.") },
        { term: "Z-score", def: tx(lang, "How far a result is from 'no effect'. z = 2.843 exceeds the 99% threshold. p = 0.0045 = 0.45% chance of randomness.", "Que tan lejos esta un resultado de 'ningun efecto'. z = 2,843 supera el umbral del 99%. p = 0,0045 = 0,45% de azar.") },
        { term: tx(lang, "Cramér's V", "V de Cramér"), def: tx(lang, "Measures the strength of the association found by Chi-square. Ranges from 0 (no association) to 1 (perfect). Values 0.05-0.10 = small but real effect in large samples.", "Mide la fuerza de la asociacion encontrada por Chi-square. Va de 0 (sin asociacion) a 1 (perfecta). Valores 0,05-0,10 = efecto pequeno pero real en muestras grandes.") },
        { term: tx(lang, "Statistical Significance", "Significancia Estadistica"), def: tx(lang, "The probability that the observed effect happened by chance is below a threshold (usually 5%). If p < 0.05, the effect is almost certainly real, not noise.", "La probabilidad de que el efecto observado haya ocurrido por azar esta por debajo de un umbral (usualmente 5%). Si p < 0,05, el efecto es casi seguramente real, no ruido.") },
        { term: tx(lang, "Seasonal Tailwind", "Viento de Cola Estacional"), def: tx(lang, "Period of naturally elevated demand. March 2026 Asia-Pacific peak. Singapore (no change) grew +21.7%. Part of Japan's growth was seasonal.", "Periodo de demanda naturalmente elevada. Marzo 2026 pico Asia-Pacifico. Singapore (sin cambio) +21,7%. Parte del crecimiento de Japan fue estacional.") },
        { term: tx(lang, "Blended vs Excl. Paid Social", "Blended vs Excl. Paid Social"), def: tx(lang, "Blended = all visitors. Excl. PS = without Paid Social. In EXP-005, PS was more active pre (10.4%) than post (8.3%), so blended is the clean metric.", "Blended = todos los visitantes. Excl. PS = sin Paid Social. En EXP-005, PS estaba mas activo pre (10,4%) que post (8,3%), blended es la metrica limpia.") },
      ].map((item, i, arr) => <div key={i} style={{ padding: "8px 0", borderBottom: i < arr.length - 1 ? "1px solid " + t.border + "30" : "none" }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: t.accent }}>{item.term}</span>
        <div style={{ fontSize: 12, color: t.textDim, lineHeight: 1.6, marginTop: 3 }}>{item.def}</div>
      </div>)}
    </Xp>}

    {/* FOOTER */}
    <div style={{ textAlign: "center", fontSize: 10, color: t.textMuted, padding: "20px 0 10px", borderTop: "1px solid " + t.border, marginTop: 16 }}>
      {tx(lang, D.footer.en, D.footer.es)}
    </div>
  </div>;
}

// WEEKLY CHART (SVG, no Recharts — V2 compliant)
// ═══════════════════════════════════════════════════════════════════════════
function WkChart({ data, t }) {
  const maxRev = Math.max(...data.map(d => d.r));
  const h = 120, w = 700, pad = { l: 48, r: 10, t: 6, b: 20 };
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  const xStep = plotW / (data.length - 1);
  const yScale = v => pad.t + plotH - (v / (maxRev * 1.08)) * plotH;
  const li = data.findIndex(d => d.p === "L");
  const path = data.map((d, i) => `${i === 0 ? "M" : "L"}${pad.l + i * xStep},${yScale(d.r)}`).join(" ");
  return <div style={{ background: t.bg, borderRadius: 8, border: `1px solid ${t.border}`, padding: 10 }}>
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%" }}>
      {[0, 50000, 100000, 150000, 200000].filter(v => v <= maxRev * 1.1).map(v => <g key={v}>
        <line x1={pad.l} x2={w - pad.r} y1={yScale(v)} y2={yScale(v)} stroke={t.border} strokeWidth={.5} />
        <text x={pad.l - 4} y={yScale(v) + 3} fill={t.textMuted} fontSize={5.5} textAnchor="end" fontFamily={MN}>{"€"}{(v / 1000).toFixed(0)}K</text>
      </g>)}
      {li >= 0 && <rect x={pad.l + li * xStep - 2} y={pad.t} width={xStep * 2 + 4} height={plotH} fill={t.accent + "08"} rx={3} />}
      <path d={path} fill="none" stroke={t.accent} strokeWidth={1.5} />
      {data.map((d, i) => <circle key={i} cx={pad.l + i * xStep} cy={yScale(d.r)} r={d.p ? 3.5 : 1.2} fill={d.p === "P" ? t.green : d.p === "L" ? t.yellow : t.accent} stroke={d.p ? t.bg : undefined} strokeWidth={d.p ? 1.5 : 0} />)}
      {data.map((d, i) => (i % 5 === 0 || i >= data.length - 2) ? <text key={"x" + i} x={pad.l + i * xStep} y={h - 4} fill={d.p === "P" ? t.green : d.p === "L" ? t.yellow : t.textMuted} fontSize={5.5} textAnchor="middle" fontFamily={MN} fontWeight={d.p ? 700 : 400}>{d.w}</text> : null)}
    </svg>
  </div>;
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
  </script>
</body>
</html>
