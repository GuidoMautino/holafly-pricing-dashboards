<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holafly · Pricing Command Center v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Mulish',sans-serif; background:#FFFFFF; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes numIn { from { opacity:0; filter:blur(4px); transform:translateY(8px); } to { opacity:1; filter:blur(0); transform:translateY(0); } }
    @keyframes pop { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
    .anim-card { animation: fadeUp .4s ease both; }
    .anim-num { animation: numIn .5s ease both; }
    .anim-pop { animation: pop .35s ease both; }
    @media(max-width:359px){ body::before { content:'Please use a larger screen (360px+)'; position:fixed; inset:0; background:#FFFFFF; display:flex; align-items:center; justify-content:center; font-family:'Mulish',sans-serif; font-size:14px; color:#292B2E; z-index:9999; padding:20px; text-align:center; } #root { display:none; } }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:#CCD0D7; border-radius:3px; }
    @keyframes easterFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .easter-egg { display:inline-block; animation: easterFloat 2s ease-in-out infinite; font-size:14px; margin-left:8px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ═══ HOLAFLY DESIGN SYSTEM V2 — LIGHT THEME ═══
const T = {
  bg:"#FFFFFF",card:"#F8FAFC",text:"#292B2E",textDim:"#64748B",textMuted:"#94A3B8",
  border:"#E4E6EA",accent:"#E6485C",accentLight:"#FDE8EB",
  successBg:"#48EC86",successText:"#15803D",dangerText:"#DC2626",warningText:"#B45309",
  yellow:"#FFF0AB",blue:"#BFEBFF",orange:"#FFCCB0",purple:"#643560",
};
const CAT_C={"FX Correction":{bg:"#BFEBFF",t:"#1E3A5F"},"PPD Optimization":{bg:"#FFF0AB",t:"#7C5C00"},"Catalog Correction":{bg:"#E8F4FD",t:"#1E3A5F"},"Exploratory":{bg:"#FFCCB0",t:"#7C3A00"}};
const MN="JetBrains Mono,Consolas,monospace",UI="Mulish,sans-serif";

const TABS=[
  {id:"overview",en:"Overview",es:"Resumen",c:T.text},
  {id:"blockers",en:"Blockers & Decisions",es:"Bloqueos & Decisiones",c:T.dangerText},
  {id:"experiments",en:"Experiments",es:"Experimentos",c:"#34D399"},
  {id:"strategy",en:"Strategy",es:"Estrategia",c:T.purple},
  {id:"data",en:"Data & Dashboards",es:"Datos & Dashboards",c:"#6BA3D6"},
  {id:"infra",en:"Infrastructure",es:"Infraestructura",c:"#D4A843"},
  {id:"roadmap",en:"Roadmap",es:"Hoja de ruta",c:"#D49370"},
  {id:"log",en:"Log",es:"Registro",c:"#8B5CF6"},
];

// STATUS
const ST={live:{bg:"#E8FBF0",t:T.successText,d:T.successBg},closed:{bg:T.card,t:T.textMuted,d:T.border},ready:{bg:"#FEF9C3",t:T.warningText,d:"#EAB308"},approved:{bg:"#DBEAFE",t:"#1D4ED8",d:"#3B82F6"},paused:{bg:T.accentLight,t:T.accent,d:T.accent},success:{bg:"#E8FBF0",t:T.successText,d:T.successBg},blocked:{bg:"#FEE2E2",t:T.dangerText,d:T.dangerText},pending:{bg:"#FFF7ED",t:T.warningText,d:"#F97316"},"stand-by":{bg:"#F3F4F6",t:"#6B7280",d:"#9CA3AF"}};
const Bd=({s,label})=>{const c=ST[s]||ST.paused;return (<span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:99,background:c.bg,color:c.t,fontSize:11,fontWeight:600}}><span style={{width:6,height:6,borderRadius:"50%",background:c.d,flexShrink:0}}/>{label||s}</span>)};
const CB=({cat})=>{const c=CAT_C[cat]||{bg:T.card,t:T.textDim};return (<span style={{fontSize:10.5,fontWeight:600,padding:"3px 8px",borderRadius:4,background:c.bg,color:c.t}}>{cat}</span>)};

// COMPONENTS — #1 Typography bump: body 14px, desc 14px, metrics 26px, section headers 12px
const Card=({children,accent,onClick,s={},delay=0})=><div onClick={onClick} className="anim-card" style={{background:T.card,borderRadius:10,border:`1px solid ${T.border}`,borderLeft:accent?`3px solid ${accent}`:`1px solid ${T.border}`,padding:"16px 18px",cursor:onClick?"pointer":"default",transition:"box-shadow .15s",animationDelay:`${delay}ms`,...s}} onMouseEnter={e=>{if(onClick)e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,.06)"}} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>{children}</div>;
const XL=({href,icon,title,desc,delay=0})=><Card accent={T.accent} delay={delay} onClick={()=>{if(href)window.open(href,"_blank")}}><div style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontSize:18,lineHeight:1,flexShrink:0}}>{icon}</span><div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:3}}>{title}</div><div style={{fontSize:12,color:T.textDim,lineHeight:1.45}}>{desc}</div></div></div></Card>;
const Sec=({children,color})=><h3 style={{fontSize:12,fontWeight:700,color:color||T.textMuted,textTransform:"uppercase",letterSpacing:1.3,margin:"26px 0 12px",fontFamily:UI}}>{children}</h3>;
const Desc=({children})=><p style={{fontSize:14,color:T.textDim,lineHeight:1.6,margin:"0 0 14px"}}>{children}</p>;
const G=({cols="repeat(auto-fit,minmax(230px,1fr))",gap=10,children})=><div style={{display:"grid",gridTemplateColumns:cols,gap}}>{children}</div>;
const Met=({label,value,sub,color,delay=0})=><div className="anim-pop" style={{background:T.card,borderRadius:10,border:`1px solid ${T.border}`,borderLeft:`3px solid ${color||T.textMuted}`,padding:"14px 10px",textAlign:"center",animationDelay:`${delay}ms`}}><div style={{fontSize:10.5,color:T.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:.7,marginBottom:5}}>{label}</div><div className="anim-num" style={{fontSize:26,fontWeight:800,color:color||T.text,fontFamily:MN,lineHeight:1,animationDelay:`${delay+80}ms`}}>{value}</div>{sub&&<div style={{fontSize:10.5,color:T.textDim,marginTop:5}}>{sub}</div>}</div>;
const L=(lang,en,es)=>lang==="en"?en:es;

// COLLAPSIBLE SECTION
const Coll=({title,color,count,children,open:initOpen=false})=>{
  const [open,setOpen]=useState(initOpen);
  return <div style={{marginBottom:14}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"10px 0",borderBottom:`1px solid ${T.border}`,userSelect:"none"}}>
      <span style={{fontSize:11,color:color||T.textMuted,transition:"transform .2s",transform:open?"rotate(90deg)":"rotate(0deg)",fontWeight:700}}>▶</span>
      <span style={{fontSize:12,fontWeight:700,color:color||T.textMuted,textTransform:"uppercase",letterSpacing:1.3,fontFamily:UI}}>{title}</span>
      {count!=null&&<span style={{fontSize:10,fontFamily:MN,color:T.textMuted,background:T.border,padding:"1px 6px",borderRadius:4}}>{count}</span>}
    </div>
    {open&&<div style={{paddingTop:12}} className="anim-card">{children}</div>}
  </div>
};

// DASHBOARD URLS (per experiment)
const DASH={
  "EXP-004":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_004_mxn_v5_final.html",
  "EXP-005":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_005_jpy_v5_final.html",
  "EXP-006":"https://guidomautino.github.io/holafly-pricing-dashboards/exp_006_thailand_v7.html",
};

// TIMELINE BAR — #20 experiment progress bar
const TimelineBar=({start,end,label,pct,delay=0})=>{
  const col = pct>=100?"#34D399":pct>=50?T.warningText:T.accent;
  return <div className="anim-card" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",animationDelay:`${delay}ms`}}>
    <span style={{fontSize:11,fontFamily:MN,color:T.textMuted,minWidth:60}}>{start}</span>
    <div style={{flex:1,height:6,background:T.border,borderRadius:3,overflow:"hidden",position:"relative"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:col,borderRadius:3,transition:"width .6s ease"}}/>
    </div>
    <span style={{fontSize:11,fontFamily:MN,color:T.textMuted,minWidth:60,textAlign:"right"}}>{end}</span>
    <span style={{fontSize:10,fontWeight:700,fontFamily:MN,color:col,minWidth:40,textAlign:"right"}}>{pct}%</span>
  </div>
};

// LIFECYCLE BADGE — #21
const LifecycleBd=({phase})=>{
  const map={"pre-launch":{bg:"#FFF7ED",t:"#B45309"},"running":{bg:"#E8FBF0",t:T.successText},"closed":{bg:T.card,t:T.textMuted},"review":{bg:"#EDE9FE",t:"#6D28D9"}};
  const c=map[phase]||map["pre-launch"];
  return <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,background:c.bg,color:c.t,textTransform:"capitalize"}}>{phase}</span>
};

// EXPERIMENT CARD — collapsible detail
const ExpCard=({e,idx,l})=>{
  const [open,setOpen]=useState(false);
  const accentCol=e.st==="live"?"#34D399":e.st==="approved"?"#3B82F6":e.st==="stand-by"?"#9CA3AF":T.border;
  return <Card accent={accentCol} delay={idx*60}>
    <div onClick={()=>setOpen(!open)} style={{cursor:"pointer",userSelect:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:5}}>
        <div><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
          <span style={{fontSize:11,color:accentCol,transition:"transform .2s",transform:open?"rotate(90deg)":"rotate(0deg)",fontWeight:700}}>▶</span>
          <span style={{fontFamily:MN,fontSize:11,color:T.accent,fontWeight:700}}>{e.id}</span><span style={{fontWeight:700,fontSize:13.5,color:T.text}}>{e.name}</span></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Bd s={e.st}/>{e.result&&<Bd s={e.result} label="Scale"/>}<LifecycleBd phase={e.phase}/><span style={{fontSize:10,color:T.textMuted,padding:"2px 6px",background:T.border,borderRadius:3}}>{e.meth}</span><CB cat={e.cat}/></div></div>
        <span style={{fontSize:10.5,color:T.textMuted,whiteSpace:"nowrap"}}>{e.dates}</span></div>
    </div>
    {open&&<div className="anim-card" style={{marginTop:10}}>
      <div style={{fontSize:14,color:T.textDim,lineHeight:1.55}}>{e.detail}</div>
      {e.start!=="—"&&<TimelineBar start={e.start} end={e.end} pct={e.pct} delay={0}/>}
      {e.review&&<div style={{marginTop:8,padding:"8px 12px",background:"#FAFAFE",borderRadius:6,border:`1px solid ${T.border}`}}>
        <div style={{fontSize:10.5,fontWeight:700,color:T.purple,marginBottom:6,textTransform:"uppercase",letterSpacing:.8}}>{L(l,"Review Schedule","Calendario Review")}</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{e.review.map((r,ri)=><div key={ri} style={{flex:"1 1 180px",padding:"6px 10px",borderRadius:5,border:`1px solid ${r.done?T.successBg:T.border}`,background:r.done?"#F0FDF4":"#FFFFFF"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <span style={{fontFamily:MN,fontSize:11,fontWeight:700,color:r.done?T.successText:T.text}}>{r.d}</span>
            <span style={{fontFamily:MN,fontSize:10,color:T.textMuted}}>{r.date}</span>
          </div>
          <div style={{fontSize:11.5,color:T.textDim,lineHeight:1.4}}>{r.focus}</div>
        </div>)}</div>
      </div>}
      {e.url&&<div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
        <a href={e.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.accent,fontWeight:600}}>Notion →</a>
        {DASH[e.id]&&<a href={DASH[e.id]} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.purple,fontWeight:600}}>Dashboard →</a>}
      </div>}
    </div>}
  </Card>;
};

// TLDR BANNER — situational summary, updated manually with each dashboard update
const TLDR=({date,items,lang})=><div className="anim-card" style={{background:"#F8FAFC",border:`1px solid ${T.border}`,borderLeft:`3px solid ${T.accent}`,borderRadius:10,padding:"14px 18px",marginBottom:20}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
    <span style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1}}>TLDR</span>
    <span style={{fontSize:10,fontFamily:MN,color:T.textMuted}}>{date}</span>
  </div>
  <div style={{fontSize:14,color:T.text,lineHeight:1.65}}>{items.map((it,i)=><div key={i} style={{marginBottom:i<items.length-1?6:0,display:"flex",gap:8,alignItems:"flex-start"}}><span style={{color:it.color||T.textDim,fontSize:13,lineHeight:1.7,flexShrink:0}}>{it.icon}</span><span>{it.text}</span></div>)}</div>
</div>;

// WEEK IN REVIEW component
const WRSect=({groups,sectionColor})=><div>
  {groups.map((g,gi)=>g.items.length>0&&<div key={gi} style={{marginBottom:14}}>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,paddingBottom:4,borderBottom:`1px solid ${T.border}`}}>
      <span style={{fontSize:13}}>{g.icon}</span>
      <span style={{fontSize:10,fontWeight:800,color:g.color,textTransform:"uppercase",letterSpacing:1}}>{g.cat}</span>
      <span style={{fontSize:10,fontWeight:600,color:T.textMuted,fontFamily:MN}}>({g.items.length})</span>
    </div>
    {g.items.map((d,i)=><div key={i} style={{fontSize:14,color:T.text,lineHeight:1.65,marginBottom:7,paddingLeft:12,borderLeft:`2px solid ${sectionColor}`}}>{d}</div>)}
  </div>)}
</div>;
const WRcount=(groups)=>groups.reduce((a,g)=>a+g.items.length,0);
const WR=({done,carried,next,l})=><div style={{display:"flex",flexDirection:"column",gap:4}}>
  <Coll title={`✅ ${L(l,"Done","Hecho")} (${WRcount(done)})`} color={"#34D399"}>
    <WRSect groups={done} sectionColor={"#34D399"}/>
  </Coll>
  <Coll title={`⏳ ${L(l,"Carried Over","Pendiente")} (${WRcount(carried)})`} color={"#EAB308"} open={true}>
    <WRSect groups={carried} sectionColor={"#EAB308"}/>
  </Coll>
  <Coll title={`📅 ${L(l,"This Week","Esta Semana")} (${WRcount(next)})`} color={"#3B82F6"} open={true}>
    <WRSect groups={next} sectionColor={"#3B82F6"}/>
  </Coll>
</div>;

// TLDR DATA — edit these when updating the dashboard
const TLDR_OVERVIEW=(l)=>({date:"Apr 14, 2026",items:[
  {icon:"🎯",color:T.accent,text:l==="en"?<span><strong>Q1 Review Meeting TODAY Tue Apr 14.</strong> Pricing contribution: 4-opp portfolio, €3.7M–8.5M realistic 2026. Ver tab Estrategia → cards Opp 1-4.</span>:<span><strong>Reunión Q1 HOY mar 14 Abr.</strong> Contribución de Pricing: portfolio 4 opps, €3.7M–8.5M realista 2026. Ver tab Estrategia → cards Opp 1-4.</span>},   {icon:"🧪",color:T.successText,text:l==="en"?<span><strong>PIM Measurement Framework v1.0 live.</strong> Slack published yesterday 14:39 BA, 48h objection window closes tomorrow Wed Apr 15. Highest-leverage this week: PH 8-cluster review. Framework en <a href={LS.pimFramework} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"underline"}}>Notion</a> · Ver tab Datos → tile Framework PIM.</span>:<span><strong>Framework Medición PIM v1.0 live.</strong> Slack publicado ayer 14:39 BA, ventana 48h cierra mañana mié 15 Abr. Más alta-leverage esta semana: análisis 8 clusters PH. Framework en <a href={LS.pimFramework} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"underline"}}>Notion</a> · Ver tab Datos → tile Framework PIM.</span>},   {icon:"💵",color:T.warningText,text:l==="en"?<span><strong>Email USD drafted yesterday.</strong> Alfonso OK on framing Apr 13 12:22 BA, gated on his Pedro talk before send. €6.5M–€6.8M exposure. Ver tab Bloqueos → Operational Pending → "Email USD".</span>:<span><strong>Email USD drafted ayer.</strong> Alfonso OK al framing 13 Abr 12:22 BA, gated en charla con Pedro antes del envío. €6.5M–€6.8M exposición. Ver tab Bloqueos → Pendientes Operativos → "Email USD".</span>},   {icon:"📊",color:T.text,text:l==="en"?<span><strong>Core Migration Snapshot Apr 13 integrated.</strong> 89% launched, 11 rollbacks, Morocco co-led since Oct 2025. Reframes Opp 1. Ver tab Estrategia → card Opp 1.</span>:<span><strong>Snapshot Migración Core 13 Abr integrado.</strong> 89% launched, 11 rollbacks, Morocco co-liderado desde Oct 2025. Reenmarca Opp 1. Ver tab Estrategia → card Opp 1.</span>},
  {icon:"🔄",color:T.warningText,text:l==="en"?<span><strong>Strapi reframes the PH workstream.</strong> Base price + tier curves, not day-by-day. PH 8-cluster work stays as input. Ver tab Bloqueos → Operational Pending → "Strapi".</span>:<span><strong>Strapi reenmarca el workstream PH.</strong> Precio base + curvas de tiers, no día por día. Trabajo 8 clusters PH queda como input. Ver tab Bloqueos → Pendientes Operativos → "Strapi".</span>},
  {icon:"📐",color:T.purple,text:l==="en"?<span><strong>SSoT scope: 11 use cases with sub-cases.</strong> Meet agreed to identify resources for coming weeks. <a href={LS.ssot} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"underline"}}>SSoT Dashboard</a> · Ver tab Datos → tile SSoT Dashboard.</span>:<span><strong>Alcance SSoT: 11 casos de uso con sub-casos.</strong> Meet acordó identificar recursos para próximas semanas. <a href={LS.ssot} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"underline"}}>SSoT Dashboard</a> · Ver tab Datos → tile SSoT Dashboard.</span>},
]});
const TLDR_BLOCKERS=(l)=>({date:"Apr 14, 2026",items:[   {icon:"🇦🇩",color:T.warningText,text:l==="en"?<span><strong>Andorra watchpoint (action zone since yesterday Apr 13).</strong> First material below-floor rollback destination entering +60d action zone. Doubly classified. Ver tab Estrategia → card Opp 1 (risk).</span>:<span><strong>Andorra watchpoint (zona de acción desde ayer 13 Abr).</strong> Primer destino material below-floor con rollback entrando en ventana +60d. Doblemente clasificada. Ver tab Estrategia → card Opp 1 (risk).</span>},
  {icon:"⏰",color:T.dangerText,text:l==="en"?<span><strong>Q1 Review Meeting TODAY Tue Apr 14.</strong> Alfonso reviewed Pricing contribution yesterday Mon. Sync window narrow if changes requested. Ver tab Estrategia → cards Opp 1-4.</span>:<span><strong>Reunión Q1 HOY mar 14 Abr.</strong> Alfonso revisó contribución de Pricing ayer lun. Ventana sync angosta si pide cambios. Ver tab Estrategia → cards Opp 1-4.</span>},
  {icon:"⏸",color:T.warningText,text:l==="en"?<span><strong>4 pre-approved curve fixes pending implementation (€5.9M scope, 14 days in limbo).</strong> Mar 30 Alfonso OK on Bundles / DR / Saint Barthélemy. Bosnia blocked by negative GM. Ver tab Bloqueos → Operational Pending → "4 pre-approved curve fixes".</span>:<span><strong>4 fixes de curva pre-aprobados pendientes de implementación (€5.9M scope, 14 días en limbo).</strong> OK Alfonso 30 Mar en Bundles / DR / Saint Barthélemy. Bosnia bloqueada por GM negativa. Ver tab Bloqueos → Pendientes Operativos → "4 fixes de curva pre-aprobados".</span>},
  {icon:"🏗️",text:l==="en"?<span><strong>Background confounders.</strong> Core→Legacy rollback (Spain/EU/UK/MAR/TUR) affects any experiment in those markets. Eamonn fraud alert Apr 8 pending investigation. PRIC-85 cruise eSIMs verification pending. Ver tab Bloqueos → Operational Pending (Eamonn + Verify deploys + PRIC-85 items).</span>:<span><strong>Confounders de fondo.</strong> Rollback Core→Legacy (España/EU/UK/MAR/TUR) afecta cualquier experimento en esos mercados. Alerta fraude Eamonn 8 Abr pendiente investigación. Verificación PRIC-85 eSIMs cruceros pendiente. Ver tab Bloqueos → Pendientes Operativos (items Eamonn + Verify deploys + PRIC-85).</span>},

      {[
        {q:L(l,"Pricing Committee:","Comité de Pricing:"),d:L(l,"Being evaluated jointly by Alfonso and Guido. Josy (Carriers Performance) recommends herself as sole Carriers rep, her team handles costs, GM, revenue, traffic, QA-performance. For Partnerships: Elchin (Ari's boss) should decide who represents. Josy's advice: keep it lean. Pending: define scope, members, cadence.","En evaluacion conjunta Alfonso y Guido. Josy (Carriers Performance) se recomienda como unica rep de Carriers, su equipo maneja costes, GM, revenue, trafico, QA-performance. Para Partnerships: Elchin (jefa de Ari) decide quien. Consejo Josy: mantenerlo lean. Pendiente: definir scope, miembros, cadencia.")},
        {q:L(l,"SSoT initiative — in motion:","Iniciativa SSoT — en marcha:"),d:L(l,"Data alignment meet happened Thursday Apr 9 with Alfonso, Miquel, Óscar Vilella. Yesterday Apr 13 Óscar asked again for the presentation we reviewed in the meet — engagement is real. Open thread: Data still has to assign the profile that will own the project on their side. Once that lands we have a counterpart to push the workstream forward.","Meet de alineación con Data sucedió el jueves 9 Abr con Alfonso, Miquel, Óscar Vilella. Ayer 13 Abr Óscar volvió a pedirme la presentación que vimos en el meet — el engagement es real. Hilo abierto: Data todavía tiene que asignar el perfil que va a tomar el proyecto del lado de ellos. Cuando eso aterrice tenemos contraparte para empujar el workstream.")},

        {q:L(l,"LTV integration:","Integración LTV:"),d:L(l,"Dani Samaniego meeting pending. How does pricing connect to LTV?","Reunión Dani Samaniego pendiente. Cómo conecta pricing con LTV?")},
        {q:L(l,"GOI Tree:","Árbol GOI:"),d:L(l,"3-block session designed (decomposition, levers, prioritization), pending scheduling with Alfonso. Note: most of the structural tree advanced informally through the Q1 Review 4-opportunity portfolio (Opp 1 GM Floor, Opp 2 PIM corrections, Opp 3 Web vs App, Opp 4 FX pipeline). Formal session still useful for the levers below the opps.","Sesión 3 bloques diseñada (descomposición, palancas, priorización), pendiente agendar con Alfonso. Nota: gran parte del árbol estructural avanzó informalmente a través del portfolio de 4 oportunidades del Q1 Review (Opp 1 GM Floor, Opp 2 correcciones PIM, Opp 3 Web vs App, Opp 4 pipeline FX). Sesión formal sigue siendo útil para las palancas por debajo de las opps.")},
        {q:L(l,"Net profit as obligatory experiment metric:","Beneficio neto estimado como métrica obligatoria de experimentos:"),d:L(l,"Confirmed Apr 14 weekly. Xabi proposed adopting net profit estimate as the unifying metric across all pricing experiments (his previous practice with Dani at prior company). Rationale: lowering prices may reduce AOV but if 30% of 1-day buyers later buy 10/15-day plans, the net effect is positive — the snapshot at moment-zero misleads. Decision: incorporate into the closing checklist of all future experiments. Connects to D+30/D+60/D+90 validation already in place. Implementation: add net profit estimate to D object schema and Communications Spec output.","Confirmado en weekly del 14 Abr. Xabi propuso adoptar el beneficio neto estimado como métrica unificadora de todos los experimentos de pricing (su práctica previa con Dani en empresa anterior). Razonamiento: bajar precios puede reducir AOV pero si el 30% de compradores de 1 día luego compran planes de 10/15 días, el efecto neto es positivo — la foto del momento cero engaña. Decisión: incorporar al closing checklist de todos los experimentos futuros. Conecta con la validación D+30/D+60/D+90 ya en lugar. Implementación: sumar beneficio neto estimado al schema del D object y al output del Communications Spec.")},
        {q:L(l,"Elasticity analysis as top priority:","Análisis de elasticidad como prioridad top:"),d:L(l,"Confirmed Apr 14 weekly by Alfonso + Xabi + Guido (3-way alignment). Alfonso framed it as one of the first priorities — \"esta elasticidad de los precios va a ser crítica\". Joan's arrival mid-May enables it (Revenue Management background). Vanwestendorp research (Aleja) is a complementary input. Q1 context: 10% more recurring orders + 3.5% more new customer orders, yet 8% below revenue target — volume growth is not enough, need to understand price elasticity to optimize CR and AOV jointly. Status: confirmed priority, not pending decision. Action: pre-onboarding Joan with elasticity playbook outline.","Confirmado en weekly del 14 Abr por Alfonso + Xabi + Guido (alineación de 3 partes). Alfonso lo enmarcó como una de las primeras prioridades — \"esta elasticidad de los precios va a ser crítica\". La incorporación de Joan mid-May lo habilita (background Revenue Management). El research Vanwestendorp (Aleja) es un input complementario. Contexto Q1: 10% más órdenes recurrentes + 3.5% más órdenes nuevas, pero 8% por debajo del target de revenue — el crecimiento en volumen no alcanza, necesitamos entender elasticidad para optimizar CR y AOV juntos. Status: prioridad confirmada, no pendiente de decisión. Acción: pre-onboarding Joan con outline de playbook de elasticidad.")},

  <Coll title={L(l,"Operational Pending (Pricing-owned)","Pendientes Operativos (Pricing)")} count={13} open={true}>
    {[
      {item:L(l,"Strapi pricing model design (base + discount tiers) — broad workstream","Diseño modelo pricing Strapi (base + tiers de descuento) — workstream broad"),detail:L(l,"Broad workstream tracking. Strapi uses base price + discount tier curves, not day-by-day (Apr 9 meet with Gabriela Vicioso). PH 8-cluster work stays as input, not final output. Iñigo confirmed charming price is per-currency. Immediate action this week (8-cluster review + ~24 representatives selection) tracked in Weekly Actions. This home = broader ongoing workstream. Apr 14 weekly Xabi caveat: PH model output will be transformed by Strapi internal rules (charming pricing + FX rounding) — what matters is the FINAL price post-Strapi rules vs current price, NOT the raw PH model output. Concrete next test (Xabi suggestion): once a PH cluster is reviewed and considered ready, upload that single group to Strapi and inspect the JSON output for the actual final price after rules apply, then compare against current. I already requested PH to include charming + post-FX analyses in their delivery — pending verification on detailed review.","Tracking broad. Strapi usa precio base + curvas de tiers, no día por día (meet 9 Abr con Gabriela Vicioso). Trabajo de 8 clusters de PH queda como input, no output final. Iñigo confirmó charming price por moneda. Acción inmediata esta semana (análisis 8 clusters + selección ~24 representativos) trackeada en Weekly Actions. Este home = workstream broad en curso. Caveat Xabi del weekly 14 Abr: el output del modelo PH va a ser transformado por las reglas internas de Strapi (charming pricing + redondeo FX) — lo que importa es el precio FINAL post reglas Strapi vs precio actual, NO el output crudo del modelo PH. Próximo test concreto (sugerencia Xabi): una vez que un cluster de PH esté revisado y considerado listo, subir ese grupo solo a Strapi e inspeccionar el output JSON para ver el precio final real después de que las reglas se apliquen, después comparar contra el actual. Ya le pedí a PH que incluyan análisis de charming + post-FX en su entrega — pendiente verificación en la revisión a detalle.")},
      
      {item:L(l,"10-day Middle East package: investigate unauthorized price change","Paquete 10 días Middle East: investigar cambio de precio no autorizado"),detail:L(l,"Eamonn Dromgoole flagged this morning in #pricing: variant 48839767720272 went from 52.90 to 48.90 over the last 10 days, breaking a fraud rule the support team had in place. Pricing did not push this change. Need to find who or what touched it (catalog edit, automation, or system bug) and decide whether to revert, document, or formalize it.","Eamonn Dromgoole flagueó esta mañana en #pricing: la variante 48839767720272 pasó de 52.90 a 48.90 en los últimos 10 días, rompió una regla de fraude que tenía el equipo de soporte. Pricing no empujó este cambio. Hay que encontrar quién o qué lo tocó (edición de catálogo, automatización, o bug del sistema) y decidir si revertir, documentar, o formalizarlo.")},
      
      {item:L(l,"4 pre-approved curve fixes pending implementation (Mar 30 Alfonso OK, no execution yet)","4 fixes de curva pre-aprobados pendientes de implementación (OK Alfonso 30 Mar, sin ejecución todavía)"),detail:l==="en"?<span>14 days in limbo since Alfonso's OK on Mar 30 thread (#internal-growth-team). €5.9M total exposure across 4 cases:<br/>☐ <strong>Bundles (€2.6M)</strong> — China+HK+Macao, Japan-China, Japan-South Korea. Decision: keep as-is for migration. Status: decision-only, no immediate action. Becomes input for PIM migration phase.<br/>☐ <strong>Dominican Republic (€3.2M)</strong> — error in price curve at day 26 (€94.9→€74.9). Decision: adopt Brazil/Chile/Colombia curve for full range. Status: pending Sebas implementation ticket, no JSMCO opened.<br/>☐ <strong>Saint Barthélemy (€22K, potential &lt;€500K)</strong> — broken curve at day 31 (€123.9→€69.9). Decision: assign to India cluster (€8.9). Status: pending Sebas implementation ticket, no JSMCO opened.<br/>☐ <strong>Bosnia (markup +23.3% on days 60-90)</strong> — surfaced by Alejandro Zuleta Mar 31. Fix is mechanically simple (align days 60-90 to cluster). BLOCKED by Bosnia having negative GM (-38.0%, also one of the 9 material below-floor destinations of Opp 1). Approach: GM negativa first, curve fix second. Becomes the illustrative case for the Opp 1 co-led approach.</span>:<span>14 días en limbo desde el OK de Alfonso del 30 Mar en el thread (#internal-growth-team). €5.9M de exposición total entre 4 casos:<br/>☐ <strong>Bundles (€2.6M)</strong> — China+HK+Macao, Japón-China, Japón-Corea del Sur. Decisión: mantener as-is para migración. Estado: solo decisión, sin acción inmediata. Pasa a ser input para la fase de migración PIM.<br/>☐ <strong>República Dominicana (€3.2M)</strong> — error en curva de precio en día 26 (€94.9→€74.9). Decisión: adoptar curva Brazil/Chile/Colombia para el rango completo. Estado: pendiente ticket de implementación con Sebas, sin JSMCO abierto.<br/>☐ <strong>Saint Barthélemy (€22K, potencial &lt;€500K)</strong> — curva rota en día 31 (€123.9→€69.9). Decisión: asignar cluster India (€8.9). Estado: pendiente ticket de implementación con Sebas, sin JSMCO abierto.<br/>☐ <strong>Bosnia (markup +23.3% en días 60-90)</strong> — surfaced por Alejandro Zuleta 31 Mar. Fix mecánicamente simple (alinear días 60-90 al cluster). BLOQUEADO porque Bosnia tiene GM negativa (-38.0%, también uno de los 9 destinos materiales below-floor de Opp 1). Approach: GM negativa primero, fix de curva segundo. Pasa a ser el caso ilustrativo del approach co-led de Opp 1.</span>},
      {item:L(l,"Data Team Request — PIM Migration Monitoring (canonical home, deadline May 5)","Pedido al Data Team — Monitoreo Migración PIM (home canónico, deadline 5 May)"),detail:L(l,"Single home for this workstream (Tier 2 entry removed to avoid duplication). Subhoja del PIM Framework v1.0 in Notion. 3 needs: baseline capture / weekly guardrails report / deep-read dashboard for ~24 representatives. Out of scope: real-time, new ingestion, backfilling, attribution. Counterpart: Miquel + Dani Samaniego. Deadline target: Tue May 5 2026. Plan B: manual baselines via BigQuery 2-3 weeks. Send gated on 48h Slack window closing Wed Apr 15.","Home único de este workstream (entry de Tier 2 removido para evitar duplicación). Subhoja del Framework PIM v1.0 en Notion. 3 necesidades: captura de baseline / reporte semanal de guardrails / dashboard de lectura profunda para ~24 representativos. Fuera de scope: real-time, ingesta nueva, backfilling, atribución. Contraparte: Miquel + Dani Samaniego. Deadline target: Mar 5 May 2026. Plan B: baselines manuales vía BigQuery 2-3 semanas. Envío gated en la ventana 48h del Slack cerrando Mié 15 Abr.")},{item:L(l,"COGS data model alignment with pricing dashboard (Mati workstream)","Alineación modelo de datos COGS con dashboard pricing (workstream Mati)"),detail:L(l,"Opened today Apr 13 09:15 BA in DM with Mati Villalba Llano. I asked for a complete listing of destinations × variants × prices by currency as a raw base for the PIM monitoring rollout. Mati confirmed COGS handles a different data granularity than the pricing dashboard and that the model needs to be polished until they are equivalent. New workstream: align COGS data layer with pricing dashboard layer. Mati also flagged that cruise eSIMs (PRIC-85) are missing from the pricing dashboard but appear in the COGS dashboard — separate fix tracked alongside.","Abierto hoy 13 Abr 09:15 BA en DM con Mati Villalba Llano. Le pedí un listado completo de destinos × variantes × precios por moneda como base raw para el rollout del monitoreo PIM. Mati confirmó que COGS maneja una granularidad de datos distinta del dashboard pricing y que hay que pulir el modelo hasta que sean equivalentes. Workstream nuevo: alinear capa de datos COGS con capa del dashboard pricing. Mati también flagueó que los eSIMs de cruceros (PRIC-85) faltan en el dashboard pricing pero aparecen en el dashboard COGS — fix separado trackeado en paralelo.")},{item:L(l,"Email USD to Allan + Miki — drafted (canonical home)","Email USD a Allan + Miki — drafted (home canónico)"),detail:L(l,"Canonical draft status. Apr 13 14:30 BA, full text shared with Alfonso in DM. Recipients: Allan + Miki TO, Alfonso + Xabi CC. Frames gap 8.33%, ~€80M annual USD, €6.5M–€6.8M exposure. Alfonso OK framing Apr 13 12:22 BA with his wording. Guardrail: conversion must not drop. Send action in Tier 2 A6. Apr 14 weekly clarifications from Xabi + Alfonso: (1) NOT a systemic block on USD experiments — it is a mindset agreed with Pedro to not penalize US users when their currency loses value. (2) Threshold for raising the hand: a principal currency moving >10-12%. (3) Sequence: align with Javier first (he has more weight), then Pedro, then inform. (4) Previous USD experiment by Xabi exists in Drive: he raised USD prices 10%, conversion drop was greater than the AOV gain — find that doc before proposing new USD experiments. Sub-action: search Drive for Xabi USD experiment. Gating dependency (Alfonso → Javier → Pedro) in Awaiting Response.","Status canónico del draft. 13 Abr 14:30 BA, texto completo compartido con Alfonso en DM. Destinatarios: Allan + Miki TO, Alfonso + Xabi CC. Enmarca gap 8.33%, ~€80M anual USD, €6.5M–€6.8M exposición. Alfonso OK framing 13 Abr 12:22 BA con su wording. Guardrail: conversión no debe caer. Acción de envío en Tier 2 A6. Clarificaciones del weekly 14 Abr de Xabi + Alfonso: (1) NO es un bloqueo sistémico de experimentos USD — es un mindset acordado con Pedro de no penalizar a usuarios US cuando su moneda pierde valor. (2) Threshold para levantar la mano: una moneda principal moviéndose >10-12%. (3) Secuencia: alinear con Javier primero (tiene más peso), después Pedro, después informar. (4) Existe un experimento USD previo de Xabi en Drive: subió USD 10%, la caída de conversión fue mayor que la ganancia de AOV — encontrar ese doc antes de proponer nuevos experimentos USD. Sub-acción: buscar en Drive el experimento USD de Xabi. Dependencia gating (Alfonso → Javier → Pedro) en Awaiting Response.")},{item:L(l,"PRIC-85 cruise pricing, verification","PRIC-85 pricing cruceros, verificación"),detail:L(l,"Post-implementation check. Verify the cruise pricing is live on storefront, the implementation matches the original design, and that it is actually generating GM as expected. Not a new design task. Mati flagged on Apr 13 that the cruise eSIMs are missing from the pricing dashboard.","Check post-implementación. Verificar que el pricing de cruceros está activo en el sitio, que la implementación coincide con el diseño original, y que efectivamente está generando GM como esperado. No es tarea de diseño nuevo. Mati flagueó el 13 Abr que los eSIMs de cruceros faltan en el dashboard pricing.")},
      {item:L(l,"App vs Web pricing gap — investigation reframed (Iñigo response received)","Gap pricing App vs Web — investigación reenmarcada (respuesta Iñigo recibida)"),detail:L(l,"Iñigo responded Apr 14: \"No price differences should exist between app and web (Shopify is the source of truth). Temporary display mismatches may happen, but checkout should always reflect the same price. If we find concrete cases, he can review them.\" This reframes the investigation entirely. The -7.3% weighted gap surfaced in BQ data is NOT explained by a structural App vs Web pricing differential — Shopify enforces parity at checkout. Two possibilities remain: (1) display-time mismatches that don't survive to checkout, (2) data attribution artifacts (Hola Coins app-only usage as Alfonso hypothesized, or other confounders not yet identified). Next steps: (1) dig deeper into the BQ data to validate exactly what was being measured — checkout price or displayed price, (2) document concrete cases where the gap appears, (3) if cases survive the deeper validation, share with Iñigo for case-by-case review. Hola Coins remains a known potential confounder that must be controlled for in any future analysis. Strategic implication: anything that surfaces here must be reported because it could affect Opp 3 sizing materially.","Iñigo respondió 14 Abr: \"No deberían existir diferencias de precio entre app y web (Shopify es la fuente de verdad). Pueden ocurrir desincronizaciones temporales en el display, pero el checkout siempre debería reflejar el mismo precio. Si encontramos casos concretos, los puede revisar.\" Esto reenmarca la investigación entera. El gap ponderado -7.3% que surgió en los datos de BQ NO se explica por un diferencial estructural de pricing App vs Web — Shopify impone paridad en checkout. Quedan dos posibilidades: (1) desincronizaciones en el display que no sobreviven al checkout, (2) artefactos de atribución de datos (uso de Hola Coins solo en app como hipótesis Alfonso, u otros confounders todavía no identificados). Próximos pasos: (1) profundizar en los datos de BQ para validar exactamente qué se estaba midiendo — precio de checkout o precio mostrado, (2) documentar casos concretos donde aparezca el gap, (3) si los casos sobreviven a la validación profunda, compartir con Iñigo para revisión caso por caso. Hola Coins sigue siendo un confounder potencial conocido que hay que controlar en cualquier análisis futuro. Implicación estratégica: cualquier cosa que aparezca acá hay que reportarla porque podría afectar el sizing de Opp 3 materialmente.")},
      {item:L(l,"FX shortlist closed (Apr 13) — ready for individual experiment design","Shortlist FX cerrado (13 Abr) — listo para diseño individual de experimentos"),detail:L(l,"Apr 13 closure of the [A7] Tier 2 analysis. BigQuery Q1 2026 + 4-quarter historical (Q2-2025 to Q1-2026), validated against previous files with zero discrepancies. Master doc: fx_shortlist_apr13_2026.docx in Opp 4 Drive folder. WAVE 1 (May-June): JPY + CAD in parallel, €1.00M combined annual scoped exposure (USA destination excluded per rollback pool restriction). WAVE 2 conditional: CLP based on Wave 1 results. STAND-BY: SAR (Iran-Gulf context dropped volume -64% Jan→Mar 2026, re-evaluate Q3 2026) + GBP (1.2% checkout perceived gap insufficient for elasticity signal). Methodological caveats per case at design phase: (1) rising volume trend → DID with control, not pre/post simple; (2) post-charming monotonicity validation (JPY uses XX90 rule); (3) explicit USA destination exclusion until Carriers May snapshot; (4) JPY had previous changes — identify last change date before defining baseline window. Next step: open individual brief for JPY and CAD design once PH 8-cluster review is closed.","Cierre del 13 Abr del análisis [A7] del Tier 2. BigQuery Q1 2026 + histórico 4 trimestres (Q2-2025 a Q1-2026), validado contra archivos previos sin discrepancias. Documento maestro: fx_shortlist_apr13_2026.docx en carpeta Drive de Opp 4. OLA 1 (mayo-junio): JPY + CAD en paralelo, €1.00M combinada anual scoped (destino USA excluido por restricción de rollback pool). OLA 2 condicional: CLP según resultados de Ola 1. STAND-BY: SAR (contexto Iran-Gulf bajó volumen -64% Ene→Mar 2026, re-evaluar Q3 2026) + GBP (gap percibido 1.2% en checkout insuficiente para señal de elasticidad). Caveats metodológicos por caso en fase de diseño: (1) trend creciente de volumen → DID con control, no pre/post simple; (2) validación de monotonicidad post-charming (JPY usa regla XX90); (3) exclusión explícita de destino USA hasta snapshot Carriers de mayo; (4) JPY tuvo cambios previos — identificar fecha del último cambio antes de definir baseline window. Próximo paso: abrir brief individual para diseño JPY y CAD una vez cerrado el análisis 8-cluster de PH.")},
      {item:L(l,"Post-experiment validation D+30","Validacion post-experimento D+30"),detail:L(l,"EXP-004 + EXP-005 checkpoint Apr 15. GM Foundational needs COGS confirmation. Jira: PA-353.","Checkpoint 004 + 005 el 15 Abr. GM Foundational necesita confirmacion COGS. Jira: PA-353.")},
      {item:L(l,"PA-350: Cost logic modification (Dani)","PA-350: Modificacion logica costos (Dani)"),detail:L(l,"Dani flagged: expected consumption costs model uses order value as base, should use number of users. Affects GM estimates during pricing experiments. In progress.","Dani flagueo: modelo de costos esperados usa valor de orden como base, deberia usar numero de usuarios. Afecta estimaciones GM en experimentos de pricing. En curso.")},
      {item:L(l,"Gines behavioural workstream — discovery follow-up","Workstream behavioural Gines — follow-up discovery"),detail:L(l,"Apr 8 kickoff meet happened with Gines + Alfonso. Next step: schedule a discovery meet to see how the workstream actually evolves and reinforce the direction. Also flag the workstream to Xabi so he has visibility before it produces outputs.","El meet kickoff del 8 Abr ya pasó con Gines + Alfonso. Próximo paso: agendar meet de discovery para ver cómo evoluciona el workstream y reforzar la dirección. También comentar el workstream a Xabi para que tenga visibility antes de que produzca outputs.")},
      {item:L(l,"Verify recent deployments on storefront","Verificar deploys recientes en storefront"),detail:l==="en"?<span>EXP-009 GBP already live, monitoring tracked separately in Weekly Actions Controls (D+7 read tomorrow Wed Apr 15).<br/>☐ EXP-006 rollback: Thailand all currencies reverted to pre-Mar 12 pricing<br/>☐ CORR-001: TW+SK JPY 1-3d at new prices (¥690/¥1,390/¥1,990)<br/>☐ CORR-001: TW+SK EUR and other currencies UNCHANGED</span>:<span>EXP-009 GBP ya está live, monitoreo trackeado por separado en Weekly Actions Controls (lectura D+7 mañana mié 15 Abr).<br/>☐ Rollback EXP-006: Tailandia todas las monedas revertidas a pre-12 Mar<br/>☐ CORR-001: TW+SK JPY 1-3d a nuevos precios (¥690/¥1,390/¥1,990)<br/>☐ CORR-001: TW+SK EUR y otras monedas SIN CAMBIO</span>},

      {who:"Mati",item:L(l,"Raw destinations × variants × prices listing for PIM monitoring","Listado raw destinos × variantes × precios para monitoreo PIM"),detail:L(l,"Asked today Apr 13 09:15 BA in DM. Need a complete base of destinations with variants and prices per currency as input for the PIM migration monitoring rollout. Mati responded that COGS has a different data granularity and that the model needs to be polished until they are equivalent. New workstream opened (tracked also in Op Pending). Older request from Mar 31 about 'not identified' product and 'esim trial' superseded.","Pedido hoy 13 Abr 09:15 BA en DM. Necesito una base completa de destinos con variantes y precios por moneda como input para el rollout del monitoreo de migración PIM. Mati respondió que COGS tiene granularidad distinta y que hay que pulir el modelo hasta que sean equivalentes. Workstream nuevo abierto (trackeado también en Op Pending). Pedido anterior del 31 Mar sobre producto 'not identified' y 'esim trial' superado."),accent:T.text},
      {who:"Iñigo",item:L(l,"PIM timeline + Strapi pricing model handoff","Timeline PIM + handoff modelo pricing Strapi"),detail:L(l,"Now connected: Iñigo flagged me to Gabriela Vicioso (Product) as the source for the pricing model needed to disconnect Shopify. The Thu Apr 9 14:30 meet with Gabriela + Sergio Guerrero (PM Ecommerce) delivered the reframing: Strapi uses base + tier curves. PH clustering output is the upstream gate.","Ahora conectado: Iñigo me marcó frente a Gabriela Vicioso (Product) como la fuente del modelo de pricing necesario para desconectar Shopify. El meet del Jue 9 Abr 14:30 con Gabriela + Sergio Guerrero (PM Ecommerce) entregó el reframing: Strapi usa base + curvas de tiers. El output del clustering PH es el gate upstream."),accent:T.warningText},{who:"Alfonso",item:L(l,"USD experiment framing — Alfonso → Javier → Pedro conversation","Framing experimento USD — conversación Alfonso → Javier → Pedro"),detail:L(l,"Gating dependency for Email USD send. Alfonso OK on framing Apr 13 12:22 BA. Apr 14 weekly clarification from Alfonso: align with Javier first (more weight on this decision), then Pedro. Threshold for the conversation: principal currency moving >10-12% (Xabi rule). Email draft in Op Pending; send action in Tier 2 A6. This entry = gating dependency only.","Dependencia gating para envío del Email USD. Alfonso OK al framing 13 Abr 12:22 BA. Clarificación del weekly 14 Abr de Alfonso: alinear con Javier primero (más peso en esta decisión), después Pedro. Threshold para la conversación: moneda principal moviéndose >10-12% (regla Xabi). Draft del email en Op Pending; acción de envío en Tier 2 A6. Este entry = solo la dependencia gating."),accent:"#6BA3D6"},
      {who:"Aleja",item:L(l,"Pricing Research + Van Westendorp analysis","Investigación de Pricing + análisis Van Westendorp"),detail:L(l,"Apr 14: Aleja confirmed the study is in progress. Expected report ready by the LAST WEEK OF APRIL. This is a complementary input to the elasticity workstream that becomes top priority post Joan onboarding (mid-May). Xabi flagged in Apr 14 weekly that this analysis is hard to do well, and our previous attempt was \"medio mal\" — important to validate methodology before acting on the report. Action when received: review with Xabi before publishing any pricing decision based on it.","14 Abr: Aleja confirmó que el estudio está en proceso. Reporte esperado para la ÚLTIMA SEMANA DE ABRIL. Es un input complementario al workstream de elasticidad que pasa a ser prioridad top post onboarding de Joan (mid-May). Xabi flageó en el weekly del 14 Abr que este análisis es difícil de hacer bien, y nuestro intento anterior fue \"medio mal\" — importante validar la metodología antes de actuar sobre el reporte. Acción cuando se reciba: revisar con Xabi antes de publicar cualquier decisión de pricing basada en él."),accent:"#6BA3D6"},

const Experiments=({l})=>{
  const [f,sF]=useState("all");
  const exps=[
    {id:"EXP-006",name:L(l,"Thailand PPD €2.90","Tailandia PPD €2.90"),st:"closed",cat:"PPD Optimization",meth:"DID",phase:"review",
      detail:L(l,"Signal: ITERATE. Rollback deployed Mar 31 (JSMCO-285). Results published to #pricing Mar 30. Revenue -€3,701/day (-16.2%). No bucket broke even. Key finding: 8-14d plans (41% of revenue) show price insensitivity (+2.7% volume vs +14.1% needed). 14 days insufficient in declining seasonal market. GM +1.9pp driven by carrier cost reduction, not pricing. Closed, monitoring metrics post-rollback evolution (volume, CR, GM).","Signal: ITERATE. Rollback deployed 31 Mar (JSMCO-285). Resultados publicados en #pricing 30 Mar. Revenue -€3.701/dia (-16.2%). Ningun bucket llegó a break-even. Hallazgo clave: planes 8-14d (41% revenue) muestran insensibilidad al precio (+2.7% vol vs +14.1% necesario). 14 dias insuficientes en mercado estacional descendente. GM +1.9pp por reduccion costo carrier, no pricing. Cerrado, monitoreando evolución métricas post-rollback (volumen, CR, GM)."),
      dates:L(l,"Closed (Iterate). Rollback deployed","Cerrado (Iterar). Rollback deployed"),url:N.exp006,start:"Mar 12",end:"Mar 26",pct:100,
      review:[{d:"D+30",date:"Apr 24",focus:L(l,"Post-rollback revenue recovery. Full COGS for 15+ day plans. Verify storefront prices reverted. AED resolved as part of JSMCO-285 closure (Apr 2).","Recuperacion revenue post-rollback. COGS completo para planes 15+ dias. Verificar precios revertidos en storefront. AED resuelto como parte del cierre JSMCO-285 (2 Abr)."),done:false}]},
    {id:"CORR-001",name:L(l,"TW+SK PPD Alignment (ex EXP-007)","Alineacion PPD TW+SK (ex EXP-007)"),st:"live",cat:"Catalog Correction",meth:"Pre-Post",phase:"running",
      detail:L(l,"LIVE, deployed Mar 31. D+7 read posted yesterday Apr 7: 1d SK +8.4% / TW -58.3% vs +50% target, but 6 of 7 days inside Easter. Untreated 4-7d buckets dropped in parallel (-22% SK, -35% TW), pointing to holiday noise rather than treatment failure. ARPU floors holding, no guardrails breached. Monitoring continues to D+14 close on Apr 14 for clean post-Easter read. Watch signal: SK 2-day +23% volume, the bucket where Japan showed real elasticity in EXP-005.","LIVE, deployed 31 Mar. Lectura D+7 posteada ayer 7 Abr: 1d SK +8.4% / TW -58.3% vs +50% target, pero 6 de 7 días dentro de Easter. Buckets 4-7d sin tratar bajaron en paralelo (-22% SK, -35% TW), apuntando a ruido de feriado más que a fallo de tratamiento. ARPU floors holding, no guardrails rotos. Monitoreo continúa hasta cierre D+14 el 14 Abr para lectura limpia post-Easter. Señal a vigilar: SK 2-day +23% volumen, el bucket donde Japón mostró elasticidad real en EXP-005."),
      dates:L(l,"Live, D+7 posted Apr 7, closing D+14 (Apr 14)","Live, D+7 posteado 7 Abr, cierra D+14 (14 Abr)"),url:N.corr001,start:"Mar 31",end:"Apr 14",pct:60,
      review:[{d:"D+7",date:"Apr 7",focus:L(l,"Posted yesterday. Numbers below target but Easter contamination dominates. Decision: extend to D+14.","Posteado ayer. Números bajo target pero contaminación Easter domina. Decisión: extender a D+14."),done:true},{d:"D+14",date:"Apr 14",focus:L(l,"Clean post-Easter read. Decision gate on EUR/USD extension.","Lectura limpia post-Easter. Decision gate sobre extensión EUR/USD."),done:false}]},
    {id:"EXP-009",name:L(l,"GBP PPD Correction","Correccion PPD GBP"),st:"live",cat:"FX Correction",meth:"DID",phase:"running",
      detail:L(l,"FULLY LIVE. JSMCO-283 closed by Juan Jose Gabelo yesterday at 18:32 CET (status: Finalizada). 63 destinations × 3 days × £2.99 active across all 190 variants. D+0 monitoring starts today on a clean trading day, since yesterday's deploy was mid-day and contaminated. Monitoring window 14 days, watch for Easter recovery dynamics in first reads. Coordinated through Sergio Guerrero (PM Ecommerce) and Sebastian Morales (Content) for the IT activation handoff.","TOTALMENTE LIVE. JSMCO-283 cerrado por Juan Jose Gabelo ayer a las 18:32 CET (status: Finalizada). 63 destinos × 3 días × £2.99 activos en las 190 variantes. Monitoreo D+0 arranca hoy en un día limpio de trading, dado que el deploy de ayer fue a media jornada y quedó contaminado. Ventana monitoreo 14 días, atento a dinámica recuperación Easter en primeras lecturas. Coordinado a través de Sergio Guerrero (PM Ecommerce) y Sebastian Morales (Content) para el handoff de activación IT."),
      dates:L(l,"Fully live, JSMCO-283 closed Apr 7 18:32 CET","Totalmente live, JSMCO-283 cerrado 7 Abr 18:32 CET"),url:N.exp009,start:"Apr 7",end:"Apr 21",pct:10,
      review:[{d:"D+0",date:"Apr 7",focus:L(l,"Full IT activation confirmed at 18:32 CET (JSMCO-283 closed). Mid-day deploy contaminated.","Activación IT completa confirmada a las 18:32 CET (JSMCO-283 cerrado). Deploy a media jornada contaminado."),done:true},{d:"D+1",date:"Apr 8",focus:L(l,"First clean trading day. Watch GBP volume baseline.","Primer día limpio de trading. Vigilar baseline volumen GBP."),done:false},{d:"D+7",date:"Apr 14",focus:L(l,"First proper read, Easter recovery dynamics.","Primera lectura propia, dinámica recuperación Easter."),done:false}]},

        {cat:L(l,"Controls (live experiment monitoring)","Controles (monitoreo experimentos vivos)"),icon:"🔍",color:"#3B82F6",items:[{d:"Tue Apr 14",task:L(l,"CORR-001 D+14 close decision (TW + SK JPY)","Cierre D+14 CORR-001 (TW + SK JPY)"),detail:L(l,"Re-read the 10 anti-drift rules first. Recommendation is MAINTAIN but deferred pending clean post-Easter window. Decision today.","Re-leer las 10 reglas anti-drift primero. Recomendación es MAINTAIN pero diferida pendiente ventana limpia post-Easter. Decisión hoy."),tag:"#CORR-001"},{d:"Wed Apr 15",task:L(l,"EXP-009 GBP D+7 checkpoint","Checkpoint D+7 EXP-009 GBP"),detail:L(l,"D+1 was clean (Apr 8). D+7 proper read on Apr 15. Watch ARPU vs counterfactual, GM floor 60% (baseline 70.4%), volume vs baseline.","D+1 fue limpio (8 Abr). Lectura D+7 propia el 15 Abr. Vigilar ARPU vs contrafactual, GM floor 60% (baseline 70.4%), volumen vs baseline."),tag:"#EXP-009"},{d:L(l,"Daily","Diario"),task:L(l,"Eamonn fraud alert investigation","Investigación alerta de fraude Eamonn"),detail:L(l,"Pending since Apr 8. 10-day Middle East package variant changed from 52.90 to 48.90 outside Pricing channel. Need to identify who/what changed it before it propagates as governance gap.","Pendiente desde 8 Abr. Variante del paquete 10 días Middle East cambió de 52.90 a 48.90 fuera del canal de Pricing. Identificar quién/qué lo cambió antes de que se propague como governance gap."),tag:"#Governance"}]},
        {cat:L(l,"Reports / Deliverables","Informes / Entregables"),icon:"📄",color:"#6D28D9",items:[{d:"Mon-Tue 13-14",task:L(l,"Sync window with Alfonso if he requests changes","Ventana de sync con Alfonso si pide cambios"),detail:L(l,"Narrow window between Alfonso Monday read and Tuesday Q1 Review Meeting. Be available, prepared to iterate quickly on any specific opp.","Ventana angosta entre la lectura del lunes de Alfonso y la Reunión Q1 del martes. Estar disponible, preparado para iterar rápido sobre cualquier opp específica."),tag:"#Q1Review"},{d:"Tue Apr 14",task:L(l,"Q1 Review Meeting — present Pricing contribution (4-opp portfolio)","Reunión Q1 — presentar contribución de Pricing (portfolio 4 opps)"),detail:L(l,"The main event of the week. This is Pricing input to the Q1 Review Meeting, not a dedicated committee. Format: Context / What Pricing brings / When / Dependencies. Drive folder ready with full research fundamentals.","El evento principal de la semana. Es contribución de Pricing a la Reunión Q1, no un comité dedicado. Formato: Context / What Pricing brings / When / Dependencies. Carpeta Drive lista con fundamentos completos."),tag:"#Q1Review"},{d:"Thu Apr 16",task:L(l,"2026 Revenue Pricing dimensioning — first contribution to Alfonso doc","Dimensionamiento Revenue Pricing 2026 — primer aporte al doc de Alfonso"),detail:L(l,"Workstream Alfonso convened Apr 9. The 4 opps from the committee feed directly into this exercise. First meaningful contribution this week.","Workstream que Alfonso convocó el 9 Abr. Las 4 opps del comité alimentan directamente este ejercicio. Primer aporte significativo esta semana."),tag:"#Revenue2026"}]},
        {cat:L(l,"New experiments / briefs","Experimentos nuevos / briefs"),icon:"🧪",color:"#059669",items:[{d:L(l,"Wed-Fri","Mié-Vie"),task:L(l,"Opp 4 FX pipeline — formalize prioritization with economic estimates per case","Opp 4 Pipeline FX — formalizar priorización con estimados económicos por caso"),detail:L(l,"Per the Opp 4 doc, this is the #1 immediate action. JPY (€727K ceiling) and CAD (€511K) as natural next candidates by size. Pre-work for the next case incorporation.","Según el doc de Opp 4, esta es la acción inmediata #1. JPY (€727K ceiling) y CAD (€511K) como candidatos naturales próximos por tamaño. Pre-work para la próxima incorporación de caso."),tag:"#Opp4"},{d:L(l,"This week","Esta semana"),task:L(l,"Opp 4 — shared guardrails template for all pipeline cases","Opp 4 — template compartido de guardrails para todos los casos del pipeline"),detail:L(l,"Common rollback criteria, monitoring cadence, success/failure thresholds. So we do not reinvent it case by case. Output is a 1-page template that becomes the standard.","Criterios de rollback comunes, cadencia de monitoreo, umbrales de éxito/falla. Para no reinventarlo caso por caso. Output es un template de 1 página que se vuelve el estándar."),tag:"#Opp4"}]},
        {cat:L(l,"Definitions to push to teams / 3rd parties","Definiciones a empujar a equipos / terceros"),icon:"📨",color:"#C5824A",items:[{d:"This week (high-leverage)",task:L(l,"PH 8-cluster detailed review (highest-leverage action)","Análisis detallado de los 8 clusters de PH (acción más alta-leverage)"),detail:L(l,"Output: confirmation of the final number of representative destinations per cluster (between 2 and 4), specific selection, first pass of threshold refinement per cluster. PH delivered the 8 clusters but I have not analyzed them yet. This unblocks the ~24 representatives selection for Level 2 of the framework, and conditions everything that comes after in the measurement phase. Target: lock before Fri Apr 17.","Output: confirmación del número final de destinos representativos por cluster (entre 2 y 4), selección específica, primera pasada de refinamiento de thresholds por cluster. PH entregó los 8 clusters pero todavía no los analicé. Esto desbloquea la selección de ~24 representativos para el Nivel 2 del framework, y condiciona todo lo que venga después en la fase de medición. Target: cerrar antes del Vie 17 Abr."),tag:"#PIM"},{d:L(l,"This week","Esta semana"),task:L(l,"Product (Gabriela) — confirm new app launch timing","Product (Gabriela) — confirmar timing del launch de la nueva app"),detail:L(l,"Opp 3 binding constraint. The conservative range (€400K–1M) flexes to €0 contribution if launch slips to 2027. Need a directional check-in, not a hard commitment.","Binding constraint de Opp 3. El rango conservador (€400K–1M) flexea a contribución €0 si el launch se desliza a 2027. Es un check-in direccional, no un compromiso firme."),tag:"#Opp3"},{d:"Wed Apr 15",task:L(l,"Joan onboarding pre-work — prepare context pack for mid-May start","Pre-work onboarding Joan — preparar context pack para arranque mid-May"),detail:L(l,"Joan de Homdedeu Cortés joins mid-May. Per Opp 4 capacity flag, his second-month ownership of some FX cases unblocks the pipeline cadence. Context pack prepared this week so first-day is productive.","Joan de Homdedeu Cortés entra mid-May. Según el flag de capacidad de Opp 4, su ownership desde el segundo mes de algunos casos FX desbloquea la cadencia del pipeline. Context pack preparado esta semana para que el primer día sea productivo."),tag:"#Opp4 #Joan"}]},
        {cat:L(l,"Follow-ups / reinforcements","Follow-ups / refuerzos"),icon:"🔁",color:"#8B5CF6",items:[{d:"Thu Apr 16",task:L(l,"D+30/60/90 validation checkpoints for EXP-004 MXN and EXP-005 JPY","Checkpoints validación D+30/60/90 para EXP-004 MXN y EXP-005 JPY"),detail:L(l,"PA-353/354/355 cards. Closed experiments need their long-tail validation. LEARN-109 risk: baselines may be distorted. If numbers do not reconcile, revisit baseline filter assumption first.","Cards PA-353/354/355. Experimentos cerrados necesitan validación de cola larga. Riesgo LEARN-109: los baselines pueden estar distorsionados. Si los números no cierran, revisar primero el supuesto del filtro de baseline."),tag:"#EXP-004 #EXP-005"},{d:L(l,"This week","Esta semana"),task:L(l,"Run check_spec_integrity.sh before any new experiment design","Correr check_spec_integrity.sh antes de cualquier diseño de experimento nuevo"),detail:L(l,"Per protocol. Current verdict is WARNINGS (4 non-blocking). Zero FAILED. System is ready but the integrity check must run before new experiments and before checkpoint reads.","Por protocolo. Verdict actual es WARNINGS (4 no bloqueantes). Cero FAILED. Sistema listo pero el integrity check debe correr antes de experimentos nuevos y antes de lecturas de checkpoint."),tag:"#Protocol"},{d:L(l,"This week","Esta semana"),task:L(l,"Verify cruise eSIMs flowing into GM sheets and dashboards","Verificar que los eSIMs de cruceros fluyen a sheets GM y dashboards"),detail:L(l,"PRIC-85 launched Apr 9 (Mediterranean, Europe, Caribbean, Alaska). I committed to Bon to verify everything is being picked up correctly. Light touch task but needs to happen this week.","PRIC-85 lanzado 9 Abr (Mediterranean, Europe, Caribbean, Alaska). Me comprometí con Bon a verificar que todo se esté tomando correctamente. Tarea liviana pero tiene que pasar esta semana."),tag:"#PRIC-85"},{d:"Fri Apr 17",task:L(l,"Friday close: update PCC with the week outputs","Cierre del viernes: actualizar PCC con los outputs de la semana"),detail:L(l,"After committee + checkpoints + first opp work. Capture committee outcome, decisions, any new workstreams that come out. So Monday April 20 starts with a clean state.","Después del comité + checkpoints + primer trabajo en opps. Capturar resultado del comité, decisiones, cualquier workstream nuevo que salga. Para que el lunes 20 Abr arranque con estado limpio."),tag:"#Infra"}]},
        {cat:L(l,"✅ Done this week","✅ Hecho esta semana"),icon:"✅",color:T.textMuted,items:[{d:"Mon Apr 13",task:L(l,"Re-read Pricing contribution overview before Alfonso review","Re-leer overview de contribución de Pricing antes de la revisión de Alfonso"),detail:L(l,"Alfonso reviews Monday. Last chance to catch typos, missing context, framing issues. The 4-opp portfolio Pricing contributes to the Q1 Review Meeting must be tight before he reads.","Alfonso lo revisa el lunes. Última chance para cazar typos, contexto faltante, problemas de framing. Las 4 opps que Pricing aporta a la Reunión Q1 deben estar tight antes de que él las lea."),tag:"#Q1Review"},{d:"✓ Apr 13",task:L(l,"Carriers list of Core-migrated destinations — answered via snapshot","Planilla Carriers de destinos migrados a Core — respondida via snapshot"),detail:L(l,"Closed by the Apr 13 Core migration snapshot: 89% of catalog launched (181 of 204), 11 destinations with rollback history identified, Morocco confirmed in Core since Oct 15 2025 (6 months stable). Cadence agreed: monthly snapshot, first day of each month, Pricing operates autonomously. Master doc: core_migration_status_report.docx in committee Drive folder.","Cerrado por el snapshot de Core migration del 13 Abr: 89% del catálogo launched (181 de 204), 11 destinos con historial de rollback identificados, Morocco confirmado en Core desde 15 Oct 2025 (6 meses estable). Cadencia acordada: snapshot mensual, primer día de cada mes, Pricing opera autónomo. Doc maestro: core_migration_status_report.docx en carpeta Drive del comité."),tag:"#Opp1"},{d:"✓ Apr 13 14:39",task:L(l,"PIM Migration Measurement Framework v1.0 published to #internal-growth-team","Framework Medición Migración PIM v1.0 publicado en #internal-growth-team"),detail:L(l,"Slack message live, cc Alfonso + Dani Samaniego + Xabi. Thread with core (3 points) + next steps. 48h objection window closes Wed Apr 15 ~14:39 BA. If no objections: send Data Team Request, lock the ~24 representatives selection in parallel. The framework was the main deliverable of the morning session and it is now sealed as v1.0.","Mensaje Slack live, cc Alfonso + Dani Samaniego + Xabi. Thread con core (3 puntos) + next steps. Ventana 48h cierra Mié 15 Abr ~14:39 BA. Si no hay objeciones: enviar Data Team Request, cerrar selección de los ~24 representativos en paralelo. El framework fue el deliverable principal de la sesión de la mañana y queda sellado como v1.0."),tag:"#PIM"}]}

      {d:"✓ Closed Apr 13",task:L(l,"[A7] FX shortlist 2-3 currencies activable during PIM migration","[A7] Shortlist FX 2-3 monedas activables durante migración PIM"),detail:L(l,"CLOSED Apr 13. Analysis done on BigQuery Q1 2026 + 4-quarter historical (Q2-2025 → Q1-2026), validated against previous files with no discrepancies. Output: Wave 1 = JPY + CAD in parallel (€1.00M combined annual scoped exposure, excluding destination=USA per rollback pool restriction). Wave 2 conditional = CLP based on Wave 1 results. Stand-by = SAR (-64% volume drop Jan→Mar 2026 from Iran-Gulf context, re-evaluate Q3 2026 when volume recovers) + GBP (1.2% perceived gap in checkout insufficient for elasticity signal). Master doc: fx_shortlist_apr13_2026.docx in Opp 4 Drive folder. Status: ready for individual experiment design phase. See Op Pending → \"FX shortlist closed\" for the next step.","CERRADO 13 Abr. Análisis hecho sobre BigQuery Q1 2026 + histórico 4 trimestres (Q2-2025 → Q1-2026), validado contra archivos previos sin discrepancias. Output: Ola 1 = JPY + CAD en paralelo (€1.00M combinada exposición anual scoped, excluyendo destination=USA por restricción de rollback pool). Ola 2 condicional = CLP según resultados de Ola 1. Stand-by = SAR (caída -64% volumen Ene→Mar 2026 por contexto Iran-Gulf, re-evaluar Q3 2026 cuando volumen recupere) + GBP (gap 1.2% percibido en checkout insuficiente para señal de elasticidad). Documento maestro: fx_shortlist_apr13_2026.docx en carpeta Drive de Opp 4. Estado: listo para fase de diseño individual de experimentos. Ver Op Pending → \"FX shortlist cerrado\" para el próximo paso."),tag:"#Opp4"},

        {d:"✓ Apr 9 14:30",item:L(l,"Platform Migration + Pricing","Platform Migration + Pricing"),accent:T.dangerText,detail:L(l,"Thu Apr 9 with Gabriela Vicioso + Sergio Guerrero + Guido. KEY INSIGHT: Strapi works with base price + discount tier curves, not day-by-day prices. We can define as many models as we want. Reframes PH's 9-cluster output from final to input. Passed the heads-up to Alfonso before the PH meeting #2 so he could steer the conversation.","Jue 9 Abr con Gabriela Vicioso + Sergio Guerrero + Guido. INSIGHT CLAVE: Strapi funciona con precio base + curvas de tiers de descuento, no con precios día por día. Podemos definir todos los modelos que queramos. Reenmarca el output de los 9 clusters de PH de final a input. Le pasé el heads-up a Alfonso antes del meet PH #2 para que pudiera guiar la conversación.")},

        {d:"✓ Apr 9 17:00",item:L(l,"PH meeting #2 (reframed post Strapi insight)","Meet PH #2 (reenmarcado post insight Strapi)"),accent:T.accent,detail:L(l,"Thu Apr 9 17:00 ES. Used to ask questions under the new Strapi lens (base + tiers, not day-by-day) instead of locking the old criteria. PH's work is still valid as input: the clustering logic, the price curve methodology, the monotonicity checks. Next step is translating that input into a Strapi-compatible structure.","Jue 9 Abr 17:00 ES. Usado para hacer preguntas bajo la nueva lente Strapi (base + tiers, no día por día) en vez de cerrar el criterio viejo. El trabajo de PH sigue siendo válido como input: la lógica de clustering, la metodología de curva de precio, los checks de monotonicidad. Próximo paso es traducir ese input a una estructura compatible con Strapi.")},

  <Coll title={L(l,"Key Learnings","Aprendizajes Clave")} count={14}>
    <Card accent={T.purple}><div style={{fontSize:14,color:T.textDim,lineHeight:1.8}}>
      {[{k:L(l,"Contrafactual > 90d:","Contrafactual > 90d:"),v:L(l,"Adobe CF model is the primary lens. 90d is supplementary.","Modelo Adobe CF es la lente primaria. 90d es suplementario.")},
        {k:L(l,"GM needs source declaration:","GM necesita declaracion fuente:"),v:L(l,"Foundational (estimated) vs COGS (real). Always state which. LEARN-76.","Foundational (estimado) vs COGS (real). Siempre declarar cual. LEARN-76.")},
        {k:L(l,"Closed ≠ done:","Cerrado ≠ terminado:"),v:L(l,"D+30/60/90 checkpoints are part of the experiment. LEARN-77.","Checkpoints D+30/60/90 son parte del experimento. LEARN-77.")},
        {k:L(l,"Paid Social confounder:","Confounder Paid Social:"),v:L(l,"If active at launch, excl_PS is the reference.","Si activo al lanzar, excl_PS es la referencia.")},
        {k:L(l,"AOV masking:","AOV masking:"),v:L(l,"When opposite forces cancel in blended average, decompose by subgroup. LEARN-52.","Cuando fuerzas opuestas se cancelan, descomponer por subgrupo. LEARN-52.")},
        {k:L(l,"Comms metrics hierarchy:","Jerarquía métricas comms:"),v:L(l,"First Slack message MUST include metrics: Success → Guardrail → Secondary with values. Narrative alone not enough. LEARN-87.","Primer mensaje Slack DEBE incluir métricas: Success → Guardrail → Secondary con valores. Narrativa sola no alcanza. LEARN-87.")},
        {k:L(l,"Source consistency in MDE:","Consistencia fuentes en MDE:"),v:L(l,"Never mix Adobe post with BQ pre. Same source for pre and post. LEARN-88.","Nunca mezclar Adobe post con BQ pre. Misma fuente para pre y post. LEARN-88.")},
        {k:L(l,"Variant-level GM mandatory:","GM por variante obligatorio:"),v:L(l,"Revenue \u2260 profit in price-down. Day 1 entry pricing may lose money. Repurchase baseline before funnel claims. LEARNs 89-99.","Revenue \u2260 profit en price-down. Pricing entry day 1 puede perder plata. Baseline recompra antes de claims funnel. LEARNs 89-99.")},
        {k:L(l,"Core Migration confounder:","Confounder Core Migration:"),v:L(l,"Core\u2192Legacy rollbacks REVERSE cost reductions. GM improvements may not be experiment-driven. Always check #holafly-all. LEARN-86+.","Rollbacks Core\u2192Legacy REVIERTEN reducciones de costos. Mejoras GM pueden no ser del experimento. Siempre checkear #holafly-all. LEARN-86+.")},
        {k:L(l,"CORRs produce monitoring dashboards:","CORRs producen dashboards de monitoreo:"),v:L(l,"CORRs derived from validated experiments with MDE and guardrails produce a single monitoring view (no D Object, no CF model). Not \"no dashboard\". LEARN-100.","CORRs derivadas de experimentos validados con MDE y guardrails producen una vista única de monitoreo (sin D Object, sin modelo CF). No es \"sin dashboard\". LEARN-100.")},
        {k:L(l,"current_total_price is in EUR:","current_total_price está en EUR:"),v:L(l,"BQ revenue field is in EUR regardless of presentment_currency_code. Never convert. LEARN-105.","Campo revenue de BQ está en EUR sin importar presentment_currency_code. Nunca convertir. LEARN-105.")},
        {k:L(l,"Cherry blossom seasonal (TW/SK):","Estacional cherry blossom (TW/SK):"),v:L(l,"Asian destination baselines inflate +23-58% in Mar-Apr. Use 90d as decision reference for these markets. LEARN-106.","Baselines de destinos asiáticos inflan +23-58% en Mar-Abr. Usar 90d como referencia de decisión para estos mercados. LEARN-106.")},
        {k:L(l,"Easter gap handling:","Manejo gap Easter:"),v:L(l,"Document Easter as confounder. If D+7 signal is distorted, defer decision to D+14. LEARN-107.","Documentar Easter como confounder. Si señal D+7 distorsionada, diferir decisión a D+14. LEARN-107.")},
        {k:L(l,"D+0 contamination rules:","Reglas contaminación D+0:"),v:L(l,"Mid-day implementations contaminate D+0. Define cut rules upfront per experiment. LEARN-108.","Implementaciones a media jornada contaminan D+0. Definir reglas de corte por experimento desde el inicio. LEARN-108.")},
