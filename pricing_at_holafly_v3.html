<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Holafly · Pricing — Area Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --pink:#E6485C;--pink-soft:rgba(230,72,92,0.08);--pink-border:rgba(230,72,92,0.18);
  --charcoal:#292B2E;--charcoal-soft:#4A4D52;--gray-mid:#64748B;--gray-light:#94A3B8;
  --card:#F8FAFC;--white:#FFFFFF;--rule:#E4E6EA;--rule-soft:rgba(41,43,46,0.06);
  --green:#15803D;--green-bg:#E8F5EE;--warn:#B45309;--warn-bg:#FDF3E7;
  --blue:#1D4ED8;--blue-bg:#E8EFFD;--purple:#7C3AED;--purple-bg:#F3EEFE;
  --pastel-yellow:#FFF0AB;--mono:'JetBrains Mono',monospace;--sans:'Mulish',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--white);color:var(--charcoal);line-height:1.65;font-size:14px;-webkit-font-smoothing:antialiased}
::selection{background:var(--pink);color:var(--white)}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#CCD0D7;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.anim-up{animation:fadeUp .4s ease both}.anim-scale{animation:scaleIn .35s ease both}

/* Top bar */
.top-bar{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 48px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:border-color .3s}
.top-bar.scrolled{border-bottom-color:var(--rule)}
.top-bar-left{display:flex;align-items:center;gap:10px}
.top-bar-dot{width:8px;height:8px;background:var(--pink);border-radius:50%}
.top-bar-brand{font-size:15px;font-weight:800;color:var(--charcoal);letter-spacing:-0.02em}
.top-bar-divider{width:1px;height:14px;background:var(--rule)}
.top-bar-context{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--gray-mid);letter-spacing:.08em;text-transform:uppercase}
.lang-toggle{display:flex;border:1px solid var(--rule);border-radius:999px;overflow:hidden;background:var(--rule-soft);padding:3px;gap:2px}
.lang-toggle button{background:transparent;border:none;padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);cursor:pointer;border-radius:999px;transition:all .25s;letter-spacing:.08em}
.lang-toggle button.active{background:var(--charcoal);color:var(--white)}

/* Layout */
.page{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.section{padding:40px 0 10px}
.section-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:8px}
.section h2{font-size:clamp(24px,3vw,34px);font-weight:800;color:var(--charcoal);line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px}
.section h2 .accent{color:var(--pink)}
.section h2 .highlight{background-image:linear-gradient(120deg,var(--pastel-yellow) 0%,var(--pastel-yellow) 100%);background-repeat:no-repeat;background-size:100% 26%;background-position:0 88%;padding:0 3px}
.section-intro{font-size:15px;color:var(--charcoal-soft);max-width:780px;line-height:1.65;margin-bottom:28px}
.section-intro strong{color:var(--charcoal);font-weight:700}
.section-divider{border:none;border-top:1px solid var(--rule);margin:48px 0 0}

/* Hero */
.hero{padding:64px 0 48px}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink)}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:900;color:var(--charcoal);line-height:1.08;letter-spacing:-0.03em;margin-bottom:18px}
.hero h1 .accent{color:var(--pink)}
.hero-deck{font-size:16px;color:var(--charcoal-soft);max-width:750px;line-height:1.65}
.hero-deck strong{color:var(--charcoal);font-weight:700}
.hero-meta{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap;font-size:12px;color:var(--gray-light)}
.hero-meta span strong{color:var(--charcoal);font-weight:700}
.hero-meta .sep{width:1px;height:12px;background:var(--rule);align-self:center}

/* Cards & Callouts */
.card{background:var(--white);border:1px solid var(--rule);border-radius:12px;padding:22px 24px}
.card-accent{border-left:3px solid var(--pink)}
.card-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.card p{font-size:14px;color:var(--charcoal-soft);line-height:1.6;margin-bottom:6px}.card p:last-child{margin-bottom:0}.card p strong{color:var(--charcoal);font-weight:700}
.callout{background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:16px 20px;margin:18px 0;font-size:13px;color:var(--charcoal-soft);line-height:1.6}
.callout strong{color:var(--charcoal);font-weight:700}.callout em{color:var(--pink);font-style:normal;font-weight:700}
.callout.green{border-left-color:var(--green);background:var(--green-bg)}
.callout.blue{border-left-color:var(--blue);background:var(--blue-bg)}
.callout.warn{border-left-color:var(--warn);background:var(--warn-bg)}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:18px 16px;text-align:center}
.metric-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
.metric-value{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--charcoal);line-height:1}
.metric-value .accent{color:var(--pink)}
.metric-sub{font-size:11px;color:var(--gray-mid);margin-top:6px}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
@media(max-width:800px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Flow */
.flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:24px 0}
.flow-step{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:14px 18px;flex:1;min-width:140px;text-align:center}
.flow-step.active{background:var(--pink);border-color:var(--pink)}
.flow-step.active .flow-step-label{color:rgba(255,255,255,0.7)}.flow-step.active .flow-step-value{color:var(--white)}
.flow-step-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:4px}
.flow-step-value{font-size:13px;font-weight:700;color:var(--charcoal)}
.flow-arrow{color:var(--gray-light);font-size:16px;padding:0 6px;flex-shrink:0}

/* BU cards */
.bu-card{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:18px 20px;border-top:3px solid var(--rule)}
.bu-card.primary{border-top-color:var(--pink)}.bu-card.secondary{border-top-color:var(--gray-mid)}
.bu-card .bu-title{font-size:14px;font-weight:800;color:var(--charcoal);margin-bottom:4px}
.bu-card .bu-desc{font-size:12px;color:var(--gray-mid);line-height:1.5}
.bu-card .bu-tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-top:8px}
.bu-tag.core{background:#FDE8EB;color:var(--pink)}.bu-tag.growing{background:var(--blue-bg);color:var(--blue)}.bu-tag.emerging{background:var(--purple-bg);color:var(--purple)}

/* Team */
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.team-card{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.team-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.team-name{font-size:14px;font-weight:700;color:var(--charcoal)}
.team-role{font-size:11px;color:var(--gray-mid);margin-top:1px}
.team-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-top:3px;display:inline-block}

/* Opp rows */
.opp-list{display:flex;flex-direction:column;gap:10px;margin:20px 0}
.opp-row{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:18px 22px;display:grid;grid-template-columns:36px 1fr auto;gap:16px;align-items:center;transition:box-shadow .15s}
.opp-row:hover{box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.opp-num{width:36px;height:36px;border-radius:8px;background:#FDE8EB;color:var(--pink);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.opp-body .opp-title{font-size:15px;font-weight:700;color:var(--charcoal);margin-bottom:3px}
.opp-body .opp-desc{font-size:12px;color:var(--gray-mid);line-height:1.5}
.opp-range{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--charcoal);white-space:nowrap;text-align:right}
.opp-range .range-label{display:block;font-size:9px;font-weight:700;color:var(--gray-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}

/* Status badges */
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.status.live{background:#E8F5EE;color:var(--green)}.status.progress{background:var(--blue-bg);color:var(--blue)}.status.planned{background:var(--warn-bg);color:var(--warn)}.status.done{background:var(--card);color:var(--gray-mid)}
.status::before{content:'';width:6px;height:6px;border-radius:50%}
.status.live::before{background:var(--green)}.status.progress::before{background:var(--blue)}.status.planned::before{background:var(--warn)}.status.done::before{background:var(--gray-light)}

/* Infra */
.infra-card{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:18px 20px}
.infra-card .infra-icon{font-size:22px;margin-bottom:8px}
.infra-card .infra-title{font-size:14px;font-weight:800;color:var(--charcoal);margin-bottom:4px}
.infra-card .infra-desc{font-size:12px;color:var(--gray-mid);line-height:1.5;margin-bottom:8px}

/* Roadmap */
.roadmap-row{display:grid;grid-template-columns:100px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--rule-soft);align-items:start}
.roadmap-row:last-child{border-bottom:none}
.roadmap-when{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gray-mid);padding-top:2px}
.roadmap-what{font-size:14px;color:var(--charcoal-soft);line-height:1.55}
.roadmap-what strong{color:var(--charcoal);font-weight:700}

/* Context cards */
.ctx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ctx-card{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:16px;text-align:center;position:relative;overflow:hidden}
.ctx-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ctx-card.c1::before{background:var(--pink)}.ctx-card.c2::before{background:var(--green)}.ctx-card.c3::before{background:var(--blue)}.ctx-card.c4::before{background:var(--purple)}
.ctx-val{font-family:var(--mono);font-size:26px;font-weight:800;color:var(--charcoal);line-height:1;margin-bottom:4px}
.ctx-val .accent{color:var(--pink)}
.ctx-label{font-size:11px;color:var(--gray-mid);font-weight:500}
@media(max-width:800px){.ctx-grid{grid-template-columns:1fr 1fr}}

/* Landscape table */
.ls-table{width:100%;border-collapse:collapse;margin:16px 0}
.ls-table th{text-align:left;padding:10px 14px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gray-light);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--rule)}
.ls-table th:not(:first-child){text-align:right}
.ls-table td{padding:10px 14px;font-size:13px;color:var(--charcoal-soft);border-bottom:1px solid var(--rule-soft)}
.ls-table td:not(:first-child){text-align:right;font-family:var(--mono);font-weight:600}
.ls-table tr:first-child td{color:var(--charcoal);font-weight:700}
.ls-table .ls-anchor{font-family:var(--mono);font-weight:700;color:var(--charcoal)}
.ls-table .ls-bar{height:6px;border-radius:3px;background:var(--pink);display:inline-block;vertical-align:middle;margin-left:8px;min-width:3px}

/* Experiment columns */
.exp-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
@media(max-width:800px){.exp-cols{grid-template-columns:1fr}}
.exp-col{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:16px 18px}
.exp-col-header{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--rule)}
.exp-col-header.done{color:var(--gray-mid)}.exp-col-header.active{color:var(--green)}.exp-col-header.planned{color:var(--warn)}
.exp-item{padding:6px 0;font-size:12px;color:var(--charcoal-soft);line-height:1.5;border-bottom:1px solid var(--rule-soft)}
.exp-item:last-child{border-bottom:none}
.exp-item strong{color:var(--charcoal);font-weight:700;font-size:13px}
.exp-item .exp-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px}
.exp-tag.scaled{background:var(--green-bg);color:var(--green)}
.exp-tag.reverted{background:#FDE8EB;color:var(--pink)}
.exp-tag.corrected{background:var(--blue-bg);color:var(--blue)}

/* Methodology flow */
.meth-flow{display:flex;align-items:stretch;gap:0;margin:20px 0;flex-wrap:wrap}
.meth-step{flex:1;min-width:100px;padding:12px 10px;text-align:center;background:var(--card);border:1px solid var(--rule);font-size:11px;font-weight:700;color:var(--charcoal)}
.meth-step:first-child{border-radius:8px 0 0 8px}
.meth-step:last-child{border-radius:0 8px 8px 0}
.meth-step.highlight-step{background:var(--pink);color:var(--white);border-color:var(--pink)}
.meth-num{font-family:var(--mono);font-size:9px;color:var(--gray-light);display:block;margin-bottom:2px}
.meth-step.highlight-step .meth-num{color:rgba(255,255,255,0.6)}

/* Confounder tags */
.conf-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.conf-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--card);border:1px solid var(--rule);color:var(--charcoal-soft)}

.page-footer{border-top:1px solid var(--rule);padding:24px 0;margin-top:48px;text-align:center;font-size:11px;color:var(--gray-light)}
.page-footer strong{color:var(--gray-mid);font-weight:700}

@media(max-width:800px){
  .top-bar{padding:12px 18px}.page{padding:0 18px 48px}.hero h1{font-size:28px}
  .flow{flex-direction:column}.flow-arrow{transform:rotate(90deg)}
  .opp-row{grid-template-columns:1fr}.opp-range{text-align:left}
  .meth-flow{flex-direction:column}.meth-step{border-radius:0!important}
  .meth-step:first-child{border-radius:8px 8px 0 0!important}.meth-step:last-child{border-radius:0 0 8px 8px!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [lang, setLang] = useState("en");
  const [scrolled, setScrolled] = useState(false);
  const en = lang === "en";

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 10);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);

  return (<div>
    {/* TOP BAR */}
    <div className={`top-bar ${scrolled ? "scrolled" : ""}`}>
      <div className="top-bar-left">
        <span className="top-bar-dot" />
        <span className="top-bar-brand">Holafly</span>
        <span className="top-bar-divider" />
        <span className="top-bar-context">{en ? "Area Overview · May 2026" : "Visión del Área · Mayo 2026"}</span>
      </div>
      <div className="lang-toggle">
        <button className={en ? "active" : ""} onClick={() => setLang("en")}>EN</button>
        <button className={!en ? "active" : ""} onClick={() => setLang("es")}>ES</button>
      </div>
    </div>

    <div className="page">
      {/* ═══ HERO ═══ */}
      <div className="hero anim-up">
        <div className="hero-eyebrow">Growth Pricing</div>
        <h1>{en ? <>Pricing at <span className="accent">Holafly.</span></> : <>Pricing en <span className="accent">Holafly.</span></>}</h1>
        <div className="hero-deck">{en
          ? <>The Pricing area owns <strong>how Holafly sets, tests, and governs prices</strong> across 200+ travel destinations, 25 storefront currencies, and three business units. We build the systems, run the experiments, and translate data into pricing decisions that move revenue and protect margin.</>
          : <>El área de Pricing es responsable de <strong>cómo Holafly define, testea y gobierna los precios</strong> en 200+ destinos de viaje, 25 monedas de storefront y tres unidades de negocio. Construimos los sistemas, corremos los experimentos y traducimos datos en decisiones de pricing que mueven revenue y protegen margen.</>}</div>
        <div className="hero-meta">
          <span><strong>{en ? "For" : "Para"}</strong> {en ? "Joan, COO & Growth leadership" : "Joan, COO & liderazgo de Growth"}</span>
          <span className="sep" /><span><strong>{en ? "Date" : "Fecha"}</strong> {en ? "May 2026" : "Mayo 2026"}</span>
          <span className="sep" /><span><strong>Owner</strong> Growth Pricing</span>
        </div>
      </div>

      {/* ═══ COMPANY CONTEXT ═══ */}
      <hr className="section-divider" />
      <div className="section">
        <div className="section-label">{en ? "Company Context" : "Contexto de Compañía"}</div>
        <h2>{en ? <>Where pricing fits in <span className="highlight">the picture.</span></> : <>Dónde encaja pricing en <span className="highlight">el panorama.</span></>}</h2>
        <div className="section-intro">{en
          ? <>Holafly reached 10M customers in 2025, targeting 20M in 2026. The company is evolving its value proposition from "Unlimited data" to <strong>"Always-On"</strong>, moving from a trip-based product to a continuous promise. The growth strategy is shifting from volume to value: <strong>who our customers are and their long-term worth matters more than adding more of them.</strong> Pricing is a core lever in that shift.</>
          : <>Holafly alcanzó 10M de clientes en 2025, con target de 20M en 2026. La compañía está evolucionando su propuesta de valor de "Datos ilimitados" a <strong>"Always-On"</strong>, pasando de un producto basado en viaje a una promesa continua. La estrategia de crecimiento está girando de volumen a valor: <strong>quiénes son nuestros clientes y su valor a largo plazo importa más que sumar más.</strong> Pricing es una palanca central en ese cambio.</>}</div>
        <div className="ctx-grid">
          <div className="ctx-card c1 anim-scale"><div className="ctx-val"><span className="accent">€550M</span></div><div className="ctx-label">{en ? "2026 revenue target" : "Target revenue 2026"}</div></div>
          <div className="ctx-card c2 anim-scale" style={{animationDelay:"60ms"}}><div className="ctx-val">20M</div><div className="ctx-label">{en ? "2026 customer target" : "Target clientes 2026"}</div></div>
          <div className="ctx-card c3 anim-scale" style={{animationDelay:"120ms"}}><div className="ctx-val">{">"}65%</div><div className="ctx-label">{en ? "Gross margin target" : "Target margen bruto"}</div></div>
          <div className="ctx-card c4 anim-scale" style={{animationDelay:"180ms"}}><div className="ctx-val">{">"}60</div><div className="ctx-label">{en ? "NPS target" : "Target NPS"}</div></div>
        </div>
        <div className="callout"><strong>{en ? "Volume → Value." : "Volumen → Valor."}</strong> {en
          ? "The company is moving from acquiring as many customers as possible to understanding who they are, what they're worth, and how to grow that. Pricing contributes directly: optimizing ARPU, testing price sensitivity by market, and building the infrastructure for evidence-based pricing decisions at scale."
          : "La compañía está pasando de adquirir la mayor cantidad posible de clientes a entender quiénes son, cuánto valen y cómo hacer crecer eso. Pricing contribuye directamente: optimizando ARPU, testeando sensibilidad de precio por mercado y construyendo la infraestructura para decisiones de pricing basadas en evidencia a escala."}</div>
      </div>

      {/* ═══ MISSION ═══ */}
      <hr className="section-divider" />
      <div className="section">
        <div className="section-label">{en ? "Mission" : "Misión"}</div>
        <h2>{en ? <>Maximize profitable growth <span className="highlight">through pricing.</span></> : <>Maximizar crecimiento rentable <span className="highlight">a través de pricing.</span></>}</h2>
        <div className="section-intro">{en ? "Improve conversion and ARPU without breaking margin guardrails. Prioritize scalable decisions (rules and systems), not one-off price changes. Every action is measured." : "Mejorar conversión y ARPU sin romper los guardrails de margen. Priorizar decisiones escalables (reglas y sistemas), no cambios de precio puntuales. Cada acción se mide."}</div>

          : <>La función de pricing se construyó desde cero. Hoy tenemos un sistema de experimentación operativo, tres capas de monitoreo automatizado y un proceso de gobernanza. <strong>11 experimentos en diferentes etapas.</strong> Algunos escalaron, otros se revirtieron deliberadamente cuando los resultados no pasaron el umbral. Ambos resultados retroalimentan la metodología.</>}</div>

        {/* BLOCK B: How an experiment works */}

          <div className="meth-step"><span className="meth-num">01</span>{en ? "Detect" : "Detectar"}</div>

        </div>
        <div className="card card-accent" style={{marginBottom:18}}>
          <p>{en
            ? <>We detected that the EUR→USD internal rate was 8% below market. That meant <strong>~€6M/year in revenue left on the table</strong> across USD-denominated markets. We declared a hypothesis, set rollback thresholds, launched the correction in selected markets, and we're now in the measurement window. Staged readouts happen at D+1, D+7, D+14, and D+30. If the numbers don't pass the declared success metric, we revert. We've done it before (Thailand).</>
            : <>Detectamos que la tasa interna EUR→USD estaba 8% por debajo del mercado. Eso significaba <strong>~€6M/año de revenue que no estábamos capturando</strong> en mercados denominados en USD. Declaramos hipótesis, definimos umbrales de rollback, lanzamos la corrección en mercados seleccionados, y ahora estamos en la ventana de medición. Lecturas por etapas en D+1, D+7, D+14 y D+30. Si los números no pasan la métrica de éxito declarada, revertimos. Ya lo hicimos antes (Tailandia).</>}</p>
        </div>

        {/* BLOCK C: How we control for noise */}
        <div className="card-label">{en ? "How we control for noise" : "Cómo controlamos el ruido"}</div>
        <div className="grid-2" style={{marginTop:10}}>
          <div className="card">
            <p><strong>{en ? "Three lenses, not one." : "Tres miradas, no una."}</strong></p>
            <p>{en
              ? "We read every experiment through a counterfactual projection (what would have happened without the change), a control market benchmark, and a year-over-year comparison. Never just pre-vs-post."
              : "Leemos cada experimento a través de una proyección contrafactual (qué habría pasado sin el cambio), un benchmark de mercado de control, y una comparación año contra año. Nunca solo pre-vs-post."}</p>
          </div>
          <div className="card">
            <p><strong>{en ? "8 named confounders." : "8 confounders nombrados."}</strong></p>
            <p>{en
              ? "Each has a specific protocol. We don't guess about external factors, we address them by category before launching and monitor them during the experiment."
              : "Cada uno con protocolo específico. No adivinamos factores externos, los tratamos por categoría antes de lanzar y los monitoreamos durante el experimento."}</p>
          </div>
        </div>
        <div className="conf-tags">
          <span className="conf-tag">{en ? "Cultural seasonality" : "Estacionalidad cultural"}</span>
          <span className="conf-tag">{en ? "Marketing campaigns" : "Campañas de marketing"}</span>
          <span className="conf-tag">{en ? "Competitor moves" : "Movimientos de competencia"}</span>
          <span className="conf-tag">{en ? "Parallel cost changes" : "Cambios paralelos de costos"}</span>
          <span className="conf-tag">{en ? "Hola Coins asymmetry" : "Asimetría Hola Coins"}</span>
          <span className="conf-tag">Shopify FX</span>
          <span className="conf-tag">{en ? "Promo mix shift" : "Cambio de mix de promos"}</span>
          <span className="conf-tag">{en ? "Geopolitical shocks" : "Shocks geopolíticos"}</span>
        </div>
        <div className="callout blue" style={{marginTop:4}}>{en
          ? <><strong>What's next for experiment rigor:</strong> we know we need switchback testing tools (like Statsig) to isolate effects with more control at the user level. We prioritized PIM first because it gives us the clean price surface to test on. Statsig is the next priority, and it will be a step change in how fast and precisely we can run experiments.</>
          : <><strong>Lo que sigue en rigor de experimentación:</strong> sabemos que necesitamos herramientas de switchback testing (como Statsig) para aislar efectos con más control a nivel usuario. Priorizamos PIM primero porque nos da la superficie de precios limpia sobre la que testear. Statsig es la siguiente prioridad, y va a ser un salto en la velocidad y precisión con la que podemos correr experimentos.</>}</div>
      </div>

      {/* ═══ OPPORTUNITY AREAS ═══ */}
      <hr className="section-divider" />
      <div className="section">
        <div className="section-label">{en ? "Opportunity Areas" : "Áreas de Oportunidad"}</div>
        <h2>{en ? <>Where we see <span className="accent">opportunity.</span></> : <>Dónde vemos <span className="accent">oportunidad.</span></>}</h2>
        <div className="section-intro">{en
          ? <>We've identified and sized four opportunity areas across different pricing surfaces. Combined 2026 contribution range: <strong>€3.2M to €6.9M</strong>, with a realistic midpoint around €5M. Each is data-anchored and being actively worked.</>
          : <>Identificamos y dimensionamos cuatro áreas de oportunidad en diferentes superficies de pricing. Rango de contribución combinada 2026: <strong>€3.2M a €6.9M</strong>, con un punto medio realista alrededor de €5M. Cada una está anclada en datos y se está trabajando activamente.</>}</div>
        <div className="opp-list">
          <div className="opp-row"><div className="opp-num">1</div><div className="opp-body"><div className="opp-title">{en ? "Gross margin recovery on below-floor destinations" : "Recuperación de margen bruto en destinos bajo el piso"}</div><div className="opp-desc">{en ? "9 material destinations with low gross margins, co-led with Carriers and Operations. Focus on cost-side and pricing-side levers." : "9 destinos materiales con márgenes brutos bajos, co-liderado con Carriers y Operaciones. Foco en palancas de costo y pricing."}</div></div><div className="opp-range"><span className="range-label">2026</span>€1.5M – €2.6M</div></div>
          <div className="opp-row"><div className="opp-num">2</div><div className="opp-body"><div className="opp-title">{en ? "PIM-enabled pricing corrections" : "Correcciones de pricing vía PIM"}</div><div className="opp-desc">{en ? "Validation and measurement of new clustered pricing models deployed through the Strapi migration. 123 destinations in the mid-range GM band." : "Validación y medición de nuevos modelos de pricing clusterizados desplegados en la migración a Strapi. 123 destinos en la banda media de GM."}</div></div><div className="opp-range"><span className="range-label">2026</span>€500K – €1.7M</div></div>
          <div className="opp-row"><div className="opp-num">3</div><div className="opp-body"><div className="opp-title">{en ? "App channel pricing opportunity" : "Oportunidad de pricing en canal App"}</div><div className="opp-desc">{en ? "Web AOV runs consistently higher than App for the same product. App volume keeps growing and now represents a larger share of total purchases. There's also an open question around how new versus returning customers behave differently on pricing in this channel." : "El AOV de Web es consistentemente más alto que App para el mismo producto. El volumen de App sigue creciendo y ya representa un share más grande del total de compras. También hay una pregunta abierta sobre cómo se comportan diferente los clientes nuevos versus los recurrentes en pricing en este canal."}</div></div><div className="opp-range"><span className="range-label">2026</span>€400K – €1M</div></div>
          <div className="opp-row"><div className="opp-num">4</div><div className="opp-body"><div className="opp-title">{en ? "FX-driven pricing project" : "Proyecto de pricing por FX"}</div><div className="opp-desc">{en ? "Active pipeline of 10-15 currency-level experiments testing how much of each fixed-vs-market rate gap the market absorbs. Already in execution." : "Pipeline activo de 10-15 experimentos a nivel moneda testeando cuánto del gap entre tasa fija y de mercado el mercado absorbe. Ya en ejecución."}</div></div><div className="opp-range"><span className="range-label">2026</span>€800K – €1.6M</div></div>
        </div>
        <div className="callout" style={{marginTop:14}}>{en
          ? "These four areas are not independent wishlists. They work on different pricing surfaces and two pairs interact: Opp 1 and Opp 2 are mutually exclusive by GM band, while Opp 3 captures the residual after Opp 2 resolves the PIM-related portion of the gap. Opp 4 (FX) is orthogonal to all."
          : "Estas cuatro áreas no son wishlists independientes. Trabajan en diferentes superficies de pricing y dos pares interactúan: Opp 1 y Opp 2 son mutuamente excluyentes por banda de GM, mientras que Opp 3 captura el residual después de que Opp 2 resuelva la porción del gap relacionada con PIM. Opp 4 (FX) es ortogonal a todas."}</div>
      </div>

      {/* ═══ ROADMAP ═══ */}
      <hr className="section-divider" />
      <div className="section">
        <div className="section-label">{en ? "What's Next" : "Lo Que Viene"}</div>
        <h2>{en ? <>The road <span className="highlight">ahead.</span></> : <>El camino <span className="highlight">por delante.</span></>}</h2>
        <div className="section-intro">{en ? "Three structural shifts that will accelerate the pricing function in the coming months." : "Tres cambios estructurales que van a acelerar la función de pricing en los próximos meses."}</div>
        <div className="card" style={{marginBottom:18}}>
          <div className="roadmap-row"><div className="roadmap-when" style={{color:"var(--pink)"}}>{en ? "Now" : "Ahora"}</div><div className="roadmap-what"><strong>{en ? "PIM migration completing." : "Migración PIM completándose."}</strong> {en ? "New clustered pricing models being validated and deployed phase by phase. Target: full migration by late June. This creates the clean pricing baseline everything else builds on." : "Nuevos modelos de pricing clusterizados siendo validados y desplegados fase por fase. Target: migración completa para fines de junio. Esto crea la baseline limpia de pricing sobre la que se construye todo lo demás."}</div></div>
          <div className="roadmap-row"><div className="roadmap-when" style={{color:"var(--blue)"}}>Q3 2026</div><div className="roadmap-what"><strong>{en ? "A/B testing infrastructure." : "Infraestructura de A/B testing."}</strong> {en ? "Statsig rollout enables randomized experiments at the user level. This is a step change: from market-level comparisons to true A/B within the same market. Faster iterations, cleaner causal attribution." : "El rollout de Statsig habilita experimentos randomizados a nivel usuario. Este es un salto de calidad: de comparaciones a nivel mercado a A/B real dentro del mismo mercado. Iteraciones más rápidas, atribución causal más limpia."}</div></div>
          <div className="roadmap-row"><div className="roadmap-when" style={{color:"var(--green)"}}>Q3–Q4</div><div className="roadmap-what"><strong>{en ? "Team scaling." : "Escalamiento del equipo."}</strong> {en ? "Joan joins as Pricing Manager (May 19). The open Pricing Analyst role adds SQL/Python capacity for parallel experimentation. The target operating model is 5+ experiments per month across the opportunity portfolio." : "Joan se suma como Pricing Manager (19 Mayo). La posición abierta de Pricing Analyst agrega capacidad SQL/Python para experimentación en paralelo. El modelo operativo target es 5+ experimentos por mes a través del portfolio de oportunidades."}</div></div>
        </div>
        <div className="callout green"><strong>{en ? "The compound effect:" : "El efecto compuesto:"}</strong>{en ? " PIM gives us a clean, governable price surface. Statsig gives us speed and precision. The team gives us throughput. Together, these move us from one-off corrections to a real pricing optimization program." : " PIM nos da una superficie de precios limpia y gobernable. Statsig nos da velocidad y precisión. El equipo nos da throughput. Juntos, nos mueven de correcciones puntuales a un programa real de optimización de pricing."}</div>
      </div>

      {/* ═══ FOOTER ═══ */}
      <div className="page-footer">
        <strong>Holafly · Growth Pricing</strong> · {en ? "Prepared for area overview, May 2026 · All figures anchored on Q1-Q2 2026 data" : "Preparado para overview del área, Mayo 2026 · Todas las cifras ancladas en datos Q1-Q2 2026"}
      </div>
    </div>
  </div>);
}
